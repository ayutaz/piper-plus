# markdownlint configuration for piper-plus
# https://github.com/DavidAnson/markdownlint
default: true

# Disabled rules (with rationale):
MD013: false   # Line length
              # Rationale: docs include long URLs, code blocks, table cells
              # that would be ugly to wrap. Editors fold long lines.
MD024:        # Multiple headers with the same content
  siblings_only: true
MD026: false   # Trailing punctuation in header
              # Rationale: 「概要」「使い方」など日本語ヘッダで:を許容
MD033:        # Inline HTML
  allowed_elements:
    - br
    - details
    - summary
    - kbd
    - sub
    - sup
    - table
    - tr
    - td
    - th
MD041: false   # First line in file should be a top-level header
              # Rationale: some files start with frontmatter / license

# Disabled rules (existing baseline 違反が大量、別 PR で段階的修正):
MD022: false  # Headings should be surrounded by blank lines
              # Rationale: 既存 docs で多用、Wave 後段で個別修正
MD032: false  # Lists should be surrounded by blank lines
              # Rationale: 同上
MD040: false  # Fenced code blocks should have a language specified
              # Rationale: ``` (no lang) はテキスト出力例として頻出
MD034: false  # Bare URLs (no <>)
              # Rationale: localhost / example URL の説明で頻出
MD004: false  # Unordered list style (* vs -)
              # Rationale: Markdown ファイル間の混在を許容
MD009: false  # Trailing whitespace
              # Rationale: 既存 docs に大量、auto-fix で対応推奨
MD025: false  # Multiple top-level H1 headings
              # Rationale: 多言語 README に複数 H1 あり

# Strict rules:
MD010:        # Hard tabs
  code_blocks: false
MD012:        # Multiple blank lines
  maximum: 3
MD030:        # Spaces after list markers
  ul_single: 1
  ul_multi: 1
  ol_single: 1
  ol_multi: 1
