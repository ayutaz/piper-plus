# Official Model SHA-256 Manifest
# ================================
# This file is the canonical hash pin for every official piper-plus model
# (and its companion config.json) that we publish. Every runtime's model
# resolution path (Python, Rust, C#, Go, WASM, C++) MUST verify the
# downloaded artifact's SHA-256 against the value pinned here before
# loading. Hash mismatch is a hard error — never a warning.
#
# Why pin: HF mirrors are mutable storage. A silent re-upload (or supply
# chain compromise) of a model under the same URL would otherwise change
# inference behaviour without any signal to the user. By pinning we make
# the change visible: the loader fails fast with a clear "expected X, got
# Y" message, and the operator can inspect the diff before continuing.
#
# Update procedure:
#   1. Train / re-export the model.
#   2. Upload to HuggingFace under the canonical mirror URL.
#   3. Compute SHA-256 of the published bytes (sha256sum / shasum -a 256).
#   4. Update this file's `sha256` and `bytes` fields IN THE SAME COMMIT
#      that bumps CHANGELOG.md and (if applicable) release-versions.toml.
#   5. Publish.
#
# CI gate: scripts/check_model_manifest.py (planned) verifies that every
# `<computed-on-publish>` placeholder is filled in before any release tag
# is created.
#
# Implementations:
#   Python:    src/python_run/piper/download.py
#   Rust:      src/rust/piper-cli/src/download.rs
#   C#:        src/csharp/PiperPlus.Cli/Download/ModelDownloader.cs
#   Go:        src/go/cmd/piper-plus/download.go
#   WASM:      src/wasm/openjtalk-web/src/model-download.js (browser fetch + subtle.digest)
#   C++:       src/cpp/main.cpp (CLI download path)

[meta]
spec_version = "1.0"
last_updated = "2026-05-09"
canonical_source = "docs/spec/model-sha256-manifest.toml"
hash_algorithm = "SHA-256"
hash_encoding = "lowercase hex, 64 chars"
update_policy = """
Hash and CHANGELOG.md MUST be updated in the same commit. Re-uploading a
model file under an existing entry without updating both is a release
process violation.
"""

# ============================================================================
# Required config.json fields
# ============================================================================
# Every official piper-plus model ships with a sibling config.json. The
# fields below are required by every runtime loader; missing fields are a
# hard load error (not a warning). Optional fields may be present and are
# surfaced via the relevant feature contracts (e.g. `short_text` in
# short-text-contract.toml).

[config_schema]
required_fields = [
    "audio.sample_rate",         # int (Hz) — typically 22050
    "espeak.voice",              # str — language code for legacy espeak compat
    "inference.noise_scale",     # float — default 0.667
    "inference.length_scale",    # float — default 1.0
    "inference.noise_w",         # float — default 0.8
    "phoneme_id_map",            # object — single-codepoint string -> int[]
    "phoneme_type",              # str — typically "espeak" or "text"
    "num_symbols",               # int — vocabulary size
    "num_speakers",              # int — 1 for single-speaker models
    "speaker_id_map",            # object — empty {} for single-speaker
    "language_id_map",           # object — multilingual models; empty {} otherwise
    "piper_version",             # str — semver of the producing piper-plus
]

optional_fields = [
    "short_text",                # see short-text-contract.toml
    "prosody",                   # prosody_dim and related fields
    "version",                   # legacy alias for piper_version (still read)
]

# ============================================================================
# Model entries
# ============================================================================
# Each [[models]] entry pins one published model. `sha256` placeholders
# (`<computed-on-publish>`) MUST be filled in before the entry's first
# tagged release. Entries are listed in the same order as CLAUDE.md's
# "学習済みモデル (6言語マルチリンガル)" table for ease of cross-reference.

# ---------------------------------------------------------------------------
# [Archived] 6lang base (HiFi-GAN, 75 epoch) — v1.11 系 / 非推奨
# ---------------------------------------------------------------------------
# このエントリは v1.11 系の HiFi-GAN Decoder で学習されたモデルです。
# v1.12.0 で HiFi-GAN Decoder は削除され MB-iSTFT に統一されたため、
# 新規利用は非推奨。互換のためマニフェストには残置していますが、
# 現行モデルとしては下記 `multilingual-6lang-mb-istft` を使用してください。
# 詳細: docs/migration/v1.11-to-v1.12.md
# ---------------------------------------------------------------------------
[[models]]
name = "multilingual-6lang-base"
description = "[Archived/v1.11] 6lang base model trained for 75 epochs on the v1.11 HiFi-GAN pipeline (deprecated in v1.12.0)"
training_basis = "75 epoch (v1.11 HiFi-GAN)"
deprecated = true
deprecated_since = "1.12.0"
deprecated_reason = "HiFi-GAN Decoder removed in v1.12.0; superseded by multilingual-6lang-mb-istft"
trained_languages = ["ja", "en", "zh", "es", "fr", "pt"]
local_origin = "/data/piper/output-multilingual-6lang/"
hf_mirror_repo = "ayousanz/piper-plus-base"
hf_mirror_url = "https://huggingface.co/ayousanz/piper-plus-base/resolve/main/multilingual-6lang-base.onnx"

[[models.artifacts]]
filename = "multilingual-6lang-base.onnx"
sha256 = "<computed-on-publish>"
bytes = 0  # <computed-on-publish>

[[models.artifacts]]
filename = "multilingual-6lang-base.onnx.json"
role = "config"
sha256 = "<computed-on-publish>"
bytes = 0  # <computed-on-publish>

# ---------------------------------------------------------------------------
# 6lang MB-iSTFT (75 epoch, scratch) — 現行 / v1.12.0 推奨
# ---------------------------------------------------------------------------
# v1.12.0 以降の canonical な 6lang base モデル。MB-iSTFT Decoder で学習され、
# CPU Decoder 単体で約 2.21x の高速化を達成 (HiFi-GAN 168.2ms → MB-iSTFT
# 76.2ms / 100 phoneme p50)。新規 FT は本モデルを base にしてください。
# ---------------------------------------------------------------------------
[[models]]
name = "multilingual-6lang-mb-istft"
description = "6lang base model trained for 75 epochs from scratch with MB-iSTFT decoder (canonical for v1.12.0+)"
training_basis = "75 epoch scratch (MB-iSTFT)"
