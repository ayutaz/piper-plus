# ============================================================================
# Verification behaviour (runtime side)
# ============================================================================

[verification]
# How the loader behaves when the on-disk artifact's SHA-256 differs from
# the manifest. The same semantics apply across every runtime.

on_mismatch = "fail"
on_missing_artifact = "download_then_verify"
on_missing_pin_in_manifest = "warn_then_skip_verify"  # for user-supplied custom models

error_message_format = """
Hash mismatch for {filename}:
  expected: {expected_sha256}
  actual:   {actual_sha256}
Refusing to load. The downloaded file may be corrupt, mirrored from a
stale CDN, or tampered with. Delete the local cache and retry, or pin a
different model name.
"""

# Checking the config.json hash is just as important as the .onnx hash —
# config.json contains the phoneme_id_map which directly affects audio
# output. Tampering only the JSON would silently change inference.
require_config_hash_match = true

# ============================================================================
# Custom (user-supplied) models
# ============================================================================

[custom_models]
# Models not listed in this manifest are loaded without hash verification
# (the loader emits a single info-level log line). This is the documented
# escape hatch for users who train their own models — pinning would not be
# feasible because the file is local-only.
allowed = true
log_level = "info"
log_message = "Loading unpinned model {filename}; no SHA-256 verification performed."
