local_origin = "/data/piper/output-multilingual-6lang-mb-istft/multilingual-6lang-mb-istft-scratch-75epoch.onnx"
hf_mirror_repo = "ayousanz/piper-plus-base"
hf_mirror_url = "https://huggingface.co/ayousanz/piper-plus-base/resolve/main/multilingual-6lang-mb-istft-scratch-75epoch.onnx"

[[models.artifacts]]
filename = "multilingual-6lang-mb-istft-scratch-75epoch.onnx"
sha256 = "<computed-on-publish>"
bytes = 0  # <computed-on-publish>

[[models.artifacts]]
filename = "multilingual-6lang-mb-istft-scratch-75epoch.onnx.json"
