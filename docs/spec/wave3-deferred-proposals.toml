# =============================================================================
# T15: Benchmark Regression 強化
# =============================================================================

[t15_dynamic_threshold]
priority = "HIGH"
effort = "M (~1 週間)"
status = "proposal"
description = """
multi-runtime-rtf.yml の固定 threshold (rtf 10%, latency p95 15%) を
stddev × 2 動的計算に置換し、 runner variance に適応。
"""
implementation = """
  1. scripts/calibrate_bench_stddev.py: gh-pages の過去 5-10 回の bench
     を集約し、 ランタイム × text-length 別 stddev を算出
  2. multi-runtime-rtf-baseline.json に _stddev_baseline.json を追加
  3. multi-runtime-rtf.yml の aggregator step で動的 threshold 判定
"""

[t15_unified_schema]
priority = "MEDIUM"
effort = "M (~1 週間)"
status = "proposal"
description = """
benchmark.py (in-process) と benchmark_runtime.py (subprocess) の出力
schema を統一 TOML contract で定義し、 iOS / Android bench も同 schema
で互換に。
"""
implementation = """
  1. docs/spec/benchmark-contract.toml: 統一 JSON schema (metric / unit /
     comparison method)
  2. benchmark.py / benchmark_runtime.py 両者がこの schema 準拠で出力
  3. pre-commit hook: check_benchmark_contract.py
"""

[t15_mobile_harness]
priority = "LOW"
effort = "L (~2 週間)"
status = "proposal"
description = """
iOS Simulator + Android Emulator で bench を走らせる harness。
"""
implementation = """
  1. benchmark_mobile.py: xcrun simctl (iOS) + adb (Android emu) wrapper
  2. CI workflow: mobile-bench.yml (scheduled weekly / manual dispatch)
  3. 結果は multi-runtime-rtf-baseline.json に ios_simulator /
     android_emulator cell として格納
"""

