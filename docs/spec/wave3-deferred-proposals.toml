# Wave 3 Deferred Proposals — Cross-Runtime Parity / Benchmark / Governance
#
# Wave 3 (workflow automation enhancement) で 15 並列 agent が 75 提案を
# 出したうち、 PR 規模 (45 件規模) を考慮して個別 PR に分割した方が良い
# 大規模 task を本 spec に集約。 各 proposal の優先度 / 実装計画を
# canonical 化する。
#
# 順序: 個別 PR の作成は T14 → T15 → T16 で進める想定。

[meta]
spec_version = 1
last_updated = "2026-05-16"
applies_to = ["python", "rust", "go", "csharp", "wasm", "cpp", "kotlin", "swift"]
forward_compat_policy = "strict"
status = "deferred-from-wave3"
canonical_reference = "Wave 3 agent調査 (75 提案)"

# =============================================================================
# T14: Cross-Runtime Parity 拡大
# =============================================================================

[t14_speaker_embedding_e2e]
priority = "HIGH"
effort = "M (~1 週間)"
status = "scaffold-only"
description = """
Speaker Encoder (ECAPA-TDNN) の E2E cross-runtime parity gate を 6 runtime
拡張する。 現状は Mel parity Layer 1 のみ検証済 (contract-gates-extended.yml
の speaker-encoder)。 E2E cosine gate (Layer 2) は scaffold 化されているが
encoder ONNX が release されていない。
"""
implementation = """
  1. ECAPA-TDNN ONNX を release (HF にアップロード + sha256-manifest 追加)
  2. e2e-issue-426.yml の job を 6 runtime に拡張 (Python/Rust/Go/C#/C++/WASM)
  3. 各 runtime で encoder.onnx 推論時の embedding feeding パス一致を assert
  4. fixture: tests/fixtures/speaker-encoder/golden_embeddings.json
"""

[t14_custom_dict_v2_lookup]
priority = "HIGH"
effort = "M (~1 週間)"
status = "proposal"
description = """
カスタム辞書 JSON v2 → phoneme ID mapping の 7 runtime parity gate。
特に Kotlin Android / Swift G2P-only での辞書 lookup パス、 JSON schema
version 差を検証。
"""
implementation = """
  1. tests/fixtures/dictionary/v2_lookup_matrix.json を作成 (ja/en/pt の
     custom dict + test case matrix)
  2. 各 runtime の dict.load() + lookup() 結果が canonical (Python) と
     一致するか assert
  3. Kotlin/Swift test scaffold を追加 (Swift FFI + Kotlin JNI bridge)
  4. CI gate: dictionary-lookup-parity.yml
"""

[t14_pt_dialect_audio]
priority = "MEDIUM"
effort = "L (~2 週間)"
status = "proposal"
description = """
PT BR / EU dialect の audio cosine assert。 現状 phoneme-id level までは
parity 済 (pt-dialect-contract.toml + pt_dialect_parity.json)、 audio
合成 (mel synthesis + duration) は未検証。
"""
implementation = """
  1. fixture: tests/fixtures/pt_dialect/golden_audio_matrix.json (BR 3 ref +
     EU 3 variant)
  2. canonical Python TTS で合成 → reference WAV 生成
  3. 各 runtime (Rust/Go/C#/C++/WASM) で同合成 → cosine-sim 閾値で assert
  4. CI gate: pt-dialect-audio-parity.yml (重い、 schedule weekly)
"""

[t14_ssml_audio_byte_for_byte]
priority = "LOW"
effort = "L (~2 週間)"
status = "proposal"
description = """
SSML <prosody rate> / <break time> の WAV output byte-for-byte parity。
現状 SSML→phoneme stream の parity (G2P-only) のみ。 audio output 差
(length_scale 適用 / silence 挿入 / duration scaling) は未検証。
"""
implementation = """
  1. fixture: tests/fixtures/ssml/golden_audio_matrix.json
  2. canonical Python SSML 合成 → wav dump
  3. 各 runtime での md5 / PCM byte 一致検証
  4. skill: check-ssml-audio-contract.py
"""

[t14_list_models_filter]
priority = "LOW"
effort = "S (~半日)"
status = "proposal"
description = """
--list-models --language <lang> filter の cross-runtime parity。 現状は
