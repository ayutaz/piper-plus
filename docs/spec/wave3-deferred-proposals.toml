# =============================================================================
# 不変条件
# =============================================================================

[[invariants]]
name = "individual-pr-per-task"
description = """
T14 / T15 / T16 は個別 PR で進める。 Wave 3 PR にまとめて入れない
(PR レビュー困難 + revert 影響範囲が大きい)。
"""

[[invariants]]
name = "test-coverage-first"
description = """
各 task は実装前に「現状の検証深度」 を spec に明記する。
"phoneme-id level only" / "audio sample" / "byte-for-byte" の区別を明確化。
"""

[[invariants]]
name = "fixture-first-then-runtime"
description = """
cross-runtime parity 拡大は「canonical (Python) で fixture 生成」 を先に
行い、 そこから各 runtime test を追加する。 fixture が canonical を確定
した後に runtime test の golden 化が可能。
"""
