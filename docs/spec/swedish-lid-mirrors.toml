# Swedish per-word LID (language-ID) function-word JSON mirror declarations.
#
# Source of truth: src/python/g2p/piper_plus_g2p/data/sv_function_words.json
# Consumed by scripts/check_swedish_lid_consistency.py (thin wrapper around
# scripts/_mirror_check.py).
#
# One group: the Swedish function-word / strong-char table that drives
# per-word Swedish language detection. 7 runtime mirrors must be
# byte-for-byte equal to the Python g2p canonical (Python runtime / Rust ×
# 2 crate / Go / C# / WASM / C++).
#
# Schema validation for the group is registered in code by the wrapper
# (`register_schema_validator`) because it inspects JSON structure that
# can't be declared in TOML. Forward-compat: the validator accepts unknown
# top-level fields and `schema_version` absence/extra silently so a future
# `schema_version: 2`-shaped canonical is not rejected at runtime (matching
# the ZH-EN loanword loader stance).

[meta]
forward_compat_policy = "strict"

schema_version = 1

[[groups]]
name = "sv_function_words runtime data (7 mirrors)"
canonical = "src/python/g2p/piper_plus_g2p/data/sv_function_words.json"
mirrors = [
  "src/python_run/piper/phonemize/data/sv_function_words.json",
  # Rust 2 crate (piper-plus-g2p と piper-core の重複維持)
  "src/rust/piper-plus-g2p/data/sv_function_words.json",
  "src/rust/piper-core/data/sv_function_words.json",
  "src/go/phonemize/data/sv_function_words.json",
  "src/csharp/PiperPlus.Core/Phonemize/Data/sv_function_words.json",
  "src/wasm/g2p/data/sv_function_words.json",
  "src/cpp/data/sv_function_words.json",
]
incident_refs = ["Issue #539", "PR #297 regression via #300"]
notes = "Conservative per-word Swedish LID policy: strong_chars = å/Å plus the function_words list trigger Swedish; ä/ö are weak (shared with German etc.) and intentionally NOT strong_chars. Schema validator registered in code (sv-specific JSON shape)."
