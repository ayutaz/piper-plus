# Language ID Map Cross-Runtime Contract
# =======================================
# This file pins the canonical language code -> integer ID mapping that ALL
# trained piper-plus checkpoints (and therefore all 6 runtimes consuming the
# resulting ONNX models) MUST agree on.
#
# Drift is catastrophic: if any runtime, dataset preprocessor, or test fixture
# uses a different mapping (e.g. swaps `zh` and `es`), the model's `emb_lang`
# lookup is silently misindexed and every multilingual checkpoint produced with
# the v1.11+ pipeline becomes unrecoverable. There is no graceful fallback.
#
# Source of truth (Python canonical):
#   src/python/piper_train/tools/prepare_multilingual_dataset.py
#     `LANGUAGE_ID_MAP` (line ~43) and `ALL_LANGUAGES` (line ~46)
#
# Per-runtime implementations and test fixtures (verified by
# `scripts/check_language_id_map_contract.py`):
#   Python (training, canonical):
#     src/python/piper_train/tools/prepare_multilingual_dataset.py     (LANGUAGE_ID_MAP)
#   Python (runtime, 6-lang trained subset):
#     src/python_run/piper/voice.py                                    (multilingual phonemizer language list)
#   Rust (piper-core test fixtures):
#     src/rust/piper-core/src/config.rs                                (test JSON literals)
#     src/rust/piper-core/src/wasm.rs                                  (test JSON literal)
#   Rust (piper-wasm test fixture):
#     src/rust/piper-wasm/src/lib.rs                                   (sample config JSON literal)
#   Go (config test fixture):
#     src/go/piperplus/testdata/valid_multilingual_config.json
#   WASM/openjtalk-web sample model config:
#     src/wasm/openjtalk-web/models/multilingual-test-medium.onnx.json
#
# C# (PiperPlus.Core/Cli) and C++ (piper.cpp) parse the mapping from the model
# config JSON at runtime and have no hard-coded canonical map; their drift
# surface is the model config itself, which is generated by the Python
# canonical above.

[meta]
forward_compat_policy = "strict"

[canonical]
# Canonical language -> language_id mapping. The 7-language form is the
# code-side ground truth (sv has G2P + symbol coverage but no trained model
# yet). The 6-language form (sv removed) is the *trained-model* subset
# emitted into checkpoint config.json files.
#
# All runtimes that hard-code or test against a literal mapping MUST use
# either the 7-language form (training-side) or the 6-language form
# (trained-model side). No other ordering is permitted.

# Training/dataset side (7 languages — includes sv).
language_id_map = { ja = 0, en = 1, zh = 2, es = 3, fr = 4, pt = 5, sv = 6 }

# Stable canonical ordering (sorted by language_id ascending).
all_languages = ["ja", "en", "zh", "es", "fr", "pt", "sv"]

# Trained-model side (6 languages — sv excluded; this is what current
# checkpoint config.json language_id_map fields contain).
trained_language_id_map = { ja = 0, en = 1, zh = 2, es = 3, fr = 4, pt = 5 }
trained_languages = ["ja", "en", "zh", "es", "fr", "pt"]

# Extended/future-model side (8 languages — adds ko=7). Used by piper-wasm's
# sample multilingual config generator (`piper-wasm/src/lib.rs`) to project
# the full 8-language phoneme inventory documented in
# `src/python/g2p/piper_plus_g2p/encode/id_maps.py:140` ("ja-en-zh-es-fr-pt-ko-sv").
# IMPORTANT: ja..pt indexes match `language_id_map` (the 7-lang form) exactly;
# `sv` and `ko` are the only added entries, in that order. Any future trained
# model that includes ko MUST keep ko=7.
extended_language_id_map = { ja = 0, en = 1, zh = 2, es = 3, fr = 4, pt = 5, sv = 6, ko = 7 }
extended_languages = ["ja", "en", "zh", "es", "fr", "pt", "sv", "ko"]

[invariants]
# These properties hold for every (canonical|trained) language_id_map and are
# enforced by `scripts/check_language_id_map_contract.py`.
keys_lowercase = true               # all language codes lowercase ISO 639-1
values_consecutive_from_zero = true # values exactly == range(len(map))
values_unique = true                # no duplicate IDs
ja_is_zero = true                   # ja=0 is load-bearing for legacy ckpts
en_is_one = true                    # en=1 is load-bearing for legacy ckpts

[runtime_sources]
# Per-runtime files containing a literal language_id_map. The drift checker
# parses these and asserts they match either `canonical.language_id_map`
# (7-lang form) or `canonical.trained_language_id_map` (6-lang form).
#
# `kind` controls how `check_language_id_map_contract.py` extracts the mapping:
#   python_dict_literal     — Python `NAME = {"ja": 0, ...}` assignment
#   python_list_literal     — Python `NAME = [...]` list assignment
#   inline_substring_6lang  — file must contain the 6-lang JSON literal
#   inline_substring_7lang  — file must contain the 7-lang JSON literal
#   inline_substring_8lang  — file must contain the 8-lang JSON literal (sv+ko)
#   json_field              — JSON file's `language_id_map` field
#   none                    — data-driven from config; nothing to verify here

[[runtime_sources.entries]]
runtime = "python_train"
path = "src/python/piper_train/tools/prepare_multilingual_dataset.py"
kind = "python_dict_literal"
symbol = "LANGUAGE_ID_MAP"
expected = "language_id_map"  # 7-lang form (training side)

[[runtime_sources.entries]]
runtime = "python_train"
path = "src/python/piper_train/tools/prepare_multilingual_dataset.py"
kind = "python_list_literal"
symbol = "ALL_LANGUAGES"
expected = "all_languages"

[[runtime_sources.entries]]
runtime = "python_runtime"
path = "src/python_run/piper/voice.py"
kind = "python_list_literal_inline"
# voice.py uses an inline list literal (no top-level constant); we look for
# the 6-lang literal directly.
expected = "trained_languages"

[[runtime_sources.entries]]
runtime = "rust_core"
path = "src/rust/piper-core/src/config.rs"
kind = "inline_substring_6lang"
expected = "trained_language_id_map"

[[runtime_sources.entries]]
runtime = "rust_core"
path = "src/rust/piper-core/src/wasm.rs"
kind = "inline_substring_6lang"
expected = "trained_language_id_map"

[[runtime_sources.entries]]
runtime = "rust_wasm"
path = "src/rust/piper-wasm/src/lib.rs"
kind = "inline_substring_8lang"
expected = "extended_language_id_map"
note = "Future-facing 8-language sample config (sv=6, ko=7)."

[[runtime_sources.entries]]
runtime = "go"
path = "src/go/piperplus/testdata/valid_multilingual_config.json"
kind = "json_field"
field = "language_id_map"
expected = "trained_language_id_map"

[[runtime_sources.entries]]
runtime = "wasm_openjtalk"
path = "src/wasm/openjtalk-web/models/multilingual-test-medium.onnx.json"
kind = "json_field"
field = "language_id_map"
expected = "trained_language_id_map"

# C# and C++ runtimes parse language_id_map from the model config at runtime
# and have NO source-level literal to verify. They are intentionally listed
# here as `none` to make the absence visible (and to fail loudly if a future
# PR adds an inline literal that should be verified).

[[runtime_sources.entries]]
runtime = "csharp"
path = "src/csharp/PiperPlus.Core/Config/PiperConfig.cs"
kind = "none"
note = "Data-driven: LanguageIdMap is parsed from config JSON."

[[runtime_sources.entries]]
runtime = "cpp"
path = "src/cpp/piper.cpp"
kind = "none"
note = "Data-driven: languageIdMap parsed from config JSON (see piper.cpp:318)."

[expected_not_found]
# Patterns that should NOT appear anywhere outside the documented sources.
# A future audit could grep for these to catch accidental new hard-codings.
forbidden_outside_sources = [
    # Any other ordering would break trained models. Examples of catastrophic
    # drift the checker should reject if it ever appears in a non-allowlisted
    # source file:
    '"ja": 0, "zh": 1',  # zh promoted to 1 (would break en lookup)
    '"en": 0, "ja": 1',  # ja/en swapped
    '"ja": 1, "en": 0',  # ja/en swapped (alternate ordering)
]
