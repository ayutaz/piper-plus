[tool.ruff]
# Ruffの基本設定
line-length = 88  # blackと同じ行長
target-version = "py311"  # Python 3.11以降をターゲット

# 除外するファイルとディレクトリ
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
    "src/python/piper_train/vits/monotonic_align",  # Cython generated
]

[tool.ruff.lint]
# 有効にするルール
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "ARG",  # flake8-unused-arguments
    "PL",   # pylint
]

# 除外するルール
ignore = [
    "E501",  # line too long (blackが処理)
    "PLR0913",  # Too many arguments to function call
    "PLR2004",  # Magic value used in comparison
    "PLR0912",  # Too many branches
    "PLR0915",  # Too many statements
    "ARG001",  # Unused function argument
    "ARG002",  # Unused method argument
    "PLW2901",  # Redefined loop name
]

# isort互換設定
[tool.ruff.lint.isort]
known-first-party = ["piper", "piper_train"]

# flake8-quotes互換設定
[tool.ruff.lint.flake8-quotes]
inline-quotes = "double"

# Per-file ignores
[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
"src/python/tests/*" = ["ARG"]
"scripts/*" = ["ARG"]
# token_mapper.py: グローバル変数を使用した音素マッピングシステム
"src/python/piper_train/phonemize/token_mapper.py" = ["PLW0603"]
# mel_processing.py: パフォーマンス最適化のためのグローバルキャッシュ
"src/python/piper_train/vits/mel_processing.py" = ["PLW0602"]
# test_phonemize.py: オプショナルな依存関係の条件付きインポート
"src/python/tests/test_phonemize.py" = ["E402"]