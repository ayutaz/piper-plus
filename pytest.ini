[pytest]
# Pytest configuration for piper-tts

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test* *Tests
python_functions = test_*

# Test paths
testpaths =
    src/python/tests
    src/python_run/tests
    test
    tools/benchmark

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may require external resources)
    slow: Slow running tests
    japanese: Japanese TTS specific tests
    training: Training related tests
    inference: Inference related tests
    requires_gpu: Tests that require GPU
    requires_openjtalk: Tests that require OpenJTalk
    requires_model: Tests that require a model file
    benchmark: Performance benchmark tests

# Coverage configuration
# `--cov-fail-under` は pyproject.toml の `[tool.coverage.report] fail_under`
# を引き継ぎつつ、pytest 経由でも明示的に閾値を強制する (CI fail-fast)。
addopts =
    --verbose
    --strict-markers
    --cov=src/python/piper_train
    --cov=src/python_run/piper
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=70
    --ignore=scripts/test_phoneme_input.py
    --ignore=scripts/test_streaming_mode.py

# Timeout for tests (in seconds)
timeout = 300

# Parallel execution settings
# Use -n auto for automatic CPU count detection
# addopts = -n auto

# Output and reporting
console_output_style = progress
junit_family = xunit2

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::FutureWarning
