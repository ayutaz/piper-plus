name: Docker Build and Push

# Multi-arch publishing strategy (Issue: HA Raspberry Pi user, dev audit):
#
# Most images target both linux/amd64 and linux/arm64 via QEMU emulation
# (set up by docker/setup-qemu-action). emulated arm64 builds are 3-5x
# slower than native amd64; we accept that to keep a single workflow.
#
# python-inference is CUDA-based and has NO arm64 image available
# upstream (nvidia/cuda:* manifests are amd64-only outside Jetson).
# Two build-* jobs handle this:
#   * build-python-inference          -> amd64 only, CUDA (Dockerfile)
#   * build-python-inference-cpu      -> arm64 (+ amd64), CPU (Dockerfile.cpu)
# Same ghcr.io image; tags carry a `-cpu` suffix on the CPU variant so HA
# users on Raspberry Pi can pull `:dev-cpu` and not the CUDA tag.
#
# Other images (wyoming, webui, cpp-dev, cpp-inference, python-train) use
# CUDA-free or arm64-compatible bases and build natively on both arches.

on:
  push:
    branches: [dev]
    paths:
      - 'docker/**'
      - 'Dockerfile'
      - 'src/python/**'
      - 'pyproject.toml'
      - 'CMakeLists.txt'
      - '.github/workflows/docker-build.yml'
    tags:
      - 'docker-v*'
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-python-inference:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write    # NEW: for OIDC sigstore signing
      attestations: write  # NEW: for build provenance attestation
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean

      - uses: actions/checkout@v6.0.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to ghcr.io
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/python-inference
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push to ghcr.io
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./docker/python-inference/Dockerfile
          # CUDA base nvidia/cuda:* is amd64-only; arm64 build is published
          # by the build-python-inference-cpu job below.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEW: SLSA provenance + SBOM attestation
          provenance: true
          sbom: true

      - name: Install Cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v2.4.1'

      - name: Sign the published image
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      # --- Docker Hub publish (tag push or workflow_dispatch only) ---
      - name: Check Docker Hub credentials
        if: startsWith(github.ref, 'refs/tags/docker-v') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        id: dockerhub-check
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docker Hub secrets not configured — skipping Docker Hub publish"
          fi
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: >-
          steps.dockerhub-check.outputs.available == 'true' &&
          (startsWith(github.ref, 'refs/tags/docker-v') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker Hub metadata
        if: >-
          steps.dockerhub-check.outputs.available == 'true' &&
          (startsWith(github.ref, 'refs/tags/docker-v') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
        id: meta-dockerhub
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/piper-plus-api
          tags: |
            type=semver,pattern={{version}},prefix=
            type=semver,pattern={{major}}.{{minor}},prefix=
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Push to Docker Hub
        if: >-
          steps.dockerhub-check.outputs.available == 'true' &&
          (startsWith(github.ref, 'refs/tags/docker-v') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./docker/python-inference/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-dockerhub.outputs.tags }}
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # CPU-only variant of python-inference for arm64 (HA Raspberry Pi /
  # Apple Silicon / AWS Graviton). nvidia/cuda:* base used by the CUDA
  # variant has no arm64 manifest, so we ship a separate image built from
  # docker/python-inference/Dockerfile.cpu. The image is tagged with a
  # `-cpu` suffix on ghcr.io so consumers can pin explicitly:
  #   ghcr.io/.../python-inference:dev-cpu
  build-python-inference-cpu:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write    # NEW: for OIDC sigstore signing
      attestations: write  # NEW: for build provenance attestation
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean

      - uses: actions/checkout@v6.0.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to ghcr.io
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/python-inference
          # `-cpu` suffix distinguishes from the CUDA-default tags above.
          # type=ref produces e.g. `dev-cpu`, type=semver produces `1.12.0-cpu`.
          flavor: |
            suffix=-cpu,onlatest=true
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push CPU image (multi-arch)
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./docker/python-inference/Dockerfile.cpu
          # arm64 first so multi-arch manifest defaults to the value HA
          # users care about. amd64 also published for Apple Silicon devs
          # who don't want CUDA pulls.
          platforms: linux/arm64,linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=python-inference-cpu
          cache-to: type=gha,mode=max,scope=python-inference-cpu
          # NEW: SLSA provenance + SBOM attestation
          provenance: true
          sbom: true

      - name: Install Cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v2.4.1'

      - name: Sign the published image
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

  build-python-train:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write    # NEW: for OIDC sigstore signing
      attestations: write  # NEW: for build provenance attestation
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean

      - uses: actions/checkout@v6.0.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to ghcr.io
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/python-train
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./docker/python-train/Dockerfile
          # python-train uses nvidia/cuda:12.1.0-cudnn8-* which has no
          # arm64 manifest, and arm64 model training is unsupported (no
          # PyTorch CUDA wheels). amd64 only.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEW: SLSA provenance + SBOM attestation
          provenance: true
          sbom: true

      - name: Install Cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v2.4.1'

      - name: Sign the published image
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

  build-cpp-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write    # NEW: for OIDC sigstore signing
      attestations: write  # NEW: for build provenance attestation
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean

      - uses: actions/checkout@v6.0.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to ghcr.io
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cpp-dev
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./docker/cpp-dev/Dockerfile
          # cpp-dev's Dockerfile downloads onnxruntime-linux-x64-1.17.0.tgz
          # (architecture-pinned), so multi-arch needs a deeper rewrite.
          # Keep amd64-only until that lands; cpp-inference's CMake-built
          # ORT path is already arm64-friendly and IS multi-arch below.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEW: SLSA provenance + SBOM attestation
          provenance: true
          sbom: true

      - name: Install Cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v2.4.1'

      - name: Sign the published image
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

  build-cpp-inference:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write    # NEW: for OIDC sigstore signing
      attestations: write  # NEW: for build provenance attestation
    # ORT ExternalProject + Open JTalk dictionary build is already heavy
    # under amd64; arm64 emulation roughly doubles wall time. Bump the
    # default 360-min timeout headroom explicitly so builds don't get
    # killed mid-`ninja install`.
    timeout-minutes: 240
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean

      - uses: actions/checkout@v6.0.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to ghcr.io
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cpp-inference
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./docker/cpp-inference/Dockerfile
          # cmake/ExternalDeps.cmake handles aarch64 — see
          # CMAKE_SYSTEM_PROCESSOR MATCHES "aarch64" branch. arm64 build
          # via QEMU emulation is slow (~2x amd64) but produces a valid
          # native arm64 image.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEW: SLSA provenance + SBOM attestation
          provenance: true
          sbom: true

      - name: Install Cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v2.4.1'

      - name: Sign the published image
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

  # Multi-arch is critical here: Home Assistant ships on Raspberry Pi
  # (arm64) and the docker-build job is the only path users have to a
  # working wyoming-piper-plus tag. CPU-only image, no CUDA pinning.
  build-wyoming:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write    # NEW: for OIDC sigstore signing
      attestations: write  # NEW: for build provenance attestation
    # arm64 emulated build for pyopenjtalk (C++ extension compile from
    # source) takes ~25 min per arch on QEMU; default 360-min is plenty,
    # but we set an explicit headroom so a hung `pip install` is killed
    # before it consumes the whole queue slot.
    timeout-minutes: 120
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean

      - uses: actions/checkout@v6.0.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to ghcr.io
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/wyoming
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push to ghcr.io
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./docker/wyoming/Dockerfile
          # python:3.11-slim-trixie has a native arm64 manifest; the
          # wyoming Dockerfile already builds pyopenjtalk from source in
          # stage 1 (build-essential + cmake + g++), so arm64 works
          # without further changes.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEW: SLSA provenance + SBOM attestation
          provenance: true
          sbom: true

      - name: Install Cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v2.4.1'

      - name: Sign the published image
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      # --- Docker Hub publish (tag push or workflow_dispatch only) ---
      - name: Check Docker Hub credentials
        if: startsWith(github.ref, 'refs/tags/docker-v') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        id: dockerhub-check
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docker Hub secrets not configured -- skipping Docker Hub publish"
          fi
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: >-
          steps.dockerhub-check.outputs.available == 'true' &&
          (startsWith(github.ref, 'refs/tags/docker-v') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker Hub metadata
        if: >-
          steps.dockerhub-check.outputs.available == 'true' &&
          (startsWith(github.ref, 'refs/tags/docker-v') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
        id: meta-dockerhub
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/wyoming-piper-plus
          tags: |
            type=semver,pattern={{version}},prefix=
            type=semver,pattern={{major}}.{{minor}},prefix=
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Push to Docker Hub
        if: >-
          steps.dockerhub-check.outputs.available == 'true' &&
          (startsWith(github.ref, 'refs/tags/docker-v') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./docker/wyoming/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-dockerhub.outputs.tags }}
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-webui:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write    # NEW: for OIDC sigstore signing
      attestations: write  # NEW: for build provenance attestation
    timeout-minutes: 90
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean

      - uses: actions/checkout@v6.0.2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to ghcr.io
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/webui
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push to ghcr.io
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./docker/webui/Dockerfile
          # Pure Python + Gradio + slim-trixie -> arm64 native available.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEW: SLSA provenance + SBOM attestation
          provenance: true
          sbom: true

      - name: Install Cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: 'v2.4.1'

      - name: Sign the published image
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      # --- Docker Hub publish (tag push or workflow_dispatch only) ---
      - name: Check Docker Hub credentials
        if: startsWith(github.ref, 'refs/tags/docker-v') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        id: dockerhub-check
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Docker Hub secrets not configured -- skipping Docker Hub publish"
          fi
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: >-
          steps.dockerhub-check.outputs.available == 'true' &&
          (startsWith(github.ref, 'refs/tags/docker-v') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker Hub metadata
        if: >-
          steps.dockerhub-check.outputs.available == 'true' &&
          (startsWith(github.ref, 'refs/tags/docker-v') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
        id: meta-dockerhub
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/piper-plus-webui
          tags: |
            type=semver,pattern={{version}},prefix=
            type=semver,pattern={{major}}.{{minor}},prefix=
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Push to Docker Hub
        if: >-
          steps.dockerhub-check.outputs.available == 'true' &&
          (startsWith(github.ref, 'refs/tags/docker-v') || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./docker/webui/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-dockerhub.outputs.tags }}
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
