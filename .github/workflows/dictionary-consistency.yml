name: "Dictionary Consistency Gate"

# Verifies data/dictionaries/*.json (canonical) matches the bundled mirrors in
# src/wasm/openjtalk-web/assets/. Without this gate, default_common_dict.json
# drifts silently (canonical 443 lines vs WASM mirror 124 lines was observed
# in May 2026 before this gate landed) — only browser consumers see stale
# pronunciations.

on:
  push:
    branches: [dev, main]
    paths:
      - 'data/dictionaries/**.json'
      - 'src/wasm/openjtalk-web/assets/default_common_dict.json'
      - 'src/wasm/openjtalk-web/assets/default_tech_dict.json'
      - 'src/wasm/openjtalk-web/assets/additional_tech_dict.json'
      - 'scripts/check_dictionary_consistency.py'
      - '.github/workflows/dictionary-consistency.yml'
  pull_request:
    paths:
      - 'data/dictionaries/**.json'
      - 'src/wasm/openjtalk-web/assets/default_common_dict.json'
      - 'src/wasm/openjtalk-web/assets/default_tech_dict.json'
      - 'src/wasm/openjtalk-web/assets/additional_tech_dict.json'
      - 'scripts/check_dictionary_consistency.py'
      - '.github/workflows/dictionary-consistency.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dict-sync:
    name: data/dictionaries → WASM assets byte-equal (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        # Run on all three OSes. The byte-for-byte sha256 mirror check is
        # the same class as zh-en-loanword-sync / pua-consistency: a CRLF
        # checkout on Windows can mask or surface drift an ubuntu-only
        # matrix never sees. Closes the QA CI-coverage gap.
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        # windows-latest ships Git Bash; the --fix idempotency step uses
        # `if ! git diff --quiet`, which is bash-only.
        shell: bash
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Byte-for-byte hash check
        run: python scripts/check_dictionary_consistency.py

      - name: --fix is idempotent on clean tree
        run: |
          python scripts/check_dictionary_consistency.py --fix
          if ! git diff --quiet; then
            echo "ERROR: --fix changed working tree on a clean repo:"
            git --no-pager diff
            exit 1
          fi
