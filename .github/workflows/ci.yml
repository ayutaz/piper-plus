name: CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  cpp-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
        build_type: [Release, Debug]
        
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libsndfile1-dev \
            open-jtalk open-jtalk-mecab-naist-jdic \
            libmecab-dev mecab mecab-naist-jdic
      
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja libsndfile
          brew install open-jtalk mecab mecab-ipadic || true
      
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake ninja
      
      - name: Configure CMake
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            cmake -B build \
              -G "Visual Studio 17 2022" \
              -A x64 \
              -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
              -DBUILD_TESTS=ON \
              -DUSE_CUDA=OFF
          else
            cmake -B build \
              -G Ninja \
              -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
              -DBUILD_TESTS=ON \
              -DUSE_CUDA=OFF
          fi
        shell: bash
      
      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}
      
      - name: Download OpenJTalk dictionary
        if: runner.os != 'Windows'
        run: |
          mkdir -p build/naist-jdic
          if [ -d "/usr/share/open_jtalk/dic" ]; then
            cp -r /usr/share/open_jtalk/dic/* build/naist-jdic/
          elif [ -d "/opt/homebrew/share/open_jtalk/dic" ]; then
            cp -r /opt/homebrew/share/open_jtalk/dic/* build/naist-jdic/
          elif [ -d "/usr/local/share/open_jtalk/dic" ]; then
            cp -r /usr/local/share/open_jtalk/dic/* build/naist-jdic/
          else
            echo "Downloading OpenJTalk dictionary..."
            curl -L https://sourceforge.net/projects/open-jtalk/files/Dictionary/open_jtalk_dic-1.11/open_jtalk_dic_utf_8-1.11.tar.gz/download | tar xzf - -C build/
            mv build/open_jtalk_dic_utf_8-1.11/* build/naist-jdic/
          fi

      - name: Test
        run: |
          cd build
          if [ "${{ runner.os }}" == "Windows" ]; then
            # Run tests on Windows with proper configuration
            ctest -C ${{ matrix.build_type }} --output-on-failure -V --exclude-regex "test_openjtalk"
          else
            # Set environment variables for OpenJTalk tests
            export OPENJTALK_VOICE="dummy.htsvoice"
            export OPENJTALK_SKIP_TESTS_IF_UNAVAILABLE=1
            export OPENJTALK_DICTIONARY_DIR="${PWD}/naist-jdic"
            
            # Run tests with verbose output
            ctest -C ${{ matrix.build_type }} --output-on-failure -V
          fi
        shell: bash

  python-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
        python-version: ['3.11']
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsndfile1-dev build-essential cmake
      
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libsndfile cmake
      
      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          refreshenv
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Try to install piper-phonemize, but continue if it fails
          pip install piper-phonemize || echo "piper-phonemize not available, continuing..."
          # Install test requirements without strict dependency resolution
          pip install --no-deps -r src/python/requirements_test.txt
          # Install core dependencies
          pip install cython numpy onnxruntime librosa soundfile pytest pytest-cov
          # Install package in development mode
          pip install -e src/python/
      
      - name: Build C++ executable (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64
          cmake --build . --config Release
        shell: cmd
      
      - name: Build C++ executable (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p build
          cd build
          cmake ..
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)
      
      - name: Download OpenJTalk dictionary
        if: runner.os != 'Windows'
        run: |
          cd build
          ../scripts/download_openjtalk_dict.sh || true
      
      - name: Run Python tests
        run: |
          # Run tests properly
          cd src/python
          if [ "${{ runner.os }}" == "Windows" ]; then
            python -m pytest tests/ -v --tb=short -m "unit and not phonemize and not training" -k "not test_phonemize and not test_japanese"
          else
            python -m pytest tests/ -v --tb=short -m "unit and not training and not benchmark"
          fi
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11' && runner.os == 'Linux'
        with:
          file: ./coverage.xml
          flags: python
          name: Python ${{ matrix.python-version }} - ${{ runner.os }}

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.12.5 mypy
      
      - name: Run ruff check
        run: ruff check .
      
      - name: Run ruff format check
        run: ruff format --check

  docker-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Free disk space
        run: |
          echo "=== Initial disk space ==="
          df -h
          echo "=== Removing unnecessary files ==="
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean
          echo "=== Final disk space ==="
          df -h
      
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Test Python train image build
        run: |
          docker build -t piper-python-train:test -f docker/python-train/Dockerfile .
          echo "Python train image built successfully"
      
      - name: Test Python inference image build
        run: |
          docker build -t piper-python-inference:test -f docker/python-inference/Dockerfile .
          echo "Python inference image built successfully"
      
      - name: Test C++ train image build
        run: |
          docker build -t piper-cpp-train:test -f docker/cpp-train/Dockerfile .
          echo "C++ train image built successfully"
      
      - name: Verify Docker images
        run: |
          docker images | grep piper
          echo "All Docker images built successfully"