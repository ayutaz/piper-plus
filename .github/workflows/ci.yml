name: CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  cpp-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
        build_type: [Release, Debug]
        
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libsndfile1-dev \
            open-jtalk open-jtalk-mecab-naist-jdic \
            libmecab-dev mecab mecab-naist-jdic \
            wget
          
          # Install ONNX Runtime
          wget https://github.com/microsoft/onnxruntime/releases/download/v1.14.1/onnxruntime-linux-x64-1.14.1.tgz
          tar -xzf onnxruntime-linux-x64-1.14.1.tgz
          sudo cp -r onnxruntime-linux-x64-1.14.1/lib/* /usr/local/lib/
          sudo cp -r onnxruntime-linux-x64-1.14.1/include/* /usr/local/include/
          sudo ldconfig
          rm -rf onnxruntime-linux-x64-1.14.1*
      
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja libsndfile wget
          brew install open-jtalk mecab mecab-ipadic || true
          
          # Install ONNX Runtime based on architecture
          sudo mkdir -p /usr/local/lib /usr/local/include
          
          if [[ $(uname -m) == "arm64" ]]; then
            echo "Installing ONNX Runtime for Apple Silicon..."
            wget https://github.com/microsoft/onnxruntime/releases/download/v1.14.1/onnxruntime-osx-arm64-1.14.1.tgz
            tar -xzf onnxruntime-osx-arm64-1.14.1.tgz
            sudo cp -r onnxruntime-osx-arm64-1.14.1/lib/* /usr/local/lib/ 2>/dev/null || true
            sudo cp -r onnxruntime-osx-arm64-1.14.1/include/* /usr/local/include/ 2>/dev/null || true
            rm -rf onnxruntime-osx-arm64-1.14.1*
          else
            echo "Installing ONNX Runtime for Intel Mac..."
            wget https://github.com/microsoft/onnxruntime/releases/download/v1.14.1/onnxruntime-osx-x86_64-1.14.1.tgz
            tar -xzf onnxruntime-osx-x86_64-1.14.1.tgz
            sudo cp -r onnxruntime-osx-x86_64-1.14.1/lib/* /usr/local/lib/ 2>/dev/null || true
            sudo cp -r onnxruntime-osx-x86_64-1.14.1/include/* /usr/local/include/ 2>/dev/null || true
            rm -rf onnxruntime-osx-x86_64-1.14.1*
          fi
      
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake ninja
          
          # Download and extract ONNX Runtime using PowerShell
          Invoke-WebRequest -Uri https://github.com/microsoft/onnxruntime/releases/download/v1.14.1/onnxruntime-win-x64-1.14.1.zip -OutFile onnxruntime-win-x64-1.14.1.zip
          Expand-Archive -Path onnxruntime-win-x64-1.14.1.zip -DestinationPath .
          
          # Set environment variables for CMake to find ONNX Runtime
          echo "ONNXRUNTIME_ROOT_PATH=$PWD/onnxruntime-win-x64-1.14.1" >> $env:GITHUB_ENV
      
      - name: Configure CMake
        run: |
          CMAKE_ARGS="-DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DBUILD_TESTS=ON -DUSE_CUDA=OFF"
          
          if [ "${{ runner.os }}" == "Windows" ]; then
            cmake -B build \
              -G "Visual Studio 17 2022" \
              -A x64 \
              ${CMAKE_ARGS} \
              -DONNXRUNTIME_ROOT_PATH="$ONNXRUNTIME_ROOT_PATH"
          elif [ "${{ runner.os }}" == "macOS" ]; then
            # Add macOS-specific architecture flags
            if [[ $(uname -m) == "arm64" ]]; then
              CMAKE_ARGS="${CMAKE_ARGS} -DCMAKE_OSX_ARCHITECTURES=arm64"
            else
              CMAKE_ARGS="${CMAKE_ARGS} -DCMAKE_OSX_ARCHITECTURES=x86_64"
            fi
            cmake -B build ${CMAKE_ARGS}
          else
            # Linux - use default Make generator instead of Ninja
            cmake -B build ${CMAKE_ARGS}
          fi
        shell: bash
      
      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}
      
      - name: Download OpenJTalk dictionary
        if: runner.os != 'Windows'
        run: |
          mkdir -p build/naist-jdic
          if [ -d "/usr/share/open_jtalk/dic" ]; then
            cp -r /usr/share/open_jtalk/dic/* build/naist-jdic/
          elif [ -d "/opt/homebrew/share/open_jtalk/dic" ]; then
            cp -r /opt/homebrew/share/open_jtalk/dic/* build/naist-jdic/
          elif [ -d "/usr/local/share/open_jtalk/dic" ]; then
            cp -r /usr/local/share/open_jtalk/dic/* build/naist-jdic/
          else
            echo "Downloading OpenJTalk dictionary..."
            curl -L https://sourceforge.net/projects/open-jtalk/files/Dictionary/open_jtalk_dic-1.11/open_jtalk_dic_utf_8-1.11.tar.gz/download | tar xzf - -C build/
            mv build/open_jtalk_dic_utf_8-1.11/* build/naist-jdic/
          fi
          
      - name: Download espeak-ng-data
        if: runner.os != 'Windows'
        run: |
          echo "Downloading espeak-ng-data..."
          mkdir -p build
          cd build
          # Try to download espeak-ng-data, but continue if it fails
          if wget -q https://github.com/rhasspy/espeak-ng/releases/download/2023.9.7-4/espeak-ng-data.tar.gz; then
            tar -xzf espeak-ng-data.tar.gz
            rm espeak-ng-data.tar.gz
            echo "espeak-ng-data downloaded successfully"
          else
            echo "Warning: Failed to download espeak-ng-data, some tests may be skipped"
            mkdir -p espeak-ng-data
          fi
          cd ..
        shell: bash
        
      - name: Download espeak-ng-data (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "Skipping espeak-ng-data download on Windows (not required for build verification)"
          New-Item -ItemType Directory -Force -Path build\espeak-ng-data

      - name: Test
        run: |
          cd build
          echo "Build completed successfully for ${{ runner.os }} ${{ matrix.build_type }}"
          
          # For cpp-tests job in CI, we only verify that the build completes successfully
          # The actual test execution is handled by the dedicated C++ Tests workflow
          # which has proper test failure handling for legacy tests
          
          # List available test executables as a sanity check
          echo "Looking for test executables..."
          if [ "${{ runner.os }}" == "Windows" ]; then
            find . -name "*.exe" | grep -i test || echo "No test executables found (OK for minimal build)"
          else
            find . -name "test_*" -type f -executable || echo "No test executables found (OK for minimal build)"
          fi
          
          echo "cpp-tests job completed - build verification successful"
        shell: bash

  python-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
        python-version: ['3.11']
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsndfile1-dev build-essential cmake
      
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libsndfile cmake
      
      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          refreshenv
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          cd src/python
          # Install test requirements first
          pip install -r requirements_test.txt
          # Install core dependencies manually to avoid conflicts
          pip install numpy scipy soundfile librosa onnxruntime pytest pytest-cov
          # For pyopenjtalk-plus dependencies (optional)
          pip install sudachipy sudachidict_core || echo "Japanese dependencies optional"
          # Install requirements, filtering out problematic ones on Windows
          if [ "${{ runner.os }}" == "Windows" ]; then
            grep -v "piper-phonemize" requirements.txt | pip install -r /dev/stdin || true
          else
            pip install -r requirements.txt || true
          fi
          # Install package in development mode
          pip install -e .
      
      - name: Build C++ executable (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64
          cmake --build . --config Release
        shell: cmd
      
      - name: Build C++ executable (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p build
          cd build
          cmake ..
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)
      
      - name: Download OpenJTalk dictionary
        if: runner.os != 'Windows'
        run: |
          cd build
          ../scripts/download_openjtalk_dict.sh || true
      
      - name: Run Python tests
        run: |
          # Run tests properly
          cd src/python
          if [ "${{ runner.os }}" == "Windows" ]; then
            python -m pytest tests/ -v --tb=short -m "unit and not phonemize and not training" -k "not test_phonemize and not test_japanese"
          else
            python -m pytest tests/ -v --tb=short -m "unit and not training and not benchmark"
          fi
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11' && runner.os == 'Linux'
        with:
          file: ./coverage.xml
          flags: python
          name: Python ${{ matrix.python-version }} - ${{ runner.os }}

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.12.5 mypy
      
      - name: Run ruff check
        run: ruff check .
      
      - name: Run ruff format check
        run: ruff format --check

  docker-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Free disk space
        run: |
          echo "=== Initial disk space ==="
          df -h
          echo "=== Removing unnecessary files ==="
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean
          echo "=== Final disk space ==="
          df -h
      
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Test Python train image build
        run: |
          echo "Building Python train image..."
          docker build -t piper-python-train:test -f docker/python-train/Dockerfile . --progress=plain
          echo "Python train image built successfully"
          # Clean up to save space
          docker system prune -f
      
      - name: Test Python inference image build
        run: |
          echo "Building Python inference image..."
          docker build -t piper-python-inference:test -f docker/python-inference/Dockerfile . --progress=plain
          echo "Python inference image built successfully"
          # Clean up intermediate layers
          docker system prune -f
      
      - name: Test C++ train image build (lightweight)
        run: |
          echo "Testing C++ build environment..."
          # Create a minimal Dockerfile for testing
          cat > Dockerfile.cpp-test << 'EOF'
          FROM ubuntu:22.04
          RUN apt-get update && apt-get install -y build-essential cmake ninja-build
          WORKDIR /test
          RUN echo "int main() { return 0; }" > test.cpp && \
              g++ test.cpp -o test && \
              ./test && \
              echo "C++ environment OK"
          EOF
          docker build -t piper-cpp-test:minimal -f Dockerfile.cpp-test .
          echo "C++ build environment verified"
      
      - name: Summary
        run: |
          echo "Docker build tests completed"
          echo "Note: Full C++ image build skipped due to resource constraints"