name: "Wyoming Protocol Smoke Test"

# Real Wyoming protocol smoke test against the running docker/wyoming
# image (Issue: dev audit — test_integration.py is fully mocked).
#
# Boots the Wyoming TTS server in a container, then:
#   1. Sends Describe -> expects an Info event back with TtsProgram +
#      voices.
#   2. Sends Synthesize -> expects AudioStart + N x AudioChunk + AudioStop.
#
# This catches regressions that pure-mock tests don't (handler wiring,
# wyoming-protocol version drift, model auto-download, port binding,
# OpenJTalk dictionary install path, healthcheck contract).

on:
  push:
    branches: [dev, main]
    paths:
      - 'docker/wyoming/**'
      - 'src/python/piper_wyoming/**'
      - 'src/python/piper_plus/**'
      - 'src/python/piper_train/**'
      - 'src/python/g2p/**'
      - 'pyproject.toml'
      - 'VERSION'
      - '.github/workflows/wyoming-smoke.yml'
  pull_request:
    paths:
      - 'docker/wyoming/**'
      - 'src/python/piper_wyoming/**'
      - 'src/python/piper_plus/**'
      - 'src/python/piper_train/**'
      - 'src/python/g2p/**'
      - 'pyproject.toml'
      - 'VERSION'
      - '.github/workflows/wyoming-smoke.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  wyoming-smoke:
    name: docker compose up + wyoming protocol round-trip
    runs-on: ubuntu-latest
    # Local image build (with pyopenjtalk source compile) takes ~6-8 min;
    # model auto-download from HuggingFace adds 1-2 min on a cold runner.
    # 25-min budget leaves room for transient network slowness.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # `wyoming-cli` is not a separate PyPI distribution; the `wyoming`
      # package itself ships the protocol client classes we use below
      # (AsyncTcpClient, Describe, Synthesize, AudioChunk). This pin
      # matches the >=1.7,<2 version range used by docker/wyoming/Dockerfile
      # so the client's protocol version cannot drift from the server.
      - name: Install Wyoming protocol client
        run: python -m pip install --no-cache-dir "wyoming>=1.7,<2"

      - name: Build and start Wyoming server
        working-directory: docker/wyoming
        run: |
          set -euxo pipefail
          # `docker compose up -d --build` returns once the container is
          # started, but the Wyoming server itself takes 30-90s to load
          # the ONNX model + OpenJTalk dictionary. The wait step below
          # polls the TCP port + sends a Describe to confirm readiness.
          docker compose up -d --build
          docker compose ps

      - name: Wait for Wyoming TCP port
        run: |
          set -euo pipefail
          # The container's healthcheck only checks `socket.connect`,
          # which can succeed before the wyoming AsyncServer accepts
          # protocol events. We do both: bare TCP first, then a real
          # Describe round-trip in the next step.
          for attempt in $(seq 1 60); do
            if python -c "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 10200)); s.close()" 2>/dev/null; then
              echo "TCP port 10200 reachable on attempt ${attempt}"
              exit 0
            fi
            echo "TCP not yet up (attempt ${attempt}/60); sleeping 5s"
            sleep 5
          done
          echo "::error::Wyoming TCP port 10200 never came up"
          docker compose -f docker/wyoming/docker-compose.yml logs --tail=200 || true
          exit 1

      - name: Smoke test — Describe round-trip
        run: |
          python <<'PY'
          # Send a Describe event over the Wyoming protocol and assert
          # we receive an Info response naming our TTS program. Catches:
          # - handler.build_info() raising on import
          # - protocol-version mismatch with installed wyoming lib
          # - server crashing on first incoming event
          import asyncio
          import sys

          from wyoming.client import AsyncTcpClient
          from wyoming.info import Describe, Info

          async def main() -> int:
              async with AsyncTcpClient("localhost", 10200) as client:
                  await client.write_event(Describe().event())
                  # Up to 30s for model-loading + first response.
                  try:
                      event = await asyncio.wait_for(client.read_event(), timeout=30.0)
                  except asyncio.TimeoutError:
                      print("::error::Describe timed out after 30s", file=sys.stderr)
                      return 1
                  if event is None:
                      print("::error::Describe returned None (connection closed)", file=sys.stderr)
                      return 1
                  if not Info.is_type(event.type):
                      print(f"::error::expected Info, got {event.type}", file=sys.stderr)
                      return 1
                  info = Info.from_event(event)
                  programs = info.tts or []
                  if not programs:
                      print("::error::Info.tts is empty — no TtsProgram advertised", file=sys.stderr)
                      return 1
                  prog = programs[0]
                  voices = prog.voices or []
                  print(f"ok: TtsProgram={prog.name!r} voices={len(voices)}")
                  for v in voices[:3]:
                      print(f"  voice: name={getattr(v, 'name', '?')} languages={getattr(v, 'languages', '?')}")
                  return 0

          sys.exit(asyncio.run(main()))
          PY

      - name: Smoke test — Synthesize event sequence
        run: |
          python <<'PY'
          # Send Synthesize and verify the canonical event sequence:
          #   AudioStart -> 1+ AudioChunk -> AudioStop
          # Also asserts the chunks contain non-empty PCM bytes (catches
          # silent regressions where the model returns zeros).
          import asyncio
          import sys

          from wyoming.audio import AudioChunk, AudioStart, AudioStop
          from wyoming.client import AsyncTcpClient
          from wyoming.tts import Synthesize

          async def main() -> int:
              # Plain ASCII to side-step any encoding subtlety in stage-1
              # smoke. JA models map "Hello" through the en phonemizer
              # (fallback to default_language="ja" -> JA G2P over latin
              # chars yields a small but non-empty audio buffer).
              text = "Hello"
              async with AsyncTcpClient("localhost", 10200) as client:
                  await client.write_event(Synthesize(text=text).event())

                  saw_audio_start = False
                  chunk_count = 0
                  total_bytes = 0
                  saw_audio_stop = False

                  # Cap total wall time so a stuck server doesn't hang
                  # the whole job. Audio for "Hello" is well under 1s
                  # of synthesis.
                  deadline = asyncio.get_event_loop().time() + 60.0

                  while True:
                      remaining = deadline - asyncio.get_event_loop().time()
                      if remaining <= 0:
                          print("::error::synthesize deadline exceeded", file=sys.stderr)
                          return 1
                      try:
                          event = await asyncio.wait_for(client.read_event(), timeout=remaining)
                      except asyncio.TimeoutError:
                          print("::error::read_event timeout", file=sys.stderr)
                          return 1
                      if event is None:
                          print("::error::server closed connection mid-stream", file=sys.stderr)
                          return 1

                      if AudioStart.is_type(event.type):
                          start = AudioStart.from_event(event)
                          print(f"AudioStart rate={start.rate} width={start.width} channels={start.channels}")
                          saw_audio_start = True
                      elif AudioChunk.is_type(event.type):
                          chunk = AudioChunk.from_event(event)
                          chunk_count += 1
                          total_bytes += len(chunk.audio)
                      elif AudioStop.is_type(event.type):
                          saw_audio_stop = True
                          print(f"AudioStop after {chunk_count} chunks, {total_bytes} bytes total")
                          break
                      else:
                          # Unknown event types are tolerated — handler
                          # contract is "ignore unknown" — but log them.
                          print(f"info: ignoring event type={event.type}")

                  if not saw_audio_start:
                      print("::error::no AudioStart event received", file=sys.stderr)
                      return 1
                  if not saw_audio_stop:
                      print("::error::no AudioStop event received", file=sys.stderr)
                      return 1
                  if chunk_count == 0:
                      print("::error::no AudioChunk events between Start and Stop", file=sys.stderr)
                      return 1
                  if total_bytes == 0:
                      print("::error::AudioChunks were all empty (silent audio)", file=sys.stderr)
                      return 1
                  print(f"ok: AudioStart + {chunk_count} chunks ({total_bytes} bytes) + AudioStop")
                  return 0

          sys.exit(asyncio.run(main()))
          PY

      - name: Dump server logs on failure
        if: failure()
        working-directory: docker/wyoming
        run: |
          echo "=== docker compose ps ==="
          docker compose ps || true
          echo "=== wyoming-piper-plus logs (tail 500) ==="
          docker compose logs --tail=500 wyoming-piper-plus || true

      - name: Tear down
        if: always()
        working-directory: docker/wyoming
        run: docker compose down -v --remove-orphans || true
