name: Docker Build Minimal

on:
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build-python-inference:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Free disk space
        run: |
          echo "=== Initial disk space ==="
          df -h
          echo "=== Removing unnecessary files ==="
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean
          echo "=== Final disk space ==="
          df -h
      
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Python inference image (test only)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/python-inference/Dockerfile
          push: false
          tags: piper-python-inference:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          load: true  # Load the image into docker daemon
      
      - name: Test the built image
        run: |
          docker run --rm piper-python-inference:test python -c "print('Image test passed')"