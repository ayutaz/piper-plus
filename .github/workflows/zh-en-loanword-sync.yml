name: "ZH-EN Loanword Sync Gate"

# Phase 6b (Day 14, TICKET-06b): full byte-for-byte gate across all 9 copies
# (Python source + 9 mirrors = 10 files total) and 8 fixture mirrors.
# The Phase 6a `--allow-missing` flag was dropped after TICKET-01〜05 landed
# all runtime copies. Kotlin Android (Issue #388) and Swift G2P (Issue #387)
# follow-ups added 2 additional own mirrors so the gate guards them directly
# rather than transitively through the Rust crate copies. Any PR that drifts
# a copy from the Python source-of-truth is now blocked at this gate.
#
# Source of truth: src/python/g2p/piper_plus_g2p/data/zh_en_loanword.json
# See docs/spec/zh-en-loanword-runtime-rollout.md for the full contract.

on:
  push:
    branches: [dev, main]
    paths:
      - '**/zh_en_loanword.json'
      - '**/zh_en_loanword_matrix.json'
      - 'scripts/check_loanword_consistency.py'
      - 'cmake/EmbedJson.cmake'
      - 'cmake/PiperCommon.cmake'
      - '.github/workflows/zh-en-loanword-sync.yml'
  pull_request:
    paths:
      - '**/zh_en_loanword.json'
      - '**/zh_en_loanword_matrix.json'
      - 'scripts/check_loanword_consistency.py'
      - 'cmake/EmbedJson.cmake'
      - 'cmake/PiperCommon.cmake'
      - '.github/workflows/zh-en-loanword-sync.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  json-sync:
    name: 9 zh_en_loanword.json copies match Python source
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Schema validation (Python source)
        run: python scripts/check_loanword_consistency.py --schema-only

      - name: Byte-for-byte hash check (Phase 6b — full gate, 9 copies + 8 fixture mirrors)
        run: python scripts/check_loanword_consistency.py

  helper-self-check:
    name: check_loanword_consistency.py self-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # `--schema-only` and `--diff` should always succeed against a clean
      # working tree. `--fix` should be idempotent (a no-op when in sync).
      # Catches drift in the helper itself before the full gate fires.
      - name: --schema-only succeeds on clean tree
        run: python scripts/check_loanword_consistency.py --schema-only

      - name: --diff produces no real diff on clean tree
        run: |
          # Status lines like "Source: <hash>" and "OK ..." are allowed; only
          # actual unified-diff content (---/+++/@@ lines) signals drift.
          out=$(python scripts/check_loanword_consistency.py --diff)
          if echo "$out" | grep -qE '^(---|\+\+\+|@@)'; then
            echo "ERROR: --diff emitted unified-diff content on a clean tree:"
            echo "$out"
            exit 1
          fi

      - name: --fix is idempotent (no git diff after running)
        run: |
          python scripts/check_loanword_consistency.py --fix
          if ! git diff --quiet; then
            echo "ERROR: --fix changed working tree on a clean repo:"
            git --no-pager diff
            exit 1
          fi

      # Meta-test: deliberately drift a single byte in the canonical source
      # and a single mirror, then assert the gate exits non-zero. Without
      # this, a regression in the gate (e.g. a regex that no longer matches
      # a runtime table) could let drift slip through unnoticed.
      - name: Meta-test (gate fails on intentional drift)
        run: |
          python scripts/test_sync_gates_meta.py
          # Restore must have run; assert tree is clean for the next jobs.
          if ! git diff --quiet; then
            echo "ERROR: meta-test left the working tree dirty (restore failed):"
            git --no-pager diff
            exit 1
          fi
