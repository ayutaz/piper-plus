name: "ZH-EN Loanword Sync Gate"

# Phase 6b (Day 14, TICKET-06b): full byte-for-byte gate across all 7 copies +
# 6 fixture mirrors. The Phase 6a `--allow-missing` flag was dropped after
# TICKET-01〜05 landed all runtime copies. Any PR that drifts a copy from
# the Python source-of-truth is now blocked at this gate.
#
# Source of truth: src/python/g2p/piper_plus_g2p/data/zh_en_loanword.json
# See docs/tickets/zh-en-loanword/TICKET-06-ci-sync.md for the full contract.

on:
  push:
    branches: [dev, main]
    paths:
      - '**/zh_en_loanword.json'
      - 'tests/fixtures/g2p/zh_en_loanword_matrix.json'
      - 'scripts/check_loanword_consistency.py'
      - '.github/workflows/zh-en-loanword-sync.yml'
  pull_request:
    paths:
      - '**/zh_en_loanword.json'
      - 'tests/fixtures/g2p/zh_en_loanword_matrix.json'
      - 'scripts/check_loanword_consistency.py'
      - '.github/workflows/zh-en-loanword-sync.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  json-sync:
    name: 7 zh_en_loanword.json copies match Python source
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Schema validation (Python source)
        run: python scripts/check_loanword_consistency.py --schema-only

      - name: Byte-for-byte hash check (Phase 6b — full gate, 7 copies + 6 fixture mirrors)
        run: python scripts/check_loanword_consistency.py

  fixture-self-check:
    name: Helper script self-check (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pytest
        run: pip install pytest

      - name: Run helper script tests
        run: |
          if [ -f tests/test_check_loanword_consistency.py ]; then
            pytest tests/test_check_loanword_consistency.py -v
          else
            echo "No tests yet — placeholder for TICKET-06b."
          fi
