name: C++ Tests

on:
  push:
    branches: [ dev, master, main ]
    paths:
      - 'src/cpp/**'
      - 'CMakeLists.txt'
      - '.github/workflows/cpp-tests.yml'
  pull_request:
    branches: [ dev, master, main ]
    paths:
      - 'src/cpp/**'
      - 'CMakeLists.txt'
      - '.github/workflows/cpp-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-cpp:
    name: C++ Tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build-type: [Release]
    
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: true
      
      - name: Setup build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ccache
            ~/Library/Caches/ccache
          key: ${{ runner.os }}-ccache-${{ matrix.build-type }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ matrix.build-type }}-
            ${{ runner.os }}-ccache-
      
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ccache \
            wget
          
          # Install ONNX Runtime
          wget https://github.com/microsoft/onnxruntime/releases/download/v1.14.1/onnxruntime-linux-x64-1.14.1.tgz
          tar -xzf onnxruntime-linux-x64-1.14.1.tgz
          sudo cp -r onnxruntime-linux-x64-1.14.1/lib/* /usr/local/lib/
          sudo cp -r onnxruntime-linux-x64-1.14.1/include/* /usr/local/include/
          sudo ldconfig
          rm -rf onnxruntime-linux-x64-1.14.1*
      
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ccache wget
          
          # Detect architecture and download appropriate ONNX Runtime
          if [[ $(uname -m) == "arm64" ]]; then
            echo "Installing ONNX Runtime for Apple Silicon..."
            wget https://github.com/microsoft/onnxruntime/releases/download/v1.14.1/onnxruntime-osx-arm64-1.14.1.tgz
            tar -xzf onnxruntime-osx-arm64-1.14.1.tgz
            sudo cp -r onnxruntime-osx-arm64-1.14.1/lib/* /usr/local/lib/
            sudo cp -r onnxruntime-osx-arm64-1.14.1/include/* /usr/local/include/
            rm -rf onnxruntime-osx-arm64-1.14.1*
          else
            echo "Installing ONNX Runtime for Intel Mac..."
            wget https://github.com/microsoft/onnxruntime/releases/download/v1.14.1/onnxruntime-osx-x86_64-1.14.1.tgz
            tar -xzf onnxruntime-osx-x86_64-1.14.1.tgz
            sudo cp -r onnxruntime-osx-x86_64-1.14.1/lib/* /usr/local/lib/
            sudo cp -r onnxruntime-osx-x86_64-1.14.1/include/* /usr/local/include/
            rm -rf onnxruntime-osx-x86_64-1.14.1*
          fi
      
      - name: Configure CMake
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          CMAKE_ARGS="-DCMAKE_BUILD_TYPE=${{ matrix.build-type }} -DBUILD_TESTS=ON"
          
          # Add macOS-specific flags
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            if [[ $(uname -m) == "arm64" ]]; then
              CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_OSX_ARCHITECTURES=arm64"
            else
              CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_OSX_ARCHITECTURES=x86_64"
            fi
          fi
          
          cmake -B build $CMAKE_ARGS
      
      - name: Build
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          cmake --build build --config ${{ matrix.build-type }} -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
      
      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure --verbose
      
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.build-type }}
          path: |
            build/Testing/Temporary/
          retention-days: 7