name: sanitizer-matrix

on:
  pull_request:
    branches: [dev]
    paths:
      - 'src/cpp/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - '.github/workflows/sanitizer-matrix.yml'
  push:
    branches: [dev, main]
    paths:
      - 'src/cpp/**'
      - 'CMakeLists.txt'
      - 'cmake/**'
  schedule:
    - cron: '0 4 * * 1'  # weekly Monday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  sanitizer:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - { name: 'asan',  flags: '-fsanitize=address -fno-omit-frame-pointer -g -O1' }
          - { name: 'ubsan', flags: '-fsanitize=undefined -fno-omit-frame-pointer -g -O1' }
          - { name: 'tsan',  flags: '-fsanitize=thread -fno-omit-frame-pointer -g -O1' }

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build \
            libsndfile1-dev libonnxruntime-dev libfmt-dev libspdlog-dev

      - name: Configure (sanitizer ${{ matrix.sanitizer.name }})
        run: |
          mkdir -p build-${{ matrix.sanitizer.name }}
          cd build-${{ matrix.sanitizer.name }}
          cmake .. \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="${{ matrix.sanitizer.flags }}" \
            -DCMAKE_CXX_FLAGS="${{ matrix.sanitizer.flags }}" \
            -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.sanitizer.flags }}" \
            -DCMAKE_SHARED_LINKER_FLAGS="${{ matrix.sanitizer.flags }}" \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build-${{ matrix.sanitizer.name }} --parallel

      - name: Run tests with sanitizer
        env:
          # ASan/LSan suppression file (already exists in repo)
          LSAN_OPTIONS: "suppressions=${{ github.workspace }}/tests/asan_lsan_suppressions.txt:print_suppressions=0"
          # UBSan halt on first error
          UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
          # TSan halt on first error
          TSAN_OPTIONS: "halt_on_error=1:second_deadlock_stack=1"
        run: |
          cd build-${{ matrix.sanitizer.name }}
          ctest --output-on-failure --parallel 2 -E "_integration_|_e2e_" || \
            { echo "::warning::Sanitizer ${{ matrix.sanitizer.name }} found issues"; exit 1; }
        # 既存の baseline を許容するため continue-on-error
        continue-on-error: true

      - name: Upload sanitizer logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sanitizer-${{ matrix.sanitizer.name }}-logs
          path: |
            build-${{ matrix.sanitizer.name }}/Testing/**
          retention-days: 14
