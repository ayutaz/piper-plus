# Runtime Parity Deep — audio output equivalence (informational tier)
# =====================================================================
# 同一 model + 同一 phoneme IDs から各 runtime が出力する WAV が階層化
# 判定で「同じ音」 と認められるかを検証する。 階層は SHA256 / peak-RMS /
# SNR の順で評価され、 informational tier (continue-on-error: true) で
# 4 週間運用後 blocker 昇格を maintainer が判定する。
#
# Phase 2 (PR #511 系列): 6 runtime (Python / Rust / Go / C# / C++ / WASM)
# 全てで稼働。 contract toml の supports_dump_wav=false な runtime は
# scripts/audio_parity.py 側で skip 行として報告される (現状ゼロ)。
#
# 各 runtime は同一の fixture を入力:
#   - model:       test/models/multilingual-test-medium.onnx (~38 MB, git)
#   - phoneme IDs: tests/fixtures/audio-corpus/parity/phoneme_ids.jsonl
# 各 build job が WAV 1 個を artifact upload → 最後の compare job が
# scripts/audio_parity.py で 6 pair (C(4,2)) の tier 判定を出力する。

name: Runtime Parity Deep

on:
  pull_request:
    branches: [dev]
    paths:
      - 'src/**'
      - 'tests/fixtures/audio-corpus/**'
      - 'docs/spec/audio-parity-contract.toml'
      - 'scripts/audio_parity.py'
      - '.github/workflows/runtime-parity-deep.yml'
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: runtime-parity-deep-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  MODEL_PATH: test/models/multilingual-test-medium.onnx
  CONFIG_PATH: test/models/multilingual-test-medium.onnx.json
  FIXTURE: tests/fixtures/audio-corpus/parity/phoneme_ids.jsonl
  # ONNX Runtime version pinned to match .github/workflows/go-ci.yml so the
  # Go runtime can dlopen the same .so the production CI does.
  ORT_VERSION: '1.24.4'

jobs:
  dump-python:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install piper-plus (inference only)
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir uv
          uv pip install --system -e src/python_run

      - name: Synthesize via --json-input
        run: |
          mkdir -p /tmp/parity
          # piper-plus is the installed entry point name; use the module path
          # to avoid bin shadowing if multiple wheels are present.
          python -m piper \
            --model "$MODEL_PATH" \
            --config "$CONFIG_PATH" \
            --json-input \
            --output-file /tmp/parity/python.wav \
            < "$FIXTURE"
          ls -lh /tmp/parity/python.wav

      - uses: actions/upload-artifact@v4.6.0
        with:
          name: parity-wav-python
          path: /tmp/parity/python.wav
          retention-days: 7

  dump-rust:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    continue-on-error: true
    defaults:
      run:
        working-directory: src/rust
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust -> target

      - name: Build piper-plus-cli (release)
        run: cargo build --release -p piper-plus-cli

      - name: Synthesize via JSONL stdin
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p /tmp/parity
          # Rust CLI auto-detects JSONL when --text is absent and stdin is
          # piped; --output-file overrides per-line output_file when missing.
          # Binary name is `piper-plus-cli` (Cargo.toml package name; no
          # [[bin]] override).
          ./src/rust/target/release/piper-plus-cli \
            --model "$MODEL_PATH" \
            --config "$CONFIG_PATH" \
            --output-file /tmp/parity/rust.wav \
            --no-warmup \
            < "$FIXTURE"
          ls -lh /tmp/parity/rust.wav

      - uses: actions/upload-artifact@v4.6.0
        with:
          name: parity-wav-rust
          path: /tmp/parity/rust.wav
          retention-days: 7

  dump-go:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v5.0.2
        with:
          go-version: "1.23"

      - name: Cache ONNX Runtime
        uses: actions/cache@v5.0.5
        with:
          path: onnxruntime
          key: onnxruntime-linux-x64-${{ env.ORT_VERSION }}

      - name: Download ONNX Runtime
        # The Go runtime dlopens libonnxruntime.so at init time and refuses
        # to start without ONNX_RUNTIME_SHARED_LIBRARY_PATH. Mirror the
        # exact download / extract steps used by go-ci.yml so the dump
        # job sees the same library layout.
        run: |
          if [ ! -f onnxruntime/lib/libonnxruntime.so ]; then
            wget -q https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz
            tar xzf onnxruntime-linux-x64-${ORT_VERSION}.tgz
            mkdir -p onnxruntime/lib
            cp onnxruntime-linux-x64-${ORT_VERSION}/lib/libonnxruntime.so* onnxruntime/lib/
          fi

      - name: Build piper-plus (Go CLI)
        working-directory: src/go
        run: go build -o /tmp/piper-plus-go ./cmd/piper-plus

      - name: Synthesize via --json-input
        env:
          ONNX_RUNTIME_SHARED_LIBRARY_PATH: ${{ github.workspace }}/onnxruntime/lib/libonnxruntime.so
        run: |
          mkdir -p /tmp/parity
          # Go CLI の JSONL mode は --output-file を無視し --output-dir に
          # line_001.wav (連番) を書く設計 (src/go/cmd/piper-plus/main.go:425)。
          # parity gate のために rename して go.wav に揃える。
          /tmp/piper-plus-go \
            --model "$MODEL_PATH" \
            --config "$CONFIG_PATH" \
            --json-input \
            --output-dir /tmp/parity/go-out \
            < "$FIXTURE"
          mv /tmp/parity/go-out/line_001.wav /tmp/parity/go.wav
          ls -lh /tmp/parity/go.wav

      - uses: actions/upload-artifact@v4.6.0
        with:
          name: parity-wav-go
          path: /tmp/parity/go.wav
          retention-days: 7

  dump-csharp:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 10.0.x

      - name: Build PiperPlus.Cli (release)
        run: dotnet build src/csharp/PiperPlus.Cli/PiperPlus.Cli.csproj -c Release

      - name: Synthesize via --json-input
        run: |
          mkdir -p /tmp/parity
          dotnet run --project src/csharp/PiperPlus.Cli/PiperPlus.Cli.csproj -c Release --no-build -- \
            --model "$MODEL_PATH" \
            --config "$CONFIG_PATH" \
            --json-input \
            --output-file /tmp/parity/csharp.wav \
            < "$FIXTURE"
          ls -lh /tmp/parity/csharp.wav

      - uses: actions/upload-artifact@v4.6.0
        with:
          name: parity-wav-csharp
          path: /tmp/parity/csharp.wav
          retention-days: 7

  dump-cpp:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: cmake configure + build piper
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc) piper

      - name: Synthesize via --json-input
        run: |
          mkdir -p /tmp/parity
          ./build/piper \
            --model "$MODEL_PATH" \
            --json-input \
            --output_file /tmp/parity/cpp.wav \
            < "$FIXTURE"
          ls -lh /tmp/parity/cpp.wav

      - uses: actions/upload-artifact@v4.6.0
        with:
          name: parity-wav-cpp
          path: /tmp/parity/cpp.wav
          retention-days: 7

  dump-wasm:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    continue-on-error: true
    defaults:
      run:
        working-directory: src/wasm/openjtalk-web
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Install onnxruntime-node (no full npm install)
        # The full `npm install` triggers WASM build dependencies that are
        # unrelated to the parity gate. We only need onnxruntime-node for
        # bin/piper-cli.js to load the model.
        run: npm install --no-save --no-package-lock onnxruntime-node

      - name: Synthesize via bin/piper-cli.js
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p /tmp/parity
          node src/wasm/openjtalk-web/bin/piper-cli.js \
            --model "$MODEL_PATH" \
            --config "$CONFIG_PATH" \
            --json-input \
            --output-file /tmp/parity/wasm.wav \
            < "$FIXTURE"
          ls -lh /tmp/parity/wasm.wav

      - uses: actions/upload-artifact@v4.6.0
        with:
          name: parity-wav-wasm
          path: /tmp/parity/wasm.wav
          retention-days: 7

  compare:
    needs: [dump-python, dump-rust, dump-go, dump-csharp, dump-cpp, dump-wasm]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Validate contract toml
        # The script raises if any threshold is 0 / missing, so this step is
        # itself the meta-gate: a contract drift fails before any audio is
        # touched.
        run: python scripts/audio_parity.py compare --help >/dev/null

      - name: Download per-runtime wav artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: /tmp/parity-artifacts
          pattern: parity-wav-*
          merge-multiple: false

      - name: Run audio_parity.py compare
        run: |
          mkdir -p /tmp/parity
          declare -a INPUTS=()
          for r in python rust go csharp cpp wasm; do
            wav="/tmp/parity-artifacts/parity-wav-${r}/${r}.wav"
            if [ -f "$wav" ]; then
              INPUTS+=("--inputs" "${r}=${wav}")
            else
              echo "WARN: $wav missing — runtime ${r} will be reported as skipped."
            fi
          done
          python scripts/audio_parity.py compare \
            "${INPUTS[@]}" \
            --output /tmp/parity/parity-diff.md
          cat /tmp/parity/parity-diff.md

      - name: Post sticky comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2.9.4
        with:
          header: runtime-parity-deep
          path: /tmp/parity/parity-diff.md

      - name: Upload diff + wavs
        uses: actions/upload-artifact@v4.6.0
        if: always()
        with:
          name: runtime-parity-deep-${{ github.run_id }}
          path: |
            /tmp/parity/parity-diff.md
            /tmp/parity-artifacts/**/*.wav
          retention-days: 30
