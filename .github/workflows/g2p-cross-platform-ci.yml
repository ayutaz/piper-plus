name: "G2P Cross-Platform Consistency"

on:
  push:
    branches: [dev, main]
    paths:
      - 'src/python/g2p/**'
      - 'src/rust/piper-g2p/**'
      - 'src/wasm/g2p/**'
      - 'tests/fixtures/g2p/**'
      - '.github/workflows/g2p-cross-platform-ci.yml'
  pull_request:
    paths:
      - 'src/python/g2p/**'
      - 'src/rust/piper-g2p/**'
      - 'src/wasm/g2p/**'
      - 'tests/fixtures/g2p/**'
      - '.github/workflows/g2p-cross-platform-ci.yml'

permissions:
  contents: read

jobs:
  consistency-check:
    name: cross-platform consistency
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust

      - name: Install Python deps
        working-directory: src/python/g2p
        run: uv sync --extra all --extra dev

      - name: Download NLTK data (for g2p-en)
        working-directory: src/python/g2p
        run: uv run python -c "import nltk; nltk.download('averaged_perceptron_tagger_eng', quiet=True)"

      - name: Python cross-platform tests
        working-directory: src/python/g2p
        run: uv run pytest tests/test_cross_platform.py -v

      - name: Rust build check
        working-directory: src/rust
        run: cargo check -p piper-g2p --all-features

      - name: JS fixture tests
        working-directory: src/wasm/g2p
        run: |
          node --test test/test-g2p.js
          node --test test/test-korean.js
          node --test test/test-swedish.js
          node --test test/test-detect.js

      - name: PUA map count validation
        run: |
          python3 -c "
          import json
          with open('src/python/g2p/piper_plus_g2p/data/pua.json') as f:
              data = json.load(f)
          with open('tests/fixtures/g2p/phoneme_test_cases.json') as f:
              fixture = json.load(f)
          pua_count = len(data['entries'])
          expected = fixture['pua_map_count']
          print(f'PUA entries: {pua_count}, fixture expects: {expected}')
          assert pua_count >= expected, f'PUA count {pua_count} < fixture expected {expected}'
          print('PUA map count validation passed')
          "

      - name: PUA count cross-platform validation
        run: |
          EXPECTED=96

          # JS: count PUA value entries ('\uE0xx') in pua-map.js
          js_count=$(grep -c "'\\\uE0" src/wasm/g2p/src/pua-map.js || true)
          echo "JS  PUA entries: $js_count (expected: $EXPECTED)"

          # Rust: count PUA tuple entries (', 0xE0xx') in token_map.rs
          rust_count=$(grep -c ', 0xE0' src/rust/piper-g2p/src/token_map.rs || true)
          echo "Rust PUA entries: $rust_count (expected: $EXPECTED)"

          # Python: count from canonical pua.json
          py_count=$(python3 -c "
          import json
          with open('src/python/g2p/piper_plus_g2p/data/pua.json') as f:
              print(len(json.load(f)['entries']))
          ")
          echo "Python PUA entries: $py_count (expected: $EXPECTED)"

          failed=0
          if [ "$js_count" -ne "$EXPECTED" ]; then
            echo "::error::JS PUA count mismatch: got $js_count, expected $EXPECTED"
            failed=1
          fi
          if [ "$rust_count" -ne "$EXPECTED" ]; then
            echo "::error::Rust PUA count mismatch: got $rust_count, expected $EXPECTED"
            failed=1
          fi
          if [ "$py_count" -ne "$EXPECTED" ]; then
            echo "::error::Python PUA count mismatch: got $py_count, expected $EXPECTED"
            failed=1
          fi

          if [ "$failed" -eq 1 ]; then
            echo "::error::PUA counts are inconsistent across platforms"
            exit 1
          fi
          echo "PUA cross-platform count validation passed (all $EXPECTED)"
