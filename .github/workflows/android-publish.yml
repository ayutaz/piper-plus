name: Publish Android AAR to Maven Central

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: startsWith(github.ref, 'refs/tags/android-v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.MAVEN_CENTRAL_USERNAME }}" ]; then echo "MAVEN_CENTRAL_USERNAME not set"; exit 1; fi
          if [ -z "${{ secrets.MAVEN_CENTRAL_PASSWORD }}" ]; then echo "MAVEN_CENTRAL_PASSWORD not set"; exit 1; fi
          if [ -z "${{ secrets.GPG_SIGNING_KEY }}" ]; then echo "GPG_SIGNING_KEY not set"; exit 1; fi
          if [ -z "${{ secrets.GPG_SIGNING_PASSWORD }}" ]; then echo "GPG_SIGNING_PASSWORD not set"; exit 1; fi

      - name: Validate version
        working-directory: src/android
        run: |
          VERSION=$(grep "VERSION_NAME=" gradle.properties | cut -d= -f2 | tr -d '[:space:]')
          TAG_VERSION=$(echo "${GITHUB_REF#refs/tags/android-v}" | tr -d '[:space:]')
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: gradle.properties=$VERSION, tag=$TAG_VERSION"
            exit 1
          fi

      - name: Build AAR (release)
        working-directory: src/android
        run: ./gradlew :piper-android:assembleRelease

      - name: Run Android Lint
        working-directory: src/android
        run: ./gradlew :piper-android:lint

      - name: Run tests
        working-directory: src/android
        run: ./gradlew :piper-android:testReleaseUnitTest

      - name: Publish to Maven Central
        working-directory: src/android
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
