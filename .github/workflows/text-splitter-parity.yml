name: Text-Splitter Contract Parity

# Cross-runtime text-splitter parity gate.
#
# 6 ランタイム (Python / Rust / Go / C# / C++ / WASM) は、closing punctuation と
# sentence terminator の codepoint セットおよび split strategy で per-runtime
# divergence を持つ。canonical (toml) と Python source が drift していないこと、
# JSON fixture が toml と一致していること、をこのジョブで強制する。
#
# 各ランタイム個別の parity 検証 (Rust/Go/C# 等で contract.json を読み込む
# behavioral test) は per-runtime CI 側で実行する。ここはあくまで
# canonical Python ↔ spec toml ↔ JSON fixture の drift 検出 gate。

on:
  pull_request:
    branches: [ dev ]
    paths:
      - 'docs/spec/text-splitter-contract.toml'
      - 'src/python_run/piper/text_splitter.py'
      - 'scripts/check_text_splitter_contract.py'
      - 'scripts/regenerate_text_splitter_fixture.py'
      - 'tests/fixtures/text_splitter/**'
      - '.github/workflows/text-splitter-parity.yml'
  push:
    branches: [ dev ]
    paths:
      - 'docs/spec/text-splitter-contract.toml'
      - 'src/python_run/piper/text_splitter.py'
      - 'scripts/check_text_splitter_contract.py'
      - 'scripts/regenerate_text_splitter_fixture.py'
      - 'tests/fixtures/text_splitter/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  contract-drift-check:
    name: Text-splitter contract drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Verify contract matches Python canonical
        # tomllib is in stdlib (Python 3.11+); no third-party install needed.
        run: |
          python scripts/check_text_splitter_contract.py --verbose

      - name: Verify JSON fixture matches contract toml
        # Per-runtime parity tests (Rust/Go/C++/C#) consume contract.json,
        # so the fixture must stay byte-equivalent with the toml + the
        # RUNTIME_*_OMITS table in regenerate_text_splitter_fixture.py.
        run: |
          python scripts/regenerate_text_splitter_fixture.py --check
