name: "ORT Version Sync Gate"

# Issue #383 follow-up: 1.17.0 → 1.20.0 アップグレードで 6 ファイル + sha256 を
# 同時更新する必要があり、build-piper.yml の wget URL を取りこぼした実例があった
# (sed pattern が x86_64 / win-x64 を網羅していなかったため)。今後同じ取りこぼしを
# CI で検出するための gate。
#
# Issue #372 follow-up: 各ランタイム ecosystem (Python / C# / Go / WASM) の
# 依存定義ファイルが C++ canonical を下回らないことも CI gate で検証
# (Option C 方針: bit-exactness は捨てつつも floor を統一)。
#
# Source of truth: cmake/OnnxRuntime.cmake の set(ONNXRUNTIME_VERSION "X.Y.Z")
# 検査範囲:
#   - exact-match group: cmake / GitHub Actions workflow / docker/cpp-dev/Dockerfile
#   - floor-check group: 各ランタイムの dep ファイル (Cargo.toml は対象外、
#     ort crate stable 未公開のため。docs/reference/ort-versions.md で別途記録)

on:
  push:
    branches: [dev, main]
    paths:
      # Source of truth + script
      - 'cmake/OnnxRuntime.cmake'
      - 'scripts/check_ort_versions.py'
      - 'scripts/test_check_ort_versions.py'
      - '.github/workflows/ort-version-sync.yml'
      # Exact-match group
      - 'cmake/find_onnxruntime_windows.cmake'
      - '.github/workflows/release-shared-lib.yml'
      - '.github/workflows/android-build.yml'
      - '.github/workflows/release-kotlin-g2p.yml'
      - '.github/workflows/kotlin-g2p-ci.yml'
      - '.github/workflows/build-piper.yml'
      - '.github/workflows/_build-test-cpp.yml'
      - 'docker/cpp-dev/Dockerfile'
      # Floor-check group (Issue #372)
      - 'src/python/pyproject.toml'
      - 'src/python_run/requirements.txt'
      - 'src/python_run/requirements_gpu.txt'
      - 'src/python_run/setup.py'
      - 'src/csharp/**/*.csproj'
      - 'src/go/go.mod'
      - 'src/wasm/openjtalk-web/package.json'
  pull_request:
    paths:
      # Source of truth + script
      - 'cmake/OnnxRuntime.cmake'
      - 'scripts/check_ort_versions.py'
      - 'scripts/test_check_ort_versions.py'
      - '.github/workflows/ort-version-sync.yml'
      # Exact-match group
      - 'cmake/find_onnxruntime_windows.cmake'
      - '.github/workflows/release-shared-lib.yml'
      - '.github/workflows/android-build.yml'
      - '.github/workflows/release-kotlin-g2p.yml'
      - '.github/workflows/kotlin-g2p-ci.yml'
      - '.github/workflows/build-piper.yml'
      - '.github/workflows/_build-test-cpp.yml'
      - 'docker/cpp-dev/Dockerfile'
      # Floor-check group (Issue #372)
      - 'src/python/pyproject.toml'
      - 'src/python_run/requirements.txt'
      - 'src/python_run/requirements_gpu.txt'
      - 'src/python_run/setup.py'
      - 'src/csharp/**/*.csproj'
      - 'src/go/go.mod'
      - 'src/wasm/openjtalk-web/package.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ort-version-sync:
    name: cmake / workflows ORT versions match
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.13'

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Pin regex contract (test_check_ort_versions.py)
        # Issue #383 follow-up review on PR #403: the archive-filename regex
        # silently dropped GPU/CUDA suffix shapes (e.g. linux-x64-gpu) until
        # the `[a-z0-9_-]+` fix. Run the unit tests so a future regex tweak
        # cannot regress detection without CI noticing.
        # Override pytest.ini's addopts (which include --cov flags requiring
        # pytest-cov) so this gate stays self-contained — the script lives at
        # scripts/ and has no production code to cover.
        run: pytest scripts/test_check_ort_versions.py -v --override-ini="addopts="

      - name: Run ORT version sync gate
        run: python scripts/check_ort_versions.py --verbose
