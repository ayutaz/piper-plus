name: "CLI Flag Parity Gate"

# Verifies every runtime CLI declares the same hyphen-form flag names.
# Drift example: C++ `main.cpp:865` historically accepted both
# `--sentence_silence` (underscore) and `--sentence-silence` (hyphen)
# while Rust / Go accepted only the hyphen form. Users who learned the
# underscore form from C++ help text were confused on Rust / Go.
#
# The script also encodes a not-implemented allowlist so the gate fails
# only on *new* drift; removing an entry from SKIPS is the correct action
# when a runtime adds the missing flag.

on:
  push:
    branches: [dev, main]
    paths:
      - 'src/python_run/piper/__main__.py'
      - 'src/python/piper_train/infer_onnx.py'
      - 'src/rust/piper-cli/src/main.rs'
      - 'src/go/cmd/piper-plus/main.go'
      - 'src/csharp/PiperPlus.Cli/Program.cs'
      - 'src/cpp/main.cpp'
      - 'scripts/check_cli_flag_parity.py'
      - '.github/workflows/cli-flag-parity.yml'
  pull_request:
    paths:
      - 'src/python_run/piper/__main__.py'
      - 'src/python/piper_train/infer_onnx.py'
      - 'src/rust/piper-cli/src/main.rs'
      - 'src/go/cmd/piper-plus/main.go'
      - 'src/csharp/PiperPlus.Cli/Program.cs'
      - 'src/cpp/main.cpp'
      - 'scripts/check_cli_flag_parity.py'
      - '.github/workflows/cli-flag-parity.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cli-flag-parity:
    name: Runtime CLI flag names agree
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run CLI flag parity check
        run: python scripts/check_cli_flag_parity.py
