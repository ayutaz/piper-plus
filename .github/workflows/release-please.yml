name: Release Please

# release-please-action による Release PR 自動生成 (Wave 3, T13 / S-1)。
# dev / main branch への Conventional Commits push に応じて、 次の
# version を判定し、 `chore(main): release X.Y.Z` 形式の Release PR を
# auto-open する。
#
# 対象 package (release-please-config.json):
#   - canonical: piper-plus (Python, VERSION / pyproject.toml の dynamic)
#
# Rust / C# / npm / Swift / Kotlin は per-package 独自 cadence のため
# 本 workflow は管理しない。 これらは個別 release workflow で publish 済。
# drift は version-consistency workflow + check_version_manifest_sync.py が
# 検出する (Wave 3, T7)。
#
# 既存 /prepare-release skill との分担:
#   - skill: dry-run preview / manual verification (個別 manifest 確認)
#   - release-please: PR auto-generation / CHANGELOG promotion
#
# Conventional Commits 100% 遵守が前提 (commitlint.yml で gate 化済)。

on:
  push:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    # PR への merge 後の dev / main push でのみ走る。 PR commit 中は trigger
    # しない (push event の branches で既に絞り込み済だが、 念のため
    # github.actor のチェックも入れる)。
    if: github.repository == 'ayutaz/piper-plus'
    runs-on: ubuntu-24.04
    steps:
      - uses: googleapis/release-please-action@v4.3.0
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      # Release PR が作成された / 既存 Release PR が更新された場合の通知。
      # 実際の publish (PyPI / crates.io / NuGet) は別 workflow が tag push
      # を catch して走る形 (release-shared-lib.yml 等)。
      - name: Summary
        run: |
          echo "## release-please result"
          echo ""
          echo "- release_created: ${{ steps.release.outputs.release_created }}"
          echo "- tag_name: ${{ steps.release.outputs.tag_name }}"
          echo "- version: ${{ steps.release.outputs.version }}"
          echo "- major.minor.patch: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}"
