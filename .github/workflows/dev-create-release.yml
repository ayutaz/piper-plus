name: dev-create-release

on:
  push:
    branches:
      - dev
      - fix/*
      - feat/*
  workflow_dispatch:
    inputs:
      release_name:
        description: 'リリース名（未指定の場合は日付ベースで自動生成）'
        required: false
        type: string
      release_description:
        description: 'リリース説明（未指定の場合は自動生成）'
        required: false
        type: string
      use_new_workflow:
        description: 'Use new workflow (for testing)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: read

jobs:
  # Create Release
  create_release:
    name: Create Development Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_name: ${{ steps.get_release_name.outputs.name }}
      tag_name: ${{ steps.get_release_name.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Generate release name
        id: get_release_name
        run: |
          if [ -n "${{ github.event.inputs.release_name }}" ]; then
            echo "name=${{ github.event.inputs.release_name }}" >> $GITHUB_OUTPUT
          else
            TIMESTAMP=$(TZ=Asia/Tokyo date +'%Y%m%d-%H%M%S')
            echo "name=Dev Release ${TIMESTAMP}" >> $GITHUB_OUTPUT
          fi
          
          TAG_NAME="dev-$(date -u +'%Y%m%d-%H%M%S')"
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: get_release_notes
        run: |
          if [ -n "${{ github.event.inputs.release_description }}" ]; then
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "${{ github.event.inputs.release_description }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            # Auto-generate release notes
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "## 🚀 Development Release" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "**Build Date:** $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M:%S JST')" >> $GITHUB_OUTPUT
            echo "**Commit:** ${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            
            # Get recent commits
            echo "### 📝 Recent Changes" >> $GITHUB_OUTPUT
            git log --oneline -10 --pretty=format:"- %s (%h)" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            
            echo "### ⚠️ Note" >> $GITHUB_OUTPUT
            echo "This is a development release and may be unstable." >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_release_name.outputs.tag_name }}
          release_name: ${{ steps.get_release_name.outputs.name }}
          body: ${{ steps.get_release_notes.outputs.body }}
          draft: false
          prerelease: true

  # Trigger builds
  build_all:
    name: Build All Platforms
    needs: create_release
    uses: ./.github/workflows/dev-build-all.yml
    with:
      release_upload_url: ${{ needs.create_release.outputs.upload_url }}
      use_new_workflow: ${{ inputs.use_new_workflow }}
    permissions:
      contents: write
      packages: read

  # Run tests
  test_japanese:
    name: Test Japanese TTS
    needs: build_all
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-13, windows-2019]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup test model cache
        uses: actions/cache@v4
        with:
          path: |
            test_models/
            ~/.cache/piper_tts_models/
          key: test-models-${{ runner.os }}-${{ hashFiles('**/test_*.onnx') }}
          restore-keys: |
            test-models-${{ runner.os }}-
            test-models-

      - name: Download test model
        shell: bash
        run: |
          mkdir -p test_models
          if [ ! -f test_models/test_voice.onnx ]; then
            echo "Downloading test model..."
            # Replace with actual test model URL
            curl -L https://github.com/rhasspy/piper/releases/download/v1.2.0/voice-en-us-lessac-low.onnx -o test_models/test_voice.onnx || echo "Using placeholder model"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: piper-${{ matrix.os == 'ubuntu-22.04' && 'linux-x64' || matrix.os == 'macos-13' && 'macos-arm64' || 'windows-x64' }}
          path: dist/

      - name: Extract and test
        shell: bash
        run: |
          cd dist
          if [[ "${{ matrix.os }}" == "windows-2019" ]]; then
            unzip piper-windows-x64.zip
            ./piper/piper.exe --version
            echo "こんにちは、世界" | ./piper/piper.exe \
              --model ../test_models/test_voice.onnx \
              --output_file test_ja.wav
          else
            tar xzf piper-*.tar.gz
            ./piper/piper --version
            echo "こんにちは、世界" | ./piper/piper \
              --model ../test_models/test_voice.onnx \
              --output_file test_ja.wav
          fi
          
          # Verify output
          if [ -f test_ja.wav ]; then
            echo "✅ Japanese TTS test passed"
          else
            echo "❌ Japanese TTS test failed"
            exit 1
          fi

  # Publish to PyPI
  publish_pypi:
    name: Publish to PyPI
    needs: [build_all, test_japanese]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install twine
        run: pip install twine

      - name: Check wheels
        run: |
          ls -la dist/
          twine check dist/*.whl

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          # Only publish if we have the token
          if [ -n "$TWINE_PASSWORD" ]; then
            twine upload --skip-existing dist/*.whl
          else
            echo "⚠️ PyPI token not found, skipping upload"
          fi

  # Final summary
  release_summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [create_release, build_all, test_japanese, publish_pypi]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 📊 Release Summary"
          echo ""
          echo "**Release Name:** ${{ needs.create_release.outputs.release_name }}"
          echo "**Tag:** ${{ needs.create_release.outputs.tag_name }}"
          echo ""
          echo "### Build Status"
          echo "- Create Release: ${{ needs.create_release.result }}"
          echo "- Build All: ${{ needs.build_all.result }}"
          echo "- Test Japanese: ${{ needs.test_japanese.result }}"
          echo "- Publish PyPI: ${{ needs.publish_pypi.result }}"
          echo ""
          
          if [ "${{ needs.build_all.result }}" = "success" ]; then
            echo "✅ All platforms built successfully"
          else
            echo "❌ Some builds failed"
          fi