name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'バージョン（X.X.X形式、例: 1.4.0） - タグ名はvを付けて自動生成されます'
        required: true
        type: string
      release_name:
        description: 'リリース名（未指定の場合は自動生成）'
        required: false
        type: string
      release_description:
        description: 'リリース説明（未指定の場合は自動生成）'
        required: false
        type: string
      use_new_workflow:
        description: 'Use new workflow (for testing)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: read

jobs:
  # Create Release
  create_release:
    name: Create Development Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_name: ${{ steps.get_release_name.outputs.name }}
      tag_name: ${{ steps.get_release_name.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Version must be in format X.X.X (e.g., 1.4.0)"
            echo "Provided version: $VERSION"
            exit 1
          fi
          echo "Version format is valid: $VERSION"

      - name: Validate version consistency across files
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "Checking version consistency for: $VERSION"
          
          # Check VERSION file
          if [ -f "VERSION" ]; then
            FILE_VERSION=$(cat VERSION | tr -d '\n\r')
            if [ "$FILE_VERSION" != "$VERSION" ]; then
              echo "❌ VERSION file has '$FILE_VERSION', expected '$VERSION'"
              exit 1
            fi
            echo "✅ VERSION file: $FILE_VERSION"
          fi
          
          # Check pyproject.toml
          if [ -f "pyproject.toml" ]; then
            PYPROJECT_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
            if [ "$PYPROJECT_VERSION" != "$VERSION" ]; then
              echo "❌ pyproject.toml has '$PYPROJECT_VERSION', expected '$VERSION'"
              exit 1
            fi
            echo "✅ pyproject.toml: $PYPROJECT_VERSION"
          fi
          
          # Check src/python/piper_train/VERSION
          if [ -f "src/python/piper_train/VERSION" ]; then
            TRAIN_VERSION=$(cat src/python/piper_train/VERSION | tr -d '\n\r')
            if [ "$TRAIN_VERSION" != "$VERSION" ]; then
              echo "❌ src/python/piper_train/VERSION has '$TRAIN_VERSION', expected '$VERSION'"
              exit 1
            fi
            echo "✅ src/python/piper_train/VERSION: $TRAIN_VERSION"
          fi
          
          # Check src/python_run/setup.py
          if [ -f "src/python_run/setup.py" ]; then
            SETUP_VERSION=$(grep 'version=' src/python_run/setup.py | grep -o '"[^"]*"' | tr -d '"')
            if [ "$SETUP_VERSION" != "$VERSION" ]; then
              echo "❌ src/python_run/setup.py has '$SETUP_VERSION', expected '$VERSION'"
              exit 1
            fi
            echo "✅ src/python_run/setup.py: $SETUP_VERSION"
          fi
          
          echo "\n✅ All version files are consistent with version $VERSION"

      # Version update step removed - versions should be updated before release

      - name: Generate release name
        id: get_release_name
        run: |
          if [ -n "${{ github.event.inputs.release_name }}" ]; then
            echo "name=${{ github.event.inputs.release_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=Release ${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi
          
          echo "tag_name=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: get_release_notes
        run: |
          if [ -n "${{ github.event.inputs.release_description }}" ]; then
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "${{ github.event.inputs.release_description }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            # Auto-generate release notes
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "## 🚀 Development Release" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "**Build Date:** $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M:%S JST')" >> $GITHUB_OUTPUT
            echo "**Commit:** ${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            
            # Get recent commits
            echo "### 📝 Recent Changes" >> $GITHUB_OUTPUT
            git log --oneline -10 --pretty=format:"- %s (%h)" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            
            echo "### ⚠️ Note" >> $GITHUB_OUTPUT
            echo "This is a development release and may be unstable." >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create release using gh CLI
          RELEASE_URL=$(gh release create "${{ steps.get_release_name.outputs.tag_name }}" \
            --title "${{ steps.get_release_name.outputs.name }}" \
            --notes "${{ steps.get_release_notes.outputs.body }}" \
            --draft \
            --target "${{ github.sha }}")
          
          # Extract upload URL from release URL
          # Release URL format: https://github.com/owner/repo/releases/tag/tagname
          # We need to get the release ID to construct upload URL
          RELEASE_ID=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${{ github.repository }}/releases/tags/${{ steps.get_release_name.outputs.tag_name }}" \
            --jq '.id')
          
          # Construct upload URL
          UPLOAD_URL="https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets{?name,label}"
          
          echo "upload_url=${UPLOAD_URL}" >> $GITHUB_OUTPUT
          echo "release_url=${RELEASE_URL}" >> $GITHUB_OUTPUT
          echo "Created release: ${RELEASE_URL}"

  # Trigger builds
  build_all:
    name: Build All Platforms
    needs: create_release
    uses: ./.github/workflows/dev-build-all.yml
    with:
      release_upload_url: ${{ needs.create_release.outputs.upload_url }}
      use_new_workflow: ${{ github.event.inputs.use_new_workflow || false }}
    permissions:
      contents: write
      packages: read

  # Run comprehensive test suite
  # TODO: Fix test suite issues:
  # 1. Python linting errors (33 errors found)
  # 2. Performance benchmarks can't find piper binary
  # Temporarily disabled until fixed
  # run_tests:
  #   name: Run Test Suite
  #   needs: build_all
  #   uses: ./.github/workflows/test-suite.yml
  #   with:
  #     release_name: ${{ needs.create_release.outputs.release_name }}
  #   continue-on-error: true  # Allow workflow to continue even if tests fail

  # Publish to PyPI
  publish_pypi:
    name: Publish to PyPI
    needs: [build_all]  # run_tests removed temporarily
    if: |
      always() && 
      needs.build_all.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install twine
        run: pip install twine

      - name: Check wheels
        run: |
          ls -la dist/
          if ls dist/*.whl 1> /dev/null 2>&1; then
            twine check dist/*.whl
          else
            echo "No wheel files found, skipping check"
          fi

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PIPY_TOKEN }}
        run: |
          # Only publish if we have the token and wheels
          if [ -n "$TWINE_PASSWORD" ] && ls dist/*.whl 1> /dev/null 2>&1; then
            twine upload --skip-existing dist/*.whl
          else
            echo "⚠️ PyPI token not found or no wheels to upload, skipping"
          fi

  # Final summary
  release_summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [create_release, build_all, publish_pypi]  # run_tests removed temporarily
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 📊 Release Summary"
          echo ""
          echo "**Release Name:** ${{ needs.create_release.outputs.release_name }}"
          echo "**Tag:** ${{ needs.create_release.outputs.tag_name }}"
          echo ""
          echo "### Build Status"
          echo "- Create Release: ${{ needs.create_release.result }}"
          echo "- Build All: ${{ needs.build_all.result }}"
          echo "- Test Suite: SKIPPED (temporarily disabled)"
          echo "- Publish PyPI: ${{ needs.publish_pypi.result }}"
          echo ""
          
          if [ "${{ needs.build_all.result }}" = "success" ]; then
            echo "✅ All platforms built successfully"
          else
            echo "❌ Some builds failed"
          fi
          
          echo "⚠️ Test suite temporarily disabled - needs fixing"