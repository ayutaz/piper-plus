name: Create Dev Release

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      release_name:
        description: 'リリース名（未指定の場合は日付ベースで自動生成）'
        required: false
        type: string
      release_description:
        description: 'リリース説明（未指定の場合は自動生成）'
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  # First, trigger the build workflow
  trigger-build:
    name: Trigger Build
    runs-on: ubuntu-latest
    outputs:
      workflow-run-id: ${{ steps.get-run-id.outputs.run-id }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Trigger build workflow
        id: trigger
        uses: actions/github-script@v7
        with:
          script: |
            const result = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-all-platforms.yml',
              ref: context.ref
            });
            
            console.log('Workflow dispatch triggered');
            
      - name: Wait and get workflow run ID
        id: get-run-id
        uses: actions/github-script@v7
        with:
          script: |
            // Wait for workflow to start
            await new Promise(resolve => setTimeout(resolve, 10000));
            
            // Get the workflow runs triggered in the last minute
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-all-platforms.yml',
              branch: context.ref.replace('refs/heads/', ''),
              event: 'workflow_dispatch',
              per_page: 5
            });
            
            // Find the most recent run
            const recentRuns = runs.data.workflow_runs.filter(run => {
              const runTime = new Date(run.created_at).getTime();
              const now = new Date().getTime();
              return (now - runTime) < 60000; // Within last minute
            });
            
            if (recentRuns.length === 0) {
              throw new Error('Could not find the triggered workflow run');
            }
            
            const runId = recentRuns[0].id;
            console.log(`Found workflow run ID: ${runId}`);
            core.setOutput('run-id', runId);
            return runId;

  # Wait for build to complete
  wait-for-build:
    name: Wait for Build
    needs: trigger-build
    runs-on: ubuntu-latest
    outputs:
      run-id: ${{ needs.trigger-build.outputs.workflow-run-id }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Wait for build completion
        uses: actions/github-script@v7
        with:
          script: |
            const runId = ${{ needs.trigger-build.outputs.workflow-run-id }};
            let status = 'in_progress';
            let conclusion = null;
            
            console.log(`Waiting for workflow run ${runId} to complete...`);
            
            while (status === 'in_progress' || status === 'queued') {
              const run = await github.rest.actions.getWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: runId
              });
              
              status = run.data.status;
              conclusion = run.data.conclusion;
              console.log(`Build status: ${status}, conclusion: ${conclusion}`);
              
              if (status === 'in_progress' || status === 'queued') {
                await new Promise(resolve => setTimeout(resolve, 30000)); // Wait 30s
              }
            }
            
            if (status !== 'completed' || conclusion !== 'success') {
              throw new Error(`Build failed with status: ${status}, conclusion: ${conclusion}`);
            }
            
            console.log('Build completed successfully!');

  # Create release
  create-release:
    name: Create Release
    needs: wait-for-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate release name
        id: release-name
        run: |
          if [ -n "${{ github.event.inputs.release_name }}" ]; then
            echo "name=${{ github.event.inputs.release_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=Dev Release $(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT
          fi
          echo "tag=dev-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
      
      - name: Download artifacts from other workflow
        uses: actions/github-script@v7
        with:
          script: |
            const runId = ${{ needs.wait-for-build.outputs.run-id }};
            const fs = require('fs');
            const path = require('path');
            
            // Create artifacts directory
            const artifactsDir = 'artifacts';
            if (!fs.existsSync(artifactsDir)) {
              fs.mkdirSync(artifactsDir, { recursive: true });
            }
            
            // List artifacts for the workflow run
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId
            });
            
            console.log(`Found ${artifacts.data.artifacts.length} artifacts`);
            
            // Download each artifact
            for (const artifact of artifacts.data.artifacts) {
              console.log(`Downloading artifact: ${artifact.name}`);
              
              // Download artifact
              const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
                archive_format: 'zip'
              });
              
              // Save to file
              const artifactPath = path.join(artifactsDir, `${artifact.name}.zip`);
              fs.writeFileSync(artifactPath, Buffer.from(download.data));
              
              console.log(`Saved artifact to: ${artifactPath}`);
            }
      
      - name: Extract artifacts
        run: |
          cd artifacts
          for zip in *.zip; do
            echo "Extracting $zip"
            unzip -o "$zip"
            rm "$zip"
          done
          echo "Extracted files:"
          ls -la
      
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ steps.release-name.outputs.name }}
          tag_name: ${{ steps.release-name.outputs.tag }}
          draft: false
          prerelease: true
          files: artifacts/**/*
          body: |
            ## 🚀 Development Release
            
            This is an automated development release from the `dev` branch.
            
            ### Changes
            ${{ github.event.inputs.release_description || 'See commit history for changes.' }}
            
            ### Artifacts
            - Linux x86_64
            - macOS ARM64  
            - Windows x64
            
            ---
            *Generated at: ${{ steps.release-name.outputs.name }}*