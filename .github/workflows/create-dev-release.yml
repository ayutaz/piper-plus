name: Create Dev Release

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      release_name:
        description: 'リリース名（未指定の場合は日付ベースで自動生成）'
        required: false
        type: string
      release_description:
        description: 'リリース説明（未指定の場合は自動生成）'
        required: false
        type: string

permissions:
  contents: write

jobs:
  # First, trigger the build workflow
  trigger-build:
    name: Trigger Build
    runs-on: ubuntu-latest
    outputs:
      workflow-run-id: ${{ steps.trigger.outputs.run-id }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Trigger build workflow
        id: trigger
        uses: actions/github-script@v7
        with:
          script: |
            const result = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-all-platforms.yml',
              ref: context.ref
            });
            
            // Wait for workflow to start
            await new Promise(resolve => setTimeout(resolve, 5000));
            
            // Get the workflow run
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-all-platforms.yml',
              per_page: 1
            });
            
            return runs.data.workflow_runs[0].id;

  # Wait for build to complete
  wait-for-build:
    name: Wait for Build
    needs: trigger-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Wait for build completion
        uses: actions/github-script@v7
        with:
          script: |
            const runId = ${{ needs.trigger-build.outputs.workflow-run-id }};
            let status = 'in_progress';
            
            while (status === 'in_progress' || status === 'queued') {
              const run = await github.rest.actions.getWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: runId
              });
              
              status = run.data.status;
              console.log(`Build status: ${status}`);
              
              if (status === 'in_progress' || status === 'queued') {
                await new Promise(resolve => setTimeout(resolve, 30000)); // Wait 30s
              }
            }
            
            if (status !== 'completed' || run.data.conclusion !== 'success') {
              throw new Error('Build failed');
            }

  # Create release
  create-release:
    name: Create Release
    needs: wait-for-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate release name
        id: release-name
        run: |
          if [ -n "${{ github.event.inputs.release_name }}" ]; then
            echo "name=${{ github.event.inputs.release_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=Dev Release $(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT
          fi
          echo "tag=dev-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: piper-*
          path: artifacts/
      
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ steps.release-name.outputs.name }}
          tag_name: ${{ steps.release-name.outputs.tag }}
          draft: false
          prerelease: true
          files: artifacts/**/*
          body: |
            ## 🚀 Development Release
            
            This is an automated development release from the `dev` branch.
            
            ### Changes
            ${{ github.event.inputs.release_description || 'See commit history for changes.' }}
            
            ### Artifacts
            - Linux x86_64
            - macOS ARM64  
            - Windows x64
            
            ---
            *Generated at: ${{ steps.release-name.outputs.name }}*