name: Build OpenJTalk for Windows (Manual)

on:
  workflow_dispatch:
    inputs:
      upload_to_pr:
        description: 'Upload binary as PR artifact (for testing)'
        required: false
        type: boolean
        default: true
      pr_number:
        description: 'PR number to comment on (optional)'
        required: false
        type: string
        default: ''

jobs:
  build-openjtalk:
    name: Build OpenJTalk Windows Binary
    runs-on: windows-latest
    
    steps:
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-make
          make
          wget
          tar
          
    - name: Build HTSEngine
      shell: msys2 {0}
      run: |
        cd /tmp
        wget https://downloads.sourceforge.net/project/hts-engine/hts_engine%20API/hts_engine_API-1.10/hts_engine_API-1.10.tar.gz
        tar xzf hts_engine_API-1.10.tar.gz
        cd hts_engine_API-1.10
        
        # Configure and build
        ./configure --prefix=/mingw64
        make -j$(nproc)
        make install
        
    - name: Build OpenJTalk
      shell: msys2 {0}
      run: |
        cd /tmp
        wget https://downloads.sourceforge.net/project/open-jtalk/Open%20JTalk/open_jtalk-1.11/open_jtalk-1.11.tar.gz
        tar xzf open_jtalk-1.11.tar.gz
        cd open_jtalk-1.11
        
        # Configure with UTF-8 support
        ./configure --prefix=/mingw64 --with-charset=UTF-8
        make -j$(nproc)
        
        # The binary is in the current directory after build
        cp open_jtalk.exe /tmp/
        
    - name: Check binary dependencies
      shell: msys2 {0}
      run: |
        echo "=== Checking open_jtalk.exe dependencies ==="
        ldd /tmp/open_jtalk.exe || echo "ldd failed, trying objdump"
        objdump -p /tmp/open_jtalk.exe | grep "DLL Name" || true
        
        echo "=== Binary info ==="
        file /tmp/open_jtalk.exe
        ls -la /tmp/open_jtalk.exe
        
    - name: Test binary
      shell: msys2 {0}
      run: |
        echo "=== Testing open_jtalk.exe ==="
        /tmp/open_jtalk.exe --help || echo "Help flag not supported"
        
        # Create a simple test
        echo "Test" > /tmp/test.txt
        /tmp/open_jtalk.exe -x /mingw64/share/open_jtalk/dic -ot /tmp/test.lab /tmp/test.txt || echo "Test run failed (expected without dictionary)"
        
    - name: Strip binary
      shell: msys2 {0}
      run: |
        echo "=== Original size ==="
        ls -la /tmp/open_jtalk.exe
        
        strip /tmp/open_jtalk.exe
        
        echo "=== Stripped size ==="
        ls -la /tmp/open_jtalk.exe
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: open_jtalk_windows_${{ github.run_number }}
        path: C:\msys64\tmp\open_jtalk.exe
        retention-days: 7
        
    - name: Comment on PR
      if: github.event.inputs.pr_number != ''
      uses: actions/github-script@v7
      with:
        script: |
          const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: ${{ github.event.inputs.pr_number }},
            body: `🎉 OpenJTalk Windows binary has been built successfully!\n\n` +
                  `📦 Download the artifact from: ${artifactUrl}\n\n` +
                  `The binary will be available for 7 days as \`open_jtalk_windows_${context.runNumber}\`.`
          });
          
    - name: Display download instructions
      run: |
        echo "::notice::OpenJTalk Windows binary built successfully!"
        echo "::notice::Download from the artifacts section of this workflow run."
        echo "::notice::To use in your build:"
        echo "::notice::1. Download the artifact"
        echo "::notice::2. Place it in build/oj/bin/open_jtalk.exe"
        echo "::notice::3. Run CMake configure again"