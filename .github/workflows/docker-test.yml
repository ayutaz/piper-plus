name: Docker Tests

on:
  pull_request:
    paths:
      - 'docker/**'
      - '.github/workflows/docker-*.yml'
      - '.dockerignore'
  push:
    branches:
      - main
      - dev
    paths:
      - 'docker/**'
      - '.github/workflows/docker-*.yml'
      - '.dockerignore'

jobs:
  test-docker-builds:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: python-train
            context: .
            dockerfile: ./docker/python-train/Dockerfile
          - name: python-inference
            context: .
            dockerfile: ./docker/python-inference/Dockerfile
          - name: cpp-train
            context: .
            dockerfile: ./docker/cpp-train/Dockerfile
    
    steps:
      - name: Free disk space
        run: |
          echo "=== Initial disk space ==="
          df -h
          echo "=== Removing unnecessary files ==="
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean
          echo "=== Final disk space ==="
          df -h
      
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build ${{ matrix.image.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: false
          tags: piper-${{ matrix.image.name }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test ${{ matrix.image.name }} container
        run: |
          case "${{ matrix.image.name }}" in
            python-train)
              docker run --rm piper-${{ matrix.image.name }}:test python -c "
import torch
import numpy
import librosa
import soundfile
print('All imports successful')
"
              ;;
            python-inference)
              docker run --rm piper-${{ matrix.image.name }}:test python -c "
import torch
import onnxruntime
print('Inference environment OK')
"
              ;;
            cpp-train)
              docker run --rm piper-${{ matrix.image.name }}:test bash -c "
cmake --version && ninja --version && echo 'Build tools OK'
"
              ;;
          esac
      
      - name: Clean up Docker images
        if: always()
        run: |
          docker image rm piper-${{ matrix.image.name }}:test || true
          docker system prune -f

  test-multi-stage-build:
    runs-on: ubuntu-latest
    needs: test-docker-builds
    
    steps:
      - name: Free disk space
        run: |
          echo "=== Initial disk space ==="
          df -h
          echo "=== Removing unnecessary files ==="
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean
          echo "=== Final disk space ==="
          df -h
      
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build cpp-train image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/cpp-train
          file: ./docker/cpp-train/Dockerfile
          push: false
          tags: piper-cpp-train:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build cpp-inference image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/cpp-inference/Dockerfile
          push: false
          tags: piper-cpp-inference:test
          build-args: |
            BUILDER_IMAGE=piper-cpp-train:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test cpp-inference container
        run: |
          docker run --rm --entrypoint /bin/bash piper-cpp-inference:test -c "
            ldconfig -p | grep -E '(onnxruntime|espeak|HTSEngine)' && echo 'Libraries OK'
          "
      
      - name: Clean up Docker images
        if: always()
        run: |
          docker image rm piper-cpp-train:test piper-cpp-inference:test || true
          docker system prune -f

  run-smoke-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run Docker smoke tests
        run: |
          chmod +x docker/test-docker.sh
          ./docker/test-docker.sh