name: Docker Tests

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'docker/**'
      - 'Dockerfile'
      - 'src/python/**'
      - 'pyproject.toml'
      - '.github/workflows/docker-test.yml'
  workflow_dispatch:

jobs:
  test-python-inference:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean

      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build Python inference image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/python-inference/Dockerfile
          push: false
          tags: piper-python-inference:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run --rm piper-python-inference:test python -c "
          import piper_train; print('piper_train OK')
          import onnxruntime; print(f'onnxruntime {onnxruntime.__version__} OK')
          import soundfile; print('soundfile OK')
          print('All smoke tests passed')
          "

  test-webui:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean

      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build WebUI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/webui/Dockerfile
          push: false
          tags: piper-webui:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run --rm piper-webui:test python -c "
          import piper_train; print('piper_train OK')
          import gradio; print(f'gradio {gradio.__version__} OK')
          print('All smoke tests passed')
          "
