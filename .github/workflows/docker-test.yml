name: Docker Tests

on:
  pull_request:
    paths:
      - 'docker/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-*.yml'
      - '.dockerignore'
  push:
    branches:
      - main
      - dev
    paths:
      - 'docker/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-*.yml'
      - '.dockerignore'

jobs:
  test-docker-builds:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: python-train
            context: ./docker/python-train
            dockerfile: ./docker/python-train/Dockerfile
          - name: python-inference
            context: ./docker/python-inference
            dockerfile: ./docker/python-inference/Dockerfile
          - name: cpp-train
            context: ./docker/cpp-train
            dockerfile: ./docker/cpp-train/Dockerfile
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build ${{ matrix.image.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: false
          tags: piper-${{ matrix.image.name }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test ${{ matrix.image.name }} container
        run: |
          case "${{ matrix.image.name }}" in
            python-train)
              docker run --rm piper-${{ matrix.image.name }}:test python -c "
import torch
import numpy
import librosa
import soundfile
print('All imports successful')
"
              ;;
            python-inference)
              docker run --rm piper-${{ matrix.image.name }}:test python -c "
import torch
import onnxruntime
print('Inference environment OK')
"
              ;;
            cpp-train)
              docker run --rm piper-${{ matrix.image.name }}:test bash -c "
cmake --version && ninja --version && echo 'Build tools OK'
"
              ;;
          esac

  test-multi-stage-build:
    runs-on: ubuntu-latest
    needs: test-docker-builds
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build cpp-train image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/cpp-train
          file: ./docker/cpp-train/Dockerfile
          push: false
          tags: piper-cpp-train:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build cpp-inference image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/cpp-inference/Dockerfile
          push: false
          tags: piper-cpp-inference:test
          build-args: |
            BUILDER_IMAGE=piper-cpp-train:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test cpp-inference container
        run: |
          docker run --rm --entrypoint /bin/bash piper-cpp-inference:test -c "
            ldconfig -p | grep -E '(onnxruntime|espeak|HTSEngine)' && echo 'Libraries OK'
          "

  test-docker-compose:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Validate docker-compose.yml
        run: |
          docker compose config
      
      - name: Test docker-compose build (selected services)
        run: |
          docker compose build python-inference
      
      - name: Test service startup
        run: |
          docker compose run --rm python-inference python -c "print('Service OK')"

  run-smoke-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run Docker smoke tests
        run: |
          chmod +x docker/test-docker.sh
          ./docker/test-docker.sh