name: rust-tests

# 最小権限: cargo test / clippy のみ。
permissions:
  contents: read

on:
  workflow_call:
  pull_request:
    branches: [ dev ]
    paths:
      - 'src/rust/**'
      - 'src/python/g2p/piper_plus_g2p/data/zh_en_loanword.json'
      - 'tests/fixtures/g2p/zh_en_loanword_matrix.json'
      - 'tests/fixtures/phoneme_timing/**'
      - 'tests/fixtures/short_text/**'
      - 'tests/fixtures/ort_session/**'
      - 'test/fixtures/speaker_encoder_golden.json'
      - '.github/workflows/rust-tests.yml'
  push:
    branches: [ dev ]
    paths:
      - 'src/rust/**'
      - 'src/python/g2p/piper_plus_g2p/data/zh_en_loanword.json'
      - 'tests/fixtures/g2p/zh_en_loanword_matrix.json'
      - 'tests/fixtures/phoneme_timing/**'
      - 'tests/fixtures/short_text/**'
      - 'tests/fixtures/ort_session/**'
      - 'test/fixtures/speaker_encoder_golden.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: cargo check
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: src/rust
    steps:
    - uses: actions/checkout@v6.0.3
    - uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.13'
    - name: Install ALSA dev (for rodio/playback feature)
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: src/rust -> target
    - run: cargo check --workspace --all-features

  test:
    name: tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: src/rust
    steps:
    - uses: actions/checkout@v6.0.3
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: src/rust -> target

    - name: Run tests (default features)
      run: cargo test -p piper-plus --no-fail-fast

    - name: Run tests (naist-jdic)
      run: cargo test -p piper-plus --features naist-jdic --no-fail-fast

    - name: Run g2p chinese feature tests (ZH-EN dispatch via Phonemizer trait)
      # `chinese` is enabled by piper-plus-g2p's default features, so this
      # also runs the #[cfg(feature = "chinese")] dispatch tests added in
      # multilingual.rs (test_zh_en_dispatch_via_phonemizer_trait etc).
      run: cargo test -p piper-plus-g2p --no-fail-fast

    - name: Run short-text contract tests (onnx feature)
      # test_short_text_contract.rs imports piper_core::engine which is gated
      # behind the onnx feature. Run it explicitly so the parity gate is
      # exercised in CI.
      run: cargo test -p piper-plus --features onnx --test test_short_text_contract --no-fail-fast

    - name: Run ORT session contract tests (onnx feature)
      # test_ort_session_contract.rs imports MAX_INTRA_THREADS / WARMUP_PHONEME_LENGTH
      # from piper_core::engine which is gated behind onnx; mirror the short-text
      # gate so the per-runtime drift assert runs in CI.
      run: cargo test -p piper-plus --features onnx --test test_ort_session_contract --no-fail-fast

    - name: Run zero-shot E2E tests (onnx feature, Linux only)
      if: runner.os == 'Linux'
      run: cargo test --test test_zero_shot_e2e --features onnx --no-fail-fast

    - name: Run CLI tests
      run: cargo test -p piper-plus-cli --no-fail-fast

  wasm-test:
    name: piper-wasm wasm-bindgen tests (wasm32)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: src/rust/piper-wasm
    steps:
    - uses: actions/checkout@v6.0.3
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: src/rust -> target
    - uses: actions/setup-node@v6.4.0
      with:
        node-version: '24'
    - name: Install wasm-pack
      uses: jetli/wasm-pack-action@v0.4.0
      with:
        version: 'latest'
    - name: Run wasm-bindgen tests in Node (multilingual-external)
      # 22 #[wasm_bindgen_test] functions in src/lib.rs are gated on
      # target_arch = "wasm32" so they only run via wasm-pack — `cargo test`
      # on the host never touches them. multilingual-external enables all
      # 8 language G2P paths with runtime-loaded JA/ZH dictionaries.
      run: wasm-pack test --node --features multilingual-external

  fmt:
    name: rustfmt
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: src/rust
    steps:
    - uses: actions/checkout@v6.0.3
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: src/rust
    steps:
    - uses: actions/checkout@v6.0.3
    - uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.13'
    - name: Install ALSA dev (for rodio/playback feature)
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: src/rust -> target
    - run: cargo clippy --workspace --all-features -- -D warnings

  coverage:
    name: coverage (cargo-llvm-cov, Ubuntu)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: src/rust
    steps:
    - uses: actions/checkout@v6.0.3
    - uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.13'
    - name: Install ALSA dev (for rodio/playback feature)
      run: sudo apt-get update && sudo apt-get install -y libasound2-dev
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: src/rust -> target
        key: coverage
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@v2.82.2
      with:
        tool: cargo-llvm-cov
    - name: Generate coverage (workspace, lcov)
      # piper-wasm は wasm32 target で別 job (wasm-test) からのみテスト
      # 可能なため llvm-cov の native target から除外。
      # piper-plus-cli は build job 側でビルド検証されており、
      # llvm-cov に含めると thin な CLI wrapper の coverage が他クレートの
      # 数値を希釈するため除外する。
      #
      # --all-features は使わない: playback feature (rodio) のテストは
      # 実 audio device を要求するため CI runner で panic する
      # (play_audio_empty_samples_ok 等 3 件)。test job 側も --features
      # naist-jdic / onnx しか有効化していないので、coverage 計測も
      # 同じ feature 集合に揃える (drift 回避)。
      # 計測対象: piper-core / piper-plus-g2p / piper-python。
      run: |
        cargo llvm-cov clean --workspace
        cargo llvm-cov --workspace \
          --exclude piper-wasm --exclude piper-plus-cli \
          --features naist-jdic,onnx \
          --lcov --output-path lcov.info
    - name: Upload coverage to Codecov
      # continue-on-error は GitHub Actions エンジンレベル、
      # fail_ci_if_error は codecov-action 内部の挙動制御で、層が違う
      # ため両指定は二重防御として有効。明確性のため continue-on-error
      # に統一する (review #456 重複指摘への対応)。
      uses: codecov/codecov-action@v5.5.5
      with:
        files: src/rust/lcov.info
        flags: rust
        name: rust-coverage
      continue-on-error: true

  python-bindings:
    name: piper-plus-python build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: src/rust/piper-python
    steps:
    - uses: actions/checkout@v6.0.3
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: src/rust -> target
    - uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.13'
    - run: pip install maturin
    - run: maturin build --release

  build:
    name: build (${{ matrix.target }})
    needs: [check, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact: piper-plus-rs-cli-linux-x64
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: piper-plus-rs-cli-osx-arm64
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: piper-plus-rs-cli-win-x64
            archive_ext: zip
    defaults:
      run:
        working-directory: src/rust
    steps:
    - uses: actions/checkout@v6.0.3
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: src/rust -> target

    - name: Build release binary
      run: cargo build --release -p piper-plus-cli --target ${{ matrix.target }}

    - name: Create archive (tar.gz)
      if: matrix.archive_ext == 'tar.gz'
      run: |
        mkdir -p staging
        cp target/${{ matrix.target }}/release/piper-plus-cli staging/
        tar -czf ${{ matrix.artifact }}.tar.gz -C staging .

    - name: Create archive (zip)
      if: matrix.archive_ext == 'zip'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force staging
        Copy-Item target/${{ matrix.target }}/release/piper-plus-cli.exe staging/
        Compress-Archive -Path staging/* -DestinationPath ${{ matrix.artifact }}.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4.6.2
      with:
        name: ${{ matrix.artifact }}
        path: src/rust/${{ matrix.artifact }}.${{ matrix.archive_ext }}
        retention-days: 7
