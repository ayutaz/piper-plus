name: C++ Build & Test (reusable)

on:
  workflow_call:
    inputs:
      run-integration-tests:
        description: "Run integration tests that require a test model"
        type: boolean
        default: true
      cmake-args:
        description: "Additional CMake configure arguments"
        type: string
        default: ""
      os-matrix:
        description: 'JSON array of runner OS labels, e.g. ["ubuntu-latest","macos-latest"]'
        type: string
        default: '["ubuntu-latest", "macos-latest"]'
      build-type-matrix:
        description: 'JSON array of build types, e.g. ["Release"]'
        type: string
        default: '["Release"]'
      timeout-minutes:
        description: "Job timeout in minutes"
        type: number
        default: 25
      sanitizer:
        description: 'Sanitizer to enable: none, asan, ubsan, asan-ubsan'
        type: string
        default: 'none'

permissions:
  contents: read

jobs:
  build-and-test:
    name: C++ ${{ matrix.build-type }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
        build-type: ${{ fromJson(inputs.build-type-matrix) }}

    steps:
      - uses: actions/checkout@v6.0.3
        with:
          submodules: recursive

      # ── Dependencies ──────────────────────────────────────────
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ccache wget

          # Install ONNX Runtime
          wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.20.0/onnxruntime-linux-x64-1.20.0.tgz
          tar -xzf onnxruntime-linux-x64-1.20.0.tgz
          sudo cp -r onnxruntime-linux-x64-1.20.0/lib/* /usr/local/lib/
          sudo cp -r onnxruntime-linux-x64-1.20.0/include/* /usr/local/include/
          sudo ldconfig
          rm -rf onnxruntime-linux-x64-1.20.0*

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # Workaround for GitHub Actions cmake pinning issue
          # See: https://github.com/actions/runner-images/issues/12912
          brew uninstall cmake 2>/dev/null || true
          brew untap local/pinned 2>/dev/null || true

          brew update || true
          brew install cmake || true
          brew install ccache || brew upgrade ccache || true
          brew install wget || brew upgrade wget || true

          # Install ONNX Runtime (architecture-aware)
          sudo mkdir -p /usr/local/lib /usr/local/include

          if [[ $(uname -m) == "arm64" ]]; then
            echo "Installing ONNX Runtime for Apple Silicon..."
            wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.20.0/onnxruntime-osx-arm64-1.20.0.tgz
            tar -xzf onnxruntime-osx-arm64-1.20.0.tgz
            sudo cp -r onnxruntime-osx-arm64-1.20.0/lib/* /usr/local/lib/ 2>/dev/null || true
            sudo cp -r onnxruntime-osx-arm64-1.20.0/include/* /usr/local/include/ 2>/dev/null || true
            rm -rf onnxruntime-osx-arm64-1.20.0*
          else
            echo "Installing ONNX Runtime for Intel Mac..."
            wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.20.0/onnxruntime-osx-x86_64-1.20.0.tgz
            tar -xzf onnxruntime-osx-x86_64-1.20.0.tgz
            sudo cp -r onnxruntime-osx-x86_64-1.20.0/lib/* /usr/local/lib/ 2>/dev/null || true
            sudo cp -r onnxruntime-osx-x86_64-1.20.0/include/* /usr/local/include/ 2>/dev/null || true
            rm -rf onnxruntime-osx-x86_64-1.20.0*
          fi

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # cmake is pre-installed on windows-latest runner
          Invoke-WebRequest -Uri https://github.com/microsoft/onnxruntime/releases/download/v1.20.0/onnxruntime-win-x64-1.20.0.zip -OutFile onnxruntime-win-x64-1.20.0.zip
          Expand-Archive -Path onnxruntime-win-x64-1.20.0.zip -DestinationPath .
          echo "ONNXRUNTIME_ROOT_PATH=$PWD/onnxruntime-win-x64-1.20.0" >> $env:GITHUB_ENV

      # ── Build cache ───────────────────────────────────────────
      - name: Setup build cache
        if: runner.os != 'Windows'
        uses: actions/cache@v4.3.0
        with:
          path: |
            ~/.cache/ccache
            ~/Library/Caches/ccache
          key: ${{ runner.os }}-ccache-${{ matrix.build-type }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ matrix.build-type }}-
            ${{ runner.os }}-ccache-

      # ── Configure & Build ─────────────────────────────────────
      - name: Configure CMake
        shell: bash
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          CMAKE_ARGS="-DCMAKE_BUILD_TYPE=${{ matrix.build-type }} -DBUILD_TESTS=ON -DPIPER_PLUS_BUILD_SHARED=ON -DUSE_CUDA=OFF"

          # Append caller-provided extra args
          if [ -n "${{ inputs.cmake-args }}" ]; then
            CMAKE_ARGS="${CMAKE_ARGS} ${{ inputs.cmake-args }}"
          fi

          # Sanitizer flags (caller-driven; default 'none' is a no-op)
          # Note: SANITIZER_FLAGS が空白を含むため、`-DCMAKE_CXX_FLAGS=...` を
          # CMAKE_ARGS に inline すると shell word splitting で `-g` が独立した
          # CMake argument と誤認識される (CMake Error: Unknown argument -g)。
          # 環境変数 CXXFLAGS / CFLAGS / LDFLAGS 経由で CMake に渡すことで
          # quoting 問題を完全回避する。
          SANITIZER_FLAGS=""
          case "${{ inputs.sanitizer }}" in
            asan) SANITIZER_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g" ;;
            ubsan) SANITIZER_FLAGS="-fsanitize=undefined -fno-omit-frame-pointer -g" ;;
            asan-ubsan) SANITIZER_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g" ;;
            none|"") SANITIZER_FLAGS="" ;;
            *) echo "Unknown sanitizer: ${{ inputs.sanitizer }}" >&2; exit 1 ;;
          esac
          if [ -n "$SANITIZER_FLAGS" ]; then
            echo "Enabling sanitizer flags via env: $SANITIZER_FLAGS"
            export CXXFLAGS="$SANITIZER_FLAGS"
            export CFLAGS="$SANITIZER_FLAGS"
            export LDFLAGS="$SANITIZER_FLAGS"
          fi

          if [ "${{ runner.os }}" == "Windows" ]; then
            cmake -B build \
              -G "Visual Studio 17 2022" \
              -A x64 \
              ${CMAKE_ARGS} \
              -DONNXRUNTIME_ROOT_PATH="$ONNXRUNTIME_ROOT_PATH"
          elif [ "${{ runner.os }}" == "macOS" ]; then
            if [[ $(uname -m) == "arm64" ]]; then
              CMAKE_ARGS="${CMAKE_ARGS} -DCMAKE_OSX_ARCHITECTURES=arm64"
            else
              CMAKE_ARGS="${CMAKE_ARGS} -DCMAKE_OSX_ARCHITECTURES=x86_64"
            fi
            cmake -B build ${CMAKE_ARGS}
          else
            cmake -B build ${CMAKE_ARGS}
          fi

      - name: Build
        shell: bash
        run: |
          export PATH="/usr/lib/ccache:/usr/local/opt/ccache/libexec:$PATH"
          # Windows needs less parallelism to avoid timeout
          if [ "${{ runner.os }}" == "Windows" ]; then
            PARALLEL_JOBS="--parallel 2"
          else
            PARALLEL_JOBS="-j$(nproc 2>/dev/null || sysctl -n hw.ncpu)"
          fi

          if ! cmake --build build --config ${{ matrix.build-type }} $PARALLEL_JOBS; then
            echo "Build failed"
            exit 1
          fi
          echo "Build succeeded"

      # ── Runtime data ──────────────────────────────────────────
      - name: Download OpenJTalk dictionary
        shell: bash
        run: |
          # Always download dictionary — no dependency on system open-jtalk packages
          mkdir -p build/naist-jdic
          echo "Downloading OpenJTalk dictionary..."
          curl -sL https://sourceforge.net/projects/open-jtalk/files/Dictionary/open_jtalk_dic-1.11/open_jtalk_dic_utf_8-1.11.tar.gz/download \
            | tar xzf - -C build/
          mv build/open_jtalk_dic_utf_8-1.11/* build/naist-jdic/

      - name: Download espeak-ng-data
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p build
          cd build
          if wget -q https://github.com/rhasspy/espeak-ng/releases/download/2023.9.7-4/espeak-ng-data.tar.gz; then
            tar -xzf espeak-ng-data.tar.gz
            rm espeak-ng-data.tar.gz
            echo "espeak-ng-data downloaded successfully"
          else
            echo "Warning: Failed to download espeak-ng-data, some tests may be skipped"
            mkdir -p espeak-ng-data
          fi

      - name: Download espeak-ng-data (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p build
          cd build
          if wget -q https://github.com/rhasspy/espeak-ng/releases/download/2023.9.7-4/espeak-ng-data.tar.gz; then
            tar -xzf espeak-ng-data.tar.gz
            rm espeak-ng-data.tar.gz
            echo "espeak-ng-data downloaded successfully"
          else
            echo "Warning: Failed to download espeak-ng-data, some tests may be skipped"
            mkdir -p espeak-ng-data
          fi

      # ── Test model (integration tests only) ───────────────────
      - name: Cache test model
        if: ${{ inputs.run-integration-tests }}
        id: cache-test-model
        uses: actions/cache@v4.3.0
        with:
          path: test/models/
          key: test-model-multilingual-medium-v1

      - name: Download test model
        if: ${{ inputs.run-integration-tests && steps.cache-test-model.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          mkdir -p test/models
          curl -sfL "https://huggingface.co/ayousanz/piper-plus-base/resolve/main/multilingual-test-medium.onnx" \
            -o test/models/multilingual-test-medium.onnx || true
          curl -sfL "https://huggingface.co/ayousanz/piper-plus-base/resolve/main/multilingual-test-medium.onnx.json" \
            -o test/models/multilingual-test-medium.onnx.json || true

      # ── Dead code lint guard ──────────────────────────────────
      - name: Check for dead code markers
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "Checking for #if 0 dead code blocks in C++ sources..."
          if grep -rn '#if 0' src/cpp/ --include="*.c" --include="*.cpp" --include="*.h"; then
            echo "FAIL: #if 0 blocks found. Remove dead code or use feature flags."
            exit 1
          else
            echo "OK: No #if 0 blocks found."
          fi

      # ── Run tests ─────────────────────────────────────────────
      - name: Run tests
        shell: bash
        run: |
          cd build

          echo "Looking for test executables..."
          find . -name "test_*" -type f 2>/dev/null | head -20 || echo "No test executables found"

          # Environment variables
          if [ "${{ runner.os }}" == "Windows" ]; then
            export ESPEAK_NG_DATA="${PWD}/espeak-ng-data"
            export PATH="${ONNXRUNTIME_ROOT_PATH}/lib:${PATH}"
            export OPENJTALK_DICTIONARY_PATH="${PWD}/naist-jdic"
            export OPENJTALK_SKIP_TESTS_IF_UNAVAILABLE=1
          else
            export OPENJTALK_SKIP_TESTS_IF_UNAVAILABLE=1
            # Always use downloaded dictionary (no system open-jtalk dependency)
            export OPENJTALK_DICTIONARY_PATH="${PWD}/naist-jdic"
            export ESPEAK_NG_DATA="${PWD}/espeak-ng-data"

            echo "OpenJTalk env: DICTIONARY_PATH=$OPENJTALK_DICTIONARY_PATH"
          fi

          echo "Running C++ tests for ${{ runner.os }} ${{ matrix.build-type }}"
          echo "Available tests:"
          ctest -C ${{ matrix.build-type }} -N | grep -E "Test #" || echo "No tests found"

          CRITICAL_TESTS_PASSED=true
          INTEGRATION_TESTS="test_c_api_integration|test_c_api_audio_regression"

          if [ "${{ inputs.run-integration-tests }}" == "true" ]; then
            echo "Running all tests..."
            if ctest -C ${{ matrix.build-type }} --output-on-failure -V --timeout 120; then
              echo "All tests passed"
            else
              CRITICAL_TESTS_PASSED=false
            fi
          else
            echo "Running unit tests (excluding integration tests)..."
            if ctest -C ${{ matrix.build-type }} -E "${INTEGRATION_TESTS}" --output-on-failure -V --timeout 120; then
              echo "All unit tests passed"
            else
              CRITICAL_TESTS_PASSED=false
            fi
          fi

          if [ "$CRITICAL_TESTS_PASSED" = "true" ]; then
            echo "All critical tests passed!"
          else
            echo "Critical tests failed!"
            exit 1
          fi

      # ── Test result summary ──────────────────────────────────
      - name: Test result summary
        if: always()
        shell: bash
        run: |
          cd build
          echo "## C++ Test Results (${{ matrix.os }} / ${{ matrix.build-type }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ctest -C ${{ matrix.build-type }} -N 2>/dev/null | grep -E "Test #|Total Tests:" >> "$GITHUB_STEP_SUMMARY" || echo "No tests registered" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -f Testing/Temporary/LastTest.log ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Last test log (truncated)</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -100 Testing/Temporary/LastTest.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── Coverage (Ubuntu Debug only) ─────────────────────────
      # NOTE: produces empty coverage report unless the build adds
      # -fprofile-arcs -ftest-coverage to CMAKE_C/CXX_FLAGS. This step
      # is wired up so a follow-up CMakeLists change can flip coverage on
      # without touching workflows. ignore-errors keeps the job green when
      # gcov data is absent.
      - name: Generate coverage report (Ubuntu Debug)
        if: matrix.os == 'ubuntu-24.04' && matrix.build-type == 'Debug'
        shell: bash
        run: |
          sudo apt-get install -y lcov
          cd build
          lcov --capture --directory . --output-file coverage.info --ignore-errors source 2>/dev/null || true
          lcov --remove coverage.info '/usr/*' '*/build/*' '*/_deps/*' '*/tests/*' --output-file coverage.info.cleaned 2>/dev/null || true
          lcov --list coverage.info.cleaned 2>/dev/null || true

      - name: Upload coverage to Codecov (C++)
        if: matrix.os == 'ubuntu-24.04' && matrix.build-type == 'Debug'
        uses: codecov/codecov-action@v5.5.4
        with:
          files: build/coverage.info.cleaned
          flags: cpp
          fail_ci_if_error: false
        continue-on-error: true

      # ── Post-build verification ───────────────────────────────
      - name: Install shared library
        if: success() && runner.os != 'Windows'
        shell: bash
        run: |
          cmake --install build --prefix ${{ github.workspace }}/test-install
          cmake -DPREFIX=${{ github.workspace }}/test-install -P cmake/verify_install_layout.cmake

      - name: Verify C API symbols
        if: success() && runner.os != 'Windows'
        shell: bash
        run: |
          INSTALL_DIR="${{ github.workspace }}/test-install"

          if [ "${{ runner.os }}" == "macOS" ]; then
            LIB=$(find "$INSTALL_DIR" -name "libpiper_plus*.dylib" -not -name "*onnx*" | head -1)
            SYMBOLS=$(nm -gU "$LIB" 2>/dev/null | grep " T _piper_plus_" | sed 's/.* T _//')
          else
            LIB=$(find "$INSTALL_DIR" -name "libpiper_plus.so" | head -1)
            SYMBOLS=$(nm -gD "$LIB" 2>/dev/null | grep " T piper_plus_" | awk '{print $3}')
          fi

          echo "Library: $LIB"

          REQUIRED_SYMBOLS=(
            piper_plus_version
            piper_plus_api_version
            piper_plus_create
            piper_plus_free
            piper_plus_synthesize
            piper_plus_synth_start
            piper_plus_synth_next
            piper_plus_synthesize_streaming
            piper_plus_free_audio
            piper_plus_default_options
            piper_plus_get_last_error
            piper_plus_sample_rate
            piper_plus_num_speakers
            piper_plus_num_languages
            piper_plus_phonemize
            piper_plus_available_languages
            piper_plus_get_library_dir
          )

          MISSING=0
          for sym in "${REQUIRED_SYMBOLS[@]}"; do
            if echo "$SYMBOLS" | grep -q "^${sym}$"; then
              echo "  OK: $sym"
            else
              echo "  MISSING: $sym"
              MISSING=$((MISSING + 1))
            fi
          done

          if [ $MISSING -gt 0 ]; then
            echo "Symbol verification FAILED: $MISSING required symbol(s) missing"
            exit 1
          fi
          echo "Symbol verification PASSED (${#REQUIRED_SYMBOLS[@]} symbols)"

      - name: Compile C API examples
        if: success() && runner.os != 'Windows'
        shell: bash
        run: |
          INSTALL_DIR="${{ github.workspace }}/test-install"
          cmake -B build-examples -S examples/c-api \
            -DCMAKE_PREFIX_PATH="$INSTALL_DIR" \
            -DCMAKE_BUILD_TYPE=${{ matrix.build-type }}
          cmake --build build-examples
          echo "C API examples compiled successfully: basic, streaming, multi_language"

      - name: Run C API examples (smoke)
        # Linker + dynamic-symbol resolution smoke for basic / streaming /
        # multi_language. All three examples print "Usage: ..." and exit 1
        # when invoked without args (see examples/c-api/*.c main() argc<2 path).
        # Running them therefore proves: (1) the binary linked against
        # libpiper_plus, (2) every piper_plus_* symbol referenced from the
        # example resolves at process startup (would otherwise fail loader
        # before reaching main()), (3) main() actually executes.
        # We deliberately do NOT pass a model: a real synthesis run is already
        # exercised by the C API integration tests (test_c_api_integration),
        # and re-running it here would just duplicate cost.
        if: success() && runner.os != 'Windows'
        shell: bash
        run: |
          INSTALL_DIR="${{ github.workspace }}/test-install"
          # Find the dir containing libpiper_plus.{so,dylib} (lib/ on Debian/
          # Ubuntu/macOS; could be lib64/ on some RHEL-family distros) and
          # prepend it to the platform's runtime loader path. We resolve via
          # the actual library file rather than hard-coding lib/.
          if [ "${{ runner.os }}" == "macOS" ]; then
            LIB_FILE=$(find "$INSTALL_DIR" -name "libpiper_plus*.dylib" -not -name "*onnx*" | head -1)
          else
            LIB_FILE=$(find "$INSTALL_DIR" -name "libpiper_plus.so" | head -1)
          fi
          if [ -z "$LIB_FILE" ]; then
            echo "FAIL: libpiper_plus shared library not found under $INSTALL_DIR"
            exit 1
          fi
          LIB_DIR=$(dirname "$LIB_FILE")
          echo "Using LIB_DIR=$LIB_DIR"
          if [ "${{ runner.os }}" == "macOS" ]; then
            export DYLD_LIBRARY_PATH="$LIB_DIR:${DYLD_LIBRARY_PATH:-}"
          else
            export LD_LIBRARY_PATH="$LIB_DIR:${LD_LIBRARY_PATH:-}"
          fi

          cd build-examples
          # Locate executables (cmake may place them in . or in subdirs
          # depending on generator; single-config Makefile/Ninja => .).
          BASIC_BIN=$(find . -maxdepth 3 -name basic -type f -perm -u+x | head -1)
          STREAM_BIN=$(find . -maxdepth 3 -name streaming -type f -perm -u+x | head -1)
          MULTI_BIN=$(find . -maxdepth 3 -name multi_language -type f -perm -u+x | head -1)

          for bin in "$BASIC_BIN" "$STREAM_BIN" "$MULTI_BIN"; do
            if [ -z "$bin" ] || [ ! -x "$bin" ]; then
              echo "FAIL: example binary missing or not executable: '$bin'"
              exit 1
            fi
          done

          # No-arg smoke: each example writes a "Usage:" message to stderr
          # and returns 1. We assert exit==1 AND stderr contains "Usage:".
          run_smoke() {
            local name="$1"
            local bin="$2"
            local out err rc
            out=$("$bin" 2>/tmp/smoke_err) && rc=$? || rc=$?
            err=$(cat /tmp/smoke_err)
            echo "  [$name] exit=$rc"
            echo "  [$name] stderr: $(echo "$err" | head -1)"
            if [ "$rc" -ne 1 ]; then
              echo "FAIL: $name returned $rc, expected 1 (no-arg usage path)"
              exit 1
            fi
            if ! echo "$err" | grep -q "Usage:"; then
              echo "FAIL: $name did not print 'Usage:' on stderr"
              exit 1
            fi
          }

          echo "Running C API example smoke tests (no-arg usage path)..."
          run_smoke basic "$BASIC_BIN"
          run_smoke streaming "$STREAM_BIN"
          run_smoke multi_language "$MULTI_BIN"
          echo "All C API examples link and execute successfully."

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.build-type }}
          path: |
            build/Testing/Temporary/
          retention-days: 7
