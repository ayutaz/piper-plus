          print("Generated rtf-multi.html")
          PY

      - name: Publish to gh-pages (dev/bench/multi-runtime/index.html)
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add --detach /tmp/gh-pages origin/gh-pages
          mkdir -p /tmp/gh-pages/dev/bench/multi-runtime
          cp rtf-multi.html /tmp/gh-pages/dev/bench/multi-runtime/index.html
          cd /tmp/gh-pages
          git add dev/bench/multi-runtime/index.html
          if git diff --staged --quiet; then
            echo "No change to bench page. Skipping push."
            exit 0
          fi
          git commit -m "chore(pages): update multi-runtime RTF benchmark [${GITHUB_SHA::7}]"
          git push origin HEAD:gh-pages
