name: Multi-Runtime RTF Benchmark

# Cross-runtime RTF / latency regression gate.
#
# Why this exists:
#   ``rtf-regression.yml`` only measures the Python ORT path. A regression in
#   Rust / Go / C# / C++ / WASM ORT bindings (intra-op threading, session-option
#   defaults, etc.) would slip past that gate. This workflow drives each
#   runtime's CLI as a black box via ``scripts/benchmark_runtime.py`` and
#   reports wall-clock RTF + P50/P95 per (runtime, text-length) cell.
#
# Matrix: 6 runtimes (python/rust/go/csharp/cpp/wasm) x 3 text lengths
#   (short/medium/long) = 18 parallel jobs. Each job builds its runtime CLI
#   then runs warmup=5 + runs=30 against ``test/models/multilingual-test-medium.onnx``
#   on the same fixed text from ``tests/fixtures/benchmark-texts.json``.
#
# Initial policy: warn-only. The baseline JSON
# (``tests/fixtures/multi-runtime-rtf-baseline.json``) ships with ``null``
# placeholders; the first push-to-dev run uploads observed values as artifacts
# and a follow-up PR commits them as the calibrated baseline. After ~2-3
# weeks of variance data, flip ``--fail-on-regression`` in the aggregator
# step (see ``Compare against baseline`` below) to make it a hard gate.
#
# WASM is best-effort: building / running the Node CLI under CI is brittle
# (emscripten artefacts, dictionary download). The wasm matrix cell uses
# ``continue-on-error: true`` so a wasm regression doesn't block PRs while
# we stabilise the harness.

on:
  pull_request:
    branches: [dev]
    paths:
      - 'src/python/piper_train/**'
      - 'src/python_run/piper/**'
      - 'src/rust/piper-core/**'
      - 'src/rust/piper-cli/**'
      - 'src/go/**'
      - 'src/csharp/PiperPlus.Core/**'
      - 'src/csharp/PiperPlus.Cli/**'
      - 'src/cpp/**'
      - 'src/wasm/openjtalk-web/**'
      - 'scripts/benchmark_runtime.py'
      - 'tests/fixtures/benchmark-texts.json'
      - 'tests/fixtures/multi-runtime-rtf-baseline.json'
      - 'test/models/multilingual-test-medium.onnx*'
      - '.github/workflows/multi-runtime-rtf.yml'
  push:
    # dev へのマージのたびに毎回全ランタイムを測定し GitHub Pages を更新する。
    # path filter なし: コード変更の有無にかかわらず最新の RTF を記録する。
    branches: [dev]
  workflow_dispatch:
    inputs:
      initialize_baseline:
        description: 'Observed values を baseline として commit する (初回初期化用)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write  # gh-pages への push に必要

jobs:
  benchmark:
    name: bench (${{ matrix.runtime }}, ${{ matrix.text }})
    runs-on: ubuntu-24.04
    # Fork PRs can't post sticky comments; skip cleanly (mirrors
    # rtf-regression.yml's policy).
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    timeout-minutes: 30
    # During the warn-only baseline calibration period (policy=warn-only in
    # tests/fixtures/multi-runtime-rtf-baseline.json), individual runtime
    # cells are allowed to fail without blocking the PR. The aggregate job
    # still runs with `if: always()` and reports `(missing)` for failed
    # cells. Flip to strict (drop continue-on-error) once baselines have
    # ~2-3 weeks of variance data and each runtime cell is stable.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        runtime: [python, rust, go, csharp, cpp, wasm]
        text: [short, medium, long]
    steps:
      - uses: actions/checkout@v6.0.3

      # ---- Python: always required (harness itself is Python) ----
      - uses: astral-sh/setup-uv@v6.8.0
        with:
          python-version: '3.13'

      - name: Install harness deps (inference + onnxruntime)
        run: uv sync --extra inference

      - name: Download NLTK data
        run: uv run python -c "import nltk; nltk.download('averaged_perceptron_tagger_eng', quiet=True); nltk.download('cmudict', quiet=True)"

      # ---- Runtime-specific build ----

      - name: Build Rust CLI
        if: matrix.runtime == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Compile Rust CLI (release)
        if: matrix.runtime == 'rust'
        working-directory: src/rust
        continue-on-error: true
        run: cargo build --release -p piper-plus-cli

      - name: Set up Go
        if: matrix.runtime == 'go'
        uses: actions/setup-go@v5.6.0
        with:
          go-version: '1.26'

      - name: Compile Go CLI
        if: matrix.runtime == 'go'
        working-directory: src/go
        continue-on-error: true
        run: go build -o piper-plus ./cmd/piper-plus

      - name: Download ONNX Runtime for Go
        if: matrix.runtime == 'go'
        run: |
          ORT_VERSION=1.24.4
          wget -q "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz"
          tar xzf "onnxruntime-linux-x64-${ORT_VERSION}.tgz"
          mkdir -p onnxruntime/lib
          cp "onnxruntime-linux-x64-${ORT_VERSION}/lib/libonnxruntime.so" onnxruntime/lib/
          rm -rf "onnxruntime-linux-x64-${ORT_VERSION}" "onnxruntime-linux-x64-${ORT_VERSION}.tgz"
          echo "ONNX_RUNTIME_SHARED_LIBRARY_PATH=${{ github.workspace }}/onnxruntime/lib/libonnxruntime.so" >> "$GITHUB_ENV"

      - name: Set up .NET
        if: matrix.runtime == 'csharp'
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Compile C# CLI (Release)
        if: matrix.runtime == 'csharp'
        working-directory: src/csharp
        continue-on-error: true
        run: dotnet build PiperPlus.Cli/PiperPlus.Cli.csproj -c Release

      - name: Install C++ build deps
        if: matrix.runtime == 'cpp'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Download ONNX Runtime for C++
        if: matrix.runtime == 'cpp'
        run: |
          ORT_VERSION=1.20.0
          wget -q "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz"
          tar xzf "onnxruntime-linux-x64-${ORT_VERSION}.tgz"
          mkdir -p /tmp/ort/lib /tmp/ort/include
          cp -r "onnxruntime-linux-x64-${ORT_VERSION}/lib/." /tmp/ort/lib/
          cp -r "onnxruntime-linux-x64-${ORT_VERSION}/include/." /tmp/ort/include/
          rm -rf "onnxruntime-linux-x64-${ORT_VERSION}" "onnxruntime-linux-x64-${ORT_VERSION}.tgz"
          echo "LD_LIBRARY_PATH=/tmp/ort/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Compile C++ CLI
        if: matrix.runtime == 'cpp'
        continue-on-error: true
        run: |
          cmake -S . -B build-cpp \
            -DCMAKE_BUILD_TYPE=Release \
            -DONNXRUNTIME_DIR=/tmp/ort
          cmake --build build-cpp --target piper -j

      - name: Set up Node
        if: matrix.runtime == 'wasm'
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '20'

      - name: Install WASM package
        if: matrix.runtime == 'wasm'
        working-directory: src/wasm/openjtalk-web
        continue-on-error: true
        run: npm ci

      # ---- Resolve runtime CLI command ----
      - name: Resolve --cli-cmd for runtime
        id: cli
        run: |
          case "${{ matrix.runtime }}" in
            python)
              echo "cmd=uv run python -m piper" >> "$GITHUB_OUTPUT"
              ;;
            rust)
              echo "cmd=src/rust/target/release/piper-plus-cli" >> "$GITHUB_OUTPUT"
              ;;
            go)
              echo "cmd=src/go/piper-plus" >> "$GITHUB_OUTPUT"
              ;;
            csharp)
              echo "cmd=dotnet src/csharp/PiperPlus.Cli/bin/Release/net10.0/PiperPlus.Cli.dll" >> "$GITHUB_OUTPUT"
              ;;
            cpp)
              echo "cmd=build-cpp/piper" >> "$GITHUB_OUTPUT"
              ;;
            wasm)
              # Node entrypoint shipped by the npm package. If this path does
              # not exist the wasm cell fails fast and continue-on-error swallows it.
              echo "cmd=node src/wasm/openjtalk-web/bin/piper-plus.js" >> "$GITHUB_OUTPUT"
              ;;
          esac

      # ---- Run benchmark ----
      # Step-level `continue-on-error: true` keeps the job conclusion as
      # success even when the actual benchmark fails. This is intentional
      # during the warn-only baseline calibration period: a single
      # runtime/CLI not being ready (model file missing, CLI flag drift,
      # WASM dictionary download flake, etc.) should NOT show up as a
      # FAILURE check on the PR. The aggregate job runs with
      # `if: always()` and surfaces the failed cells as "(missing)" rows
      # in the sticky PR comment, which is the canonical report channel.
      # Drop this flag once baselines have stabilised (~2-3 weeks).
      - name: Run benchmark
        run: |
          # `|| true` forces a zero exit so the job conclusion stays SUCCESS
          # even when the benchmark fails (model file missing, CLI flag
          # drift, WASM dictionary flake, etc.). The aggregate job reads the
          # uploaded JSON (or treats it as missing) and surfaces failures in
          # the sticky PR comment — the canonical report channel during the
          # warn-only baseline calibration period. Note: `continue-on-error:
          # true` at job level alone is NOT sufficient — GitHub still
          # reports the per-cell FAILURE in the PR check rollup, which
          # confuses reviewers. Removing this `|| true` once baselines have
          # ~2-3 weeks of variance data converts the gate to strict.
          uv run python scripts/benchmark_runtime.py \
              --runtime "${{ matrix.runtime }}" \
              --cli-cmd "${{ steps.cli.outputs.cmd }}" \
              --model test/models/multilingual-test-medium.onnx \
              --config test/models/multilingual-test-medium.onnx.json \
              --text-file tests/fixtures/benchmark-texts.json \
              --text-key "${{ matrix.text }}" \
              --runs 30 --warmup 5 \
              --output "bench-${{ matrix.runtime }}-${{ matrix.text }}.json" \
              || echo "::warning::benchmark cell failed (warn-only): runtime=${{ matrix.runtime }} text=${{ matrix.text }}"

      - name: Upload benchmark JSON
        uses: actions/upload-artifact@v4.6.2
        with:
          name: multi-runtime-rtf-${{ matrix.runtime }}-${{ matrix.text }}
          path: bench-${{ matrix.runtime }}-${{ matrix.text }}.json
          retention-days: 30

  aggregate:
    name: Aggregate & compare baseline
    needs: benchmark
    runs-on: ubuntu-24.04
    if: always() && (github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request')
    permissions:
      contents: write  # read normally; write needed for initialize_baseline commit
      pull-requests: write  # sticky comment via actions/github-script
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: astral-sh/setup-uv@v6.8.0
        with:
          python-version: '3.13'

      - name: Download all bench artifacts
        uses: actions/download-artifact@v6.0.0
        with:
          path: bench-artifacts
          pattern: multi-runtime-rtf-*
          merge-multiple: true

      - name: Build markdown report and compare to baseline
        id: report
        run: |
          uv run python <<'PY'
          import json
          import os
          import pathlib

          baseline = json.loads(
              pathlib.Path(
                  "tests/fixtures/multi-runtime-rtf-baseline.json"
              ).read_text()
          )
          thresholds = baseline.get("thresholds", {})
          rtf_pct = thresholds.get("rtf_pct", 0.10)
          p50_pct = thresholds.get("latency_p50_pct", 0.10)
          p95_pct = thresholds.get("latency_p95_pct", 0.15)
          policy = baseline.get("policy", "warn-only")

          runtimes = ["python", "rust", "go", "csharp", "cpp", "wasm"]
          texts = ["short", "medium", "long"]

          observed: dict[str, dict[str, dict]] = {r: {} for r in runtimes}
          art_dir = pathlib.Path("bench-artifacts")
          if art_dir.exists():
              for p in art_dir.glob("bench-*.json"):
                  try:
                      data = json.loads(p.read_text())
                  except json.JSONDecodeError:
                      continue
                  rt = data.get("runtime")
                  tk = data.get("text_key")
                  if rt in observed and tk in texts:
                      observed[rt][tk] = data

          lines: list[str] = []
          lines.append("## Multi-Runtime RTF Benchmark")
          lines.append("")
          lines.append(
              f"Policy: **{policy}** "
              f"(thresholds: RTF +/-{rtf_pct * 100:.0f}%, "
              f"P50 +/-{p50_pct * 100:.0f}%, "
              f"P95 +/-{p95_pct * 100:.0f}%)"
          )
          lines.append("")
          lines.append(
              "Model: `test/models/multilingual-test-medium.onnx` "
              "(warmup=5, runs=30)"
          )
          lines.append("")
          lines.append(
              "| Runtime | Text | RTF | P50 (ms) | P95 (ms) | "
              "Baseline RTF | RTF Δ | Baseline P50 | P50 Δ | Baseline P95 | P95 Δ |"
          )
          lines.append(
              "|---------|------|-----|----------|----------|"
              "--------------|-------|--------------|-------|--------------|-------|"
          )

          any_regression = False
          for rt in runtimes:
              for tk in texts:
                  obs = observed.get(rt, {}).get(tk)
                  base = (
                      baseline.get("runtimes", {})
                      .get(rt, {})
                      .get(tk, {})
                  )
                  base_rtf = base.get("rtf")
                  base_p50 = base.get("latency_p50_ms")
                  base_p95 = base.get("latency_p95_ms")
                  if obs is None:
                      lines.append(
                          f"| {rt} | {tk} | (missing) | - | - | "
                          f"{base_rtf if base_rtf is not None else 'n/a'} | - | "
                          f"{base_p50 if base_p50 is not None else 'n/a'} | - | "
                          f"{base_p95 if base_p95 is not None else 'n/a'} | - |"
                      )
                      continue
                  rtf = obs.get("rtf")
                  p50 = obs.get("latency_p50_ms")
                  p95 = obs.get("latency_p95_ms")
                  rtf_delta = "n/a"
                  rtf_flag = ""
                  if base_rtf is not None and rtf is not None and base_rtf > 0:
                      ratio = (rtf - base_rtf) / base_rtf
                      rtf_delta = f"{ratio * 100:+.1f}%"
                      if ratio > rtf_pct:
                          rtf_flag = " :warning:"
                          any_regression = True
                  p50_delta = "n/a"
                  p50_flag = ""
                  if base_p50 is not None and p50 is not None and base_p50 > 0:
                      ratio_p50 = (p50 - base_p50) / base_p50
                      p50_delta = f"{ratio_p50 * 100:+.1f}%"
                      if ratio_p50 > p50_pct:
                          p50_flag = " :warning:"
                          any_regression = True
                  p95_delta = "n/a"
                  p95_flag = ""
                  if base_p95 is not None and p95 is not None and base_p95 > 0:
                      ratio_p95 = (p95 - base_p95) / base_p95
                      p95_delta = f"{ratio_p95 * 100:+.1f}%"
                      if ratio_p95 > p95_pct:
                          p95_flag = " :warning:"
                          any_regression = True
                  lines.append(
                      f"| {rt} | {tk} | {rtf} | {p50} | {p95} | "
                      f"{base_rtf if base_rtf is not None else 'null'} | "
                      f"{rtf_delta}{rtf_flag} | "
                      f"{base_p50 if base_p50 is not None else 'null'} | "
                      f"{p50_delta}{p50_flag} | "
                      f"{base_p95 if base_p95 is not None else 'null'} | "
                      f"{p95_delta}{p95_flag} |"
                  )

          lines.append("")
          if any_regression:
              lines.append(
                  "> :warning: One or more cells regressed beyond the "
                  "RTF, P50, or P95 threshold. **Warn-only** while the baseline "
                  "is being calibrated; this will become a hard gate once "
                  "we have ~2-3 weeks of variance data."
              )
          else:
              lines.append(
                  "> All cells within RTF, P50, and P95 threshold "
                  "(or baseline=null)."
              )

          out = "multi-runtime-rtf-report.md"
          pathlib.Path(out).write_text("\n".join(lines) + "\n")
          print(f"Report written: {out}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"any_regression={'true' if any_regression else 'false'}\n")
          PY

      - name: Check required runtime measurements
        run: |
          uv run python - <<'PY'
          import json, pathlib, sys

          # Python / Rust / Go / C# are required to have at least one measurement.
          # C++ and WASM are best-effort (complex build dependencies).
          REQUIRED = ["python", "rust", "go", "csharp"]
          texts = ["short", "medium", "long"]

          art_dir = pathlib.Path("bench-artifacts")
          missing = []
          for rt in REQUIRED:
              found = any(
                  (art_dir / f"bench-{rt}-{tk}.json").exists()
                  and json.loads((art_dir / f"bench-{rt}-{tk}.json").read_text()).get("rtf") is not None
                  for tk in texts
                  if (art_dir / f"bench-{rt}-{tk}.json").exists()
              )
              if not found:
                  missing.append(rt)

          if missing:
              print(
                  f"FAIL: required runtime(s) produced no measurements: {missing}\n"
                  f"Fix the benchmark harness before merging.",
                  file=sys.stderr,
              )
              sys.exit(1)
          print(f"OK: all required runtimes ({REQUIRED}) have at least one measurement.")
          PY

      - name: Upload aggregated report
        uses: actions/upload-artifact@v4.6.2
        with:
          name: multi-runtime-rtf-report
          path: multi-runtime-rtf-report.md
          retention-days: 30

      - name: Upsert sticky PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7.1.0
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('multi-runtime-rtf-report.md', 'utf8');
            const marker = '<!-- piper-plus:multi-runtime-rtf -->';
            const payload = `${marker}\n${body}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body: payload,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body: payload,
              });
            }

      - name: Initialize baseline (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch' && inputs.initialize_baseline == true
        run: |
          uv run python - <<'EOF'
          import json, pathlib, glob

          artifacts_dir = pathlib.Path("bench-artifacts")
          baseline_path = pathlib.Path("tests/fixtures/multi-runtime-rtf-baseline.json")
          baseline = json.loads(baseline_path.read_text())

          for result_file in sorted(artifacts_dir.glob("bench-*.json")):
              data = json.loads(result_file.read_text())
              rt = data.get("runtime")
              tk = data.get("text_key")
              if rt and tk and rt in baseline["runtimes"] and tk in baseline["runtimes"][rt]:
                  cell = baseline["runtimes"][rt][tk]
                  if data.get("rtf") is not None:
                      cell["rtf"] = round(data["rtf"], 4)
                  if data.get("latency_p50_ms") is not None:
                      cell["latency_p50_ms"] = round(data["latency_p50_ms"], 1)
                  if data.get("latency_p95_ms") is not None:
                      cell["latency_p95_ms"] = round(data["latency_p95_ms"], 1)

          baseline_path.write_text(json.dumps(baseline, indent=2, ensure_ascii=False) + "\n")
          print("baseline updated")
          EOF
        shell: bash

      - name: Open PR with initialized baseline
        if: github.event_name == 'workflow_dispatch' && inputs.initialize_baseline == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="chore/rtf-baseline-init-$(date -u +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add tests/fixtures/multi-runtime-rtf-baseline.json
          if git diff --staged --quiet; then
            echo "No changes to baseline (all cells still null). Skipping PR."
            exit 0
          fi
          git commit -m "chore(bench): initialize multi-runtime RTF baseline from first run"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(bench): initialize multi-runtime RTF baseline" \
            --body "Auto-generated by \`workflow_dispatch\` with \`initialize_baseline=true\`. Merge to make RTF regression checks meaningful." \
            --base dev \
            --head "$BRANCH"

      # -------------------------------------------------------------------------
      # GitHub Pages 公開 (push to dev のみ)
      # gh-pages ブランチの dev/bench/multi-runtime/index.html を更新する。
      # ベンチマーク結果を self-contained HTML としてレンダリングし、
      # https://ayutaz.github.io/piper-plus/dev/bench/multi-runtime/ で公開。
      # -------------------------------------------------------------------------
      - name: Generate multi-runtime RTF HTML
        if: github.event_name == 'push'
        run: |
          uv run python - <<'PY'
          import json, os, pathlib, datetime

          art_dir = pathlib.Path("bench-artifacts")
          runtimes = ["python", "rust", "go", "csharp", "cpp", "wasm"]
          texts    = ["short", "medium", "long"]

          observed: dict[str, dict[str, dict]] = {r: {} for r in runtimes}
          if art_dir.exists():
              for p in art_dir.glob("bench-*.json"):
                  try:
                      data = json.loads(p.read_text())
                  except Exception:
                      continue
                  rt = data.get("runtime")
                  tk = data.get("text_key")
                  if rt in observed and tk in texts:
                      observed[rt][tk] = data

          commit_sha = os.environ.get("GITHUB_SHA", "")[:7]
          run_url    = (
              f"https://github.com/{os.environ.get('GITHUB_REPOSITORY','')}"
              f"/actions/runs/{os.environ.get('GITHUB_RUN_ID','')}"
          )
          timestamp  = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          def cell(rt, tk):
              obs = observed.get(rt, {}).get(tk)
              if obs is None:
                  return "<td>—</td><td>—</td><td>—</td>"
              rtf = obs.get("rtf", "—")
              p50 = obs.get("latency_p50_ms", "—")
              p95 = obs.get("latency_p95_ms", "—")
              return f"<td>{rtf}</td><td>{p50}</td><td>{p95}</td>"

          rows = []
          for rt in runtimes:
              for tk in texts:
                  rows.append(
                      f"<tr><td><code>{rt}</code></td><td>{tk}</td>"
                      + cell(rt, tk)
                      + "</tr>"
                  )
          rows_html = "\n".join(rows)

          html = f"""<!DOCTYPE html>
          <html lang="ja">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>Piper-Plus Multi-Runtime RTF Benchmark</title>
          <style>
            body {{ font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 16px 24px; background: #fff; color: #24292f; }}
            h1   {{ font-size: 1.4rem; margin-bottom: 4px; }}
            p.meta {{ font-size: 0.85rem; color: #57606a; margin-top: 0; }}
            table {{ border-collapse: collapse; width: 100%; font-size: 0.9rem; }}
            th, td {{ padding: 8px 12px; text-align: right; border: 1px solid #d0d7de; }}
            th {{ background: #f6f8fa; text-align: center; }}
            td:first-child, td:nth-child(2) {{ text-align: left; }}
            tr:nth-child(even) {{ background: #f6f8fa; }}
            .note {{ font-size: 0.8rem; color: #57606a; margin-top: 12px; }}
            a {{ color: #0969da; text-decoration: none; }}
          </style>
          </head>
          <body>
          <h1>Piper-Plus Multi-Runtime RTF Benchmark</h1>
