name: Kotlin G2P CI

on:
  pull_request:
    branches: [dev]
    paths:
      - 'android/piper-plus-g2p/**'
      - 'src/cpp/piper_plus.h'
      - 'src/cpp/piper_plus_c_api.cpp'
      - '.github/workflows/kotlin-g2p-ci.yml'
  push:
    branches: [dev]
    paths:
      - 'android/piper-plus-g2p/**'
      - 'src/cpp/piper_plus.h'
      - 'src/cpp/piper_plus_c_api.cpp'
      - '.github/workflows/kotlin-g2p-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  ANDROID_NDK_VERSION: "26.1.10909125"
  ANDROID_API_LEVEL: "24"
  ONNXRUNTIME_VERSION: "1.17.0"

jobs:
  # ---------------------------------------------------------------------------
  # Build libpiper_plus.so for the 3 ABIs the AAR ships.
  # Mirrors android-build.yml; we keep this in a separate workflow so the AAR
  # build can pin an exact set of artifacts independently.
  # ---------------------------------------------------------------------------
  build-native:
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    name: Native ${{ matrix.abi }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with: { cmdline-tools-version: 11076708 }

      - name: Install NDK
        run: |
          sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      - name: Cache ONNX Runtime Android
        id: cache-ort-android
        uses: actions/cache@v5
        with:
          path: ort-android/
          key: ort-android-${{ env.ONNXRUNTIME_VERSION }}-${{ matrix.abi }}

      - name: Download ONNX Runtime Android
        if: steps.cache-ort-android.outputs.cache-hit != 'true'
        run: |
          mkdir -p ort-android
          curl -sfL "https://repo1.maven.org/maven2/com/microsoft/onnxruntime/onnxruntime-android/${{ env.ONNXRUNTIME_VERSION }}/onnxruntime-android-${{ env.ONNXRUNTIME_VERSION }}.aar" -o /tmp/ort.aar
          (cd ort-android && unzip -o /tmp/ort.aar "jni/${{ matrix.abi }}/*" -d .)
          mkdir -p ort-android/lib ort-android/include
          cp ort-android/jni/${{ matrix.abi }}/libonnxruntime.so ort-android/lib/
          curl -sfL "https://github.com/microsoft/onnxruntime/releases/download/v${{ env.ONNXRUNTIME_VERSION }}/onnxruntime-linux-x64-${{ env.ONNXRUNTIME_VERSION }}.tgz" -o /tmp/ort-headers.tgz
          tar -xzf /tmp/ort-headers.tgz --strip-components=1 -C ort-android "onnxruntime-linux-x64-${{ env.ONNXRUNTIME_VERSION }}/include"

      - name: Configure CMake
        run: |
          CMAKE_EXTRA_FLAGS=""
          [ "${{ matrix.abi }}" = "armeabi-v7a" ] && CMAKE_EXTRA_FLAGS="-DANDROID_ARM_NEON=ON"
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.ANDROID_NDK_HOME }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API_LEVEL }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DPIPER_PLUS_BUILD_SHARED=ON \
            -DBUILD_TESTS=OFF \
            -DCMAKE_SHARED_LINKER_FLAGS="-Wl,-z,max-page-size=16384" \
            -DONNXRUNTIME_DIR=${{ github.workspace }}/ort-android \
            -DONNXRUNTIME_INCLUDE_DIR=${{ github.workspace }}/ort-android/include \
            -DONNXRUNTIME_LIB=${{ github.workspace }}/ort-android/lib/libonnxruntime.so \
            $CMAKE_EXTRA_FLAGS

      - name: Build piper_plus
        run: cmake --build build --config Release --target piper_plus -j$(nproc)

      - name: Stage native libs
        run: |
          mkdir -p staging/${{ matrix.abi }}
          cp build/libpiper_plus.so staging/${{ matrix.abi }}/ 2>/dev/null \
            || cp build/lib/libpiper_plus.so staging/${{ matrix.abi }}/
          cp ort-android/lib/libonnxruntime.so staging/${{ matrix.abi }}/

      - name: Upload native libs
        uses: actions/upload-artifact@v7
        with:
          name: piper-plus-g2p-native-${{ matrix.abi }}
          path: staging/${{ matrix.abi }}/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # L1 (Pure Kotlin unit tests) + L4 (cross-runtime parity placeholder).
  # ---------------------------------------------------------------------------
  unit-tests:
    name: L1 unit tests
    needs: build-native
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Download native libs
        uses: actions/download-artifact@v8
        with:
          pattern: piper-plus-g2p-native-*
          path: native/

      - name: Stage jniLibs
        run: |
          mkdir -p android/piper-plus-g2p/src/main/jniLibs
          for abi in arm64-v8a armeabi-v7a x86_64; do
            mkdir -p "android/piper-plus-g2p/src/main/jniLibs/${abi}"
            cp native/piper-plus-g2p-native-${abi}/*.so \
               "android/piper-plus-g2p/src/main/jniLibs/${abi}/"
          done

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Run L1 unit tests
        working-directory: android
        run: gradle :piper-plus-g2p:testReleaseUnitTest --no-daemon --stacktrace

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kotlin-g2p-l1-reports
          path: android/piper-plus-g2p/build/reports/tests/

  # ---------------------------------------------------------------------------
  # M4 / L5: assemble the AAR and verify the binary contract.
  # ---------------------------------------------------------------------------
  build-aar:
    name: Build AAR + L5 ABI gate
    needs: build-native
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Download native libs
        uses: actions/download-artifact@v8
        with:
          pattern: piper-plus-g2p-native-*
          path: native/

      - name: Stage jniLibs
        run: |
          mkdir -p android/piper-plus-g2p/src/main/jniLibs
          for abi in arm64-v8a armeabi-v7a x86_64; do
            mkdir -p "android/piper-plus-g2p/src/main/jniLibs/${abi}"
            cp native/piper-plus-g2p-native-${abi}/*.so \
               "android/piper-plus-g2p/src/main/jniLibs/${abi}/"
          done

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Assemble release AAR
        working-directory: android
        run: gradle :piper-plus-g2p:assembleRelease --no-daemon --stacktrace

      - name: Locate AAR
        id: aar
        run: |
          AAR=$(ls android/piper-plus-g2p/build/outputs/aar/*.aar | head -n1)
          echo "path=$AAR" >> "$GITHUB_OUTPUT"
          echo "Found AAR: $AAR"

      - name: AAR size gate (NFR-SIZE-1, < 10 MB)
        run: |
          AAR="${{ steps.aar.outputs.path }}"
          SIZE=$(stat -c%s "$AAR")
          MAX=$((10 * 1024 * 1024))
          echo "AAR size: ${SIZE} bytes (max ${MAX})"
          [ "$SIZE" -lt "$MAX" ] || { echo "AAR too large"; exit 1; }

      - name: Verify 16 KB page alignment (FR-TEST-5, NFR-COMPAT-4)
        run: |
          set -e
          AAR="${{ steps.aar.outputs.path }}"
          UNZIP_DIR=$(mktemp -d)
          unzip -q "$AAR" -d "$UNZIP_DIR"
          for abi in arm64-v8a armeabi-v7a x86_64; do
            for so in "$UNZIP_DIR/jni/${abi}"/*.so; do
              [ -f "$so" ] || { echo "$abi: missing .so"; exit 1; }
              # On 64-bit ABIs we require align 2**14 (16384). On the legacy 32-bit
              # armeabi-v7a, the kernel still uses 4 KB pages, so we accept either.
              ALIGN=$(${ANDROID_NDK_HOME:-/usr}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-objdump -p "$so" 2>/dev/null \
                      | grep -E 'LOAD|p_align' | head -n1 || true)
              echo "$abi $(basename $so): $ALIGN"
            done
          done
          # Strict check: arm64-v8a + x86_64 must show 0x4000 page align
          for abi in arm64-v8a x86_64; do
            for so in "$UNZIP_DIR/jni/${abi}"/*.so; do
              if ! readelf -lW "$so" | awk '/LOAD/ {print $NF}' | grep -q '0x4000\|0x10000'; then
                echo "FAIL: $so does not show 16 KB page alignment"
                readelf -lW "$so" | head
                exit 1
              fi
            done
          done

      - name: Upload AAR
        uses: actions/upload-artifact@v7
        with:
          name: piper-plus-g2p-aar
          path: android/piper-plus-g2p/build/outputs/aar/*.aar
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # L3: instrumented tests on a Gradle Managed Device emulator.
  # ---------------------------------------------------------------------------
  instrumented-tests:
    name: L3 instrumented tests (Pixel 6 API 34)
    needs: build-native
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download native libs
        uses: actions/download-artifact@v8
        with:
          pattern: piper-plus-g2p-native-*
          path: native/

      - name: Stage jniLibs
        run: |
          mkdir -p android/piper-plus-g2p/src/main/jniLibs
          for abi in arm64-v8a armeabi-v7a x86_64; do
            mkdir -p "android/piper-plus-g2p/src/main/jniLibs/${abi}"
            cp native/piper-plus-g2p-native-${abi}/*.so \
               "android/piper-plus-g2p/src/main/jniLibs/${abi}/"
          done

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Run instrumented tests on Gradle Managed Device
        working-directory: android
        run: |
          gradle :piper-plus-g2p:pixel6api34DebugAndroidTest \
            --no-daemon --stacktrace -Pandroid.testInstrumentationRunnerArguments.notAnnotation=androidx.test.filters.LargeTest

      - name: Upload instrumented test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kotlin-g2p-l3-reports
          path: android/piper-plus-g2p/build/reports/androidTests/managedDevice/

  # ---------------------------------------------------------------------------
  # AC-10: sample app assembleDebug from examples/android-g2p-sample/.
  # Uses the composite build wired up in settings.gradle.kts so the sample
  # consumes the in-repo AAR module instead of waiting on Maven Central.
  # ---------------------------------------------------------------------------
  sample-app:
    name: Sample app assembleDebug
    needs: build-native
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: "8.11.1" }

      - name: Download native libs
        uses: actions/download-artifact@v8
        with:
          pattern: piper-plus-g2p-native-*
          path: native/

      - name: Stage jniLibs
        run: |
          mkdir -p android/piper-plus-g2p/src/main/jniLibs
          for abi in arm64-v8a armeabi-v7a x86_64; do
            mkdir -p "android/piper-plus-g2p/src/main/jniLibs/${abi}"
            cp native/piper-plus-g2p-native-${abi}/*.so \
               "android/piper-plus-g2p/src/main/jniLibs/${abi}/"
          done

      - name: Assemble sample debug APK
        working-directory: examples/android-g2p-sample
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload sample APK
        uses: actions/upload-artifact@v7
        with:
          name: piper-plus-g2p-sample-debug
          path: examples/android-g2p-sample/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
