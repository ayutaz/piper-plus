name: Kotlin G2P CI

on:
  pull_request:
    branches: [dev]
    paths:
      - 'android/piper-plus-g2p/**'
      - 'src/cpp/piper_plus.h'
      - 'src/cpp/piper_plus_c_api.cpp'
      - '.github/workflows/kotlin-g2p-ci.yml'
  push:
    branches: [dev]
    paths:
      - 'android/piper-plus-g2p/**'
      - 'src/cpp/piper_plus.h'
      - 'src/cpp/piper_plus_c_api.cpp'
      - '.github/workflows/kotlin-g2p-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-flight runs from the same branch when a new commit arrives so we
# don't burn CI minutes / emulator slots on stale work.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_NDK_VERSION: "26.1.10909125"
  ANDROID_API_LEVEL: "24"
  ONNXRUNTIME_VERSION: "1.17.0"

jobs:
  # ---------------------------------------------------------------------------
  # Build libpiper_plus.so for the 3 ABIs the AAR ships.
  # Mirrors android-build.yml; we keep this in a separate workflow so the AAR
  # build can pin an exact set of artifacts independently.
  # ---------------------------------------------------------------------------
  build-native:
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    name: Native ${{ matrix.abi }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with: { cmdline-tools-version: 11076708 }

      - name: Install NDK
        run: |
          sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      - name: Cache ONNX Runtime Android
        id: cache-ort-android
        uses: actions/cache@v5
        with:
          path: ort-android/
          key: ort-android-${{ env.ONNXRUNTIME_VERSION }}-${{ matrix.abi }}

      - name: Download ONNX Runtime Android
        if: steps.cache-ort-android.outputs.cache-hit != 'true'
        run: |
          mkdir -p ort-android
          curl -sfL "https://repo1.maven.org/maven2/com/microsoft/onnxruntime/onnxruntime-android/${{ env.ONNXRUNTIME_VERSION }}/onnxruntime-android-${{ env.ONNXRUNTIME_VERSION }}.aar" -o /tmp/ort.aar
          (cd ort-android && unzip -o /tmp/ort.aar "jni/${{ matrix.abi }}/*" -d .)
          mkdir -p ort-android/lib ort-android/include
          cp ort-android/jni/${{ matrix.abi }}/libonnxruntime.so ort-android/lib/
          curl -sfL "https://github.com/microsoft/onnxruntime/releases/download/v${{ env.ONNXRUNTIME_VERSION }}/onnxruntime-linux-x64-${{ env.ONNXRUNTIME_VERSION }}.tgz" -o /tmp/ort-headers.tgz
          tar -xzf /tmp/ort-headers.tgz --strip-components=1 -C ort-android "onnxruntime-linux-x64-${{ env.ONNXRUNTIME_VERSION }}/include"

      - name: Configure CMake
        run: |
          CMAKE_EXTRA_FLAGS=""
          [ "${{ matrix.abi }}" = "armeabi-v7a" ] && CMAKE_EXTRA_FLAGS="-DANDROID_ARM_NEON=ON"
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.ANDROID_NDK_HOME }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API_LEVEL }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DPIPER_PLUS_BUILD_SHARED=ON \
            -DBUILD_TESTS=OFF \
            -DCMAKE_SHARED_LINKER_FLAGS="-Wl,-z,max-page-size=16384" \
            -DONNXRUNTIME_DIR=${{ github.workspace }}/ort-android \
            -DONNXRUNTIME_INCLUDE_DIR=${{ github.workspace }}/ort-android/include \
            -DONNXRUNTIME_LIB=${{ github.workspace }}/ort-android/lib/libonnxruntime.so \
            $CMAKE_EXTRA_FLAGS

      - name: Build piper_plus
        run: cmake --build build --config Release --target piper_plus -j$(nproc)

      - name: Stage native libs
        run: |
          mkdir -p staging/${{ matrix.abi }}
          cp build/libpiper_plus.so staging/${{ matrix.abi }}/ 2>/dev/null \
            || cp build/lib/libpiper_plus.so staging/${{ matrix.abi }}/
          cp ort-android/lib/libonnxruntime.so staging/${{ matrix.abi }}/

      - name: Upload native libs
        uses: actions/upload-artifact@v7
        with:
          name: piper-plus-g2p-native-${{ matrix.abi }}
          path: staging/${{ matrix.abi }}/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # L1 (Pure Kotlin unit tests) + L4 (cross-runtime parity placeholder).
  # ---------------------------------------------------------------------------
  unit-tests:
    name: L1 unit tests
    needs: build-native
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Download native libs
        uses: actions/download-artifact@v8
        with:
          pattern: piper-plus-g2p-native-*
          path: native/

      - name: Stage jniLibs
        run: |
          mkdir -p android/piper-plus-g2p/src/main/jniLibs
          for abi in arm64-v8a armeabi-v7a x86_64; do
            mkdir -p "android/piper-plus-g2p/src/main/jniLibs/${abi}"
            cp native/piper-plus-g2p-native-${abi}/*.so \
               "android/piper-plus-g2p/src/main/jniLibs/${abi}/"
          done

      # AGP runs externalNativeBuild during configure/assemble even when
      # prebuilt jniLibs are already staged. That requires the NDK to be
      # installed at the path declared by `android.ndkVersion`.
      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3
        with: { cmdline-tools-version: 11076708 }
      - name: Install NDK
        run: |
          sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Run L1 unit tests
        working-directory: android
        run: gradle :piper-plus-g2p:testReleaseUnitTest --no-daemon --stacktrace

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kotlin-g2p-l1-reports
          path: android/piper-plus-g2p/build/reports/tests/

  # ---------------------------------------------------------------------------
  # M4 / L5: assemble the AAR and verify the binary contract.
  # ---------------------------------------------------------------------------
  build-aar:
    name: Build AAR + L5 ABI gate
    needs: build-native
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Download native libs
        uses: actions/download-artifact@v8
        with:
          pattern: piper-plus-g2p-native-*
          path: native/

      - name: Stage jniLibs
        run: |
          mkdir -p android/piper-plus-g2p/src/main/jniLibs
          for abi in arm64-v8a armeabi-v7a x86_64; do
            mkdir -p "android/piper-plus-g2p/src/main/jniLibs/${abi}"
            cp native/piper-plus-g2p-native-${abi}/*.so \
               "android/piper-plus-g2p/src/main/jniLibs/${abi}/"
          done

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3
        with: { cmdline-tools-version: 11076708 }
      - name: Install NDK
        run: |
          sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Assemble release AAR
        working-directory: android
        run: gradle :piper-plus-g2p:assembleRelease --no-daemon --stacktrace

      - name: Locate AAR
        id: aar
        run: |
          AAR=$(ls android/piper-plus-g2p/build/outputs/aar/*.aar | head -n1)
          echo "path=$AAR" >> "$GITHUB_OUTPUT"
          echo "Found AAR: $AAR"

      - name: AAR size gate (NFR-SIZE-1, < 25 MB)
        # The AAR bundles libpiper_plus.so for 3 ABIs (arm64-v8a/armeabi-v7a/x86_64)
        # plus the JNI shim. Each libpiper_plus.so is ~6.5 MB stripped (it
        # statically links ONNX Runtime + OpenJTalk), so 3 ABIs land around
        # 20 MB. 25 MB gives ~5 MB headroom for future feature growth before
        # we have to revisit the publishing model (e.g. ABI splits, AAB).
        run: |
          AAR="${{ steps.aar.outputs.path }}"
          SIZE=$(stat -c%s "$AAR")
          MAX=$((25 * 1024 * 1024))
          echo "AAR size: ${SIZE} bytes (max ${MAX})"
          [ "$SIZE" -lt "$MAX" ] || { echo "AAR too large"; exit 1; }

      - name: Verify 16 KB page alignment (FR-TEST-5, NFR-COMPAT-4)
        run: |
          set -e
          AAR="${{ steps.aar.outputs.path }}"
          UNZIP_DIR=$(mktemp -d)
          unzip -q "$AAR" -d "$UNZIP_DIR"
          for abi in arm64-v8a armeabi-v7a x86_64; do
            for so in "$UNZIP_DIR/jni/${abi}"/*.so; do
              [ -f "$so" ] || { echo "$abi: missing .so"; exit 1; }
              # On 64-bit ABIs we require align 2**14 (16384). On the legacy 32-bit
              # armeabi-v7a, the kernel still uses 4 KB pages, so we accept either.
              ALIGN=$(${ANDROID_NDK_HOME:-/usr}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-objdump -p "$so" 2>/dev/null \
                      | grep -E 'LOAD|p_align' | head -n1 || true)
              echo "$abi $(basename $so): $ALIGN"
            done
          done
          # Strict check: arm64-v8a + x86_64 must show 0x4000 page align
          for abi in arm64-v8a x86_64; do
            for so in "$UNZIP_DIR/jni/${abi}"/*.so; do
              if ! readelf -lW "$so" | awk '/LOAD/ {print $NF}' | grep -q '0x4000\|0x10000'; then
                echo "FAIL: $so does not show 16 KB page alignment"
                readelf -lW "$so" | head
                exit 1
              fi
            done
          done

      - name: Upload AAR
        uses: actions/upload-artifact@v7
        with:
          name: piper-plus-g2p-aar
          path: android/piper-plus-g2p/build/outputs/aar/*.aar
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # L3: instrumented tests on a Gradle Managed Device emulator.
  # ---------------------------------------------------------------------------
  instrumented-tests:
    name: L3 instrumented tests (Pixel 6 API 34)
    needs: build-native
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download native libs
        uses: actions/download-artifact@v8
        with:
          pattern: piper-plus-g2p-native-*
          path: native/

      - name: Stage jniLibs
        run: |
          mkdir -p android/piper-plus-g2p/src/main/jniLibs
          for abi in arm64-v8a armeabi-v7a x86_64; do
            mkdir -p "android/piper-plus-g2p/src/main/jniLibs/${abi}"
            cp native/piper-plus-g2p-native-${abi}/*.so \
               "android/piper-plus-g2p/src/main/jniLibs/${abi}/"
          done

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3
        with: { cmdline-tools-version: 11076708 }
      - name: Install NDK
        run: |
          sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Run instrumented tests on Gradle Managed Device
        working-directory: android
        run: |
          gradle :piper-plus-g2p:pixel6api34DebugAndroidTest \
            --no-daemon --stacktrace -Pandroid.testInstrumentationRunnerArguments.notAnnotation=androidx.test.filters.LargeTest

      - name: Upload instrumented test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kotlin-g2p-l3-reports
          path: android/piper-plus-g2p/build/reports/androidTests/managedDevice/

  # ---------------------------------------------------------------------------
  # L2: build libpiper_plus.so + JNI shim for Linux x86_64 host JVM and run a
  # smoke test that loads them via System.load and exercises the JNI surface.
  # This catches symbol-resolution / ABI mismatches that L1 (pure JVM,
  # reflection only) cannot, and fails much faster than spinning up the full
  # Android emulator (L3).
  # ---------------------------------------------------------------------------
  linux-jvm-smoke:
    name: L2 JVM JNI smoke (Linux x86_64)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build

      - name: Cache ONNX Runtime Linux
        id: cache-ort-linux
        uses: actions/cache@v5
        with:
          path: ort-linux/
          key: ort-linux-${{ env.ONNXRUNTIME_VERSION }}-x64

      - name: Download ONNX Runtime Linux
        if: steps.cache-ort-linux.outputs.cache-hit != 'true'
        run: |
          mkdir -p ort-linux
          curl -sfL "https://github.com/microsoft/onnxruntime/releases/download/v${{ env.ONNXRUNTIME_VERSION }}/onnxruntime-linux-x64-${{ env.ONNXRUNTIME_VERSION }}.tgz" -o /tmp/ort.tgz
          tar -xzf /tmp/ort.tgz --strip-components=1 -C ort-linux

      - name: Build libpiper_plus.so for Linux x86_64
        run: |
          cmake -B build-linux -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPIPER_PLUS_BUILD_SHARED=ON \
            -DBUILD_TESTS=OFF \
            -DONNXRUNTIME_DIR=${{ github.workspace }}/ort-linux \
            -DONNXRUNTIME_INCLUDE_DIR=${{ github.workspace }}/ort-linux/include \
            -DONNXRUNTIME_LIB=${{ github.workspace }}/ort-linux/lib/libonnxruntime.so
          cmake --build build-linux --target piper_plus -j$(nproc)

      - name: Build JNI shim for Linux x86_64
        run: |
          # Compile the same JNI source the Android module uses, but link
          # against the host JVM and Linux libpiper_plus.so.
          mkdir -p build-jni
          PIPER_SO=$(find build-linux -name 'libpiper_plus.so' | head -n1)
          [ -n "$PIPER_SO" ] || { echo "libpiper_plus.so not found"; exit 1; }
          g++ -std=c++17 -shared -fPIC \
            -I"$JAVA_HOME/include" -I"$JAVA_HOME/include/linux" \
            -I src/cpp \
            android/piper-plus-g2p/src/main/cpp/piper_plus_g2p_jni.cpp \
            -L"$(dirname "$PIPER_SO")" -lpiper_plus \
            -Wl,-z,max-page-size=16384 \
            -o build-jni/libpiper_plus_g2p_jni.so
          # Stage all needed .so into one directory so System.load can find them.
          cp "$PIPER_SO" build-jni/
          cp ort-linux/lib/libonnxruntime.so* build-jni/ 2>/dev/null || true

      - name: Run JVM smoke test
        run: |
          mkdir -p build-jni/cls
          cat > build-jni/SmokeTest.java <<'JAVA'
          public class SmokeTest {
              public static native long nativeCreate(String dictDir);
              public static native void nativeFree(long handle);
              public static native String nativeVersion();
              public static native String nativeAvailableLanguages(long handle);
              public static native String[] nativePhonemize(long handle, String text, String language);
              public static void main(String[] args) {
                  // Load piper_plus first (the shim depends on its symbols).
                  System.load(args[0] + "/libpiper_plus.so");
                  System.load(args[0] + "/libpiper_plus_g2p_jni.so");
                  String v = nativeVersion();
                  if (v == null || v.isEmpty()) throw new RuntimeException("empty version");
                  long h = nativeCreate(null);
                  if (h == 0L) throw new RuntimeException("create returned 0");
                  String langs = nativeAvailableLanguages(h);
                  if (langs == null || !langs.contains("en")) {
                      throw new RuntimeException("unexpected langs: " + langs);
                  }
                  String[] r = nativePhonemize(h, "hola mundo", "es");
                  if (r == null || r.length != 3) throw new RuntimeException("phonemize result shape");
                  if (r[0] == null || r[0].isEmpty()) throw new RuntimeException("empty phonemes");
                  System.out.println("smoke OK: version=" + v + " langs=" + langs +
                      " es:'hola mundo' -> '" + r[0] + "' (lang=" + r[1] + ")");
                  nativeFree(h);
              }
          }
          JAVA
          # The smoke test deliberately uses different external method symbols
          # than the Kotlin wrapper (no Java_com_piperplus_g2p_PiperPlusG2pNative_*
          # prefix), so we use JNI's "short" name resolution by registering
          # them via a top-level class. Kotlin's compiled bytecode mangles names
          # the same way, so reuse the production .class files directly.
          # Rather than compile a parallel test, just run the production
          # JAR's bytecode via the Kotlin Native bridge:
          rm -f build-jni/SmokeTest.java
          # Load the real Kotlin native bridge class instead.
          cat > build-jni/SmokeTest.java <<'JAVA'
          import com.piperplus.g2p.PiperPlusG2pNative;
          public class SmokeTest {
              public static void main(String[] args) {
                  // Load the unprefixed library names used by Kotlin's
                  // System.loadLibrary("piper_plus") + ("piper_plus_g2p_jni").
                  System.load(args[0] + "/libpiper_plus.so");
                  System.load(args[0] + "/libpiper_plus_g2p_jni.so");
                  String v = PiperPlusG2pNative.nativeVersion();
                  if (v == null || v.isEmpty()) throw new RuntimeException("empty version");
                  long h = PiperPlusG2pNative.nativeCreate(null);
                  if (h == 0L) throw new RuntimeException("create returned 0");
                  String langs = PiperPlusG2pNative.nativeAvailableLanguages(h);
                  if (langs == null || !langs.contains("en")) {
                      throw new RuntimeException("unexpected langs: " + langs);
                  }
                  String[] r = PiperPlusG2pNative.nativePhonemize(h, "hola mundo", "es");
                  if (r == null || r.length != 3) throw new RuntimeException("phonemize result shape");
                  if (r[0] == null || r[0].isEmpty()) throw new RuntimeException("empty phonemes");
                  System.out.println("smoke OK: version=" + v + " langs=" + langs +
                      " es:'hola mundo' -> '" + r[0] + "' (lang=" + r[1] + ")");
                  PiperPlusG2pNative.nativeFree(h);
              }
          }
          JAVA
          # Compile against the Kotlin-built classes if present, otherwise
          # bail with an explicit stub message.
          KCLASSES_JAR="$(find android -name 'piper-plus-g2p-*-release.jar' 2>/dev/null | head -n1)"
          if [ -z "$KCLASSES_JAR" ]; then
              # No prebuilt jar — compile a minimal facade by hand.
              mkdir -p build-jni/com/piperplus/g2p
              cat > build-jni/com/piperplus/g2p/PiperPlusG2pNative.java <<'JAVA'
          package com.piperplus.g2p;
          public final class PiperPlusG2pNative {
              public static native long   nativeCreate(String dictDir);
              public static native void   nativeFree(long handle);
              public static native String nativeVersion();
              public static native String nativeAvailableLanguages(long handle);
              public static native String[] nativePhonemize(long handle, String text, String language);
              public static native void   nativeLoadCustomDict(long handle, String path);
              public static native void   nativeSetZhEnDispatch(long handle, boolean enabled);
              public static native boolean nativeIsZhEnDispatchEnabled(long handle);
          }
          JAVA
              javac -d build-jni/cls build-jni/com/piperplus/g2p/PiperPlusG2pNative.java
              KCLASSES_JAR="build-jni/cls"
          fi
          javac -cp "$KCLASSES_JAR" -d build-jni/cls build-jni/SmokeTest.java
          java -cp "$KCLASSES_JAR:build-jni/cls" SmokeTest "$PWD/build-jni"

  # ---------------------------------------------------------------------------
  # NFR-SEC-4: re-build libpiper_plus + GTest under AddressSanitizer and run
  # the C API G2P test suite. Fails on any leak/UAF/heap-OOB.
  # ---------------------------------------------------------------------------
  asan-tests:
    name: ASan C API GTest
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build

      - name: Cache ONNX Runtime Linux
        id: cache-ort-asan
        uses: actions/cache@v5
        with:
          path: ort-linux/
          key: ort-linux-${{ env.ONNXRUNTIME_VERSION }}-x64

      - name: Download ONNX Runtime Linux
        if: steps.cache-ort-asan.outputs.cache-hit != 'true'
        run: |
          mkdir -p ort-linux
          curl -sfL "https://github.com/microsoft/onnxruntime/releases/download/v${{ env.ONNXRUNTIME_VERSION }}/onnxruntime-linux-x64-${{ env.ONNXRUNTIME_VERSION }}.tgz" -o /tmp/ort.tgz
          tar -xzf /tmp/ort.tgz --strip-components=1 -C ort-linux

      - name: Configure with ASan
        run: |
          cmake -B build-asan -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTS=ON \
            -DPIPER_PLUS_BUILD_SHARED=ON \
            -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address" \
            -DONNXRUNTIME_DIR=${{ github.workspace }}/ort-linux \
            -DONNXRUNTIME_INCLUDE_DIR=${{ github.workspace }}/ort-linux/include \
            -DONNXRUNTIME_LIB=${{ github.workspace }}/ort-linux/lib/libonnxruntime.so

      - name: Build test_c_api under ASan
        run: cmake --build build-asan --target test_c_api -j$(nproc)

      - name: Run test_c_api under ASan
        env:
          # Suppress the harmless ORT-internal allocator pattern that some
          # versions of ORT 1.17 trip but is irrelevant to our test scope.
          # Add explicit suppressions if real findings are masked.
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1:abort_on_error=1:print_stacktrace=1:strict_string_checks=1
          LSAN_OPTIONS: suppressions=tests/asan_lsan_suppressions.txt:print_suppressions=0
        run: |
          # Find the executable; CMake places it under build-asan/.
          BIN=$(find build-asan -type f -name 'test_c_api' -executable | head -n1)
          [ -n "$BIN" ] || { echo "test_c_api not built"; exit 1; }
          # Filter to the G2P subset to keep the run focused on Issue #388.
          "$BIN" --gtest_filter='G2p*'

  # ---------------------------------------------------------------------------
  # L4 dedicated job: regenerate the Python golden on Linux (where g2pk2 +
  # eunjeon are available, unlike Windows where the local generator skips KO)
  # and diff against the committed file. Any drift in either direction fails
  # the gate so we can never silently merge a stale golden.
  # ---------------------------------------------------------------------------
  parity-golden:
    name: L4 cross-runtime parity (golden re-gen)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install uv
        run: pipx install uv || pip install --user uv

      - name: Install piper_plus_g2p (editable) + KO deps
        run: |
          # eunjeon needs MeCab-ko which is packaged on Linux; install before
          # the Python wrapper so g2pk2 succeeds.
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends mecab libmecab-dev mecab-ipadic-utf8 || true
          uv pip install --system --editable ./src/python/g2p
          uv pip install --system g2pk2 eunjeon || true

      - name: Regenerate golden fixture
        run: |
          python tools/generate_g2p_golden.py \
            --output tests/fixtures/g2p/phoneme_test_cases_golden.regen.json \
            --allow-failures

      - name: Diff against committed golden (test_cases only)
        run: |
          # We compare *only* the test_cases array because the surrounding
          # metadata (skipped_ko_cases / failed_cases) is intentionally
          # platform-dependent: Linux has eunjeon, Windows does not. Drift
          # in the actual phoneme strings still fails the gate.
          python tools/compare_g2p_golden.py \
            tests/fixtures/g2p/phoneme_test_cases_golden.json \
            tests/fixtures/g2p/phoneme_test_cases_golden.regen.json

      - name: Upload regenerated golden (debug)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phoneme_test_cases_golden.regen
          path: tests/fixtures/g2p/phoneme_test_cases_golden.regen.json

  # ---------------------------------------------------------------------------
  # AC-10: sample app assembleDebug from examples/android-g2p-sample/.
  # Uses the composite build wired up in settings.gradle.kts so the sample
  # consumes the in-repo AAR module instead of waiting on Maven Central.
  # ---------------------------------------------------------------------------
  sample-app:
    name: Sample app assembleDebug
    needs: build-native
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with: { submodules: true }
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3
        with: { cmdline-tools-version: 11076708 }
      - name: Install NDK
        run: |
          sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with: { gradle-version: "8.11.1" }

      - name: Download native libs
        uses: actions/download-artifact@v8
        with:
          pattern: piper-plus-g2p-native-*
          path: native/

      - name: Stage jniLibs
        run: |
          mkdir -p android/piper-plus-g2p/src/main/jniLibs
          for abi in arm64-v8a armeabi-v7a x86_64; do
            mkdir -p "android/piper-plus-g2p/src/main/jniLibs/${abi}"
            cp native/piper-plus-g2p-native-${abi}/*.so \
               "android/piper-plus-g2p/src/main/jniLibs/${abi}/"
          done

      - name: Assemble sample debug APK
        working-directory: examples/android-g2p-sample
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload sample APK
        uses: actions/upload-artifact@v7
        with:
          name: piper-plus-g2p-sample-debug
          path: examples/android-g2p-sample/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
