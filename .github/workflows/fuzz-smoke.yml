# Fuzz Smoke Tests
#
# Runs short fuzz / property-based smoke jobs on PRs touching the fuzz targets
# or the runtime source modules they exercise. Two suites:
#
#   - Rust  cargo-fuzz : 60-second smoke per target (libfuzzer-sys)
#   - Python hypothesis: ~3-minute total budget across all properties
#
# Full nightly fuzz campaigns are intentionally OUT of scope here — this is a
# fast PR gate, not a long-running campaign. Use `workflow_dispatch` with the
# `duration_seconds` input for ad-hoc longer runs.
#
# Crash detection: any non-zero exit code from cargo-fuzz / pytest fails the
# job, and the `crash-artifacts` step uploads the libFuzzer crash inputs so
# the PR author can reproduce.

name: Fuzz Smoke

on:
  pull_request:
    paths:
      # Rust targets and harness
      - "src/rust/piper-plus-g2p/src/ssml.rs"
      - "src/rust/piper-core/src/text_splitter.rs"
      - "src/rust/piper-core/src/streaming.rs"
      - "src/rust/piper-plus-g2p/fuzz/**"
      # Python targets and harness
      - "src/python/g2p/piper_plus_g2p/ssml.py"
      - "src/python/g2p/piper_plus_g2p/encode/pua.py"
      - "src/python_run/piper/text_splitter.py"
      - "tests/fuzz/**"
      # The workflow itself
      - ".github/workflows/fuzz-smoke.yml"
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: "Per-target fuzz duration in seconds (default 60)"
        required: false
        default: "60"

# Cancel superseded runs to avoid wasting fuzz minutes on stale commits.
concurrency:
  group: fuzz-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Rust cargo-fuzz
  # ---------------------------------------------------------------------------
  rust-fuzz:
    name: Rust cargo-fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target: [fuzz_ssml, fuzz_text_splitter]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install nightly Rust (cargo-fuzz requires nightly)
        run: |
          rustup toolchain install nightly --profile minimal --no-self-update
          rustup component add --toolchain nightly rust-src

      - name: Cache cargo-fuzz target dir
        uses: actions/cache@v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/rust/piper-plus-g2p/fuzz/target
          key: fuzz-${{ runner.os }}-${{ hashFiles('src/rust/**/Cargo.toml', 'src/rust/Cargo.lock') }}
          restore-keys: |
            fuzz-${{ runner.os }}-

      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked

      - name: Run fuzz smoke (60s default)
        working-directory: src/rust/piper-plus-g2p
        env:
          DURATION: ${{ github.event.inputs.duration_seconds || '60' }}
        run: |
          cargo +nightly fuzz run "${{ matrix.target }}" \
            -- -max_total_time="${DURATION}" -timeout=25

      - name: Upload crash artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: rust-fuzz-crashes-${{ matrix.target }}
          path: |
            src/rust/piper-plus-g2p/fuzz/artifacts/**
            src/rust/piper-plus-g2p/fuzz/corpus/${{ matrix.target }}/crash-*
          if-no-files-found: ignore
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Python hypothesis
  # ---------------------------------------------------------------------------
  python-hypothesis:
    name: Python hypothesis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install hypothesis + pytest
        run: |
          python -m pip install --upgrade pip
          # Pin to a known-good lower bound; matches pyproject `dev` group.
          python -m pip install "hypothesis>=6.0" "pytest>=7.0"

      - name: Run hypothesis fuzz suite (3-min budget)
        env:
          # Hypothesis honours this for the overall test process; the
          # `ci` profile in conftest.py sets per-test max_examples.
          HYPOTHESIS_DEADLINE: "None"
        run: |
          # Timeout the entire pytest invocation at 180s so a runaway
          # strategy can't burn the whole job. -p no:cacheprovider keeps
          # the run hermetic on cold runners. -c points at the local
          # config so we bypass the repo-root coverage gate (which would
          # always fail with this narrow test scope).
          timeout 180s pytest tests/fuzz/ \
            -c tests/fuzz/pytest.ini \
            --hypothesis-profile=ci \
            -p no:cacheprovider \
            -v

      - name: Upload hypothesis examples DB (on failure)
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: python-hypothesis-failures
          path: |
            .hypothesis/**
          if-no-files-found: ignore
          retention-days: 14
