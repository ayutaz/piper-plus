name: Publish piper-g2p (Rust)

on:
  push:
    tags: ["rust-g2p-v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: cargo test (piper-g2p)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: src/rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust -> target
      - run: cargo test -p piper-g2p --all-features

  publish:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: src/rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish piper-g2p
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$CARGO_REGISTRY_TOKEN" ]; then
            set +e
            OUTPUT=$(cargo publish -p piper-g2p 2>&1)
            STATUS=$?
            set -e
            echo "$OUTPUT"
            if [ "$STATUS" -ne 0 ]; then
              if echo "$OUTPUT" | grep -q "already uploaded\|already exists"; then
                echo "piper-g2p version already published on crates.io (skipping)"
              else
                echo "::error::Failed to publish piper-g2p to crates.io"
                exit "$STATUS"
              fi
            fi
          else
            echo "::error::CARGO_REGISTRY_TOKEN not found"
            exit 1
          fi
