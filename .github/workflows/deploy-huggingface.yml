name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - dev
    paths:
      - 'huggingface-space/**'
      - '.github/workflows/deploy-huggingface.yml'
  workflow_dispatch:
    inputs:
      deployment_message:
        description: 'Deployment message (optional)'
        required: false
        default: ''
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup deployment
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual deployment triggered"
            if [ -n "${{ github.event.inputs.deployment_message }}" ]; then
              echo "Deployment message: ${{ github.event.inputs.deployment_message }}"
            fi
          else
            echo "Automatic deployment triggered by push to dev branch"
          fi

      - name: Prepare Space files
        run: |
          # Create a temporary directory for the Space
          mkdir -p hf-space-deploy
          
          echo "Preparing Hugging Face Space deployment..."
          
          # Copy application files
          cp huggingface-space/app.py hf-space-deploy/
          cp huggingface-space/app_imports.py hf-space-deploy/
          cp huggingface-space/download_models.py hf-space-deploy/
          cp huggingface-space/requirements.txt hf-space-deploy/
          cp huggingface-space/README.md hf-space-deploy/
          
          # Copy actual model files from test/models
          mkdir -p hf-space-deploy/models
          echo "Copying model files..."
          
          # Copy multilingual model
          if [ -f "test/models/multilingual-test-medium.onnx" ]; then
            cp test/models/multilingual-test-medium.onnx hf-space-deploy/models/
            cp test/models/multilingual-test-medium.onnx.json hf-space-deploy/models/
            echo "✓ Copied multilingual model ($(du -h test/models/multilingual-test-medium.onnx | cut -f1))"
          fi
          
          # Show total size of models
          echo "Total model size: $(du -sh hf-space-deploy/models | cut -f1)"
          
          # List files to be deployed
          echo "Files to deploy:"
          find hf-space-deploy -type f \( -name "*.py" -o -name "*.txt" -o -name "*.md" -o -name "*.onnx" -o -name "*.json" \) | sort
          echo ""
          echo "Directory structure:"
          tree -h hf-space-deploy 2>/dev/null || ls -lah hf-space-deploy/ 2>/dev/null || echo "Directory not found"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install and deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          DEPLOY_MSG: ${{ github.event.inputs.deployment_message }}
        run: |
          pip install -U huggingface_hub

          python << 'PYEOF'
          import os
          from datetime import datetime
          from huggingface_hub import HfApi, login

          login(token=os.environ["HF_TOKEN"])

          event = os.environ.get("EVENT_NAME", "")
          deploy_msg = os.environ.get("DEPLOY_MSG", "")
          timestamp = datetime.now().strftime("%Y-%m-%d %H:%M:%S")

          if event == "workflow_dispatch" and deploy_msg:
              commit_msg = f"Update from GitHub Actions - {timestamp}\n\nDeployment message: {deploy_msg}"
          elif event == "push":
              commit_msg = f"Update from GitHub Actions - {timestamp}\n\nTriggered by push to dev branch"
          else:
              commit_msg = f"Update from GitHub Actions - {timestamp}"

          api = HfApi()
          api.upload_folder(
              repo_id="ayousanz/piper-plus-demo",
              folder_path="hf-space-deploy",
              repo_type="space",
              commit_message=commit_msg,
          )
          print("Successfully deployed to Hugging Face Spaces")
          PYEOF

      - name: Deploy summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Successfully deployed to Hugging Face Spaces" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Space URL**: https://huggingface.co/spaces/ayousanz/piper-plus-demo" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Show model information
          echo "**Deployed Models**:" >> $GITHUB_STEP_SUMMARY
          if [ -f "hf-space-deploy/models/multilingual-test-medium.onnx" ]; then
            echo "- Multilingual Model: $(du -h hf-space-deploy/models/multilingual-test-medium.onnx | cut -f1)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "**Deployed files**:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          find hf-space-deploy -type f | sort >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

