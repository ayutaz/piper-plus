name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - dev
    paths:
      - 'huggingface-space/**'
      - '.github/workflows/deploy-huggingface.yml'
  workflow_dispatch:
    inputs:
      deployment_message:
        description: 'Deployment message (optional)'
        required: false
        default: ''
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup deployment
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual deployment triggered"
            if [ -n "${{ github.event.inputs.deployment_message }}" ]; then
              echo "Deployment message: ${{ github.event.inputs.deployment_message }}"
            fi
          else
            echo "Automatic deployment triggered by push to dev branch"
          fi

      - name: Prepare Space files
        run: |
          # Create a temporary directory for the Space
          mkdir -p hf-space-deploy
          
          # Copy all files from huggingface-space
          cp -r huggingface-space/* hf-space-deploy/
          
          # Ensure models directory exists and has files
          if [ ! -d "hf-space-deploy/models" ] || [ -z "$(ls -A hf-space-deploy/models)" ]; then
            echo "Error: Models directory is missing or empty"
            exit 1
          fi
          
          # List files to be deployed
          echo "Files to deploy:"
          find hf-space-deploy -type f -name "*.py" -o -name "*.txt" -o -name "*.md" -o -name "*.onnx*" | sort

      - name: Setup Git LFS
        run: |
          git lfs install
          
      - name: Push to Hugging Face with Git LFS
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Clone the Space repository with LFS
          git clone https://hf.co/spaces/ayousanz/piper-plus hf-space-repo
          cd hf-space-repo
          
          # Configure git
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          
          # Remove old files (except .git and .gitattributes)
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.gitattributes' -exec rm -rf {} +
          
          # Copy new files EXCEPT models first
          cp -r ../hf-space-deploy/* . 2>/dev/null || true
          rm -rf models/
          
          # Track ONNX files with Git LFS
          echo "*.onnx filter=lfs diff=lfs merge=lfs -text" >> .gitattributes
          echo "*.onnx.json -text" >> .gitattributes
          
          # Add and commit non-model files first
          git add .gitattributes *.py *.txt *.md
          git commit -m "Update code and configuration files" || echo "No changes to code files"
          
          # Now copy and add model files
          mkdir -p models
          cp ../hf-space-deploy/models/*.json models/
          git add models/*.json
          git commit -m "Add model configuration files" || echo "No changes to config files"
          
          # Add ONNX files with LFS
          cp ../hf-space-deploy/models/*.onnx models/
          git lfs track "models/*.onnx"
          git add models/*.onnx
          git commit -m "Add ONNX model files via Git LFS" || echo "No changes to model files"
          
          # Push with authentication
          git remote set-url origin https://ayousanz:${HF_TOKEN}@huggingface.co/spaces/ayousanz/piper-plus
          git push origin main
          
          echo "✅ Successfully deployed to Hugging Face Spaces using Git LFS"

      - name: Deploy summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Successfully deployed to Hugging Face Spaces" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Space URL**: https://huggingface.co/spaces/ayousanz/piper-plus" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed files**:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          find hf-space-deploy -type f | sort >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

