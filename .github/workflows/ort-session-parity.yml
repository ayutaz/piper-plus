name: ORT Session Contract Parity

# Cross-runtime ORT session/warmup/cache contract parity gate.
#
# 4 ランタイム (Python / Rust / Go / C#) は、graph_optimization_level、
# max_intra_threads、warmup.phoneme_length、env vars (PIPER_DISABLE_*) 等の
# 定数で完全一致しなくてはならない。このジョブは Python canonical
# (ort_utils.py) と docs/spec/ort-session-contract.toml の整合性、および
# JSON fixture (tests/fixtures/ort_session/contract.json) の同期を強制する。
#
# 他ランタイムの parity 検証 (Rust/Go/C# で fixture を読み込む test) は
# per-runtime CI 側で実行される。ここはあくまで「contract と Python
# canonical の drift 検出 + JSON fixture 同期」のための gate。

on:
  pull_request:
    branches: [ dev ]
    paths:
      - 'docs/spec/ort-session-contract.toml'
      - 'src/python/piper_train/ort_utils.py'
      - 'scripts/check_ort_session_contract.py'
      - 'scripts/regenerate_ort_session_fixture.py'
      - 'tests/fixtures/ort_session/**'
      - '.github/workflows/ort-session-parity.yml'
  push:
    branches: [ dev ]
    paths:
      - 'docs/spec/ort-session-contract.toml'
      - 'src/python/piper_train/ort_utils.py'
      - 'scripts/check_ort_session_contract.py'
      - 'scripts/regenerate_ort_session_fixture.py'
      - 'tests/fixtures/ort_session/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  contract-drift-check:
    name: ORT session contract drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Verify contract matches Python canonical
        # tomllib is in stdlib (Python 3.11+); no third-party install needed.
        run: |
          python scripts/check_ort_session_contract.py --verbose

      - name: Verify JSON fixture matches contract toml
        # Per-runtime parity tests (Rust/Go/C#) consume contract.json,
        # so the fixture must stay byte-equivalent with the toml.
        run: |
          python scripts/regenerate_ort_session_fixture.py --check
