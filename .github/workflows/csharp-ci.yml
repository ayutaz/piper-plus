name: "C# CI"

on:
  pull_request:
    branches: [dev]
    paths:
      - 'src/csharp/**'
      - 'src/python/g2p/piper_plus_g2p/data/zh_en_loanword.json'
      - 'tests/fixtures/g2p/zh_en_loanword_matrix.json'
      - 'tests/fixtures/phoneme_timing/**'
      - 'tests/fixtures/short_text/**'
      - 'tests/fixtures/ort_session/**'
      - 'test/fixtures/speaker_encoder_golden.json'
      - '.github/workflows/csharp-ci.yml'
  push:
    branches: [dev]
    paths:
      - 'src/csharp/**'
      - 'src/python/g2p/piper_plus_g2p/data/zh_en_loanword.json'
      - 'tests/fixtures/g2p/zh_en_loanword_matrix.json'
      - 'tests/fixtures/phoneme_timing/**'
      - 'tests/fixtures/short_text/**'
      - 'tests/fixtures/ort_session/**'
      - 'test/fixtures/speaker_encoder_golden.json'
      - '.github/workflows/csharp-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-latest, macos-14]

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/csharp/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore src/csharp/PiperPlus.sln

      - name: Build
        run: dotnet build src/csharp/PiperPlus.sln -c Release --no-restore

      - name: Check formatting
        run: dotnet format src/csharp/PiperPlus.sln --verify-no-changes --no-restore
        continue-on-error: false

      - name: Check for vulnerable NuGet packages
        if: matrix.os == 'ubuntu-24.04'  # 1 OS で十分
        run: |
          dotnet list src/csharp/PiperPlus.sln package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
          if grep -E "(Critical|High)" vuln-report.txt; then
            echo "::error::Found Critical or High severity vulnerable packages"
            exit 1
          fi
          echo "No High/Critical vulnerabilities found"
        shell: bash

      - name: Run C# tests
        shell: bash
        run: |
          dotnet test src/csharp/PiperPlus.sln -c Release --no-build \
            --blame-hang-timeout 30s \
            --logger "trx;LogFileName=test-results.xml" \
            --collect:"XPlat Code Coverage" \
            --settings src/csharp/PiperPlus.runsettings

      - name: Generate coverage report
        if: matrix.os == 'ubuntu-24.04'
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool || true
          reportgenerator \
            -reports:"**/coverage.cobertura.xml" \
            -targetdir:"coverage-report" \
            -reporttypes:"Html;Cobertura;TextSummary" \
            -classfilters:"-*.Tests.*"
          cat coverage-report/Summary.txt

      - name: Verify coverage threshold (Ubuntu)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          # Extract line coverage from Summary.txt
          LINE_COV=$(grep -oP 'Line coverage:\s+\K[\d.]+' coverage-report/Summary.txt | head -1)
          echo "Line coverage: $LINE_COV%"
          THRESHOLD=70
          awk -v cov="$LINE_COV" -v thr="$THRESHOLD" 'BEGIN { if (cov+0 < thr+0) { print "::error::Coverage " cov "% below threshold " thr "%"; exit 1 } }'
        shell: bash
        continue-on-error: true  # baseline 確立まで warn

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-24.04'
        uses: codecov/codecov-action@v5
        with:
          files: ./**/coverage.cobertura.xml
          flags: csharp
          fail_ci_if_error: false
        continue-on-error: true

      - name: Upload coverage report HTML
        if: matrix.os == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: csharp-coverage-report
          path: coverage-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: |
            **/TestResults/test-results.xml
            **/coverage.cobertura.xml
          retention-days: 30
