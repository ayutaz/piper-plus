name: Phoneme Timing Parity

# Cross-runtime phoneme timing parity gate.
#
# All 6 runtimes (Python, Rust, Go, C++, C#, WASM/JS) must produce
# byte-equivalent output for the same (durations, phoneme_tokens,
# sample_rate, hop_length) inputs. Two layers protect that contract:
#
#  1. drift-check (this workflow): regenerate the golden fixture from the
#     Python canonical timing.py and assert the committed copy matches.
#  2. per-runtime parity tests (each runtime's own CI): every runtime
#     loads tests/fixtures/phoneme_timing/golden_matrix.json and asserts
#     its implementation matches the `expected` blocks. Files:
#       Python : src/python_run/tests/test_phoneme_timing_parity.py
#       Rust   : src/rust/piper-core/tests/test_phoneme_timing_parity.rs
#       Go     : src/go/piperplus/timing_parity_test.go
#       C++    : src/cpp/tests/test_phoneme_timing_parity.cpp
#       C#     : src/csharp/PiperPlus.Core.Tests/TimingWriterParityTests.cs
#       WASM/JS: src/wasm/openjtalk-web/test/js/test-phoneme-timing-parity.js
#
# A meta-presence job below guards against silent removal of any of those
# files. If you remove a parity test, this workflow fails — that is
# intentional; replace the test before deleting it.

on:
  pull_request:
    branches: [ dev ]
    paths:
      - 'src/python_run/piper/timing.py'
      - 'tests/fixtures/phoneme_timing/**'
      - 'scripts/regenerate_timing_fixture.py'
      - 'docs/spec/phoneme-timing-contract.toml'
      - '.github/workflows/timing-parity.yml'
  push:
    branches: [ dev ]
    paths:
      - 'src/python_run/piper/timing.py'
      - 'tests/fixtures/phoneme_timing/**'
      - 'scripts/regenerate_timing_fixture.py'
      - 'docs/spec/phoneme-timing-contract.toml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  drift-check:
    name: Phoneme timing fixture drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'

      - name: Install canonical runtime (piper-plus)
        run: |
          python -m pip install --upgrade pip
          pip install -e src/python_run

      - name: Verify fixture is in sync with canonical implementation
        run: |
          python scripts/regenerate_timing_fixture.py --check

  per-runtime-presence:
    name: Verify each runtime ships a parity test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Assert all 6 per-runtime parity test files exist
        run: |
          set -e
          missing=0
          check() {
            if [ ! -f "$1" ]; then
              echo "::error::missing per-runtime parity test: $1"
              missing=1
            else
              echo "  ok: $1"
            fi
          }
          check src/python_run/tests/test_phoneme_timing_parity.py
          check src/rust/piper-core/tests/test_phoneme_timing_parity.rs
          check src/go/piperplus/timing_parity_test.go
          check src/cpp/tests/test_phoneme_timing_parity.cpp
          check src/csharp/PiperPlus.Core.Tests/TimingWriterParityTests.cs
          check src/wasm/openjtalk-web/test/js/test-phoneme-timing-parity.js
          if [ "$missing" -ne 0 ]; then
            echo "::error::one or more parity tests are missing — replace before removing"
            exit 1
          fi
