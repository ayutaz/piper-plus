name: Test Japanese TTS

on:
  pull_request:
    branches: [master, dev]
    paths:
      - 'src/**'
      - 'test/**'
      - '.github/workflows/test-japanese-tts.yml'
      - '.github/workflows/build-piper.yml'
  push:
    branches: [dev, feat/*, fix/*]
    paths:
      - 'src/**'
      - 'test/**'
      - '.github/workflows/test-japanese-tts.yml'
      - '.github/workflows/build-piper.yml'
  workflow_dispatch:

jobs:
  # Build piper for all platforms
  build:
    name: Build for Japanese TTS tests
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    uses: ./.github/workflows/build-piper.yml
    with:
      os: ${{ matrix.os }}
      build-type: Release
      include-tests: false
      artifact-name: piper-japanese-${{ matrix.os }}-${{ github.sha }}

  # Run Japanese TTS tests
  test_japanese:
    name: Test Japanese TTS on ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - uses: actions/checkout@v4.2.2
      
      - name: Download piper artifact
        uses: actions/download-artifact@v4.1.8
        with:
          name: piper-japanese-${{ matrix.os }}-${{ github.sha }}
      
      - name: Extract piper (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -xzf piper-${{ runner.os }}.tar.gz
          chmod +x piper/bin/piper
          chmod +x piper/bin/open_jtalk || true
          
          # Set library path for Linux
          if [ "${{ runner.os }}" = "Linux" ]; then
            export LD_LIBRARY_PATH="${PWD}/piper/lib:${LD_LIBRARY_PATH}"
            echo "LD_LIBRARY_PATH=${PWD}/piper/lib:${LD_LIBRARY_PATH}" >> $GITHUB_ENV
          fi
          
          # Verify OpenJTalk is available
          if [ -f "piper/bin/open_jtalk" ]; then
            echo "✓ OpenJTalk binary found"
            ls -la piper/bin/open_jtalk
          else
            echo "⚠ OpenJTalk binary not found, Japanese TTS may not work"
            echo "Contents of piper/bin:"
            ls -la piper/bin/
          fi
      
      - name: Extract piper (Windows)
        if: runner.os == 'Windows'
        run: |
          Expand-Archive -Path piper-Windows.zip -DestinationPath . -Force
          
          # Verify OpenJTalk is available
          if (Test-Path "piper/bin/open_jtalk.exe") {
            Write-Host "✓ OpenJTalk binary found"
            Get-Item piper/bin/open_jtalk.exe | Select-Object Name, Length, LastWriteTime
          } else {
            Write-Host "⚠ OpenJTalk binary not found, Japanese TTS may not work"
            Write-Host "Contents of piper/bin:"
            Get-ChildItem piper/bin/
          }
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tqdm pytest numpy scipy
      
      - name: Create test model directory
        shell: bash
        run: |
          mkdir -p test/models
          echo "Test model directory created"
      
      - name: Run basic Japanese TTS test
        shell: bash
        run: |
          echo "Testing basic Japanese TTS functionality..."
          if [ "${{ runner.os }}" = "Windows" ]; then
            python scripts/test_japanese_tts.py --basic --piper piper/bin/piper.exe
          else
            python scripts/test_japanese_tts.py --basic --piper piper/bin/piper
          fi
      
      - name: Run comprehensive Japanese tests
        if: success()
        shell: bash
        run: |
          echo "Running comprehensive Japanese tests..."
          if [ "${{ runner.os }}" = "Windows" ]; then
            python scripts/test_japanese_tts.py --comprehensive --piper piper/bin/piper.exe
          else
            python scripts/test_japanese_tts.py --comprehensive --piper piper/bin/piper
          fi
      
      
      # Generate job summary
      - name: Generate Job Summary
        if: always()
        shell: bash
        run: |
          if [ -d "test_results" ]; then
            echo "Generating job summary..."
            python scripts/generate_job_summary.py --results-dir test_results
          else
            echo "No test results directory found"
          fi
      
      # Organize audio artifacts
      - name: Organize Audio Artifacts
        if: always()
        shell: bash
        run: |
          if [ -d "test_results" ]; then
            echo "Organizing audio artifacts..."
            python scripts/organize_audio_artifacts.py --results-dir test_results --create-samples
          else
            echo "No test results directory found"
          fi
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4.6.0
        with:
          name: japanese-test-results-${{ matrix.os }}-${{ github.sha }}
          path: |
            test_results/*.wav
            test_results/*.log
            test_results/*.json
            test_results/*.txt
            test_results/performance/*.json
          retention-days: 7
      
      - name: Upload audio artifacts
        if: always()
        uses: actions/upload-artifact@v4.6.0
        with:
          name: japanese-audio-artifacts-${{ matrix.os }}-${{ github.sha }}
          path: |
            audio_artifacts/
          retention-days: 7
      
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4.6.0
        with:
          name: japanese-test-logs-${{ matrix.os }}-${{ github.sha }}
          path: |
            *.log
            piper/bin/
            test/
          retention-days: 7