name: Test Japanese TTS

on:
  pull_request:
    branches: [master, dev]
    paths:
      - 'src/**'
      - 'test/**'
      - '.github/workflows/test-japanese-tts.yml'
  push:
    branches: [dev, feat/*, fix/*]
    paths:
      - 'src/**'
      - 'test/**'
      - '.github/workflows/test-japanese-tts.yml'
  workflow_dispatch:

jobs:
  build_piper:
    name: Build piper on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4.2.2
      
      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential
      
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake
      
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      
      - name: Build piper (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
      
      - name: Build piper (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release --parallel 2
      
      - name: Create distribution package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/piper/bin
          mkdir -p dist/piper/lib
          mkdir -p dist/piper/share
          
          # Copy main binary
          cp build/piper dist/piper/bin/
          
          # Copy espeak-ng data
          if [ -d "build/ei/share/espeak-ng-data" ]; then
            cp -r build/ei/share/espeak-ng-data dist/piper/share/
          fi
          
          # Copy libraries
          if [ "${{ runner.os }}" = "Linux" ]; then
            # Copy main libraries
            cp build/*.so* dist/piper/lib/ 2>/dev/null || true
            cp build/pi/lib/*.so* dist/piper/lib/ 2>/dev/null || true
            # Also check for lib directory
            if [ -d "build/lib" ]; then
              cp build/lib/*.so* dist/piper/lib/ 2>/dev/null || true
            fi
          elif [ "${{ runner.os }}" = "macOS" ]; then
            # Copy main libraries
            cp build/*.dylib dist/piper/lib/ 2>/dev/null || true
            cp build/pi/lib/*.dylib dist/piper/lib/ 2>/dev/null || true
            # Also check for lib directory
            if [ -d "build/lib" ]; then
              cp build/lib/*.dylib dist/piper/lib/ 2>/dev/null || true
            fi
          fi
          
          # Copy OpenJTalk binary and dictionary
          if [ -f "build/oj/bin/open_jtalk" ]; then
            cp build/oj/bin/open_jtalk dist/piper/bin/
          fi
          
          # Create archive
          tar -czf piper-${{ runner.os }}.tar.gz -C dist piper
      
      - name: Create distribution package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist/piper/bin
          New-Item -ItemType Directory -Force -Path dist/piper/lib
          New-Item -ItemType Directory -Force -Path dist/piper/share
          
          # Copy main binary
          Copy-Item build/Release/piper.exe -Destination dist/piper/bin/
          
          # Copy required DLLs
          Copy-Item build/Release/*.dll -Destination dist/piper/bin/ -ErrorAction SilentlyContinue
          
          # Copy espeak-ng data
          if (Test-Path "build/pi/share/espeak-ng-data") {
            Copy-Item build/pi/share/espeak-ng-data -Destination dist/piper/share/ -Recurse -Force
          }
          
          # Copy OpenJTalk executable
          if (Test-Path "build/oj/bin/open_jtalk.exe") {
            Copy-Item build/oj/bin/open_jtalk.exe -Destination dist/piper/bin/ -Force
          }
          
          # Create archive
          Compress-Archive -Path dist/piper -DestinationPath piper-${{ runner.os }}.zip
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4.6.0
        with:
          name: piper-${{ runner.os }}
          path: |
            piper-${{ runner.os }}.tar.gz
            piper-${{ runner.os }}.zip
          retention-days: 1

  test_japanese:
    name: Test Japanese TTS on ${{ matrix.os }}
    needs: build_piper
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4.2.2
      
      - name: Download piper artifact
        uses: actions/download-artifact@v4.1.8
        with:
          name: piper-${{ runner.os }}
      
      - name: Extract piper (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -xzf piper-${{ runner.os }}.tar.gz
          chmod +x piper/bin/piper
          chmod +x piper/bin/open_jtalk || true
          
          # Set library path for Linux
          if [ "${{ runner.os }}" = "Linux" ]; then
            export LD_LIBRARY_PATH="${PWD}/piper/lib:${LD_LIBRARY_PATH}"
            echo "LD_LIBRARY_PATH=${PWD}/piper/lib:${LD_LIBRARY_PATH}" >> $GITHUB_ENV
          fi
      
      - name: Extract piper (Windows)
        if: runner.os == 'Windows'
        run: |
          Expand-Archive -Path piper-Windows.zip -DestinationPath . -Force
      
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests tqdm
      
      - name: Create test model
        shell: bash
        run: |
          mkdir -p test/models
          # Use the existing test model from the repository
          # If it doesn't exist, we'll skip model-dependent tests
          echo "Checking for test models in repository..."
          ls -la test/models/ || echo "No existing test models found"
      
      - name: Run basic Japanese TTS test
        run: |
          echo "Testing basic Japanese TTS..."
          python scripts/test_japanese_tts.py --basic
      
      - name: Run comprehensive Japanese tests
        run: |
          echo "Running comprehensive Japanese tests..."
          python scripts/test_japanese_tts.py --comprehensive
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4.6.0
        with:
          name: japanese-test-results-${{ matrix.os }}
          path: |
            test_results/*.wav
            test_results/*.log
            test_results/*.json
          retention-days: 7