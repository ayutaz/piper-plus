name: "G2P Python CI"

on:
  push:
    branches: [dev, main]
    paths:
      - 'src/python/g2p/**'
      - '.github/workflows/g2p-python-ci.yml'
    tags:
      - 'python-g2p-v*'
  pull_request:
    paths:
      - 'src/python/g2p/**'
      - '.github/workflows/g2p-python-ci.yml'

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: src/python/g2p
        run: uv sync --extra all --extra dev

      - name: Ruff check
        working-directory: src/python/g2p
        run: uv run ruff check piper_g2p/ tests/

      - name: Ruff format check
        working-directory: src/python/g2p
        run: uv run ruff format --check piper_g2p/ tests/

      - name: Mypy
        working-directory: src/python/g2p
        run: uv run mypy --ignore-missing-imports piper_g2p/

  test:
    name: test (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: src/python/g2p
        run: uv sync --extra all --extra dev

      - name: Run tests
        working-directory: src/python/g2p
        run: uv run pytest --cov=piper_g2p --cov-report=term-missing -v

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: src/python/g2p/.coverage
          retention-days: 7

  rust-check:
    name: rust-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust

      - name: Cargo check piper-g2p
        working-directory: src/rust
        run: cargo check -p piper-g2p --all-features

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, test, rust-check]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Build package
        working-directory: src/python/g2p
        run: uv build

      - name: Verify wheel
        working-directory: src/python/g2p
        run: |
          ls -la dist/
          test -f dist/piper_g2p-*.whl
          test -f dist/piper_g2p-*.tar.gz

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: src/python/g2p/dist/
          retention-days: 7

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/python-g2p-v')
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write  # Required for PyPI Trusted Publisher (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      # TODO: Migrate to PyPI Trusted Publisher (OIDC) to eliminate PYPI_TOKEN secret.
      #       See: https://docs.pypi.org/trusted-publishers/using-a-publisher/
      - name: Build and publish
        working-directory: src/python/g2p
        run: |
          uv build
          uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
