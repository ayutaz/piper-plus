name: Secret Scan

# Gitleaks による secret 検出。push / pull_request / schedule で実行。
# baseline (false-positive 許可リスト) は repo root の `.gitleaks.toml`。
# fork PR では GITLEAKS_LICENSE secret 不要 (gitleaks は OSS、enterprise の
# 有償ライセンスは org 内 push のみ)。

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev, main]
  schedule:
    # 毎週月曜 03:30 UTC (= 12:30 JST)。security-audit と 30 分ずらす。
    - cron: "30 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  # gitleaks-action が PR comment / SARIF upload に使う。
  security-events: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          # 全履歴を fetch して既存 commit の secret も検出。
          # PR では base...head 差分をスキャンするため必須。
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # config は repo root の .gitleaks.toml を自動読み込み。
          # 有償 license が必要な org 機能 (PR comment summary) は使わない
          # 構成にしているため GITLEAKS_LICENSE は省略可能。
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"

      # gitleaks-action は PR では base...head 差分のみスキャンするため、
      # squash merge で「base 既存行が新規行として再出現する」ケースを
      # 検出できない (PR #401 で ja_JP-css10-6lang-medium 文字列が dev push
      # 時の HEAD-1commit スキャンで初めて誤検出された事例)。push 時と同じ
      # working-tree 全件スキャンを PR でも追加実行し、 allowlist 漏れを
      # マージ前に検知する。
      #
      # バイナリ取得は GitHub Releases から直接行うが、 リリースに同梱の
      # checksums.txt を用いて sha256 検証することでサプライチェーン上の
      # 改ざん検知を担保する (Copilot review 指摘)。
      - name: Run Gitleaks (full working-tree parity scan)
        if: github.event_name == 'pull_request'
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          set -euo pipefail
          ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          cd /tmp
          curl -sSfL -o "${ARCHIVE}" "${BASE_URL}/${ARCHIVE}"
          curl -sSfL -o gitleaks_checksums.txt \
            "${BASE_URL}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          # 配布 checksums.txt から該当アーカイブの行だけを抽出して検証。
          # --ignore-missing は他アーキの行を skip するため必須。
          grep " ${ARCHIVE}\$" gitleaks_checksums.txt \
            | sha256sum --check --strict
          tar -xzf "${ARCHIVE}" gitleaks
          cd "${GITHUB_WORKSPACE}"
          /tmp/gitleaks dir \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --exit-code 1 \
            .
