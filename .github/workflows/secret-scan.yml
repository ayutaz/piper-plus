name: Secret Scan

# Gitleaks による secret 検出。push / pull_request / schedule で実行。
# baseline (false-positive 許可リスト) は repo root の `.gitleaks.toml`。
# fork PR では GITLEAKS_LICENSE secret 不要 (gitleaks は OSS、enterprise の
# 有償ライセンスは org 内 push のみ)。

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev, main]
  schedule:
    # 毎週月曜 03:30 UTC (= 12:30 JST)。security-audit と 30 分ずらす。
    - cron: "30 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  # gitleaks-action が PR comment / SARIF upload に使う。
  security-events: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          # 全履歴を fetch して既存 commit の secret も検出。
          # PR では base...head 差分をスキャンするため必須。
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # config は repo root の .gitleaks.toml を自動読み込み。
          # 有償 license が必要な org 機能 (PR comment summary) は使わない
          # 構成にしているため GITLEAKS_LICENSE は省略可能。
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
