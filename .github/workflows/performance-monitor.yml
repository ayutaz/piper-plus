name: performance-monitor

on:
  workflow_run:
    workflows: ["dev-create-release", "dev-build-all"]
    types:
      - completed

permissions:
  issues: write
  contents: read

jobs:
  collect_metrics:
    name: Collect Performance Metrics
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Get workflow run details
        id: metrics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get workflow run details
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          RUN_ID="${{ github.event.workflow_run.id }}"
          
          # Get execution time in minutes
          DURATION_MS=$(gh run view $RUN_ID --json durationMS --jq '.durationMS')
          DURATION_MIN=$((DURATION_MS / 60000))
          DURATION_SEC=$(((DURATION_MS % 60000) / 1000))
          
          # Get job details
          echo "## Workflow Performance Report" > metrics.md
          echo "**Workflow:** $WORKFLOW_NAME" >> metrics.md
          echo "**Run ID:** $RUN_ID" >> metrics.md
          echo "**Duration:** ${DURATION_MIN}m ${DURATION_SEC}s" >> metrics.md
          echo "" >> metrics.md
          
          # Get individual job times
          echo "### Job Execution Times" >> metrics.md
          gh run view $RUN_ID --json jobs --jq '.jobs[] | "- **\(.name)**: \(.durationMS / 1000)s (\(.conclusion))"' >> metrics.md
          echo "" >> metrics.md
          
          # Calculate cache hit rates if applicable
          if [[ "$WORKFLOW_NAME" == "dev-build-all" ]]; then
            echo "### Build Cache Performance" >> metrics.md
            
            # Check for cache-related steps
            gh run view $RUN_ID --json jobs --jq '.jobs[] | 
              select(.steps[] | select(.name | contains("cache"))) | 
              "#### \(.name)\n" + 
              (.steps[] | select(.name | contains("cache")) | "- \(.name): \(.conclusion)")' >> metrics.md
            echo "" >> metrics.md
          fi
          
          # Store metrics for trend analysis
          echo "workflow_name=$WORKFLOW_NAME" >> $GITHUB_OUTPUT
          echo "duration_ms=$DURATION_MS" >> $GITHUB_OUTPUT
          echo "duration_min=$DURATION_MIN" >> $GITHUB_OUTPUT

      - name: Update performance tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find or create performance tracking issue
          ISSUE_NUMBER=$(gh issue list \
            --label "performance-tracking" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number')
          
          if [ -z "$ISSUE_NUMBER" ]; then
            # Create new tracking issue
            ISSUE_NUMBER=$(gh issue create \
              --title "CI/CD Performance Tracking" \
              --label "performance-tracking" \
              --body "Automated performance tracking for CI/CD workflows." \
              --assignee "@me" | grep -oE '[0-9]+$')
          fi
          
          # Add metrics as comment
          gh issue comment $ISSUE_NUMBER --body-file metrics.md
          
          echo "Metrics posted to issue #$ISSUE_NUMBER"

      - name: Check performance trends
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get historical data from issue comments
          ISSUE_NUMBER=$(gh issue list \
            --label "performance-tracking" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number')
          
          if [ -n "$ISSUE_NUMBER" ]; then
            # Extract duration data from last 10 runs
            echo "### Performance Trend Analysis" >> trend.md
            echo "" >> trend.md
            
            # Get comments and extract duration data
            gh issue view $ISSUE_NUMBER --json comments --jq '.comments[-10:] | 
              map(select(.body | contains("Duration:"))) | 
              map(.body | capture("Duration: (?<min>[0-9]+)m (?<sec>[0-9]+)s") | 
              (.min | tonumber) * 60 + (.sec | tonumber))' > durations.json
            
            # Calculate average if we have data
            if [ -s durations.json ] && [ "$(cat durations.json)" != "[]" ]; then
              AVG=$(jq 'add / length' durations.json)
              CURRENT="${{ steps.metrics.outputs.duration_min }}"
              
              echo "**Average duration (last 10 runs):** ${AVG}s" >> trend.md
              echo "**Current run:** ${CURRENT}m" >> trend.md
              
              # Check if current run is significantly slower
              THRESHOLD=$(echo "$AVG * 1.2" | bc)
              CURRENT_SEC=$((CURRENT * 60))
              
              if (( $(echo "$CURRENT_SEC > $THRESHOLD" | bc -l) )); then
                echo "" >> trend.md
                echo "⚠️ **Warning:** Current run is >20% slower than average!" >> trend.md
                
                # Create alert issue if performance degraded
                gh issue create \
                  --title "CI Performance Degradation Detected" \
                  --label "performance-alert" \
                  --body "The latest ${{ steps.metrics.outputs.workflow_name }} workflow took ${CURRENT}m, which is significantly slower than the average of ${AVG}s." \
                  || echo "Alert issue creation failed"
              fi
            fi
            
            # Add trend analysis to the issue
            if [ -s trend.md ]; then
              gh issue comment $ISSUE_NUMBER --body-file trend.md
            fi
          fi

  generate_weekly_report:
    name: Generate Weekly Report
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 * * 0'  # Weekly on Sunday
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Generate performance report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find performance tracking issue
          ISSUE_NUMBER=$(gh issue list \
            --label "performance-tracking" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number')
          
          if [ -n "$ISSUE_NUMBER" ]; then
            echo "# Weekly CI/CD Performance Report" > weekly_report.md
            echo "**Week ending:** $(date)" >> weekly_report.md
            echo "" >> weekly_report.md
            
            # Get metrics from the past week
            echo "## Workflow Execution Summary" >> weekly_report.md
            
            # Analyze each workflow type
            for workflow in "dev-create-release" "dev-build-all"; do
              echo "" >> weekly_report.md
              echo "### $workflow" >> weekly_report.md
              
              # Get runs from past week
              RUNS=$(gh run list \
                --workflow="$workflow.yml" \
                --created="$(date -d '7 days ago' '+%Y-%m-%d')" \
                --json durationMS,conclusion,createdAt \
                --limit 100)
              
              if [ -n "$RUNS" ] && [ "$RUNS" != "[]" ]; then
                # Calculate statistics
                TOTAL=$(echo "$RUNS" | jq 'length')
                SUCCESS=$(echo "$RUNS" | jq '[.[] | select(.conclusion == "success")] | length')
                AVG_DURATION=$(echo "$RUNS" | jq '[.[] | .durationMS] | add / length / 60000')
                
                echo "- **Total runs:** $TOTAL" >> weekly_report.md
                echo "- **Success rate:** $((SUCCESS * 100 / TOTAL))%" >> weekly_report.md
                echo "- **Average duration:** ${AVG_DURATION}m" >> weekly_report.md
              fi
            done
            
            echo "" >> weekly_report.md
            echo "## Recommendations" >> weekly_report.md
            echo "- Monitor cache hit rates for optimization opportunities" >> weekly_report.md
            echo "- Consider parallelizing long-running jobs" >> weekly_report.md
            echo "- Review failed runs for common patterns" >> weekly_report.md
            
            # Post weekly report
            gh issue comment $ISSUE_NUMBER --body-file weekly_report.md
          fi