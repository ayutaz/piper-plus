name: Test ARM64 TTS

on:
  pull_request:
    branches: [master, dev]
    paths:
      - 'src/**'
      - 'test/**'
      - 'CMakeLists.txt'
      - 'Dockerfile'
      - '.github/workflows/test-arm64-tts.yml'
  push:
    branches: [dev, feat/*, fix/*]
    paths:
      - 'src/**'
      - 'test/**'
      - 'CMakeLists.txt'
      - 'Dockerfile'
      - '.github/workflows/test-arm64-tts.yml'
  workflow_dispatch:

jobs:
  test-linux-arm64:
    name: Test Linux ARM64 TTS
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
          
      - name: Build Docker image for ARM64
        run: |
          # Build with cache and progress output
          docker buildx build \
            --platform linux/arm64 \
            --tag piper-arm64-test:latest \
            --load \
            --progress=plain \
            -f Dockerfile .
            
      - name: Download test models
        run: |
          mkdir -p test/models
          
          # Download Japanese model
          if [ ! -f test/models/ja_JP-test-medium.onnx ]; then
            echo "Downloading Japanese test model..."
            curl -L -o test/models/ja_JP-test-medium.onnx \
              "https://github.com/rhasspy/piper/releases/download/v0.0.2/voice-ja-jp-test-medium.onnx"
            curl -L -o test/models/ja_JP-test-medium.onnx.json \
              "https://github.com/rhasspy/piper/releases/download/v0.0.2/voice-ja-jp-test-medium.onnx.json"
          fi
          
          # Download English model for testing
          if [ ! -f test/models/en_US-amy-medium.onnx ]; then
            echo "Downloading English test model..."
            curl -L -o test/models/en_US-amy-medium.onnx \
              "https://github.com/rhasspy/piper/releases/download/v1.0.0/en_US-amy-medium.onnx"
            curl -L -o test/models/en_US-amy-medium.onnx.json \
              "https://github.com/rhasspy/piper/releases/download/v1.0.0/en_US-amy-medium.onnx.json"
          fi
          
      - name: Run Japanese TTS test in ARM64 container
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v "$(pwd)/test":/test \
            -w /build \
            piper-arm64-test:latest \
            bash -c "
              echo '=== Testing Japanese TTS on ARM64 ==='
              echo 'こんにちは世界' | /build/install/bin/piper \
                --model /test/models/ja_JP-test-medium.onnx \
                --output_file /test/japanese_arm64.wav
              
              # Check if output was created
              if [ -f /test/japanese_arm64.wav ]; then
                echo '✅ Japanese TTS test passed'
                ls -la /test/japanese_arm64.wav
              else
                echo '❌ Japanese TTS test failed'
                exit 1
              fi
              
              echo '=== Testing English TTS on ARM64 ==='
              echo 'Hello world' | /build/install/bin/piper \
                --model /test/models/en_US-amy-medium.onnx \
                --output_file /test/english_arm64.wav || true
            "
            
      - name: Run OpenJTalk functionality test
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v "$(pwd)/test":/test \
            -w /build \
            piper-arm64-test:latest \
            bash -c "
              echo '=== Testing OpenJTalk phonemization ==='
              
              # Test various Japanese inputs
              test_inputs=(
                'こんにちは'
                'ありがとうございます'
                '今日はいい天気ですね'
                '123円です'
                'AIとMLの違い'
              )
              
              for input in \"\${test_inputs[@]}\"; do
                echo \"Testing: \$input\"
                echo \"\$input\" | /build/install/bin/piper \
                  --model /test/models/ja_JP-test-medium.onnx \
                  --output_raw 2>&1 | grep -q 'phoneme' && echo '✅ Passed' || echo '❌ Failed'
              done
            "
            
      - name: Upload test outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: arm64-tts-test-outputs
          path: |
            test/japanese_arm64.wav
            test/english_arm64.wav
          if-no-files-found: warn
          
      - name: Check binary size
        run: |
          docker run --rm \
            --platform linux/arm64 \
            piper-arm64-test:latest \
            bash -c "
              echo '=== ARM64 Binary Size ==='
              ls -lh /build/install/bin/piper
              size /build/install/bin/piper || true
            "