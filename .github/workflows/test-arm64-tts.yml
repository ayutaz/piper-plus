name: Test ARM64 TTS

on:
  pull_request:
    branches: [master, dev]
    paths:
      - 'src/**'
      - 'test/**'
      - 'CMakeLists.txt'
      - 'Dockerfile'
      - '.github/workflows/test-arm64-tts.yml'
  push:
    branches: [dev, feat/*, fix/*]
    paths:
      - 'src/**'
      - 'test/**'
      - 'CMakeLists.txt'
      - 'Dockerfile'
      - '.github/workflows/test-arm64-tts.yml'
  workflow_dispatch:

jobs:
  test-linux-arm64:
    name: Test Linux ARM64 TTS
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
          
      - name: Build ARM64 binary using native compilation in Docker
        run: |
          # Use Docker with buildx for proper ARM64 build
          docker buildx build \
            --platform linux/arm64 \
            --target builder \
            --tag piper-arm64-build:latest \
            --load \
            --progress=plain \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -f Dockerfile .
            
      # Skip model download for now - focus on build success
      - name: Prepare test directory
        run: |
          mkdir -p test/models
          echo "Test directory prepared"
          
      - name: Run basic functionality test in Docker
        run: |
          # Run tests inside ARM64 Docker container
          docker run --rm \
            --platform linux/arm64 \
            -v "$(pwd)/test":/test \
            piper-arm64-build:latest \
            bash -c "
              echo '=== Testing Piper binary on ARM64 ==='
              /build/install/bin/piper --version || echo 'Version check failed'
              
              echo '=== Checking OpenJTalk availability ==='
              if [ -f /build/install/bin/open_jtalk_phonemizer ]; then
                echo '✅ OpenJTalk phonemizer found'
                ls -la /build/install/bin/open_jtalk_phonemizer
              else
                echo '❌ OpenJTalk phonemizer not found'
                ls -la /build/install/bin/
              fi
            "
            
      - name: Run simplified TTS test if build succeeded
        if: success()
        run: |
          # Skip advanced tests for now to focus on build success
          echo "Build succeeded, skipping advanced tests for now"
            
      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: arm64-build-logs
          path: |
            build.log
          if-no-files-found: ignore
          
      - name: Check binary size
        run: |
          docker run --rm \
            --platform linux/arm64 \
            piper-arm64-build:latest \
            bash -c "
              echo '=== ARM64 Binary Size ==='
              ls -lh /build/install/bin/piper
              file /build/install/bin/piper || true
            "