name: "Voice Catalog Parity Gate"

# Verifies that the canonical model resolution vector
# (test/model_resolution_vectors.json) is honoured by all 5 runtime catalogs:
# Python (download.py), C++ (piper_plus_voices.json), Rust (model_download.rs),
# C# (VoiceCatalog.cs), Go (voice_catalog.go).
#
# Without this gate, `--model tsukuyomi` can silently resolve to different
# ONNX files across runtimes (the canonical spec and golden vector existed,
# but no gate enforced them in CI).

on:
  push:
    branches: [dev, main]
    paths:
      - 'test/model_resolution_vectors.json'
      - 'docs/spec/model-resolution.md'
      - 'src/python_run/piper/download.py'
      - 'src/cpp/piper_plus_voices.json'
      - 'src/rust/piper-core/src/model_download.rs'
      - 'src/csharp/PiperPlus.Core/Config/VoiceCatalog.cs'
      - 'src/go/piperplus/voice_catalog.go'
      - 'scripts/check_voice_catalog_parity.py'
      - '.github/workflows/voice-catalog-parity.yml'
  pull_request:
    paths:
      - 'test/model_resolution_vectors.json'
      - 'docs/spec/model-resolution.md'
      - 'src/python_run/piper/download.py'
      - 'src/cpp/piper_plus_voices.json'
      - 'src/rust/piper-core/src/model_download.rs'
      - 'src/csharp/PiperPlus.Core/Config/VoiceCatalog.cs'
      - 'src/go/piperplus/voice_catalog.go'
      - 'scripts/check_voice_catalog_parity.py'
      - '.github/workflows/voice-catalog-parity.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  catalog-parity:
    name: 5 runtime catalogs honour canonical vector
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run voice catalog parity check
        run: python scripts/check_voice_catalog_parity.py
