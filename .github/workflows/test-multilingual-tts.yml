name: Test Multilingual TTS

on:
  pull_request:
    branches: [master, dev]
  push:
    branches: [dev, feat/*, fix/*]
  workflow_dispatch:
    inputs:
      languages:
        description: 'Languages to test (comma-separated, e.g., en_US,de_DE,fr_FR)'
        required: false
        default: 'en_US,de_DE,fr_FR,es_ES,zh_CN'
      test_type:
        description: 'Test type'
        required: false
        default: 'basic'
        type: choice
        options:
          - basic
          - comprehensive
          - performance

env:
  # HuggingFace model repository
  MODEL_REPO: "rhasspy/piper-voices"
  MODEL_VERSION: "v1.0.0"
  # Test settings
  TEST_TIMEOUT: 300
  CACHE_DIR: ~/.cache/piper

jobs:
  # OpenJTalk dictionary download test
  test_dictionary_download:
    name: Test Dictionary Auto-Download
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential curl
      
      - name: Build piper
        run: |
          mkdir -p build
          cd build
          cmake .. -DBUILD_TESTS=ON
          make -j$(nproc)
      
      - name: Run dictionary download tests
        run: |
          chmod +x test_dictionary_download.sh
          ./test_dictionary_download.sh
        env:
          CI: true
          ESPEAK_DATA_PATH: ${{ github.workspace }}/build/ei/share/espeak-ng-data
      
      - name: Verify auto-download functionality
        run: |
          # Change to build directory for proper OpenJTalk path resolution
          cd build
          
          # Test that Japanese TTS works with auto-download
          export HOME=/tmp/test_auto_$$
          echo "自動ダウンロードテスト" | ./piper --model ../test/models/ja_JP-test-medium.onnx --output_file /tmp/auto_test.wav 2>&1 | tee /tmp/auto_test.log || true
          
          # Check if the test ran successfully or at least downloaded the dictionary
          if [ -f "$HOME/.piper/dictionaries/openjtalk/open_jtalk_dic_utf_8-1.11/sys.dic" ]; then
            echo "✅ Dictionary auto-download successful"
            if [ -f "$HOME/.piper/voices/hts/hts_voice_nitech_jp_atr503_m001-1.05/nitech_jp_atr503_m001.htsvoice" ]; then
              echo "✅ HTS voice auto-download successful"
            else
              echo "⚠️ HTS voice not downloaded (optional)"
            fi
          else
            echo "❌ Auto-download failed"
            cat /tmp/auto_test.log
            exit 1
          fi
        env:
          CI: true
          ESPEAK_DATA_PATH: ${{ github.workspace }}/build/ei/share/espeak-ng-data

  # Build piper before running tests
  build_piper:
    name: Build piper on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4.2.2
      
      - name: Setup MSVC Developer Command Prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      
      - name: Build piper
        shell: bash
        run: |
          mkdir -p build
          cd build
          if [ "${{ runner.os }}" = "Windows" ]; then
            cmake .. -G "Visual Studio 17 2022" -A x64
            cmake --build . --config Release --parallel
          else
            cmake ..
            make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          fi
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: piper-build-${{ matrix.os }}
          path: |
            build/piper*
            build/test_piper*
            build/**/*.exe
            build/**/*.dll
            build/**/*.so*
            build/**/*.dylib
            build/oj/bin/
            build/ei/
            build/pi/
            build/fi/
            build/si/
          retention-days: 1

  test_multilingual:
    name: Test ${{ matrix.language }} on ${{ matrix.os }}
    needs: build_piper
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        language:
          - en_US  # English (US)
          - en_GB  # English (UK)
          - de_DE  # German
          - fr_FR  # French
          - es_ES  # Spanish
          - it_IT  # Italian
          - pt_BR  # Portuguese (Brazil)
          - ru_RU  # Russian
          - zh_CN  # Chinese (Simplified)
          - nl_NL  # Dutch
          - pl_PL  # Polish
          - sv_SE  # Swedish
        include:
          # Define test models for each language
          - language: en_US
            model: "en_US-lessac-medium"
            test_text: "Hello, this is a test of the text to speech system."
          - language: en_GB
            model: "en_GB-alan-medium"
            test_text: "Good morning, this is a British English voice test."
          - language: de_DE
            model: "de_DE-thorsten-medium"
            test_text: "Hallo, dies ist ein Test des Sprachsynthesesystems."
          - language: fr_FR
            model: "fr_FR-siwis-medium"
            test_text: "Bonjour, ceci est un test du système de synthèse vocale."
          - language: es_ES
            model: "es_ES-mls_9972-low"
            test_text: "Hola, esta es una prueba del sistema de síntesis de voz."
          - language: it_IT
            model: "it_IT-riccardo-x_low"
            test_text: "Ciao, questo è un test del sistema di sintesi vocale."
          - language: pt_BR
            model: "pt_BR-faber-medium"
            test_text: "Olá, este é um teste do sistema de síntese de voz."
          - language: ru_RU
            model: "ru_RU-dmitri-medium"
            test_text: "Привет, это тест системы синтеза речи."
          - language: zh_CN
            model: "zh_CN-huayan-medium"
            test_text: "你好，这是语音合成系统的测试。"
          - language: nl_NL
            model: "nl_NL-mls-medium"
            test_text: "Hallo, dit is een test van het spraaksynthesesysteem."
          - language: pl_PL
            model: "pl_PL-gosia-medium"
            test_text: "Witaj, to jest test systemu syntezy mowy."
          - language: sv_SE
            model: "sv_SE-nst-medium"
            test_text: "Hej, detta är ett test av talsyntessystemet."

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up environment variables
        shell: bash
        run: |
          echo "RUNNER_OS=${{ runner.os }}" >> $GITHUB_ENV
          echo "MATRIX_LANGUAGE=${{ matrix.language }}" >> $GITHUB_ENV
          echo "MATRIX_MODEL=${{ matrix.model }}" >> $GITHUB_ENV

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: piper-build-${{ matrix.os }}
          path: build/
      
      - name: Setup piper from build
        shell: bash
        run: |
          # Create directories
          mkdir -p piper/bin test/models
          
          # Debug: Show what we received in build artifacts
          echo "=== Inspecting downloaded build artifacts ==="
          echo "Top-level build directory:"
          ls -la build/
          echo ""
          
          # Copy built binaries
          if [ "${{ runner.os }}" = "Windows" ]; then
            # Check multiple possible locations for Windows binary
            PIPER_FOUND=false
            for piper_exe in "build/Release/piper.exe" "build/piper.exe" "build/Debug/piper.exe"; do
              if [ -f "$piper_exe" ]; then
                echo "Found piper.exe at: $piper_exe"
                cp "$piper_exe" piper/bin/piper.exe
                PIPER_FOUND=true
                break
              fi
            done
            
            if [ "$PIPER_FOUND" = "false" ]; then
              echo "ERROR: piper.exe not found in build artifacts"
              echo "Searching for all .exe files:"
              find build -name "*.exe" -type f
              exit 1
            fi
          else
            # Check for Unix binary
            if [ -f build/piper ]; then
              cp build/piper piper/bin/
              chmod +x piper/bin/piper
            else
              echo "ERROR: piper binary not found in build artifacts"
              echo "Searching for piper binary:"
              find build -name "piper" -type f
              exit 1
            fi
          fi
          
          # Copy OpenJTalk binary if available
          if [ -d build/oj/bin ]; then
            cp -r build/oj/bin/* piper/bin/ || true
          fi
          
          # Debug: Show build directory structure in detail
          echo ""
          echo "=== Detailed build directory structure ==="
          echo "Looking for espeak-ng-data in all subdirectories:"
          find build -type d -name "espeak-ng-data" 2>/dev/null | while read dir; do
            echo "  Found: $dir"
            echo "  Parent: $(dirname "$dir")"
            echo "  Files count: $(find "$dir" -type f | wc -l)"
          done
          
          # Check ei directory (espeak install)
          echo ""
          echo "=== build/ei directory check ==="
          if [ -d build/ei ]; then
            echo "build/ei exists"
            ls -la build/ei/
            if [ -d build/ei/share ]; then
              echo "build/ei/share contents:"
              ls -la build/ei/share/
              if [ -d build/ei/share/espeak-ng-data ]; then
                echo "Found espeak-ng-data in ei/share!"
              fi
            fi
          else
            echo "build/ei does not exist"
          fi
          
          # Check pi directory (piper-phonemize install)
          echo ""
          echo "=== build/pi directory check ==="
          if [ -d build/pi ]; then
            echo "build/pi exists"
            ls -la build/pi/
            if [ -d build/pi/share ]; then
              echo "build/pi/share contents:"
              ls -la build/pi/share/
              if [ -d build/pi/share/espeak-ng-data ]; then
                echo "Found espeak-ng-data in pi/share!"
              fi
            fi
          else
            echo "build/pi does not exist"
          fi
          
          # Copy share directory for espeak-ng data with improved logic
          ESPEAK_DATA_COPIED=false
          
          # Try pi/share first (piper-phonemize location - most likely)
          if [ -d build/pi/share/espeak-ng-data ]; then
            echo ""
            echo ">>> Copying espeak-ng-data from build/pi/share/espeak-ng-data"
            mkdir -p piper/share
            cp -r build/pi/share/espeak-ng-data piper/share/
            ESPEAK_DATA_COPIED=true
          # Then try ei/share (espeak install location)
          elif [ -d build/ei/share/espeak-ng-data ]; then
            echo ""
            echo ">>> Copying espeak-ng-data from build/ei/share/espeak-ng-data"
            mkdir -p piper/share
            cp -r build/ei/share/espeak-ng-data piper/share/
            ESPEAK_DATA_COPIED=true
          # Try copying all share contents as fallback
          elif [ -d build/pi/share ]; then
            echo ""
            echo ">>> Copying all contents from build/pi/share"
            mkdir -p piper/share
            cp -r build/pi/share/* piper/share/
            ESPEAK_DATA_COPIED=true
          elif [ -d build/ei/share ]; then
            echo ""
            echo ">>> Copying all contents from build/ei/share"
            mkdir -p piper/share
            cp -r build/ei/share/* piper/share/
            ESPEAK_DATA_COPIED=true
          fi
          
          if [ "$ESPEAK_DATA_COPIED" = "false" ]; then
            echo ""
            echo "ERROR: No espeak-ng-data found in build artifacts!"
            echo "This is required for TTS to work."
            # Don't exit here, let the test fail with proper error message
          fi
          
          # Copy shared libraries
          echo ""
          echo "=== Copying shared libraries ==="
          mkdir -p piper/lib
          
          if [ "${{ runner.os }}" = "Windows" ]; then
            # Copy Windows DLLs
            find build -name "*.dll" -type f | while read dll; do
              echo "Copying DLL: $dll"
              cp "$dll" piper/lib/ || true
            done
          elif [ "${{ runner.os }}" = "Linux" ]; then
            # Copy Linux shared objects
            find build -name "*.so*" -type f | while read so; do
              echo "Copying SO: $so"
              cp "$so" piper/lib/ || true
            done
          elif [ "${{ runner.os }}" = "macOS" ]; then
            # Copy macOS dynamic libraries
            find build -name "*.dylib" -type f | while read dylib; do
              echo "Copying DYLIB: $dylib"
              cp "$dylib" piper/lib/ || true
            done
          fi
          
          # Final verification
          echo ""
          echo "=== Final setup verification ==="
          echo "piper/bin contents:"
          ls -la piper/bin/
          echo ""
          echo "piper/share contents:"
          ls -la piper/share/ 2>/dev/null || echo "No share directory"
          echo ""
          if [ -d piper/share/espeak-ng-data ]; then
            echo "espeak-ng-data successfully copied!"
            echo "Number of files: $(find piper/share/espeak-ng-data -type f | wc -l)"
          else
            echo "WARNING: espeak-ng-data not found in final location!"
          fi
          echo ""
          echo "piper/lib contents:"
          ls -la piper/lib/ 2>/dev/null || echo "No lib directory"


      - name: Cache voice models
        uses: actions/cache@v4.2.0
        with:
          path: ~/.cache/piper
          key: ${{ runner.os }}-piper-models-${{ matrix.language }}-${{ env.MODEL_VERSION }}
          restore-keys: |
            ${{ runner.os }}-piper-models-${{ matrix.language }}-
            ${{ runner.os }}-piper-models-

      - name: Download voice model
        shell: bash
        run: |
          # Expand CACHE_DIR
          CACHE_DIR_EXPANDED="${HOME}/.cache/piper"
          MODEL_DIR="${CACHE_DIR_EXPANDED}/voices/${{ matrix.language }}"
          mkdir -p "$MODEL_DIR"
          
          # Construct model URLs based on the VOICES.md format
          LANG_PREFIX=$(echo "${{ matrix.language }}" | cut -d_ -f1)
          MODEL_NAME="${{ matrix.model }}"
          
          # Extract speaker and quality from model name
          # Format: lang_COUNTRY-speaker-quality
          SPEAKER=$(echo "${MODEL_NAME}" | cut -d'-' -f2)
          QUALITY=$(echo "${MODEL_NAME}" | cut -d'-' -f3)
          
          # Construct URL following HuggingFace structure
          BASE_URL="https://huggingface.co/${MODEL_REPO}/resolve/${MODEL_VERSION}/${LANG_PREFIX}/${{ matrix.language }}/${SPEAKER}/${QUALITY}"
          
          # Download model files if not cached
          if [ ! -f "${MODEL_DIR}/${MODEL_NAME}.onnx" ]; then
            echo "Downloading ${MODEL_NAME} model..."
            echo "URL: ${BASE_URL}/${MODEL_NAME}.onnx?download=true"
            curl -L -o "${MODEL_DIR}/${MODEL_NAME}.onnx" \
              "${BASE_URL}/${MODEL_NAME}.onnx?download=true" || {
              echo "Failed to download model from: ${BASE_URL}/${MODEL_NAME}.onnx"
              exit 1
            }
          fi
          
          if [ ! -f "${MODEL_DIR}/${MODEL_NAME}.onnx.json" ]; then
            echo "Downloading ${MODEL_NAME} config..."
            echo "URL: ${BASE_URL}/${MODEL_NAME}.onnx.json?download=true"
            curl -L -o "${MODEL_DIR}/${MODEL_NAME}.onnx.json" \
              "${BASE_URL}/${MODEL_NAME}.onnx.json?download=true" || {
              echo "Failed to download config from: ${BASE_URL}/${MODEL_NAME}.onnx.json"
              exit 1
            }
          fi
          
          # Verify downloads
          if [ ! -s "${MODEL_DIR}/${MODEL_NAME}.onnx" ]; then
            echo "Error: Model file is empty or corrupted"
            exit 1
          fi
          
          if [ ! -s "${MODEL_DIR}/${MODEL_NAME}.onnx.json" ]; then
            echo "Error: Config file is empty or corrupted"
            exit 1
          fi
          
          # Copy to test directory
          cp "${MODEL_DIR}/${MODEL_NAME}.onnx" "test/models/"
          cp "${MODEL_DIR}/${MODEL_NAME}.onnx.json" "test/models/"
          
          # Verify downloads
          ls -la test/models/

      - name: Run TTS test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          REM Add DLL paths to PATH
          set PATH=%CD%\piper\lib;%CD%\piper\bin;%PATH%
          
          REM Try to find espeak-ng-data in multiple locations
          if exist "%CD%\piper\share\espeak-ng-data" (
            set ESPEAK_DATA_PATH=%CD%\piper\share\espeak-ng-data
          ) else if exist "%CD%\build\ei\share\espeak-ng-data" (
            set ESPEAK_DATA_PATH=%CD%\build\ei\share\espeak-ng-data
          ) else if exist "%CD%\build\pi\share\espeak-ng-data" (
            set ESPEAK_DATA_PATH=%CD%\build\pi\share\espeak-ng-data
          ) else (
            echo WARNING: espeak-ng-data not found, trying without setting ESPEAK_DATA_PATH
          )
          
          echo ${{ matrix.test_text }} > test_input.txt
          
          REM Debug information
          echo === Debug Information ===
          echo Current directory: %CD%
          echo ESPEAK_DATA_PATH: %ESPEAK_DATA_PATH%
          echo.
          echo Checking piper\share directory:
          if exist "piper\share" (
            dir piper\share
          ) else (
            echo piper\share directory does not exist
          )
          echo.
          echo Checking build\ei\share directory:
          if exist "build\ei\share" (
            dir build\ei\share
          ) else (
            echo build\ei\share directory does not exist
          )
          echo.
          echo Checking build\pi\share directory:
          if exist "build\pi\share" (
            dir build\pi\share
          ) else (
            echo build\pi\share directory does not exist
          )
          echo.
          echo Checking for espeak-ng-data:
          if defined ESPEAK_DATA_PATH (
            if exist "%ESPEAK_DATA_PATH%" (
              echo Found espeak-ng-data at: %ESPEAK_DATA_PATH%
              dir "%ESPEAK_DATA_PATH%" | find /c "."
              echo files/directories in espeak-ng-data
            ) else (
              echo espeak-ng-data not found at %ESPEAK_DATA_PATH%
            )
          ) else (
            echo ESPEAK_DATA_PATH not set
          )
          echo.
          echo Checking model file:
          if exist "test\models\${{ matrix.model }}.onnx" (
            echo Model found: test\models\${{ matrix.model }}.onnx
          ) else (
            echo Model not found: test\models\${{ matrix.model }}.onnx
            dir test\models\
          )
          
          REM Check if piper.exe can run
          piper\bin\piper.exe --help 2>&1
          if %ERRORLEVEL% NEQ 0 (
            echo ERROR: piper.exe cannot run - exit code %ERRORLEVEL%
            echo Checking dependencies...
            where onnxruntime.dll 2>nul || echo WARNING: onnxruntime.dll not found in PATH
            exit /b 1
          )
          
          type test_input.txt | piper\bin\piper.exe ^
            --model "test\models\${{ matrix.model }}.onnx" ^
            --output_file "test_output_${{ matrix.language }}.wav" 2>&1
          
          if %ERRORLEVEL% NEQ 0 (
            echo ERROR: piper.exe returned error code %ERRORLEVEL%
            echo.
            echo Retrying with explicit ESPEAK_DATA_PATH in build directory...
            if exist "build\ei\share\espeak-ng-data" (
              set ESPEAK_DATA_PATH=%CD%\build\ei\share\espeak-ng-data
              echo Retrying with ESPEAK_DATA_PATH=%ESPEAK_DATA_PATH%
              type test_input.txt | piper\bin\piper.exe ^
                --model "test\models\${{ matrix.model }}.onnx" ^
                --output_file "test_output_${{ matrix.language }}.wav" 2>&1
              if %ERRORLEVEL% EQU 0 goto success
              echo Retry with ei\share failed
            )
            if exist "build\pi\share\espeak-ng-data" (
              set ESPEAK_DATA_PATH=%CD%\build\pi\share\espeak-ng-data
              echo Retrying with ESPEAK_DATA_PATH=%ESPEAK_DATA_PATH%
              type test_input.txt | piper\bin\piper.exe ^
                --model "test\models\${{ matrix.model }}.onnx" ^
                --output_file "test_output_${{ matrix.language }}.wav" 2>&1
              if %ERRORLEVEL% EQU 0 goto success
              echo Retry with pi\share also failed
            )
            exit /b 1
          )
          
          :success
          if exist "test_output_${{ matrix.language }}.wav" (
            echo TTS test passed for ${{ matrix.language }}!
          ) else (
            echo TTS failed for ${{ matrix.language }} - no output file generated
            exit /b 1
          )

      - name: Run TTS test (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # Set up library paths first
          if [ "${{ runner.os }}" = "Linux" ]; then
            export LD_LIBRARY_PATH=$PWD/piper/lib:$PWD/build/pi/lib:$PWD/build/ei/lib:$LD_LIBRARY_PATH
            PIPER_CMD="./piper/bin/piper"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            export DYLD_LIBRARY_PATH=$PWD/piper/lib:$PWD/build/pi/lib:$PWD/build/ei/lib:$DYLD_LIBRARY_PATH
            PIPER_CMD="./piper/bin/piper"
          fi
          
          # Try to find espeak-ng-data in multiple locations
          # Priority order: piper/share > build/pi/share > build/ei/share
          ESPEAK_DATA_FOUND=false
          for esp_path in "$PWD/piper/share/espeak-ng-data" "$PWD/build/pi/share/espeak-ng-data" "$PWD/build/ei/share/espeak-ng-data"; do
            if [ -d "$esp_path" ]; then
              export ESPEAK_DATA_PATH=$esp_path
              ESPEAK_DATA_FOUND=true
              echo "Set ESPEAK_DATA_PATH to: $ESPEAK_DATA_PATH"
              break
            fi
          done
          
          if [ "$ESPEAK_DATA_FOUND" = "false" ]; then
            echo "WARNING: espeak-ng-data not found in any expected location!"
            echo "Attempting to run without ESPEAK_DATA_PATH set..."
          fi
          
          # Debug information
          echo "=== Debug Information ==="
          echo "Current directory: $(pwd)"
          echo "ESPEAK_DATA_PATH: ${ESPEAK_DATA_PATH:-not set}"
          echo "LD_LIBRARY_PATH: ${LD_LIBRARY_PATH:-not set}"
          echo "DYLD_LIBRARY_PATH: ${DYLD_LIBRARY_PATH:-not set}"
          echo ""
          
          echo "Checking piper binary:"
          if [ -f "piper/bin/piper" ]; then
            ls -la piper/bin/piper
            echo "Testing if piper can run:"
            if $PIPER_CMD --version 2>&1; then
              echo "✓ Piper binary is executable"
            else
              echo "✗ Piper binary failed to run. Exit code: $?"
              echo "Checking library dependencies:"
              if [ "${{ runner.os }}" = "Linux" ]; then
                ldd piper/bin/piper || echo "ldd failed"
              elif [ "${{ runner.os }}" = "macOS" ]; then
                otool -L piper/bin/piper || echo "otool failed"
              fi
            fi
          else
            echo "✗ piper binary not found at piper/bin/piper"
          fi
          echo ""
          
          echo "Checking shared libraries:"
          if [ -d "piper/lib" ]; then
            echo "Libraries in piper/lib:"
            ls -la piper/lib/ | head -10
          else
            echo "No piper/lib directory"
          fi
          echo ""
          
          echo "Checking espeak-ng-data:"
          if [ -n "$ESPEAK_DATA_PATH" ] && [ -d "$ESPEAK_DATA_PATH" ]; then
            echo "✓ Found espeak-ng-data at: $ESPEAK_DATA_PATH"
            echo "  Number of files/directories: $(ls -1 "$ESPEAK_DATA_PATH" | wc -l)"
            echo "  Sample contents:"
            ls "$ESPEAK_DATA_PATH" | head -5
          else
            echo "✗ espeak-ng-data not found or ESPEAK_DATA_PATH not set"
            echo "  Searching for espeak-ng-data:"
            find . -type d -name "espeak-ng-data" 2>/dev/null | head -5
          fi
          echo ""
          
          echo "Checking model file:"
          if [ -f "test/models/${{ matrix.model }}.onnx" ]; then
            echo "✓ Model found: test/models/${{ matrix.model }}.onnx"
            ls -la "test/models/${{ matrix.model }}.onnx"
          else
            echo "✗ Model not found: test/models/${{ matrix.model }}.onnx"
            echo "  Contents of test/models:"
            ls -la test/models/ 2>/dev/null || echo "  test/models directory does not exist"
          fi
          
          # Create test input
          echo "${{ matrix.test_text }}" > test_input.txt
          
          # Run basic TTS test with verbose output
          echo ""
          echo "=== Running TTS for ${{ matrix.language }} ==="
          echo "Command: cat test_input.txt | $PIPER_CMD --model \"test/models/${{ matrix.model }}.onnx\" --output_file \"test_output_${{ matrix.language }}.wav\""
          echo ""
          
          # First attempt
          if cat test_input.txt | $PIPER_CMD \
            --model "test/models/${{ matrix.model }}.onnx" \
            --output_file "test_output_${{ matrix.language }}.wav" 2>&1; then
            echo "✓ TTS succeeded on first attempt"
          else
            EXIT_CODE=$?
            echo "✗ TTS failed with exit code: $EXIT_CODE"
            echo ""
            
            # Retry with different ESPEAK_DATA_PATH locations
            RETRY_SUCCESS=false
            for retry_path in "$PWD/build/pi/share/espeak-ng-data" "$PWD/build/ei/share/espeak-ng-data" "$PWD/piper/share/espeak-ng-data"; do
              if [ -d "$retry_path" ] && [ "$retry_path" != "$ESPEAK_DATA_PATH" ]; then
                echo "Retrying with ESPEAK_DATA_PATH=$retry_path"
                export ESPEAK_DATA_PATH=$retry_path
                
                if cat test_input.txt | $PIPER_CMD \
                  --model "test/models/${{ matrix.model }}.onnx" \
                  --output_file "test_output_${{ matrix.language }}.wav" 2>&1; then
                  echo "✓ TTS succeeded with ESPEAK_DATA_PATH=$retry_path"
                  RETRY_SUCCESS=true
                  break
                else
                  echo "✗ Retry failed with ESPEAK_DATA_PATH=$retry_path"
                fi
              fi
            done
            
            if [ "$RETRY_SUCCESS" = "false" ]; then
              echo ""
              echo "ERROR: All TTS attempts failed for ${{ matrix.language }}"
              echo "Final diagnostics:"
              echo "- ESPEAK_DATA_PATH: ${ESPEAK_DATA_PATH:-not set}"
              echo "- Working directory: $(pwd)"
              echo "- Piper binary exists: $([ -f piper/bin/piper ] && echo 'yes' || echo 'no')"
              echo "- Model exists: $([ -f "test/models/${{ matrix.model }}.onnx" ] && echo 'yes' || echo 'no')"
              exit 1
            fi
          fi
          
          # Verify output
          if [ -f "test_output_${{ matrix.language }}.wav" ]; then
            size=$(stat -f%z "test_output_${{ matrix.language }}.wav" 2>/dev/null || stat -c%s "test_output_${{ matrix.language }}.wav" 2>/dev/null)
            echo "Generated audio file size: ${size} bytes"
            
            if [ "$size" -gt 10000 ]; then
              echo "✅ TTS test passed for ${{ matrix.language }}!"
            else
              echo "❌ Output file too small for ${{ matrix.language }} (${size} bytes)"
              exit 1
            fi
          else
            echo "❌ No output file generated for ${{ matrix.language }}"
            exit 1
          fi
          
          # Performance test (if requested)
          if [ "${{ github.event.inputs.test_type }}" = "performance" ] || [ "${{ github.event.inputs.test_type }}" = "comprehensive" ]; then
            echo "Running performance test..."
            
            # Create longer test text
            for i in {1..10}; do
              echo "${{ matrix.test_text }}" >> performance_input.txt
            done
            
            # Measure time
            start_time=$(date +%s.%N)
            cat performance_input.txt | $PIPER_CMD \
              --model "test/models/${{ matrix.model }}.onnx" \
              --output_file "performance_output.wav"
            end_time=$(date +%s.%N)
            
            # Calculate duration
            duration=$(echo "$end_time - $start_time" | bc)
            echo "Performance: Generated 10 sentences in ${duration} seconds"
            
            # Save performance data
            echo "${{ matrix.language }},${{ matrix.model }},$duration" >> performance_results.csv
          fi


      - name: Run comprehensive tests
        if: github.event.inputs.test_type == 'comprehensive'
        shell: bash
        run: |
          echo "Running comprehensive tests for ${{ matrix.language }}..."
          
          # Set piper path
          PIPER_CMD="./piper/bin/piper"
          
          # Test 1: Special characters and punctuation
          echo "Testing special characters..."
          echo "Hello! How are you? This costs \$100. Email: test@example.com" > special_chars.txt
          $PIPER_CMD --model "test/models/${{ matrix.model }}.onnx" < special_chars.txt --output_file special_output.wav || echo "Special chars test completed"
          
          # Test 2: Numbers and dates
          echo "Testing numbers and dates..."
          echo "The year is 2025. Today is January 27th. The temperature is -5 degrees." > numbers.txt
          $PIPER_CMD --model "test/models/${{ matrix.model }}.onnx" < numbers.txt --output_file numbers_output.wav || echo "Numbers test completed"
          
          # Test 3: Long text (stress test)
          echo "Testing long text..."
          # Generate a long paragraph
          for i in {1..50}; do
            echo "${{ matrix.test_text }}" >> long_text.txt
          done
          timeout 60 bash -c "$PIPER_CMD --model 'test/models/${{ matrix.model }}.onnx' < long_text.txt --output_file long_output.wav" || echo "Long text test completed"
          
          # Test 4: Empty input handling
          echo "Testing empty input..."
          echo "" | $PIPER_CMD --model "test/models/${{ matrix.model }}.onnx" --output_file empty_output.wav || echo "Empty input handled"
          
          # Test 5: Multi-line input
          echo "Testing multi-line input..."
          cat > multiline.txt << EOF
          Line one of the test.
          Line two of the test.
          Line three of the test.
          EOF
          $PIPER_CMD --model "test/models/${{ matrix.model }}.onnx" < multiline.txt --output_file multiline_output.wav || echo "Multi-line test completed"
          
          echo "Comprehensive tests completed for ${{ matrix.language }}"

      - name: Upload test outputs
        if: always()
        uses: actions/upload-artifact@v4.6.0
        with:
          name: test-outputs-${{ matrix.language }}-${{ matrix.os }}
          path: |
            test_output_*.wav
            performance_output.wav
            special_output.wav
            numbers_output.wav
            long_output.wav
            multiline_output.wav
            performance_results.csv
          retention-days: 7

      - name: Upload performance results
        if: github.event.inputs.test_type == 'performance' || github.event.inputs.test_type == 'comprehensive'
        uses: actions/upload-artifact@v4.6.0
        with:
          name: performance-${{ matrix.language }}-${{ matrix.os }}
          path: performance_results.csv
          retention-days: 30

  summarize_results:
    name: Summarize Test Results
    needs: [build_piper, test_multilingual]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all performance results
        if: github.event.inputs.test_type == 'performance' || github.event.inputs.test_type == 'comprehensive'
        uses: actions/download-artifact@v4.1.0
        with:
          pattern: performance-*
          path: performance-data

      - name: Generate summary report
        if: github.event.inputs.test_type == 'performance' || github.event.inputs.test_type == 'comprehensive'
        run: |
          echo "# Multilingual TTS Test Summary" > summary.md
          echo "" >> summary.md
          echo "## Performance Results" >> summary.md
          echo "" >> summary.md
          echo "| Language | Model | OS | Time (seconds) |" >> summary.md
          echo "|----------|-------|----|--------------:|" >> summary.md
          
          # Aggregate performance data
          find performance-data -name "*.csv" | while read file; do
            # Extract OS and language from filename
            filename=$(basename "$file")
            os_lang=$(echo "$filename" | sed 's/performance-\(.*\)-\(.*\)\.csv/\1 \2/')
            
            # Process CSV data
            while IFS=',' read -r lang model time; do
              echo "| $lang | $model | ${os_lang##* } | $time |" >> summary.md
            done < "$file"
          done
          
          # Output summary
          cat summary.md

