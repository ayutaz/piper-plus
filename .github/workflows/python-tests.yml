name: Python Unit Tests

on:
  pull_request:
    paths:
      - 'src/python/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
  push:
    branches: [main, dev]
    paths:
      - 'src/python/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak-ng python3-dev
      
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Install Python dependencies
        run: |
          cd src/python
          uv pip install -e .
          uv pip install -r requirements_test.txt
      
      - name: Build Cython extensions
        run: |
          cd src/python
          ./build_monotonic_align.sh
      
      - name: Run unit tests
        run: |
          cd src/python
          uv run pytest tests/ -v -m "unit" --tb=short
      
      - name: Run ONNX simplification tests
        run: |
          cd src/python
          # Install optional dependency for testing
          uv pip install onnxsim-prebuilt || echo "onnxsim-prebuilt not available, tests will skip"
          uv run pytest tests/test_onnx_simplification.py -v --tb=short
      
      - name: Generate test report
        if: always()
        run: |
          cd src/python
          uv run pytest tests/ -v --junitxml=test-results.xml || true
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: src/python/test-results.xml
          
  test-summary:
    name: Test Summary
    needs: [test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## 🧪 Python Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Python Version | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 3.11 | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3.12 | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY