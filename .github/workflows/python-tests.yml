name: python-tests

on:
  workflow_call:
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'src/python/**'
      - 'src/python_run/**'
      - 'requirements*.txt'
      - '.github/workflows/python-tests.yml'

jobs:
  test:
    name: python-tests (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libsndfile1 sox
    
    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install libsndfile sox
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        cd src/python && pip install -r requirements_test.txt
        pip install -e .
    
    - name: Run unit tests
      run: |
        cd src/python
        pytest tests/ -v --tb=short -m "unit and not training and not benchmark"
    
    - name: Run integration tests
      run: |
        cd src/python
        pytest tests/ -v --tb=short -m "integration and not benchmark"
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
        path: |
          src/python/.pytest_cache
          src/python/htmlcov
        retention-days: 7