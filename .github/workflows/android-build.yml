name: Android Build & Test

on:
  push:
    branches: [dev, main]
    paths:
      - 'src/android/**'
      - 'src/cpp/**'
      - 'CMakeLists.txt'
  pull_request:
    paths:
      - 'src/android/**'
      - 'src/cpp/**'
      - 'CMakeLists.txt'

jobs:
  build-aar:
    name: Build AAR
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build AAR (debug)
        run: ./gradlew :piper-android:assembleDebug

      - name: Build AAR (release)
        run: ./gradlew :piper-android:assembleRelease

      - name: Run Android Lint
        run: ./gradlew :piper-android:lint

      - name: Run unit tests
        run: ./gradlew :piper-android:testDebugUnitTest

      - name: Upload AAR artifact (debug)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: piper-android-debug-aar
          path: src/android/piper-android/build/outputs/aar/*-debug.aar
          retention-days: 14

      - name: Upload AAR artifact (release)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: piper-android-release-aar
          path: src/android/piper-android/build/outputs/aar/*-release.aar
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: src/android/piper-android/build/reports/tests/
          retention-days: 14
