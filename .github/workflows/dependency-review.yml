name: dependency-review

on:
  pull_request:
    branches: [dev, main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # ライセンス互換性チェック (allow-licenses と deny-licenses は同時指定不可)
          # allow-licenses にあるものだけ通過、それ以外は暗黙拒否。
          # GPL/AGPL/LGPL は当然 list にないので拒否される。
          allow-licenses: >-
            MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC,
            Unicode-DFS-2016, Unicode-3.0, CC0-1.0, MPL-2.0,
            Zlib, OpenSSL, BSL-1.0, 0BSD, Apache-2.0 WITH LLVM-exception
          # dev / lint / docs 用 transitive dependency の例外
          # (配布バイナリには含まれず copyleft 伝播リスクなし)。
          # ライセンスを広く allow する代わりに、対象パッケージを明示し
          # carve-out することで scope を最小化する。
          #
          # pkg:npm/protobufjs: 7.5.8+ で scancode が
          # `BSD-3-Clause AND LicenseRef-scancode-protobuf` を検出する。
          # 後者は Google Protocol Buffers のオリジナル license (BSD-3-Clause
          # 系) で copyleft なし。 SPDX 標準名でないため allow-licenses では
          # 通せず、 package 単位で carve-out する。
          allow-dependencies-licenses: >-
            pkg:pypi/astroid,
            pkg:pypi/matplotlib,
            pkg:pypi/mypy,
            pkg:pypi/pylint,
            pkg:pypi/sphinx-rtd-theme,
            pkg:npm/protobufjs
          # 自動 fail にせず、PR comment で報告
          warn-only: false
          # vulnerability scope
          vulnerability-check: true
