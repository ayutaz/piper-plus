name: Security Audit

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "src/python/pyproject.toml"
      - "src/python_run/setup.py"
      - "src/python_run/requirements.txt"
      - "src/rust/**/Cargo.toml"
      - "src/rust/**/Cargo.lock"
      - "src/rust/Cargo.lock"
      # cargo-audit の ignore リスト変更を PR 時に再監査する
      # (.cargo/audit.toml を編集したら cargo-audit ジョブを走らせる)。
      - "src/rust/**/audit.toml"
      - "src/wasm/**/package.json"
      - "src/wasm/**/package-lock.json"
      - "src/csharp/**/*.csproj"
      - "src/csharp/**/packages.lock.json"
      - "src/csharp/PiperPlus.sln"
      - "src/go/go.mod"
      - "src/go/go.sum"
      - "docker/**/Dockerfile*"
      - "docker/python-inference/**"
      - "docker/wyoming/**"
      - "docker/webui/**"
      - ".github/workflows/security-audit.yml"
  push:
    branches: [dev, main]
  schedule:
    # 毎週月曜 03:00 UTC (= 12:00 JST)
    - cron: "0 3 * * 1"
  workflow_dispatch:

# Cancel superseded PR runs (push to PR branch, force-push, retry). Schedule
# / push-to-dev runs use the static `ref` so they are NOT cancelled by an
# overlapping PR run, and a re-run of the weekly cron simply queues behind
# the previous one (cancel-in-progress affects the same group only).
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write

jobs:
  # GitHub Dependency Review (PR 時に新規追加される依存をチェック)
  # PR 専用 job (dependency-review-action は PR context 以外で動作しない)。
  # High 以上で fail、ライセンスチェックも有効化。
  dependency-review:
    name: Dependency Review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/dependency-review-action@v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          license-check: true
          # 許容ライセンス (OSS 一般 + Unicode/OpenSSL/Zlib などライブラリ系)
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Unicode-DFS-2016, Unicode-3.0, CC0-1.0, MPL-2.0, Zlib, OpenSSL
          # dev / lint / docs 用 transitive dependency の例外
          # (配布バイナリには含まれず copyleft 伝播リスクなし)。
          # dependency-review.yml と同期。
          #
          # pkg:npm/protobufjs: 7.5.8+ で scancode が
          # `BSD-3-Clause AND LicenseRef-scancode-protobuf` を検出する。
          # 後者は Google Protocol Buffers のオリジナル license (BSD-3-Clause
          # 系) で copyleft なし。 SPDX 標準名でないため allow-licenses では
          # 通せず、 package 単位で carve-out する。
          allow-dependencies-licenses: >-
            pkg:pypi/astroid,
            pkg:pypi/matplotlib,
            pkg:pypi/mypy,
            pkg:pypi/pylint,
            pkg:pypi/sphinx-rtd-theme,
            pkg:npm/protobufjs

  # Python: pip-audit
  # PR では false-negative 防止のため block しないが (`continue-on-error: true`)、
  # schedule (毎週) と push (dev/main) では真に block する。これにより日常の
  # PR レビューを止めずに、最新 CVE を確実に検出する 2 階層運用にする。
  # fail-on-severity 統一 (High 以上): pip-audit は --strict で全件 fail だが、
  # PR 時のみ continue-on-error で warning 化することでバランスを取る。
  pip-audit:
    name: pip-audit (Python)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit root requirements
        # PR は warning、schedule/push は fail。
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: |
          pip-audit --requirement <(uv pip compile pyproject.toml 2>/dev/null) --strict --vulnerability-service osv || \
          pip-audit --strict --vulnerability-service osv
      - name: Audit src/python_run
        # 引数なし `pip-audit --strict` は working-directory に依存せず runner の
        # グローバル Python 環境を audit してしまい、プリインストール pip 自体の
        # CVE で fail する (PR #447 後の push run で CVE-2026-3219 / CVE-2026-6357
        # により発覚)。`--requirement requirements.txt` で配布対象の production
        # 依存だけを対象にする。dev / gpu / webui は optional extras で
        # 配布 wheel には含まれないため audit 対象外。
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        working-directory: src/python_run
        run: pip-audit --strict --vulnerability-service osv --requirement requirements.txt

  # Rust: cargo-audit
  # fail-on-severity 統一 (High 以上): cargo-audit はデフォルトで vulnerability
  # entries で exit 1。`--deny warnings` ではなくデフォルト動作のままで RUSTSEC
  # advisory database の High 以上に相当する CVE を検出。
  cargo-audit:
    name: cargo-audit (Rust)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo-audit
        working-directory: src/rust
        # vulnerabilities (実 CVE) のみ exit 1。unmaintained / informational
        # 警告は表示するが pass 扱い。RUSTSEC-2025-0141 (bincode unmaintained)、
        # RUSTSEC-2021-0153 (encoding unmaintained) のような既知警告で
        # リリースをブロックしないため。
        run: cargo audit

  # npm: npm audit
  # fail-on-severity 統一: --audit-level=high で High 以上のみ fail。
  npm-audit:
    name: npm audit
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        package: [src/wasm/openjtalk-web, src/wasm/g2p]
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          # cache は package-lock.json が repo にコミットされている
          # openjtalk-web のみ有効化。g2p は lockfile を .gitignore しているため
          # path 解決失敗で 'Some specified paths were not resolved' fail する。
          # g2p は次の "Generate lockfile if missing" step で生成して audit する。
          cache: ${{ matrix.package == 'src/wasm/openjtalk-web' && 'npm' || '' }}
          cache-dependency-path: ${{ matrix.package == 'src/wasm/openjtalk-web' && format('{0}/package-lock.json', matrix.package) || '' }}
      - name: Generate lockfile if missing (${{ matrix.package }})
        working-directory: ${{ matrix.package }}
        # src/wasm/g2p には package-lock.json をコミットしていないため、
        # audit に必要な lockfile をその場で生成する。
        run: |
          if [ ! -f "package-lock.json" ]; then
            echo "Generating package-lock.json (not committed in this package)"
            npm install --package-lock-only --no-audit --no-fund
          fi
      - name: Run npm audit (${{ matrix.package }})
        working-directory: ${{ matrix.package }}
        # production 依存の HIGH 以上のみ失敗扱い (devDependencies は警告)
        run: npm audit --omit=dev --audit-level=high

  # Go: govulncheck
  # golang.org/x/vuln/cmd/govulncheck で Go モジュールの既知 CVE を検出。
  # cargo-audit / pip-audit / npm-audit と並列に Go ランタイムをカバー。
  # fail-on-severity 統一: govulncheck は CVE が呼び出されている場合のみ
  # exit 非ゼロ。Critical/High に絞り込みは govulncheck output を grep して
  # severity 評価 (-mode=source の JSON 出力をパース)。
  govulncheck:
    name: govulncheck (Go)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v5.6.0
        with:
          go-version: "1.26"
          cache-dependency-path: src/go/go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck (High/Critical only)
        working-directory: src/go
        # JSON 出力 → CVE severity をパースして High/Critical のみ fail。
        # govulncheck は内部 advisory DB の severity を `osv` フォーマットで
        # 出力するため、`database_specific.severity` を確認。Low/Moderate は
        # warning のみ (PR を不必要にブロックしない)。
        run: |
          set -o pipefail
          # JSON モードで実行し、後段でパース。
          govulncheck -json ./... > /tmp/govulncheck.json || true
          # JSON 出力から severity を抽出。osv schema の database_specific.severity
          # が HIGH / CRITICAL の vuln が呼び出されていれば fail。
          # `osv` レコード単位で severity を確認するために jq を使う。
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq jq
          fi
          # finding (= 実際に呼ばれている CVE) を抽出し、対応する osv の severity を確認。
          HIGH_CRITICAL=$(jq -r '
            select(.osv != null) |
            select(
              (.osv.database_specific.severity // "") |
              ascii_upcase |
              test("HIGH|CRITICAL")
            ) |
            .osv.id
          ' /tmp/govulncheck.json | sort -u)
          if [ -n "$HIGH_CRITICAL" ]; then
            echo "::error::High/Critical vulnerabilities found:"
            echo "$HIGH_CRITICAL"
            # 全体出力も表示してデバッグしやすく。
            jq -r 'select(.finding != null) | .finding.osv' /tmp/govulncheck.json | sort -u
            exit 1
          fi
          echo "::notice::No High/Critical govulncheck findings."

  # NuGet: dotnet list package --vulnerable
  # `dotnet list ... --vulnerable --include-transitive` の出力をパースして
  # High / Critical severity が 1 件でもあれば fail。
  # fail-on-severity 統一 (High 以上): Moderate/Low は warning のみ。
  nuget-audit:
    name: nuget-audit (.NET)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: 10.0.x
      - name: Restore packages
        run: dotnet restore src/csharp/PiperPlus.sln
      - name: Check for vulnerable packages (severity high)
        run: |
          set -o pipefail
          # `--vulnerable --include-transitive` は dotnet 6+ で利用可能。
          OUTPUT=$(dotnet list src/csharp/PiperPlus.sln package --vulnerable --include-transitive 2>&1 | tee /tmp/nuget-audit.log)
          echo "$OUTPUT"
          # Severity 行 (例: `> Microsoft.X 1.0.0 1.0.0 High`) を抽出。
          # "no vulnerable" メッセージが出ていれば pass。
          if echo "$OUTPUT" | grep -qiE "no vulnerable packages"; then
            echo "::notice::No vulnerable NuGet packages found."
            exit 0
          fi
          # High / Critical を fail 条件にする (fail-on-severity 統一)。
          if echo "$OUTPUT" | grep -qiE "(>[[:space:]]+\S+.*\b(High|Critical)\b)"; then
            echo "::error::High/Critical severity vulnerable NuGet package(s) found."
            exit 1
          fi
          # Moderate / Low は warning のみ。
          if echo "$OUTPUT" | grep -qiE "(>[[:space:]]+\S+.*\b(Moderate|Low)\b)"; then
            echo "::warning::Moderate/Low severity vulnerable NuGet package(s) found (not blocking)."
          fi

  # Trivy: Docker image / Dockerfile config scan
  # `docker/python-inference`, `docker/wyoming`, `docker/webui` の 3 image を
  # 対象に Dockerfile の misconfig (Trivy config scan) と build した image の
  # OS package CVE (Trivy image scan) を両方検査。
  # fail-on-severity 統一 (HIGH/CRITICAL のみ fail)。
  trivy-docker-scan:
    name: trivy-docker (${{ matrix.image }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image: [python-inference, wyoming, webui]
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Trivy config scan (Dockerfile)
        # Dockerfile の misconfiguration (USER root のまま終わる、HEALTHCHECK
        # 未設定など) を build なしで検出。CRITICAL/HIGH のみ fail。
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: docker/${{ matrix.image }}
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0
      - name: Build image (no push)
        # image scan のため、push せず local に build。失敗しても次の step
        # で skip 判定するために `continue-on-error: true`。
        # PR 時は cache from gha で高速化。
        id: build
        continue-on-error: true
        run: |
          docker build -t piper-plus-${{ matrix.image }}:scan \
            -f docker/${{ matrix.image }}/Dockerfile docker/${{ matrix.image }}
      - name: Trivy image scan
        if: steps.build.outcome == 'success'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: piper-plus-${{ matrix.image }}:scan
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          # OS package + lang package 両方をスキャン。
          vuln-type: "os,library"

  # 結果サマリ
  audit-summary:
    name: Audit Summary
    if: always()
    needs: [pip-audit, cargo-audit, npm-audit, govulncheck, nuget-audit, trivy-docker-scan]
    runs-on: ubuntu-24.04
    steps:
      - name: Summary
        run: |
          echo "## Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "- pip-audit: ${{ needs.pip-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- cargo-audit: ${{ needs.cargo-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- npm-audit: ${{ needs.npm-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- govulncheck: ${{ needs.govulncheck.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- nuget-audit: ${{ needs.nuget-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- trivy-docker-scan: ${{ needs.trivy-docker-scan.result }}" >> $GITHUB_STEP_SUMMARY
