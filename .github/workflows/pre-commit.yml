name: Pre-commit

# Mirrors the local `pre-commit` hooks defined in .pre-commit-config.yaml.
# Even if a contributor (or AI agent) forgets `pre-commit install`, this
# workflow catches ruff/format/PUA drift at PR time — eliminating the
# "5 separate ruff format commits" cycle of shame seen in PR #401.
#
# Why a dedicated workflow (separate from python-lint.yml + pua-consistency.yml):
#   * Runs ALL hooks declared in .pre-commit-config.yaml at once, so adding
#     a new hook (e.g. shellcheck, codespell) requires editing only one
#     manifest — not the workflow + the manifest in lockstep.
#   * Failure messages match what local users see, so reproduction is trivial.
#   * Acts as a regression test for the .pre-commit-config.yaml itself
#     (e.g. ruff version drift between CI's `pip install ruff==X` and
#     pre-commit's `rev: vX`).

on:
  pull_request:
    branches: [ dev ]
    paths:
      - '.pre-commit-config.yaml'
      - '.github/workflows/pre-commit.yml'
      # Trigger on any source change so all hooks run; pre-commit itself
      # short-circuits hooks that are scoped via `files:` in the config.
      - '**/*.py'
      - '**/*.pyi'
      - '**/*.json'
      - '**/*.toml'
      - 'scripts/**'
  push:
    branches: [ dev ]
    paths:
      - '.pre-commit-config.yaml'
      - '.github/workflows/pre-commit.yml'
      - '**/*.py'
      - '**/*.pyi'
      - '**/*.json'
      - '**/*.toml'
      - 'scripts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit run --all-files
    runs-on: ubuntu-latest
    # Wave 3 で 14 hook (markdownlint / codespell / gitleaks / hadolint /
    # editorconfig-checker / validate-pyproject 等) 追加 + cargo clippy
    # workspace.lints opt-in で重くなり、10 分で timeout していた。
    # 25 分でも 14:59 → 15:24 = 25:15 で再 timeout (PR #401, run 25604145168)
    # したため 35 分に延長 + 専用 workflow のある hook を更に SKIP に追加。
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          # fetch-depth: 1 (HEAD only) — the base SHA needed for
          # `pre-commit run --from-ref` is fetched explicitly in the next
          # step. Avoids the full-history clone (saves ~10-20s on large
          # repos vs `fetch-depth: 0`).
          fetch-depth: 1

      - name: Fetch base SHA for diff
        # `git fetch --depth=1 <sha>` pulls just the base commit's tree
        # (no intermediate history). Sufficient for `git diff base..HEAD`
        # which is what `pre-commit run --from-ref` uses internally.
        # Skipped when BASE_SHA is empty (e.g. workflow_dispatch event).
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -n "${BASE_SHA:-}" ] && ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "${BASE_SHA}"
          fi

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          # Pin to the latest stable to avoid behavior drift between local
          # installs and this CI gate.
          pip install pre-commit==4.0.1

      - name: Install uv
        # Official astral-sh/setup-uv action — faster than `curl | sh`
        # (downloads pre-built binary from action's CDN, no shell exec).
        # `enable-cache: true` caches `~/.cache/uv` (package download
        # cache) keyed on `uv.lock` by default → restored on subsequent
        # runs so `uv sync` doesn't re-fetch wheels.
        #
        # Several sync-gate hooks (loanword-consistency, ort-version-sync, etc.)
        # invoke `uv run --no-sync python scripts/check_*.py` and need uv on
        # PATH (feedback_use_uv.md). setup-uv handles PATH automatically.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Cache uv venv
        # Cache `.venv/` so `uv sync --frozen` is near-no-op on warm cache.
        # Key on (uv.lock, pyproject.toml) → invalidates if either changes.
        # setup-uv's `~/.cache/uv` (pkg download cache) is separate; this
        # caches the materialised venv (resolved + linked packages).
        uses: actions/cache@v4.3.0
        with:
          path: .venv
          key: uv-venv-${{ runner.os }}-py3.11-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            uv-venv-${{ runner.os }}-py3.11-

      - name: Sync uv environment
        # Tier 1-B: pre-commit hooks use `uv run --no-sync python ...` to skip
        # env-validation overhead per hook (saves ~1-2s × 30+ hooks). This step
        # materialises `.venv/` once up-front so `--no-sync` doesn't hit a
        # missing-venv error. `--frozen` keeps uv.lock pinned. Near-no-op when
        # the `.venv/` cache above hits.
        run: uv sync --frozen

      - name: Cache pre-commit hook environments
        uses: actions/cache@v4.3.0
        with:
          path: ~/.cache/pre-commit
          # Wave 6-12.6: hashFiles に uv.lock を含める。
          # `uv run python scripts/check_*.py` を呼ぶ 10 件以上の sync-gate hook
          # は uv.lock の dep tree に依存するため、 uv.lock 更新時に古い uv venv
          # を流用すると script side で ImportError / version skew が発生する。
          # hashFiles に uv.lock を加えると uv.lock 更新 = cache key 変更 → fresh
          # build に切り替わる。 restore-keys は引き続き .pre-commit-config.yaml
          # 単独 hash で fallback (uv.lock のみ変わった時は uv install が走るが
          # pre-commit env 自体は再利用できる)。
          key: pre-commit-${{ runner.os }}-py3.11-${{ hashFiles('.pre-commit-config.yaml', 'uv.lock') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-py3.11-${{ hashFiles('.pre-commit-config.yaml') }}-
            pre-commit-${{ runner.os }}-py3.11-

      - name: Run hooks (changed files mode)
        env:
          # Skip heavy cross-language lint hooks (each gated by a dedicated
          # CI workflow with the right toolchain installed). Entries are
          # idempotent with .pre-commit-config.yaml `stages: [pre-push]`
          # markers (commit-stage filter already excludes those hooks).
          #   * cargo-clippy / cargo-fmt          → rust-tests.yml
          #   * gofmt / go-vet / golangci-lint    → go-ci.yml
          #   * dotnet-format                     → csharp-ci.yml + ci.yml
          #   * mypy-g2p                          → g2p-python-ci.yml
          #   * markdownlint-cli2                 → markdownlint.yml
          #   * codespell                         → codespell.yml
          #   * hadolint                          → hadolint.yml
          #   * editorconfig-checker              → full-repo scan has 17k
          #     latent drift; new drift caught locally via
          #     `pre-commit install --hook-type pre-push`.
          SKIP: cargo-clippy,cargo-fmt,gofmt,go-vet,golangci-lint,mypy-g2p,dotnet-format,markdownlint-cli2,codespell,hadolint,editorconfig-checker
        run: |
          # Tier 2-F: --from-ref/--to-ref runs hooks only on files changed
          # in this PR/push (~5x faster than --all-files for typical PRs
          # which touch <1% of repo). Latent drift in unchanged files is
          # NOT caught here — for full-repo check, run
          # `pre-commit run --all-files --hook-stage push` locally before
          # release tags. A periodic cron (weekly) could add a full-repo
          # gate as follow-up.
          # --show-diff-on-failure makes drift trivial to fix locally
          # (contributors see the exact patch the hooks produced).
          pre-commit run \
            --from-ref ${{ github.event.pull_request.base.sha || github.event.before }} \
            --to-ref HEAD \
            --show-diff-on-failure
