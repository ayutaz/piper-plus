# GitHub Pages configuration for repository settings
# This file documents the required GitHub Pages settings

# Required Repository Settings:
# 1. Go to Settings > Pages
# 2. Source: Deploy from GitHub Actions
# 3. No branch selection needed (using Actions)

# Environment Protection Rules (optional but recommended):
# 1. Go to Settings > Environments > github-pages
# 2. Add deployment protection rules:
#    - Required reviewers (optional)
#    - Deployment branches: Selected branches
#      - Add rule: dev
#      - Add rule: main
#    - Environment secrets (if needed)

# Custom Domain (optional):
# 1. In Settings > Pages > Custom domain
# 2. Add your custom domain
# 3. Enforce HTTPS

# Note: The actual deployment is handled by deploy-webassembly-demo.yml workflow