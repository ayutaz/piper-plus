name: Short-Text Contract Parity

# Cross-runtime short-text mitigation parity gate.
#
# 7 ランタイム (Python_run / Python_train / Rust / Go / C++ / C# / WASM-JS) は、
# Strategy A/B/C の閾値定数 (min_phoneme_ids=15, short_text_chars=10,
# silence_pad_ms=300, threshold_rms=0.01, etc.) で完全一致しなくてはならない。
# このジョブは Python canonical (voice.py + infer_onnx.py) と
# docs/spec/short-text-contract.toml の整合性を強制する。
#
# 他ランタイムの parity 検証 (Rust/Go/C# 等で contract toml を読み込む test)
# は per-runtime CI 側で導入する。ここはあくまで「contract と Python
# canonical の drift 検出」のための gate。

on:
  pull_request:
    branches: [ dev ]
    paths:
      - 'docs/spec/short-text-contract.toml'
      - 'src/python_run/piper/voice.py'
      - 'src/python/piper_train/infer_onnx.py'
      - 'scripts/check_short_text_contract.py'
      - '.github/workflows/short-text-parity.yml'
  push:
    branches: [ dev ]
    paths:
      - 'docs/spec/short-text-contract.toml'
      - 'src/python_run/piper/voice.py'
      - 'src/python/piper_train/infer_onnx.py'
      - 'scripts/check_short_text_contract.py'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  contract-drift-check:
    name: Short-text contract drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Verify contract matches Python canonical
        # tomllib is in stdlib (Python 3.11+); no third-party install needed.
        run: |
          python scripts/check_short_text_contract.py --verbose
