[pytest]
# -----------------------------------------------------------------------------
# piper-plus runtime: pytest configuration
# -----------------------------------------------------------------------------
# 主目的:
#   1. `asyncio_mode = auto` で FastAPI / async test を pytest-asyncio が自動扱い
#      (現状は同期テストのみだが、HTTP server 拡張時に async テストが書けるよう preempt)
#   2. coverage 閾値 70% を CI/local 両方で fail-fast
#   3. marker / filterwarnings を python_run 配下のテストにスコープ
#
# 注意:
#   - root pytest.ini を使う場合 (repo root から `pytest`) は root 設定が優先される
#   - `--override-ini="addopts="` で CI が bypass 可能
# -----------------------------------------------------------------------------

# Test discovery
python_files = test_*.py *_test.py
python_classes = Test* *Tests
python_functions = test_*

# Marker definitions (root pytest.ini と整合)
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may require external resources)
    slow: Slow running tests
    japanese: Japanese TTS specific tests
    inference: Inference related tests
    requires_openjtalk: Tests that require OpenJTalk
    requires_model: Tests that require a model file

# pytest-asyncio: FastAPI 等の async テスト向け auto mode
# 現状は async test がないため副作用なし。将来の async fixture/test を preempt。
asyncio_mode = auto

# Output / coverage
addopts =
    --strict-markers
    --tb=short
    -v
    --cov=piper
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=70

# Timeout
timeout = 300

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
