[pytest]
# Marker definitions
markers =
    unit: Unit tests that test isolated components
    integration: Integration tests that test multiple components together
    benchmark: Performance benchmark tests
    japanese: Tests specific to Japanese language processing
    requires_openjtalk: Tests that require OpenJTalk to be installed
    requires_model: Tests that require a model file to be present
    training: Tests related to model training (requires torch)
    inference: Tests related to model inference (PyTorch and ONNX)
    slow: Tests that take a long time to run

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output configuration
# `--cov-fail-under` は coverage ゲート (root pyproject.toml の
# `[tool.coverage.report] fail_under` と二重化)。
# CI の一部 job では `--override-ini="addopts="` で上書き可能。
addopts =
    --strict-markers
    --tb=short
    -v
    --cov=piper_train
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=70
    -n auto
    --dist=loadgroup

# Warnings to ignore
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
