run:
  timeout: 5m
  go: "1.26"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gosimple
    - gocritic
    - misspell
    - gofmt
    - goimports
  disable:
    - exhaustruct  # too strict for this project
    - wrapcheck    # error wrapping is handled case-by-case

linters-settings:
  gocritic:
    enabled-checks:
      - dupImport
      - ifElseChain
      - nestingReduce
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck  # test error checking is more relaxed
    - path: examples/
      linters:
        - errcheck
