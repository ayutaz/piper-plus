<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese TTS Simple Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
        }
        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:disabled {
            background: #ccc;
        }
        .status {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
        }
        .error { background: #fee; color: #c00; }
        .success { background: #efe; color: #080; }
        .info { background: #eef; color: #008; }
        pre {
            background: #f0f0f0;
            padding: 10px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Japanese TTS Simple Demo</h1>
        
        <div id="status" class="status info">初期化中...</div>
        
        <textarea id="textInput" rows="3" placeholder="日本語テキストを入力">
こんにちは世界！</textarea>
        
        <button id="synthesizeBtn" onclick="synthesize()" disabled>音声合成</button>
        
        <h3>音素変換結果:</h3>
        <pre id="phonemes">-</pre>
        
        <h3>デバッグ情報:</h3>
        <pre id="debug">-</pre>
    </div>

    <!-- Load ONNX Runtime from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.16.3/dist/ort.min.js"></script>
    
    <script type="module">
        let mecab, openjtalk, session;
        const debugLog = [];
        
        function log(message) {
            console.log(message);
            debugLog.push(new Date().toISOString() + ': ' + message);
            document.getElementById('debug').textContent = debugLog.join('\n');
        }
        
        function updateStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
        }
        
        window.synthesize = async function() {
            const text = document.getElementById('textInput').value.trim();
            if (!text) return;
            
            try {
                updateStatus('処理中...', 'info');
                
                // Step 1: MeCab
                log('MeCab processing...');
                const mecabOutput = mecab.parse(text);
                log('MeCab output: ' + mecabOutput.substring(0, 100) + '...');
                
                // Step 2: OpenJTalk
                log('OpenJTalk processing...');
                const phonemes = openjtalk.processText(mecabOutput);
                const puaPhonemes = openjtalk.processToPUA(mecabOutput);
                document.getElementById('phonemes').textContent = phonemes;
                log('Phonemes: ' + phonemes);
                
                // Step 3: Convert PUA to phoneme IDs
                const phonemeIds = puaToPhonemeIds(puaPhonemes);
                log('Phoneme IDs: ' + phonemeIds.join(', '));
                
                // Step 4: Run ONNX inference
                log('Running ONNX inference...');
                const startTime = performance.now();
                
                // Prepare tensors
                const feeds = {
                    'input': new ort.Tensor('int64', 
                        new BigInt64Array(phonemeIds.map(id => BigInt(id))), 
                        [1, phonemeIds.length]
                    ),
                    'input_lengths': new ort.Tensor('int64', 
                        new BigInt64Array([BigInt(phonemeIds.length)]), 
                        [1]
                    ),
                    'scales': new ort.Tensor('float32', 
                        new Float32Array([0.667, 1.0, 0.8]), 
                        [3]
                    )
                };
                
                const results = await session.run(feeds);
                const inferenceTime = performance.now() - startTime;
                log(`Inference completed in ${inferenceTime.toFixed(2)}ms`);
                
                // Get audio output
                const audioData = results.output || results.audio;
                if (audioData) {
                    const audio = new Float32Array(audioData.data);
                    log(`Audio generated: ${audio.length} samples`);
                    
                    // Play audio
                    playAudio(audio, 22050);
                    updateStatus('再生中...', 'success');
                } else {
                    throw new Error('No audio output from model');
                }
                
            } catch (error) {
                log('Error: ' + error.message);
                updateStatus('エラー: ' + error.message, 'error');
            }
        };
        
        function puaToPhonemeIds(puaString) {
            // Simple mapping - you'll need to adjust based on your model's phoneme_id_map
            const phonemeIds = [1]; // Start token
            
            for (const char of puaString) {
                const code = char.charCodeAt(0);
                if (code >= 0xE000 && code <= 0xE100) {
                    // Map PUA code to phoneme ID (simplified)
                    phonemeIds.push((code - 0xE000) % 58 + 1);
                } else if (char === ' ') {
                    phonemeIds.push(0); // Silence
                }
            }
            
            phonemeIds.push(2); // End token
            return phonemeIds;
        }
        
        function playAudio(audioData, sampleRate) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const buffer = audioContext.createBuffer(1, audioData.length, sampleRate);
            buffer.getChannelData(0).set(audioData);
            
            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            source.start();
            
            source.onended = () => {
                updateStatus('再生完了', 'success');
            };
        }
        
        // Initialize
        async function init() {
            try {
                log('Initializing...');
                
                // Load MeCab
                log('Loading MeCab...');
                const { MeCabWrapper } = await import('../../mecab/dist/mecab-wrapper.js');
                mecab = new MeCabWrapper();
                await mecab.initialize({
                    wasmPath: '../../mecab/dist/mecab_wasm.wasm',
                    dataPath: '../../mecab/dist/mecab_wasm.data'
                });
                log('MeCab loaded');
                
                // Load OpenJTalk
                log('Loading OpenJTalk...');
                const { OpenJTalkWrapper } = await import('../../openjtalk/dist/openjtalk-wrapper.js');
                openjtalk = new OpenJTalkWrapper();
                await openjtalk.initialize({
                    wasmPath: '../../openjtalk/dist/openjtalk_wasm.wasm'
                });
                log('OpenJTalk loaded');
                
                // Configure ONNX Runtime
                log('Configuring ONNX Runtime...');
                ort.env.wasm.simd = true;
                ort.env.wasm.numThreads = 1;
                ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.16.3/dist/';
                
                // Load model with minimal options
                log('Loading ONNX model...');
                session = await ort.InferenceSession.create('../models/ja_JP/ja_JP.onnx', {
                    executionProviders: ['wasm'],
                    graphOptimizationLevel: 'disabled'
                });
                log('Model loaded successfully');
                
                // Check model inputs/outputs
                log('Model inputs: ' + session.inputNames.join(', '));
                log('Model outputs: ' + session.outputNames.join(', '));
                
                document.getElementById('synthesizeBtn').disabled = false;
                updateStatus('準備完了', 'success');
                
            } catch (error) {
                log('Initialization error: ' + error.message);
                updateStatus('初期化エラー: ' + error.message, 'error');
                console.error(error);
            }
        }
        
        init();
    </script>
</body>
</html>
