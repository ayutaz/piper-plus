<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Debug Character Skipping</title>
</head>
<body>
    <h1>文字スキップ問題のデバッグ</h1>
    <div id="status">Loading...</div>
    <pre id="result"></pre>
    
    <script type="module">
        import { MeCabFull } from '../dist_full/mecab-full.js';
        
        async function debug() {
            const statusEl = document.getElementById('status');
            const resultEl = document.getElementById('result');
            
            try {
                const mecab = new MeCabFull();
                
                statusEl.textContent = 'Initializing...';
                await mecab.initialize({
                    basePath: '../dist_full/'
                });
                
                // Test cases where characters are skipped
                const testCases = [
                    '今日は良い天気です',  // "今日" -> "気"
                    '私は日本人です',      // "私" -> missing
                    '東京スカイツリー',    // "東" -> missing
                ];
                
                resultEl.textContent = 'Debugging character skipping:\n\n';
                
                for (const text of testCases) {
                    resultEl.textContent += `Input: "${text}"\n`;
                    resultEl.textContent += `Expected first chars: ${text.substring(0, 2)}\n`;
                    
                    const result = mecab.parse(text);
                    const lines = result.split('\n').filter(l => l && l !== 'EOS');
                    
                    if (lines.length > 0) {
                        const firstWord = lines[0].split('\t')[0];
                        resultEl.textContent += `Actual first word: "${firstWord}"\n`;
                        
                        // Check if characters are missing
                        if (!text.startsWith(firstWord)) {
                            const missingChars = [];
                            for (let i = 0; i < text.length; i++) {
                                if (text.substring(i).startsWith(firstWord)) {
                                    resultEl.textContent += `Missing characters: "${text.substring(0, i)}"\n`;
                                    break;
                                }
                            }
                        }
                    }
                    
                    resultEl.textContent += 'Full result:\n' + result + '\n';
                }
                
                statusEl.textContent = 'Debug completed. Check console for more details.';
                
            } catch (error) {
                console.error('Error:', error);
                statusEl.textContent = 'Error: ' + error.message;
            }
        }
        
        debug();
    </script>
</body>
</html>
