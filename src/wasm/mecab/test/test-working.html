<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeCab WebAssembly Working Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .status {
            padding: 10px 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .status.loading {
            background: #e3f2fd;
            color: #1976d2;
        }
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status.error {
            background: #ffebee;
            color: #c62828;
        }
        .status.warning {
            background: #fff3cd;
            color: #856404;
        }
        textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            resize: vertical;
        }
        button {
            background: #2196f3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            margin-right: 10px;
        }
        button:hover {
            background: #1976d2;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background: #e0e0e0;
            font-weight: bold;
        }
        tr:nth-child(even) {
            background: #f9f9f9;
        }
        .info-box {
            background: #e3f2fd;
            border: 1px solid #2196f3;
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
        }
        .demo-note {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 MeCab WebAssembly Working Demo</h1>
        
        <div id="status" class="status loading">
            MeCabを初期化中...
        </div>
        
        <div class="demo-note">
            <strong>注意:</strong> このデモは簡易辞書版です。完全なNAIST-JDIC辞書版は現在のビルドではFSエクスポートの問題により動作しません。
            基本的な形態素解析は可能ですが、精度はPyOpenJTalkには及びません。
        </div>
        
        <div>
            <h2>テキスト解析</h2>
            <textarea id="input" rows="5" placeholder="解析したい日本語テキストを入力してください">
今日は良い天気ですね。
桜が綺麗に咲いています。
私は昨日、友達と一緒に公園へ行きました。</textarea>
            <br>
            <button id="parseBtn" onclick="parseText()" disabled>解析</button>
            <button id="parseDetailBtn" onclick="parseDetailedText()" disabled>詳細解析</button>
            <button id="wakatiBtn" onclick="parseWakati()" disabled>分かち書き</button>
        </div>
        
        <div id="result"></div>
    </div>
    
    <div class="container" id="detailedResults" style="display: none;">
        <h2>詳細解析結果</h2>
        <table id="detailedTable">
            <thead>
                <tr>
                    <th>表層形</th>
                    <th>品詞</th>
                    <th>品詞細分類1</th>
                    <th>品詞細分類2</th>
                    <th>品詞細分類3</th>
                    <th>活用型</th>
                    <th>読み</th>
                    <th>発音</th>
                </tr>
            </thead>
            <tbody id="detailedTableBody">
            </tbody>
        </table>
    </div>
    
    <div class="container">
        <h2>統合パイプラインデモ</h2>
        <p>MeCab → OpenJTalk → 音素変換の完全なパイプラインをテストできます。</p>
        <button id="pipelineBtn" onclick="runPipeline()" disabled>パイプライン実行</button>
        <div id="pipelineResult"></div>
    </div>

    <script type="module">
        import { MeCabWrapper } from '../dist/mecab-wrapper.js';
        import { OpenJTalkWrapper } from '../../openjtalk/dist/openjtalk-wrapper.js';
        
        let mecab = null;
        let openjtalk = null;
        let isInitialized = false;
        
        async function initialize() {
            const statusEl = document.getElementById('status');
            
            try {
                console.log('Initializing MeCab (fallback mode)...');
                
                // Initialize MeCab with fallback
                mecab = new MeCabWrapper();
                await mecab.initialize({
                    wasmPath: '../dist/mecab_wasm.wasm',
                    dataPath: '../dist/mecab_wasm.data'
                });
                
                // Initialize OpenJTalk
                console.log('Initializing OpenJTalk...');
                openjtalk = new OpenJTalkWrapper();
                await openjtalk.initialize({
                    wasmPath: '../../openjtalk/dist/openjtalk_wasm.wasm'
                });
                
                statusEl.className = 'status success';
                statusEl.innerHTML = '✅ MeCab (簡易辞書版) + OpenJTalk 初期化完了';
                
                // Enable buttons
                document.getElementById('parseBtn').disabled = false;
                document.getElementById('parseDetailBtn').disabled = false;
                document.getElementById('wakatiBtn').disabled = false;
                document.getElementById('pipelineBtn').disabled = false;
                
                isInitialized = true;
                
                // Test parse
                console.log('Test parse:', mecab.parse('テスト'));
                
            } catch (error) {
                console.error('Initialization error:', error);
                statusEl.className = 'status error';
                statusEl.innerHTML = '❌ 初期化エラー: ' + error.message;
            }
        }
        
        window.parseText = function() {
            if (!isInitialized) return;
            
            const input = document.getElementById('input').value;
            const resultEl = document.getElementById('result');
            
            try {
                const result = mecab.parse(input);
                resultEl.innerHTML = '<h3>解析結果:</h3><div class="result">' + escapeHtml(result) + '</div>';
                document.getElementById('detailedResults').style.display = 'none';
            } catch (error) {
                resultEl.innerHTML = '<div class="status error">エラー: ' + error.message + '</div>';
            }
        };
        
        window.parseDetailedText = function() {
            if (!isInitialized) return;
            
            const input = document.getElementById('input').value;
            const resultEl = document.getElementById('result');
            
            try {
                const tokens = mecab.parseDetailed(input);
                
                // Update table
                const tbody = document.getElementById('detailedTableBody');
                tbody.innerHTML = '';
                
                tokens.forEach(token => {
                    const row = tbody.insertRow();
                    row.insertCell().textContent = token.surface;
                    row.insertCell().textContent = token.pos;
                    row.insertCell().textContent = token.pos1;
                    row.insertCell().textContent = token.pos2;
                    row.insertCell().textContent = token.pos3;
                    row.insertCell().textContent = token.inflection;
                    row.insertCell().textContent = token.reading;
                    row.insertCell().textContent = token.pronunciation;
                });
                
                document.getElementById('detailedResults').style.display = 'block';
                resultEl.innerHTML = '';
                
            } catch (error) {
                resultEl.innerHTML = '<div class="status error">エラー: ' + error.message + '</div>';
            }
        };
        
        window.parseWakati = function() {
            if (!isInitialized) return;
            
            const input = document.getElementById('input').value;
            const resultEl = document.getElementById('result');
            
            try {
                const result = mecab.wakati(input);
                resultEl.innerHTML = '<h3>分かち書き結果:</h3><div class="result">' + escapeHtml(result) + '</div>';
                document.getElementById('detailedResults').style.display = 'none';
            } catch (error) {
                resultEl.innerHTML = '<div class="status error">エラー: ' + error.message + '</div>';
            }
        };
        
        window.runPipeline = function() {
            if (!isInitialized) return;
            
            const input = document.getElementById('input').value;
            const resultEl = document.getElementById('pipelineResult');
            
            try {
                resultEl.innerHTML = '<div class="status loading">パイプライン実行中...</div>';
                
                // Step 1: MeCab analysis
                const mecabTokens = mecab.parseDetailed(input);
                const reading = mecabTokens.map(t => t.reading).join('');
                
                // Step 2: OpenJTalk phoneme conversion
                const phonemes = openjtalk.textToPhonemes(reading);
                
                // Step 3: Show results
                resultEl.innerHTML = `
                    <div class="info-box">
                        <h3>パイプライン実行結果</h3>
                        <p><strong>入力テキスト:</strong> ${escapeHtml(input)}</p>
                        <p><strong>MeCab解析（読み）:</strong> ${escapeHtml(reading)}</p>
                        <p><strong>OpenJTalk音素:</strong> ${escapeHtml(phonemes)}</p>
                        <p><strong>音素数:</strong> ${phonemes.length}文字</p>
                    </div>
                    <div class="status warning">
                        注: これは簡易辞書版のため、PyOpenJTalkと比較して精度が劣る場合があります。
                        完全な精度を実現するには、NAIST-JDIC辞書を含むビルドが必要です。
                    </div>
                `;
                
            } catch (error) {
                resultEl.innerHTML = '<div class="status error">エラー: ' + error.message + '</div>';
            }
        };
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initialize on load
        initialize();
    </script>
</body>
</html>
