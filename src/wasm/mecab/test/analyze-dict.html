<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Dictionary Analysis</title>
</head>
<body>
    <h1>Dictionary Format Analysis</h1>
    <pre id="output"></pre>
    
    <script>
        async function analyzeDictionary() {
            const output = document.getElementById('output');
            
            try {
                // Fetch dictionary file
                const response = await fetch('../dict/naist-jdic/sys.dic');
                const buffer = await response.arrayBuffer();
                const view = new DataView(buffer);
                
                output.textContent = 'Dictionary size: ' + buffer.byteLength + ' bytes\n\n';
                
                // Read header
                output.textContent += 'Header (first 108 bytes):\n';
                const magic = view.getUint32(0, true);
                const version = view.getUint32(4, true);
                const lexsize = view.getUint32(12, true);
                const lsize = view.getUint32(16, true);
                const rsize = view.getUint32(20, true);
                const dsize = view.getUint32(24, true);
                const tsize = view.getUint32(28, true);
                const fsize = view.getUint32(32, true);
                
                output.textContent += `Magic: 0x${magic.toString(16)}\n`;
                output.textContent += `Version: ${version}\n`;
                output.textContent += `Lexsize: ${lexsize} (0x${lexsize.toString(16)})\n`;
                output.textContent += `L/R size: ${lsize}/${rsize}\n`;
                output.textContent += `DARTS size: ${dsize} (0x${dsize.toString(16)})\n`;
                output.textContent += `Token size: ${tsize}\n`;
                output.textContent += `Feature size: ${fsize}\n\n`;
                
                // Check various offsets for DARTS
                output.textContent += 'Checking potential DARTS locations:\n';
                const offsets = [108, 1024, 1536, 1664, 2048];
                
                for (const offset of offsets) {
                    if (offset + 40 < buffer.byteLength) {
                        output.textContent += `\nOffset ${offset} (0x${offset.toString(16)}):\n`;
                        for (let i = 0; i < 10; i++) {
                            const val = view.getInt32(offset + i * 4, true);
                            output.textContent += `  [${i}] = ${val}\n`;
                        }
                    }
                }
                
                // Calculate expected offsets
                const headerSize = 108;
                const expectedDartsOffset = headerSize;
                const expectedTokenOffset = expectedDartsOffset + dsize;
                const expectedFeatureOffset = expectedTokenOffset + tsize;
                
                output.textContent += '\nExpected offsets:\n';
                output.textContent += `DARTS: ${expectedDartsOffset} (0x${expectedDartsOffset.toString(16)})\n`;
                output.textContent += `Tokens: ${expectedTokenOffset} (0x${expectedTokenOffset.toString(16)})\n`;
                output.textContent += `Features: ${expectedFeatureOffset} (0x${expectedFeatureOffset.toString(16)})\n`;
                
            } catch (error) {
                output.textContent = 'Error: ' + error.message;
            }
        }
        
        analyzeDictionary();
    </script>
</body>
</html>
