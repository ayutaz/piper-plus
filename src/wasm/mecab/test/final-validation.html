<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Final Validation Test</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .test-case { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .success { background: #d4edda; }
        .partial { background: #fff3cd; }
        .failure { background: #f8d7da; }
        pre { background: #f5f5f5; padding: 10px; }
        .important { font-weight: bold; color: #0056b3; }
    </style>
</head>
<body>
    <h1>最終検証テスト - PyOpenJTalk精度達成確認</h1>
    <div id="status">Loading...</div>
    <div id="summary"></div>
    <div id="results"></div>
    
    <script type="module">
        import { MeCabFull } from '../dist_full/mecab-full.js';
        
        async function finalValidation() {
            const statusEl = document.getElementById('status');
            const summaryEl = document.getElementById('summary');
            const resultsEl = document.getElementById('results');
            
            try {
                const mecab = new MeCabFull();
                
                statusEl.textContent = 'Initializing MeCab...';
                await mecab.initialize({
                    basePath: '../dist_full/'
                });
                
                // Critical test cases for PyOpenJTalk accuracy
                const criticalTests = [
                    {
                        name: '基本文の解析',
                        input: '今日は良い天気です',
                        expected: ['今日', 'は', '良い', '天気', 'です'],
                        critical: ['今日']  // Must detect at beginning
                    },
                    {
                        name: '代名詞と助詞',
                        input: '私は日本人です',
                        expected: ['私', 'は', '日本', '人', 'です'],
                        critical: ['私']  // Must detect at beginning
                    },
                    {
                        name: '固有名詞',
                        input: '東京スカイツリー',
                        expected: ['東京', 'スカイツリー'],
                        critical: ['東京']  // Must detect at beginning
                    },
                    {
                        name: '助詞の検出',
                        input: 'これはペンです',
                        expected: ['これ', 'は', 'ペン', 'です'],
                        critical: ['は']  // Must detect particle
                    }
                ];
                
                let allPassed = true;
                let criticalPassed = 0;
                let criticalTotal = 0;
                
                resultsEl.innerHTML = '<h2>検証結果</h2>';
                
                for (const test of criticalTests) {
                    const testDiv = document.createElement('div');
                    testDiv.className = 'test-case';
                    
                    const result = mecab.parse(test.input);
                    const lines = result.split('\n').filter(l => l && l !== 'EOS');
                    const words = lines.map(l => l.split('\t')[0]);
                    
                    // Check critical requirements
                    let testPassed = true;
                    let criticalOk = true;
                    
                    for (const critical of test.critical) {
                        criticalTotal++;
                        if (words.includes(critical)) {
                            criticalPassed++;
                        } else {
                            criticalOk = false;
                            testPassed = false;
                        }
                    }
                    
                    if (!testPassed) allPassed = false;
                    
                    testDiv.className += testPassed ? ' success' : (criticalOk ? ' partial' : ' failure');
                    
                    testDiv.innerHTML = `
                        <h3>${test.name}</h3>
                        <p>入力: <code>${test.input}</code></p>
                        <p>期待: ${test.expected.join(' / ')}</p>
                        <p>結果: <span class="important">${words.join(' / ')}</span></p>
                        <p>Critical要件: ${test.critical.map(c => 
                            words.includes(c) ? `✅ ${c}` : `❌ ${c}`
                        ).join(', ')}</p>
                        <details>
                            <summary>詳細</summary>
                            <pre>${result}</pre>
                        </details>
                    `;
                    
                    resultsEl.appendChild(testDiv);
                }
                
                // Summary
                const accuracy = ((criticalPassed / criticalTotal) * 100).toFixed(1);
                
                summaryEl.innerHTML = `
                    <h2>最終評価</h2>
                    <p class="important">Critical要件達成率: ${criticalPassed}/${criticalTotal} (${accuracy}%)</p>
                    <hr>
                    <h3>PyOpenJTalk同等精度の判定:</h3>
                    ${accuracy >= 90 ? 
                        '<p class="success" style="padding:10px">✅ PyOpenJTalk同等の精度を達成しました！</p>' :
                        accuracy >= 70 ?
                        '<p class="partial" style="padding:10px">⚠️ 部分的に達成。さらなる改善が必要です。</p>' :
                        '<p class="failure" style="padding:10px">❌ 精度不足。根本的な修正が必要です。</p>'
                    }
                    <h3>技術的詳細:</h3>
                    <ul>
                        <li>辞書検索: ${allPassed ? '正常動作' : '一部問題あり'}</li>
                        <li>文頭文字認識: ${criticalTests.every(t => t.critical.every(c => 
                            mecab.parse(t.input).includes(c))) ? '修正済み' : '要修正'}</li>
                        <li>Viterbiアルゴリズム: 正常動作</li>
                        <li>未知語処理: 正常動作</li>
                    </ul>
                `;
                
                statusEl.textContent = '検証完了';
                
            } catch (error) {
                statusEl.textContent = 'Error: ' + error.message;
                console.error(error);
            }
        }
        
        finalValidation();
    </script>
</body>
</html>
