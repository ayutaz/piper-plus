<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wasm_open_jtalk Reference Test</title>
    <style>
        body {
            font-family: monospace;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .section {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        .log {
            background: #f0f0f0;
            padding: 10px;
            height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 12px;
        }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
    </style>
</head>
<body>
    <h1>wasm_open_jtalk Reference Test</h1>
    <p>This tests the reference wasm_open_jtalk implementation from hrhr49</p>
    
    <div class="section">
        <h2>Test Reference Implementation</h2>
        <button onclick="testReference()">Test Reference</button>
        <div id="refResult"></div>
    </div>
    
    <div class="section">
        <h2>Debug Log</h2>
        <div id="debugLog" class="log"></div>
    </div>

    <script>
        function log(msg, type = 'info') {
            const logDiv = document.getElementById('debugLog');
            const timestamp = new Date().toISOString().split('T')[1].split('.')[0];
            const className = type;
            logDiv.innerHTML += `<span class="${className}">[${timestamp}] ${msg}</span>\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(`[${type}] ${msg}`);
        }
        
        async function testReference() {
            try {
                log('Loading reference wasm_open_jtalk module...', 'info');
                
                // Load the reference implementation
                const script = document.createElement('script');
                script.src = '../tools/wasm_open_jtalk/js/open_jtalk.js';
                
                await new Promise((resolve, reject) => {
                    script.onload = resolve;
                    script.onerror = reject;
                    document.head.appendChild(script);
                });
                
                log('Script loaded, initializing module...', 'info');
                
                // Initialize the module
                const Module = await OpenJTalk({
                    locateFile: (path) => {
                        log(`Locating file: ${path}`, 'info');
                        if (path.endsWith('.wasm')) {
                            return '../tools/wasm_open_jtalk/js/open_jtalk.wasm';
                        }
                        return path;
                    }
                });
                
                log('Module initialized', 'success');
                
                // Load dictionary
                log('Loading dictionary...', 'info');
                const dictResponse = await fetch('../tools/wasm_open_jtalk/etc/open_jtalk_dic_utf_8-1.11/');
                if (!dictResponse.ok) {
                    log('Loading individual dictionary files...', 'info');
                    
                    const dictFiles = [
                        'char.bin', 'matrix.bin', 'sys.dic', 'unk.dic',
                        'left-id.def', 'pos-id.def', 'rewrite.def', 'right-id.def'
                    ];
                    
                    Module.FS.mkdir('/dict');
                    
                    for (const file of dictFiles) {
                        const response = await fetch(`../tools/wasm_open_jtalk/etc/open_jtalk_dic_utf_8-1.11/${file}`);
                        const data = await response.arrayBuffer();
                        Module.FS.writeFile(`/dict/${file}`, new Uint8Array(data));
                        log(`Loaded ${file}: ${data.byteLength} bytes`, 'success');
                    }
                }
                
                // Load voice
                log('Loading voice...', 'info');
                const voiceResponse = await fetch('../tools/wasm_open_jtalk/etc/mei/mei_normal.htsvoice');
                const voiceData = await voiceResponse.arrayBuffer();
                Module.FS.writeFile('/mei_normal.htsvoice', new Uint8Array(voiceData));
                log(`Loaded voice: ${voiceData.byteLength} bytes`, 'success');
                
                // Test synthesis
                log('Testing synthesis...', 'info');
                const text = "こんにちは、世界！";
                
                // Call synthesis function
                const result = Module.ccall('synthesis', 'number', 
                    ['string', 'string', 'string'], 
                    [text, '/dict', '/mei_normal.htsvoice']);
                
                log(`Synthesis result: ${result}`, result === 0 ? 'success' : 'error');
                
                // Get labels
                const labelsPtr = Module._get_labels();
                if (labelsPtr) {
                    const labels = Module.UTF8ToString(labelsPtr);
                    log('Labels generated:', 'success');
                    log(labels.split('\n').slice(0, 5).join('\n'), 'info');
                }
                
                document.getElementById('refResult').innerHTML = '<span class="success">✓ Reference implementation works!</span>';
                
            } catch (error) {
                log(`Error: ${error.message}`, 'error');
                log(`Stack: ${error.stack}`, 'error');
                document.getElementById('refResult').innerHTML = '<span class="error">✗ Failed</span>';
            }
        }
    </script>
</body>
</html>
