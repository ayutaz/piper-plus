<!DOCTYPE html>
<html>
<head>
    <title>eSpeak-ng Debug</title>
    <meta charset="utf-8">
    <script type="text/javascript" src="../dist/espeak-ng/espeakng.min.js"></script>
</head>
<body>
    <h1>eSpeak-ng Debug</h1>
    <p>Detailed analysis of eSpeak-ng output</p>
    
    <div>
        <label>Text: <input type="text" id="text" value="Hello" size="40"></label>
        <button onclick="analyze()">Analyze</button>
    </div>
    
    <div>
        <h3>Analysis:</h3>
        <pre id="result" style="background: #f0f0f0; padding: 10px; font-family: monospace;"></pre>
    </div>
    
    <script>
        let tts;
        
        window.onload = function() {
            tts = new eSpeakNG('../dist/espeak-ng/espeakng.worker.js', function() {
                document.getElementById('result').textContent = 'eSpeak-ng ready!';
            });
        };
        
        function analyze() {
            const text = document.getElementById('text').value;
            let output = 'Analyzing: "' + text + '"\n\n';
            
            // First, check available methods
            output += 'Available methods:\n';
            for (let key in tts) {
                if (typeof tts[key] === 'function') {
                    output += '  - ' + key + '\n';
                }
            }
            output += '\n';
            
            // Set voice
            tts.set_voice.apply(tts, ['en']);
            
            let callCount = 0;
            let allSamples = [];
            let allEvents = [];
            
            tts.synthesize(text, function(samples, events) {
                callCount++;
                output += 'Callback #' + callCount + ':\n';
                
                // Analyze samples
                if (samples === undefined) {
                    output += '  samples: undefined (synthesis complete)\n';
                } else if (samples === null) {
                    output += '  samples: null\n';
                } else if (samples instanceof ArrayBuffer) {
                    output += '  samples: ArrayBuffer\n';
                    output += '    byteLength: ' + samples.byteLength + '\n';
                    
                    // Try different interpretations
                    const uint8 = new Uint8Array(samples);
                    const int16 = new Int16Array(samples);
                    const float32 = new Float32Array(samples);
                    
                    output += '    as Uint8Array length: ' + uint8.length + '\n';
                    output += '    as Int16Array length: ' + int16.length + '\n';
                    output += '    as Float32Array length: ' + float32.length + '\n';
                    
                    // Check first few values
                    output += '    First 10 as Uint8: ' + Array.from(uint8.slice(0, 10)).join(', ') + '\n';
                    output += '    First 10 as Int16: ' + Array.from(int16.slice(0, 10)).join(', ') + '\n';
                    output += '    First 10 as Float32: ' + Array.from(float32.slice(0, 10)).map(v => v.toFixed(4)).join(', ') + '\n';
                    
                    // Check data range
                    let minFloat = Infinity, maxFloat = -Infinity;
                    let minInt16 = 32767, maxInt16 = -32768;
                    for (let i = 0; i < Math.min(1000, float32.length); i++) {
                        minFloat = Math.min(minFloat, float32[i]);
                        maxFloat = Math.max(maxFloat, float32[i]);
                    }
                    for (let i = 0; i < Math.min(1000, int16.length); i++) {
                        minInt16 = Math.min(minInt16, int16[i]);
                        maxInt16 = Math.max(maxInt16, int16[i]);
                    }
                    output += '    Float32 range: [' + minFloat.toFixed(4) + ', ' + maxFloat.toFixed(4) + ']\n';
                    output += '    Int16 range: [' + minInt16 + ', ' + maxInt16 + ']\n';
                    
                    allSamples.push(samples);
                } else {
                    output += '  samples: ' + Object.prototype.toString.call(samples) + '\n';
                }
                
                // Analyze events
                if (events) {
                    output += '  events: ' + JSON.stringify(events, null, 2) + '\n';
                    allEvents.push(...events);
                } else {
                    output += '  events: ' + events + '\n';
                }
                
                output += '\n';
                document.getElementById('result').textContent = output;
                
                // Final analysis when done
                if (samples === undefined) {
                    output += '=== FINAL ANALYSIS ===\n';
                    output += 'Total callbacks: ' + callCount + '\n';
                    output += 'Total sample chunks: ' + allSamples.length + '\n';
                    
                    // Calculate total samples
                    let totalBytes = 0;
                    let totalFloat32Samples = 0;
                    let totalInt16Samples = 0;
                    
                    for (let chunk of allSamples) {
                        totalBytes += chunk.byteLength;
                        totalFloat32Samples += new Float32Array(chunk).length;
                        totalInt16Samples += new Int16Array(chunk).length;
                    }
                    
                    output += 'Total bytes: ' + totalBytes + '\n';
                    output += 'Total Float32 samples: ' + totalFloat32Samples + '\n';
                    output += 'Total Int16 samples: ' + totalInt16Samples + '\n';
                    output += 'Duration if Float32 @ 22050Hz: ' + (totalFloat32Samples / 22050).toFixed(3) + ' seconds\n';
                    output += 'Duration if Int16 @ 22050Hz: ' + (totalInt16Samples / 22050).toFixed(3) + ' seconds\n';
                    output += 'Duration if Float32 @ 44100Hz: ' + (totalFloat32Samples / 44100).toFixed(3) + ' seconds\n';
                    output += 'Duration if Int16 @ 44100Hz: ' + (totalInt16Samples / 44100).toFixed(3) + ' seconds\n';
                    
                    output += '\nAll events:\n' + JSON.stringify(allEvents, null, 2);
                    
                    document.getElementById('result').textContent = output;
                }
            });
        }
    </script>
</body>
</html>
