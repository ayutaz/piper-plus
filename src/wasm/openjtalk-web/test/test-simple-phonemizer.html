<!DOCTYPE html>
<html>
<head>
    <title>Simple Phonemizer Test</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-case {
            margin: 10px 0;
            padding: 10px;
            background: white;
            border-radius: 4px;
        }
        .pass {
            color: green;
        }
        .fail {
            color: red;
        }
        pre {
            background: #f0f0f0;
            padding: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Simple English Phonemizer Test</h1>
    <div id="results"></div>

    <script type="module">
        import { SimpleEnglishPhonemizer, createEnglishPhonemeMap } from '../src/simple_english_phonemizer.js';
        
        const results = document.getElementById('results');
        
        function addTestResult(name, pass, details) {
            const div = document.createElement('div');
            div.className = 'test-case';
            div.innerHTML = `
                <div class="${pass ? 'pass' : 'fail'}">
                    ${pass ? '✓' : '✗'} ${name}
                </div>
                ${details ? `<pre>${details}</pre>` : ''}
            `;
            results.appendChild(div);
        }
        
        async function runTests() {
            try {
                // Test 1: Create phonemizer
                const phonemizer = new SimpleEnglishPhonemizer();
                addTestResult('Create SimpleEnglishPhonemizer', true);
                
                // Test 2: Basic word phonemization
                const testWords = [
                    { text: 'hello', expected: ['h', 'ɛ', 'l', 'oʊ'] },
                    { text: 'world', expected: ['w', 'ɜː', 'l', 'd'] },
                    { text: 'the', expected: ['ð', 'ə'] }
                ];
                
                for (const test of testWords) {
                    const result = phonemizer.textToPhonemes(test.text);
                    const resultStr = result.join(' ');
                    const expectedStr = test.expected.join(' ');
                    const pass = resultStr.includes(expectedStr);
                    addTestResult(
                        `Phonemize "${test.text}"`,
                        pass,
                        `Result: ${resultStr}\nExpected: ${expectedStr}`
                    );
                }
                
                // Test 3: Sentence phonemization
                const sentence = 'Hello world';
                const sentenceResult = phonemizer.textToPhonemes(sentence);
                addTestResult(
                    'Phonemize sentence',
                    sentenceResult.length > 0,
                    `Input: "${sentence}"\nPhonemes: ${sentenceResult.join(' ')}`
                );
                
                // Test 4: Unknown word fallback
                const unknownWord = 'xyz';
                const unknownResult = phonemizer.textToPhonemes(unknownWord);
                addTestResult(
                    'Unknown word fallback',
                    unknownResult.length > 0,
                    `Input: "${unknownWord}"\nPhonemes: ${unknownResult.join(' ')}`
                );
                
                // Test 5: Phoneme ID map
                const phonemeMap = createEnglishPhonemeMap();
                const mapSize = Object.keys(phonemeMap).length;
                addTestResult(
                    'Create phoneme ID map',
                    mapSize > 40,
                    `Map contains ${mapSize} phonemes`
                );
                
                // Test 6: IPA conversion
                const ipaResult = phonemizer.phonemesToIPA(['h', 'ɛ', 'l', 'oʊ']);
                addTestResult(
                    'Phonemes to IPA',
                    ipaResult === 'hɛloʊ',
                    `Result: ${ipaResult}`
                );
                
            } catch (error) {
                addTestResult('Test suite error', false, error.message);
                console.error(error);
            }
        }
        
        runTests();
    </script>
</body>
</html>
