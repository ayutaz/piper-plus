<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenJTalk WebAssembly Simple Test</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        pre {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .error {
            color: red;
        }
        .success {
            color: green;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>OpenJTalk WebAssembly Simple Test</h1>
    
    <h2>Module Loading Test</h2>
    <button onclick="testModuleLoad()">Test Module Load</button>
    <pre id="moduleOutput"></pre>
    
    <h2>File System Test</h2>
    <button onclick="testFileSystem()">Test File System</button>
    <pre id="fsOutput"></pre>
    
    <h2>Dictionary Test</h2>
    <button onclick="testDictionary()">Test Dictionary</button>
    <pre id="dictOutput"></pre>
    
    <h2>Basic Conversion Test</h2>
    <input type="text" id="testText" value="こんにちは" style="width: 300px;">
    <button onclick="testConversion()">Test Conversion</button>
    <pre id="convOutput"></pre>

    <script type="module">
        window.moduleInstance = null;
        
        // Test module loading
        window.testModuleLoad = async function() {
            const output = document.getElementById('moduleOutput');
            output.textContent = 'Loading module...\n';
            
            try {
                // Try to load the module directly
                const response = await fetch('../dist/openjtalk.wasm');
                if (!response.ok) {
                    throw new Error(`WASM file not found: ${response.status}`);
                }
                
                output.textContent += `WASM file found: ${response.headers.get('content-length')} bytes\n`;
                
                // Try to load the JS module
                const jsResponse = await fetch('../dist/openjtalk.js');
                if (!jsResponse.ok) {
                    throw new Error(`JS file not found: ${jsResponse.status}`);
                }
                
                output.textContent += `JS file found: ${jsResponse.headers.get('content-length')} bytes\n`;
                
                // Try to actually load the module
                const OpenJTalkModule = (await import('../dist/openjtalk.js')).default;
                window.moduleInstance = await OpenJTalkModule({
                    locateFile: (path) => {
                        if (path.endsWith('.wasm')) {
                            return '../dist/openjtalk.wasm';
                        }
                        return path;
                    }
                });
                
                output.textContent += 'Module loaded successfully!\n';
                output.textContent += `Exported functions: ${Object.keys(window.moduleInstance).filter(k => k.startsWith('_')).join(', ')}\n`;
                output.className = 'success';
                
            } catch (error) {
                output.textContent += `Error: ${error.message}\n`;
                output.textContent += `\nMake sure to:\n`;
                output.textContent += `1. Run the build script first\n`;
                output.textContent += `2. Start the server from the demo directory\n`;
                output.className = 'error';
            }
        };
        
        // Test file system
        window.testFileSystem = function() {
            const output = document.getElementById('fsOutput');
            
            if (!window.moduleInstance) {
                output.textContent = 'Module not loaded. Run Module Load Test first.';
                output.className = 'error';
                return;
            }
            
            try {
                const FS = window.moduleInstance.FS;
                
                // Test creating directories
                output.textContent = 'Testing file system...\n';
                
                try {
                    FS.mkdir('/test');
                    output.textContent += '✓ Created /test directory\n';
                } catch (e) {
                    output.textContent += `✗ Failed to create /test: ${e.message}\n`;
                }
                
                // Write a test file
                FS.writeFile('/test/hello.txt', 'Hello WebAssembly!');
                output.textContent += '✓ Wrote test file\n';
                
                // Read it back
                const content = FS.readFile('/test/hello.txt', { encoding: 'utf8' });
                output.textContent += `✓ Read test file: "${content}"\n`;
                
                // List directory
                const files = FS.readdir('/');
                output.textContent += `✓ Root directory contents: ${files.join(', ')}\n`;
                
                output.className = 'success';
                
            } catch (error) {
                output.textContent += `Error: ${error.message}\n`;
                output.className = 'error';
            }
        };
        
        // Test dictionary
        window.testDictionary = function() {
            const output = document.getElementById('dictOutput');
            
            if (!window.moduleInstance) {
                output.textContent = 'Module not loaded. Run Module Load Test first.';
                output.className = 'error';
                return;
            }
            
            output.textContent = 'Dictionary test not implemented yet.\n';
            output.textContent += 'This will test loading dictionary files.\n';
        };
        
        // Test conversion
        window.testConversion = function() {
            const output = document.getElementById('convOutput');
            const text = document.getElementById('testText').value;
            
            if (!window.moduleInstance) {
                output.textContent = 'Module not loaded. Run Module Load Test first.';
                output.className = 'error';
                return;
            }
            
            try {
                output.textContent = `Testing conversion of: "${text}"\n`;
                
                // Check if functions are exported
                const funcs = ['_openjtalk_initialize', '_openjtalk_synthesis_labels', '_openjtalk_free_string'];
                for (const func of funcs) {
                    if (window.moduleInstance[func]) {
                        output.textContent += `✓ Found ${func}\n`;
                    } else {
                        output.textContent += `✗ Missing ${func}\n`;
                    }
                }
                
                // Try to call initialize (will fail without dictionary)
                const initResult = window.moduleInstance.ccall(
                    'openjtalk_initialize',
                    'number',
                    ['string', 'string'],
                    ['/dict', '/voice/test.htsvoice']
                );
                
                output.textContent += `Initialize result: ${initResult}\n`;
                
                if (initResult !== 0) {
                    output.textContent += 'Expected: initialization will fail without dictionary/voice files\n';
                }
                
            } catch (error) {
                output.textContent += `Error: ${error.message}\n`;
                output.className = 'error';
            }
        };
    </script>
</body>
</html>
