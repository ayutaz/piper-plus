<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenJTalk WebAssembly Debug Test (Fixed)</title>
    <style>
        body {
            font-family: monospace;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .section {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        .log {
            background: #f0f0f0;
            padding: 10px;
            height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 12px;
        }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        .warning { color: orange; }
    </style>
</head>
<body>
    <h1>OpenJTalk WebAssembly Debug Test (Fixed)</h1>
    
    <div class="section">
        <h2>Step 1: Load WASM Module</h2>
        <button onclick="loadModule()">Load Module</button>
        <button onclick="resetModule()" style="background-color: #ff6666; color: white;">Reset All</button>
        <div id="moduleStatus"></div>
    </div>
    
    <div class="section">
        <h2>Step 2: Check File System</h2>
        <button onclick="checkFS()" disabled id="checkFSBtn">Check FS</button>
        <div id="fsStatus"></div>
    </div>
    
    <div class="section">
        <h2>Step 3: Load Dictionary</h2>
        <button onclick="loadDict()" disabled id="loadDictBtn">Load Dictionary</button>
        <div id="dictStatus"></div>
    </div>
    
    <div class="section">
        <h2>Step 4: Load Voice</h2>
        <button onclick="loadVoice()" disabled id="loadVoiceBtn">Load Voice</button>
        <div id="voiceStatus"></div>
    </div>
    
    <div class="section">
        <h2>Step 5: Initialize OpenJTalk</h2>
        <button onclick="initOpenJTalk()" disabled id="initBtn">Initialize</button>
        <div id="initStatus"></div>
    </div>
    
    <div class="section">
        <h2>Step 6: Test Conversion</h2>
        <input type="text" id="testText" value="こんにちは" style="width: 300px;">
        <button onclick="testConvert()" disabled id="testBtn">Convert</button>
        <div id="testResult"></div>
    </div>
    
    <div class="section">
        <h2>Debug Log</h2>
        <button onclick="clearLog()">Clear Log</button>
        <div id="debugLog" class="log"></div>
    </div>

    <script type="module">
        // Store Module in window to prevent re-import issues
        window.OpenJTalkModule = null;
        window.Module = null;
        window.moduleLoaded = false;
        
        function log(msg, type = 'info') {
            const logDiv = document.getElementById('debugLog');
            const timestamp = new Date().toISOString().split('T')[1].split('.')[0];
            const className = type;
            logDiv.innerHTML += `<span class="${className}">[${timestamp}] ${msg}</span>\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(`[${type}] ${msg}`);
        }
        
        window.resetModule = function() {
            log('Resetting module...', 'warning');
            
            // Clear Module
            if (window.Module && window.Module._openjtalk_clear) {
                try {
                    window.Module._openjtalk_clear();
                } catch (e) {
                    log(`Error clearing OpenJTalk: ${e.message}`, 'error');
                }
            }
            
            window.Module = null;
            window.OpenJTalkModule = null;
            window.moduleLoaded = false;
            
            // Reset UI
            document.getElementById('moduleStatus').innerHTML = '';
            document.getElementById('fsStatus').innerHTML = '';
            document.getElementById('dictStatus').innerHTML = '';
            document.getElementById('voiceStatus').innerHTML = '';
            document.getElementById('initStatus').innerHTML = '';
            document.getElementById('testResult').innerHTML = '';
            
            // Reset buttons
            document.getElementById('checkFSBtn').disabled = true;
            document.getElementById('loadDictBtn').disabled = true;
            document.getElementById('loadVoiceBtn').disabled = true;
            document.getElementById('initBtn').disabled = true;
            document.getElementById('testBtn').disabled = true;
            
            log('Module reset complete', 'success');
        };
        
        window.clearLog = function() {
            document.getElementById('debugLog').innerHTML = '';
        };
        
        window.loadModule = async function() {
            try {
                if (window.moduleLoaded) {
                    log('Module already loaded, resetting first...', 'warning');
                    resetModule();
                }
                
                log('Loading WebAssembly module...', 'info');
                document.getElementById('moduleStatus').innerHTML = 'Loading...';
                
                // Dynamic import only if not already imported
                if (!window.OpenJTalkModule) {
                    const moduleImport = await import('../dist/openjtalk.js');
                    window.OpenJTalkModule = moduleImport.default;
                }
                
                window.Module = await window.OpenJTalkModule({
                    locateFile: (path) => {
                        log(`Locating file: ${path}`, 'info');
                        if (path.endsWith('.wasm')) {
                            return '../dist/openjtalk.wasm';
                        }
                        return path;
                    },
                    print: (text) => log(`[WASM] ${text}`, 'info'),
                    printErr: (text) => log(`[WASM ERROR] ${text}`, 'error')
                });
                
                window.moduleLoaded = true;
                log('Module loaded successfully', 'success');
                document.getElementById('moduleStatus').innerHTML = '<span class="success">✓ Loaded</span>';
                
                // Check functions
                const functions = ['_openjtalk_initialize', '_openjtalk_synthesis_labels', '_get_version'];
                log('Checking exported functions:', 'info');
                for (const func of functions) {
                    const exists = func in window.Module;
                    log(`  ${func}: ${exists ? '✓' : '✗'}`, exists ? 'success' : 'error');
                }
                
                // Check FS
                if (window.Module.FS) {
                    log('  FS module: ✓', 'success');
                } else {
                    log('  FS module: ✗', 'error');
                }
                
                // Get version
                if (window.Module._get_version) {
                    const versionPtr = window.Module._get_version();
                    const version = window.Module.UTF8ToString(versionPtr);
                    log(`Version: ${version}`, 'info');
                }
                
                document.getElementById('checkFSBtn').disabled = false;
                
            } catch (error) {
                log(`Error loading module: ${error.message}`, 'error');
                log(`Stack: ${error.stack}`, 'error');
                document.getElementById('moduleStatus').innerHTML = '<span class="error">✗ Failed</span>';
            }
        };
        
        window.checkFS = function() {
            try {
                if (!window.Module || !window.Module.FS) {
                    throw new Error('Module or FS not available');
                }
                
                log('Checking file system...', 'info');
                const FS = window.Module.FS;
                
                // List root directory
                const rootFiles = FS.readdir('/');
                log(`Root directory: ${rootFiles.join(', ')}`, 'info');
                
                // Try to create directories
                try {
                    FS.mkdir('/dict');
                    log('Created /dict directory', 'success');
                } catch (e) {
                    log('/dict directory already exists or error: ' + e.message, 'info');
                }
                
                try {
                    FS.mkdir('/voice');
                    log('Created /voice directory', 'success');
                } catch (e) {
                    log('/voice directory already exists or error: ' + e.message, 'info');
                }
                
                document.getElementById('fsStatus').innerHTML = '<span class="success">✓ Ready</span>';
                document.getElementById('loadDictBtn').disabled = false;
                
            } catch (error) {
                log(`FS Error: ${error.message}`, 'error');
                document.getElementById('fsStatus').innerHTML = '<span class="error">✗ Failed</span>';
            }
        };
        
        window.loadDict = async function() {
            try {
                if (!window.Module || !window.Module.FS) {
                    throw new Error('Module or FS not available');
                }
                
                log('Loading dictionary files...', 'info');
                document.getElementById('dictStatus').innerHTML = 'Loading...';
                
                const dictFiles = [
                    'char.bin', 'matrix.bin', 'sys.dic', 'unk.dic',
                    'left-id.def', 'pos-id.def', 'rewrite.def', 'right-id.def'
                ];
                
                for (const file of dictFiles) {
                    log(`Loading ${file}...`, 'info');
                    
                    const response = await fetch(`../assets/dict/${file}`);
                    if (!response.ok) {
                        throw new Error(`Failed to load ${file}: ${response.status}`);
                    }
                    
                    const data = await response.arrayBuffer();
                    const uint8Array = new Uint8Array(data);
                    
                    window.Module.FS.writeFile(`/dict/${file}`, uint8Array);
                    log(`  Loaded ${file}: ${data.byteLength} bytes`, 'success');
                }
                
                // Verify files
                const loadedFiles = window.Module.FS.readdir('/dict');
                log(`Dictionary files in /dict: ${loadedFiles.join(', ')}`, 'info');
                
                document.getElementById('dictStatus').innerHTML = '<span class="success">✓ Loaded</span>';
                document.getElementById('loadVoiceBtn').disabled = false;
                
            } catch (error) {
                log(`Dictionary Error: ${error.message}`, 'error');
                document.getElementById('dictStatus').innerHTML = '<span class="error">✗ Failed</span>';
            }
        };
        
        window.loadVoice = async function() {
            try {
                if (!window.Module || !window.Module.FS) {
                    throw new Error('Module or FS not available');
                }
                
                log('Loading voice file...', 'info');
                document.getElementById('voiceStatus').innerHTML = 'Loading...';
                
                const response = await fetch('../assets/voice/mei_normal.htsvoice');
                if (!response.ok) {
                    throw new Error(`Failed to load voice: ${response.status}`);
                }
                
                const data = await response.arrayBuffer();
                const uint8Array = new Uint8Array(data);
                
                window.Module.FS.writeFile('/voice/mei_normal.htsvoice', uint8Array);
                log(`Loaded voice file: ${data.byteLength} bytes`, 'success');
                
                // Verify
                const voiceFiles = window.Module.FS.readdir('/voice');
                log(`Voice files in /voice: ${voiceFiles.join(', ')}`, 'info');
                
                document.getElementById('voiceStatus').innerHTML = '<span class="success">✓ Loaded</span>';
                document.getElementById('initBtn').disabled = false;
                
            } catch (error) {
                log(`Voice Error: ${error.message}`, 'error');
                document.getElementById('voiceStatus').innerHTML = '<span class="error">✗ Failed</span>';
            }
        };
        
        window.initOpenJTalk = function() {
            try {
                if (!window.Module) {
                    throw new Error('Module not available');
                }
                
                log('Initializing OpenJTalk...', 'info');
                document.getElementById('initStatus').innerHTML = 'Initializing...';
                
                // Debug: Check if functions exist
                if (!window.Module._openjtalk_initialize) {
                    throw new Error('_openjtalk_initialize function not found');
                }
                
                // Allocate strings
                const dictPtr = window.Module.allocateUTF8('/dict');
                const voicePtr = window.Module.allocateUTF8('/voice/mei_normal.htsvoice');
                
                log(`Dictionary path pointer: ${dictPtr}`, 'info');
                log(`Voice path pointer: ${voicePtr}`, 'info');
                
                // Call initialize
                log('Calling _openjtalk_initialize...', 'info');
                const result = window.Module._openjtalk_initialize(dictPtr, voicePtr);
                
                // Free memory
                window.Module._free(dictPtr);
                window.Module._free(voicePtr);
                
                log(`Initialize result: ${result}`, result === 0 ? 'success' : 'error');
                
                if (result === 0) {
                    document.getElementById('initStatus').innerHTML = '<span class="success">✓ Initialized</span>';
                    document.getElementById('testBtn').disabled = false;
                } else {
                    throw new Error(`Initialize failed with code: ${result}`);
                }
                
            } catch (error) {
                log(`Init Error: ${error.message}`, 'error');
                log(`Stack: ${error.stack}`, 'error');
                document.getElementById('initStatus').innerHTML = '<span class="error">✗ Failed</span>';
            }
        };
        
        window.testConvert = function() {
            try {
                if (!window.Module) {
                    throw new Error('Module not available');
                }
                
                const text = document.getElementById('testText').value;
                log(`Converting text: "${text}"`, 'info');
                
                const textPtr = window.Module.allocateUTF8(text);
                const labelsPtr = window.Module._openjtalk_synthesis_labels(textPtr);
                const labels = window.Module.UTF8ToString(labelsPtr);
                
                window.Module._openjtalk_free_string(labelsPtr);
                window.Module._free(textPtr);
                
                // Extract phonemes
                const lines = labels.split('\n').filter(line => line.trim());
                const phonemes = [];
                
                for (const line of lines) {
                    const match = line.match(/\-([^+]+)\+/);
                    if (match && match[1] !== 'sil') {
                        phonemes.push(match[1]);
                    }
                }
                
                log(`Phonemes: ${phonemes.join(' ')}`, 'success');
                log(`Full labels (first 3 lines):`, 'info');
                lines.slice(0, 3).forEach(line => log(`  ${line}`, 'info'));
                
                document.getElementById('testResult').innerHTML = 
                    `<span class="success">✓ Success: ${phonemes.join(' ')}</span>`;
                
            } catch (error) {
                log(`Convert Error: ${error.message}`, 'error');
                document.getElementById('testResult').innerHTML = '<span class="error">✗ Failed</span>';
            }
        };
    </script>
</body>
</html>
