<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>音声長さ比較テスト</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .test-box {
            border: 1px solid #ccc;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #45a049;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .audio-info {
            background: #e3f2fd;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>音声長さ比較テスト</h1>
    
    <div class="test-box">
        <h2>短いテキスト: こんにちは、世界！</h2>
        <button onclick="testShortText()">生成テスト</button>
        <div id="shortResult"></div>
        <audio id="shortAudio" controls style="display: none;"></audio>
    </div>
    
    <div class="test-box">
        <h2>長いテキスト: こんにちは、OpenJTalkとPiperを使った音声合成のデモです。</h2>
        <button onclick="testLongText()">生成テスト</button>
        <div id="longResult"></div>
        <audio id="longAudio" controls style="display: none;"></audio>
    </div>
    
    <div class="test-box">
        <h2>長さスケール調整テスト</h2>
        <label>Length Scale: <input type="number" id="lengthScale" value="1.0" step="0.1" min="0.1" max="3.0"></label>
        <button onclick="testWithScale()">調整テスト (短いテキスト)</button>
        <div id="scaleResult"></div>
        <audio id="scaleAudio" controls style="display: none;"></audio>
    </div>

    <script type="module">
        import { SimpleUnifiedPhonemizer } from '../src/simple_unified_api.js';
        
        let phonemizer = null;
        let onnxSession = null;
        let modelConfig = null;
        
        async function init() {
            phonemizer = new SimpleUnifiedPhonemizer();
            await phonemizer.initialize({
                openjtalk: {
                    jsPath: '../dist/openjtalk.js',
                    wasmPath: '../dist/openjtalk.wasm',
                    dictPath: '../assets/dict',
                    voicePath: '../assets/voice/mei_normal.htsvoice'
                }
            });
            
            // Load ONNX Runtime
            await loadScript('https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.min.js');
            
            // Load model
            const configResponse = await fetch('../models/multilingual-test-medium.onnx.json');
            modelConfig = await configResponse.json();
            
            onnxSession = await ort.InferenceSession.create('../models/multilingual-test-medium.onnx', {
                executionProviders: ['wasm'],
                graphOptimizationLevel: 'extended',
                enableMemPattern: true
            });
            
            console.log('Initialized');
        }
        
        window.testShortText = async function() {
            await testText('こんにちは、世界！', 'shortResult', 'shortAudio', 1.0);
        }
        
        window.testLongText = async function() {
            await testText('こんにちは、OpenJTalkとPiperを使った音声合成のデモです。', 'longResult', 'longAudio', 1.0);
        }
        
        window.testWithScale = async function() {
            const scale = parseFloat(document.getElementById('lengthScale').value);
            await testText('こんにちは、世界！', 'scaleResult', 'scaleAudio', scale);
        }
        
        async function testText(text, resultId, audioId, lengthScale) {
            const resultDiv = document.getElementById(resultId);
            const audioEl = document.getElementById(audioId);
            
            try {
                // Get phonemes
                const labels = await phonemizer.textToPhonemes(text, 'ja');
                const phonemes = phonemizer.extractPhonemes(labels, 'ja');
                
                // Convert to IDs
                const ids = [];
                const phonemeIdMap = modelConfig.phoneme_id_map;
                
                for (const phoneme of phonemes) {
                    if (phonemeIdMap[phoneme]) {
                        ids.push(...phonemeIdMap[phoneme]);
                    } else {
                        // Use padding token as fallback
                        ids.push(...(phonemeIdMap['_'] || [0]));
                    }
                }
                
                // Synthesize
                const inputTensor = new ort.Tensor('int64', 
                    new BigInt64Array(ids.map(id => BigInt(id))), 
                    [1, ids.length]
                );
                
                const lengthTensor = new ort.Tensor('int64', 
                    new BigInt64Array([BigInt(ids.length)]), 
                    [1]
                );
                
                const scalesTensor = new ort.Tensor('float32', 
                    new Float32Array([
                        modelConfig.inference.noise_scale || 0.667,
                        lengthScale,
                        modelConfig.inference.noise_w || 0.8
                    ]), 
                    [3]
                );
                
                const feeds = {
                    'input': inputTensor,
                    'input_lengths': lengthTensor,
                    'scales': scalesTensor
                };
                
                console.log(`Generating with length_scale: ${lengthScale}`);
                const startTime = performance.now();
                const results = await onnxSession.run(feeds);
                const inferenceTime = performance.now() - startTime;
                
                const audioTensor = results['output'] || results[Object.keys(results)[0]];
                const audioData = new Float32Array(audioTensor.data);
                
                // Create WAV
                const wavBlob = createWAV(audioData, modelConfig.audio.sample_rate);
                const audioUrl = URL.createObjectURL(wavBlob);
                audioEl.src = audioUrl;
                audioEl.style.display = 'block';
                
                // Display info
                resultDiv.innerHTML = `
                    <div class="audio-info">
                        <strong>テキスト:</strong> ${text}<br>
                        <strong>音素数:</strong> ${phonemes.length}<br>
                        <strong>音素:</strong> ${phonemes.join(' ')}<br>
                        <strong>ID数:</strong> ${ids.length}<br>
                        <strong>音声サンプル数:</strong> ${audioData.length}<br>
                        <strong>音声長さ:</strong> ${(audioData.length / modelConfig.audio.sample_rate).toFixed(2)}秒<br>
                        <strong>推論時間:</strong> ${inferenceTime.toFixed(0)}ms<br>
                        <strong>Length Scale:</strong> ${lengthScale}
                    </div>
                `;
                
            } catch (error) {
                resultDiv.innerHTML = `<div style="color: red;">エラー: ${error.message}</div>`;
                console.error(error);
            }
        }
        
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }
        
        function createWAV(audioData, sampleRate) {
            const length = audioData.length;
            const arrayBuffer = new ArrayBuffer(44 + length * 2);
            const view = new DataView(arrayBuffer);
            
            // WAV header
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };
            
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, length * 2, true);
            
            // Convert float to int16
            const offset = 44;
            for (let i = 0; i < length; i++) {
                const val = Math.max(-1, Math.min(1, audioData[i]));
                const int16 = val < 0 ? val * 0x8000 : val * 0x7FFF;
                view.setInt16(offset + i * 2, int16, true);
            }
            
            return new Blob([arrayBuffer], { type: 'audio/wav' });
        }
        
        init();
    </script>
</body>
</html>
