<!DOCTYPE html>
<html>
<head>
    <title>eSpeak-ng Sample Rate Detection</title>
    <meta charset="utf-8">
    <script type="text/javascript" src="../dist/espeak-ng/espeakng.min.js"></script>
</head>
<body>
    <h1>eSpeak-ng Sample Rate Detection</h1>
    
    <div>
        <button onclick="detectSampleRate()">Detect Sample Rate</button>
    </div>
    
    <div>
        <h3>Result:</h3>
        <pre id="result"></pre>
    </div>
    
    <script>
        let tts;
        
        window.onload = function() {
            tts = new eSpeakNG('../dist/espeak-ng/espeakng.worker.js', function() {
                document.getElementById('result').textContent = 'eSpeak-ng ready!\n';
            });
        };
        
        function detectSampleRate() {
            const result = document.getElementById('result');
            result.textContent = 'Detecting sample rate...\n';
            
            // Check if there's a method to get sample rate
            if (tts.get_samplerate) {
                result.textContent += 'Found get_samplerate method\n';
                const rate = tts.get_samplerate();
                result.textContent += 'Sample rate: ' + rate + '\n';
            }
            
            // Try to get sample rate from synthesis
            tts.set_voice.apply(tts, ['en']);
            
            let detectedRate = null;
            tts.synthesize('test', function(samples, events) {
                if (events && events.length > 0) {
                    for (const event of events) {
                        if (event.type === 'samplerate') {
                            // The samplerate event might contain the rate
                            result.textContent += '\nFound samplerate event: ' + JSON.stringify(event) + '\n';
                            
                            // Check if audio_position might be the sample rate
                            if (event.audio_position === 0 && event.text_position === 0) {
                                // Maybe check word_length?
                                result.textContent += 'Checking word_length as possible rate: ' + event.word_length + '\n';
                            }
                        }
                    }
                }
                
                if (samples === undefined && !detectedRate) {
                    // Synthesis complete
                    result.textContent += '\nNo explicit sample rate found in events.\n';
                    result.textContent += 'Based on audio duration analysis:\n';
                    result.textContent += '- If "Hello world" sounds correct: 44100 Hz\n';
                    result.textContent += '- If "Hello world" sounds slow: data is 44100 Hz but playing at 22050 Hz\n';
                    result.textContent += '\nRECOMMENDATION: Use 44100 Hz for playback\n';
                }
            });
        }
    </script>
</body>
</html>
