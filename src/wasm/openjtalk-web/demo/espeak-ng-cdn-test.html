<!DOCTYPE html>
<html>
<head>
    <title>eSpeak-ng CDN Test</title>
    <meta charset="utf-8">
    <script type="text/javascript" src="../dist/espeak-ng/espeakng.min.js"></script>
</head>
<body>
    <h1>eSpeak-ng from CDN Test</h1>
    <p>This uses the pre-built eSpeak-ng from CDN</p>
    
    <div>
        <label>Text: <input type="text" id="text" value="Hello world" size="40"></label>
        <label>Voice: 
            <select id="voice">
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
            </select>
        </label>
        <button onclick="speak()">Speak</button>
        <button onclick="getVoices()">List Voices</button>
    </div>
    
    <div>
        <h3>Result:</h3>
        <pre id="result"></pre>
    </div>
    
    <script>
        let tts;
        
        // Initialize eSpeak-ng
        window.onload = function() {
            tts = new eSpeakNG('../dist/espeak-ng/espeakng.worker.js', function() {
                document.getElementById('result').textContent = 'eSpeak-ng ready!';
            });
        };
        
        let audioContext;
        let allSamples = [];
        let isPlaying = false;
        
        function speak() {
            const text = document.getElementById('text').value;
            const voice = document.getElementById('voice').value;
            
            console.log('Speaking:', text, 'with voice:', voice);
            
            // Reset samples
            allSamples = [];
            isPlaying = false;
            
            // Initialize audio context if needed
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                console.log('AudioContext sample rate:', audioContext.sampleRate);
            }
            
            tts.set_voice.apply(tts, [voice]);
            tts.synthesize(text, function(samples, events) {
                console.log('Synthesis callback received');
                console.log('Samples:', samples);
                console.log('Events:', events);
                
                // Handle samples
                if (samples) {
                    // Convert ArrayBuffer to Float32Array if needed
                    let audioData;
                    if (samples instanceof ArrayBuffer) {
                        // eSpeak-ng actually returns Float32 data at 44100Hz
                        audioData = new Float32Array(samples);
                        console.log('Converted ArrayBuffer to Float32Array, length:', audioData.length);
                    } else if (samples instanceof Float32Array) {
                        audioData = samples;
                    } else {
                        console.error('Unknown sample format:', Object.prototype.toString.call(samples));
                        return;
                    }
                    
                    // Accumulate samples
                    if (audioData.length > 0) {
                        allSamples.push(audioData);
                    }
                } else {
                    // No more samples - synthesis complete
                    console.log('Synthesis complete, total chunks:', allSamples.length);
                    
                    if (allSamples.length === 0) {
                        document.getElementById('result').textContent = 
                            'Error: No audio samples received';
                        return;
                    }
                    
                    // Combine all samples
                    let totalLength = 0;
                    for (const chunk of allSamples) {
                        totalLength += chunk.length;
                    }
                    
                    const combinedSamples = new Float32Array(totalLength);
                    let offset = 0;
                    for (const chunk of allSamples) {
                        combinedSamples.set(chunk, offset);
                        offset += chunk.length;
                    }
                    
                    console.log('Combined samples length:', combinedSamples.length);
                    
                    // Normalize audio samples
                    let maxValue = 0;
                    for (let i = 0; i < combinedSamples.length; i++) {
                        maxValue = Math.max(maxValue, Math.abs(combinedSamples[i]));
                    }
                    console.log('Max sample value:', maxValue);
                    
                    // If samples are too quiet, normalize them
                    if (maxValue < 0.5 && maxValue > 0) {
                        const scale = 0.8 / maxValue;
                        for (let i = 0; i < combinedSamples.length; i++) {
                            combinedSamples[i] *= scale;
                        }
                        console.log('Normalized audio with scale:', scale);
                    }
                    
                    // Play audio
                    try {
                        // eSpeak-ng uses 44100Hz sample rate, not 22050Hz!
                        const espeakSampleRate = 44100;
                        
                        // Create buffer with the correct sample rate
                        const buffer = audioContext.createBuffer(1, combinedSamples.length, espeakSampleRate);
                        buffer.getChannelData(0).set(combinedSamples);
                        
                        const source = audioContext.createBufferSource();
                        source.buffer = buffer;
                        source.connect(audioContext.destination);
                        source.start();
                        
                        // Show results with event details
                        let eventTypes = {};
                        for (const chunk of allSamples) {
                            if (chunk.events) {
                                for (const event of chunk.events) {
                                    eventTypes[event.type] = (eventTypes[event.type] || 0) + 1;
                                }
                            }
                        }
                        
                        document.getElementById('result').textContent = 
                            'Playing audio:\n' +
                            'Samples: ' + combinedSamples.length + ' @ 44100 Hz (eSpeak-ng native rate)\n' +
                            'Duration: ' + (combinedSamples.length / 44100).toFixed(2) + ' seconds\n' +
                            'Chunks: ' + allSamples.length + '\n' +
                            'Max amplitude: ' + maxValue.toFixed(3) + '\n' +
                            'AudioContext sample rate: ' + audioContext.sampleRate;
                        
                        isPlaying = true;
                    } catch (error) {
                        console.error('Audio playback error:', error);
                        document.getElementById('result').textContent = 
                            'Audio playback error: ' + error.message;
                    }
                }
            });
        }
        
        function getVoices() {
            tts.list_voices(function(voices) {
                document.getElementById('result').textContent = 
                    'Available voices:\n' + JSON.stringify(voices, null, 2);
            });
        }
    </script>
</body>
</html>
