<!DOCTYPE html>
<html>
<head>
    <title>eSpeak-ng Phoneme Extraction Test</title>
    <meta charset="utf-8">
    <script type="text/javascript" src="../dist/espeak-ng/espeakng.min.js"></script>
</head>
<body>
    <h1>eSpeak-ng Phoneme Extraction Test</h1>
    <p>Testing different methods to extract phonemes from eSpeak-ng</p>
    
    <div>
        <label>Text: <input type="text" id="text" value="Hello world" size="40"></label>
        <button onclick="testAllMethods()">Test All Methods</button>
    </div>
    
    <div>
        <h3>Results:</h3>
        <pre id="result" style="background: #f0f0f0; padding: 10px; font-family: monospace;"></pre>
    </div>
    
    <script>
        let tts;
        let output = '';
        
        window.onload = function() {
            tts = new eSpeakNG('../dist/espeak-ng/espeakng.worker.js', function() {
                document.getElementById('result').textContent = 'eSpeak-ng ready!';
            });
        };
        
        function addOutput(text) {
            output += text + '\n';
            document.getElementById('result').textContent = output;
        }
        
        function testAllMethods() {
            const text = document.getElementById('text').value;
            output = '';
            addOutput('Testing: "' + text + '"\n');
            
            // Test 1: Check available methods
            addOutput('=== Available Methods ===');
            for (let key in tts) {
                if (typeof tts[key] === 'function') {
                    addOutput('  ' + key);
                }
            }
            addOutput('');
            
            // Test 2: Try synthesize_ipa if it exists
            if (tts.synthesize_ipa) {
                addOutput('=== Testing synthesize_ipa ===');
                tts.synthesize_ipa(text, function(result) {
                    addOutput('IPA Result: ' + JSON.stringify(result, null, 2));
                });
            } else {
                addOutput('synthesize_ipa method not found');
            }
            
            // Test 3: Analyze synthesis events
            addOutput('\n=== Testing synthesis events ===');
            let eventLog = [];
            let callCount = 0;
            
            tts.set_voice.apply(tts, ['en']);
            tts.synthesize(text, function(samples, events) {
                callCount++;
                
                if (events && events.length > 0) {
                    for (const event of events) {
                        eventLog.push({
                            callback: callCount,
                            event: event
                        });
                    }
                }
                
                if (samples === undefined) {
                    // Synthesis complete
                    addOutput('Total callbacks: ' + callCount);
                    addOutput('All events:');
                    addOutput(JSON.stringify(eventLog, null, 2));
                    
                    // Analyze phoneme events
                    const phonemeEvents = eventLog.filter(e => e.event.type === 'phoneme');
                    addOutput('\nPhoneme events only: ' + phonemeEvents.length);
                    
                    if (phonemeEvents.length > 0) {
                        addOutput('First phoneme event:');
                        addOutput(JSON.stringify(phonemeEvents[0], null, 2));
                    }
                    
                    // Test 4: Check worker communication
                    testWorkerMethods();
                }
            });
        }
        
        function testWorkerMethods() {
            addOutput('\n=== Testing Worker Methods ===');
            
            // Check if we can access internal methods
            if (tts._worker) {
                addOutput('Worker exists');
                
                // Try to send custom message
                try {
                    // This is just a test to see what happens
                    addOutput('Attempting to get IPA phonemes...');
                    
                    // Try different approaches
                    const testApproaches = [
                        { method: 'get_ipa', args: ['Hello world'] },
                        { method: 'text_to_phonemes', args: ['Hello world'] },
                        { method: 'phonemize', args: ['Hello world'] },
                        { method: 'get_phonemes', args: ['Hello world'] }
                    ];
                    
                    for (const approach of testApproaches) {
                        try {
                            if (tts[approach.method]) {
                                addOutput(`Found method: ${approach.method}`);
                            }
                        } catch (e) {
                            // Silent fail
                        }
                    }
                } catch (error) {
                    addOutput('Worker test error: ' + error.message);
                }
            } else {
                addOutput('No direct worker access');
            }
            
            // Final summary
            addOutput('\n=== Summary ===');
            addOutput('1. synthesize() provides basic phoneme events but not IPA');
            addOutput('2. Need to implement custom phoneme extraction in the wrapper');
            addOutput('3. Or use the text-to-phoneme mapping approach');
        }
    </script>
</body>
</html>
