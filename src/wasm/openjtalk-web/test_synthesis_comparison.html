<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>音声合成比較テスト</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .test-box {
            flex: 1;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            overflow-x: auto;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #45a049;
        }
        .comparison {
            margin-top: 20px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 8px;
        }
        .different {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>音声合成比較テスト</h1>
    
    <button onclick="runComparison()">両方のテキストを比較</button>
    
    <div class="container">
        <div class="test-box">
            <h2>短いテキスト: こんにちは、世界！</h2>
            <audio id="shortAudio" controls style="width: 100%;"></audio>
            <pre id="shortResult"></pre>
        </div>
        
        <div class="test-box">
            <h2>長いテキスト (最初の部分)</h2>
            <audio id="longAudio" controls style="width: 100%;"></audio>
            <pre id="longResult"></pre>
        </div>
    </div>
    
    <div class="comparison" id="comparison"></div>

    <script type="module">
        import { SimpleUnifiedPhonemizer } from '../src/simple_unified_api.js';
        
        let phonemizer = null;
        let onnxSession = null;
        let modelConfig = null;
        
        async function init() {
            phonemizer = new SimpleUnifiedPhonemizer();
            await phonemizer.initialize({
                openjtalk: {
                    jsPath: '../dist/openjtalk.js',
                    wasmPath: '../dist/openjtalk.wasm',
                    dictPath: '../assets/dict',
                    voicePath: '../assets/voice/mei_normal.htsvoice'
                }
            });
            
            // Load ONNX Runtime
            await loadScript('https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.min.js');
            
            // Load model
            const configResponse = await fetch('../models/ja_JP-test-medium.onnx.json');
            modelConfig = await configResponse.json();
            
            onnxSession = await ort.InferenceSession.create('../models/ja_JP-test-medium.onnx', {
                executionProviders: ['wasm'],
                graphOptimizationLevel: 'extended',
                enableMemPattern: true
            });
            
            console.log('Initialized');
        }
        
        window.runComparison = async function() {
            const shortText = 'こんにちは、世界！';
            const longText = 'こんにちは、OpenJTalkとPiperを使った音声合成のデモです。';
            
            // Process short text
            const shortData = await processText(shortText, 'shortResult', 'shortAudio');
            
            // Process long text
            const longData = await processText(longText, 'longResult', 'longAudio');
            
            // Compare
            compareResults(shortData, longData);
        }
        
        async function processText(text, resultId, audioId) {
            const resultEl = document.getElementById(resultId);
            const audioEl = document.getElementById(audioId);
            
            try {
                // Get phonemes
                const labels = await phonemizer.textToPhonemes(text, 'ja');
                const phonemes = phonemizer.extractPhonemes(labels, 'ja');
                
                // Convert to IDs
                const ids = [];
                const phonemeIdMap = modelConfig.phoneme_id_map;
                
                const mappingDetails = [];
                for (let i = 0; i < phonemes.length; i++) {
                    const phoneme = phonemes[i];
                    if (phonemeIdMap[phoneme]) {
                        ids.push(...phonemeIdMap[phoneme]);
                        mappingDetails.push({
                            index: i,
                            phoneme: phoneme,
                            charCode: phoneme.charCodeAt(0),
                            ids: phonemeIdMap[phoneme]
                        });
                    } else {
                        ids.push(...(phonemeIdMap['_'] || [0]));
                        mappingDetails.push({
                            index: i,
                            phoneme: phoneme,
                            charCode: phoneme.charCodeAt(0),
                            ids: phonemeIdMap['_'] || [0],
                            fallback: true
                        });
                    }
                }
                
                // Synthesize audio
                const audio = await synthesizeAudio(ids);
                
                // Create WAV
                const wavBlob = createWAV(audio, modelConfig.audio.sample_rate);
                const audioUrl = URL.createObjectURL(wavBlob);
                audioEl.src = audioUrl;
                
                // Display results
                let result = `テキスト: ${text}\n`;
                result += `音素数: ${phonemes.length}\n`;
                result += `ID数: ${ids.length}\n`;
                result += `音声長: ${(audio.length / modelConfig.audio.sample_rate).toFixed(2)}秒\n\n`;
                
                result += `音素詳細:\n`;
                for (let i = 0; i < Math.min(10, mappingDetails.length); i++) {
                    const detail = mappingDetails[i];
                    const hex = detail.charCode.toString(16).padStart(4, '0');
                    result += `[${detail.index}] "${detail.phoneme}" (U+${hex}) → [${detail.ids.join(',')}]`;
                    if (detail.fallback) result += ' (fallback)';
                    result += '\n';
                }
                if (mappingDetails.length > 10) {
                    result += `... (${mappingDetails.length - 10} more)\n`;
                }
                
                resultEl.textContent = result;
                
                return {
                    text: text,
                    phonemes: phonemes,
                    ids: ids,
                    mappingDetails: mappingDetails,
                    audioLength: audio.length
                };
                
            } catch (error) {
                resultEl.textContent = `エラー: ${error.message}`;
                console.error(error);
                return null;
            }
        }
        
        function compareResults(shortData, longData) {
            if (!shortData || !longData) return;
            
            const comparisonEl = document.getElementById('comparison');
            let result = '<h3>比較結果</h3>';
            
            // Compare first 10 phonemes
            result += '<h4>最初の10音素の比較:</h4>';
            result += '<table border="1" cellpadding="5">';
            result += '<tr><th>位置</th><th>短いテキスト</th><th>長いテキスト</th><th>同じ？</th></tr>';
            
            for (let i = 0; i < 10 && i < Math.min(shortData.phonemes.length, longData.phonemes.length); i++) {
                const shortP = shortData.phonemes[i];
                const longP = longData.phonemes[i];
                const same = shortP === longP;
                
                const shortHex = shortP.charCodeAt(0).toString(16).padStart(4, '0');
                const longHex = longP.charCodeAt(0).toString(16).padStart(4, '0');
                
                result += '<tr>';
                result += `<td>${i}</td>`;
                result += `<td>"${shortP}" (U+${shortHex})</td>`;
                result += `<td>"${longP}" (U+${longHex})</td>`;
                result += `<td class="${same ? '' : 'different'}">${same ? '✓' : '✗'}</td>`;
                result += '</tr>';
            }
            result += '</table>';
            
            // Compare ID mappings
            result += '<h4>IDマッピングの比較 (最初の10個):</h4>';
            result += '<pre>';
            for (let i = 0; i < 10 && i < Math.min(shortData.ids.length, longData.ids.length); i++) {
                if (shortData.ids[i] !== longData.ids[i]) {
                    result += `<span class="different">位置 ${i}: ${shortData.ids[i]} vs ${longData.ids[i]}</span>\n`;
                }
            }
            result += '</pre>';
            
            comparisonEl.innerHTML = result;
        }
        
        async function synthesizeAudio(phonemeIds) {
            const inputTensor = new ort.Tensor('int64', 
                new BigInt64Array(phonemeIds.map(id => BigInt(id))), 
                [1, phonemeIds.length]
            );
            
            const lengthTensor = new ort.Tensor('int64', 
                new BigInt64Array([BigInt(phonemeIds.length)]), 
                [1]
            );
            
            const scalesTensor = new ort.Tensor('float32', 
                new Float32Array([
                    modelConfig.inference.noise_scale || 0.667,
                    modelConfig.inference.length_scale || 1.0,
                    modelConfig.inference.noise_w || 0.8
                ]), 
                [3]
            );
            
            const feeds = {
                'input': inputTensor,
                'input_lengths': lengthTensor,
                'scales': scalesTensor
            };
            
            const results = await onnxSession.run(feeds);
            const audioTensor = results['output'] || results[Object.keys(results)[0]];
            
            return new Float32Array(audioTensor.data);
        }
        
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }
        
        function createWAV(audioData, sampleRate) {
            const length = audioData.length;
            const arrayBuffer = new ArrayBuffer(44 + length * 2);
            const view = new DataView(arrayBuffer);
            
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };
            
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, length * 2, true);
            
            const offset = 44;
            for (let i = 0; i < length; i++) {
                const val = Math.max(-1, Math.min(1, audioData[i]));
                const int16 = val < 0 ? val * 0x8000 : val * 0x7FFF;
                view.setInt16(offset + i * 2, int16, true);
            }
            
            return new Blob([arrayBuffer], { type: 'audio/wav' });
        }
        
        init();
    </script>
</body>
</html>
