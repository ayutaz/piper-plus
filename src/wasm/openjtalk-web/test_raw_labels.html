<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>生ラベル出力テスト</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .test-box {
            border: 1px solid #ccc;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            white-space: pre-wrap;
            font-size: 12px;
        }
        .label-line {
            padding: 2px 0;
        }
        .phoneme-highlight {
            background: #ffeb3b;
            padding: 0 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>生ラベル出力テスト</h1>
    
    <div class="test-box">
        <h2>短いテキスト: こんにちは、世界！</h2>
        <button onclick="testShort()">ラベル取得</button>
        <pre id="shortLabels"></pre>
        <div id="shortPhonemes"></div>
    </div>
    
    <div class="test-box">
        <h2>長いテキスト: こんにちは、OpenJTalkとPiperを使った音声合成のデモです。</h2>
        <button onclick="testLong()">ラベル取得</button>
        <pre id="longLabels"></pre>
        <div id="longPhonemes"></div>
    </div>

    <script type="module">
        import { SimpleUnifiedPhonemizer } from '../src/simple_unified_api.js';
        
        let phonemizer = null;
        
        async function init() {
            phonemizer = new SimpleUnifiedPhonemizer();
            await phonemizer.initialize({
                openjtalk: {
                    jsPath: '../dist/openjtalk.js',
                    wasmPath: '../dist/openjtalk.wasm',
                    dictPath: '../assets/dict',
                    voicePath: '../assets/voice/mei_normal.htsvoice'
                }
            });
            console.log('Initialized');
        }
        
        window.testShort = async function() {
            await testText('こんにちは、世界！', 'shortLabels', 'shortPhonemes');
        }
        
        window.testLong = async function() {
            await testText('こんにちは、OpenJTalkとPiperを使った音声合成のデモです。', 'longLabels', 'longPhonemes');
        }
        
        async function testText(text, labelsId, phonemesId) {
            const labelsEl = document.getElementById(labelsId);
            const phonemesEl = document.getElementById(phonemesId);
            
            try {
                // Get raw labels
                const labels = await phonemizer.textToPhonemes(text, 'ja');
                
                // Display raw labels with phoneme highlighting
                const lines = labels.split('\n').filter(line => line.trim());
                let labelHtml = '';
                lines.forEach((line, i) => {
                    const match = line.match(/\-([^+]+)\+/);
                    if (match) {
                        const phoneme = match[1];
                        const highlightedLine = line.replace(
                            /\-([^+]+)\+/,
                            '-<span class="phoneme-highlight">$1</span>+'
                        );
                        labelHtml += `<div class="label-line">${i}: ${highlightedLine}</div>`;
                    } else {
                        labelHtml += `<div class="label-line">${i}: ${line}</div>`;
                    }
                });
                labelsEl.innerHTML = labelHtml;
                
                // Extract and display phonemes
                const phonemes = phonemizer.extractPhonemes(labels, 'ja');
                
                // Show phonemes with details
                let phonemeInfo = '<h3>抽出された音素:</h3>';
                phonemeInfo += '<p><strong>音素列:</strong> ' + phonemes.join(' ') + '</p>';
                phonemeInfo += '<p><strong>音素数:</strong> ' + phonemes.length + '</p>';
                
                // Check for multi-character phonemes
                const multiCharPhonemes = ['br', 'ch', 'cl', 'dy', 'gy', 'hy', 'ky', 'my', 'ny', 'py', 'ry', 'sh', 'ts', 'ty'];
                const foundMultiChar = [];
                
                lines.forEach(line => {
                    const match = line.match(/\-([^+]+)\+/);
                    if (match && match[1] !== 'sil') {
                        if (multiCharPhonemes.includes(match[1])) {
                            foundMultiChar.push(match[1]);
                        }
                    }
                });
                
                if (foundMultiChar.length > 0) {
                    phonemeInfo += '<p><strong>多文字音素:</strong> ' + foundMultiChar.join(', ') + '</p>';
                }
                
                // Check for Unicode replacements
                const unicodePhonemes = phonemes.filter(p => p.charCodeAt(0) >= 0xe000 && p.charCodeAt(0) <= 0xe00d);
                if (unicodePhonemes.length > 0) {
                    phonemeInfo += '<p><strong>Unicode変換された音素:</strong> ';
                    unicodePhonemes.forEach(p => {
                        phonemeInfo += `${p} (U+${p.charCodeAt(0).toString(16)}) `;
                    });
                    phonemeInfo += '</p>';
                }
                
                phonemesEl.innerHTML = phonemeInfo;
                
            } catch (error) {
                labelsEl.innerHTML = `<div style="color: red;">エラー: ${error.message}</div>`;
                console.error(error);
            }
        }
        
        init();
    </script>
</body>
</html>
