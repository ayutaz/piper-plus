# cmake-format configuration for piper-plus CMake files
#
# Used by cmake-format (https://github.com/cheshirekow/cmake_format) to
# normalize cmake/*.cmake and CMakeLists.txt files. Wave 1: optional —
# the formatter is not enforced via pre-commit yet.
#
# To run locally:
#   pip install cmake-format
#   cmake-format -i CMakeLists.txt cmake/*.cmake
format:
  line_width: 100
  tab_size: 4
  use_tabchars: false
  separate_ctrl_name_with_space: false
  separate_fn_name_with_space: false
  dangle_parens: false
  max_pargs_hwrap: 4
  max_subgroups_hwrap: 2

markup:
  bullet_char: '-'
  enum_char: '.'
  first_comment_is_literal: false

lint:
  disabled_codes: []
  function_pattern: '[0-9a-z_]+'
  macro_pattern: '[0-9A-Z_]+'
  global_var_pattern: '[A-Z][0-9A-Z_]+'
  internal_var_pattern: '_[A-Z][0-9A-Z_]+'
  local_var_pattern: '[a-z][a-z0-9_]+'
  private_var_pattern: '_[0-9a-z_]+'
  public_var_pattern: '[A-Z][0-9A-Z_]+'
  keyword_pattern: '[A-Z][0-9A-Z_]+'

encode:
  emit_byteorder_mark: false
  input_encoding: utf-8
  output_encoding: utf-8
