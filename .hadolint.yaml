# hadolint configuration for piper-plus
# https://github.com/hadolint/hadolint

# Ignored rules (with rationale):
ignored:
  - DL3008  # Pin versions in apt-get install
            # Rationale: piper-plus uses apt-get with `--no-install-recommends`
            # but versions are not always pinned for libonnxruntime-dev /
            # libsndfile-dev which we want to track Ubuntu LTS updates.
  - DL3013  # Pin versions in pip install
            # Rationale: pip is invoked via uv lock-file which already pins;
            # individual `pip install` lines may use unpinned for utility tools.
  - DL3007  # Always tag the version of an image explicitly (latest)
            # Rationale: not applicable in our Dockerfiles (we use specific tags)
  - DL3018  # Pin versions in apk add
            # Rationale: only relevant if alpine-based; our images use debian/ubuntu
  - DL3059  # Multiple consecutive RUN instructions
            # Rationale: layer separation is intentional in our multi-stage builds
            # for cache granularity (rebuilding wheels shouldn't bust pip-install
            # layers). info-level rule, not worth consolidating into one RUN.

trustedRegistries:
  - docker.io
  - ghcr.io
  - quay.io
  - registry.hub.docker.com
  - nvcr.io
  - mcr.microsoft.com
  # gcr.io/distroless: Google-maintained distroless base images
  # (https://github.com/GoogleContainerTools/distroless). Used by
  # docker/python-inference/Dockerfile.cpu.distroless final stage.
  # Debian-glibc baseline, no shell / package manager, UID 65532
  # nonroot by default. Trusted alongside the other vendor registries
  # because distroless is the canonical "minimal supply chain" choice
  # for container images that ship just CPython + a single workload.
  - gcr.io
  # cgr.dev/chainguard: Chainguard's Wolfi-based minimal images. Used
  # by docker/cpp-dev/Dockerfile.distroless (wolfi-base + apk add for
  # dev tooling). Wolfi is to-the-bone minimal (BusyBox shell + glibc),
  # rebuilt continuously upstream, with substantially smaller CVE
  # exposure than ubuntu:24.04. Trusted on the same footing as gcr.io
  # for the same supply-chain reason.
  - cgr.dev

# Failure threshold: error (DL3xxx warnings won't fail, DL3xxx errors will)
# Use --failure-threshold error to make hadolint exit non-zero only on errors.
override:
  error:
    - DL3000  # absolute WORKDIR
    - DL3002  # last USER root
    - DL3025  # JSON arrays form for CMD/ENTRYPOINT
    - DL4000  # MAINTAINER deprecated
    - DL4006  # Set the SHELL option -o pipefail before RUN with a pipe
