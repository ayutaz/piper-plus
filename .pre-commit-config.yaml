# Pre-commit hooks for piper-plus.
#
# # Setup (one-time per clone):
#   pip install pre-commit  # or `uvx pre-commit`
#   pre-commit install      # writes .git/hooks/pre-commit
#
# # Daily use:
#   git commit ...          # hooks run automatically on staged files
#   pre-commit run --all-files  # manual full-repo check
#
# # CI mirror:
#   .github/workflows/pre-commit.yml runs `pre-commit run --all-files` on
#   every PR. Even contributors that skip `pre-commit install` will see drift
#   blocked at PR time, not after 5 separate runs of cycle-of-shame ruff
#   format commits (cf. PR #401 commits 5d9c60e6 / 8dc19e3b).
#
# # Version pinning:
#   ruff version below MUST match the version pinned in
#   .github/workflows/python-lint.yml (currently 0.12.5). Drift between
#   pre-commit and CI = local-clean / CI-fail mismatch (PR #401 cause).

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # Standard whitespace / syntax hooks (cross-language drift catchers).
  # Addresses recurring symptom-treatment commits that should be auto-fixed
  # at commit time instead of round-trip through CI.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # Markdown intentional double-space-newline = forced line break.
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        # Some workflows use GitHub Actions extensions (`!reference`) that
        # PyYAML can't parse without `--unsafe`. Workflow YAML is validated
        # in actual job runs anyway; this is a syntax-error-only catch.
        args: [--unsafe]
      - id: check-json
        # Exclude:
        #   - invalid_json.json: intentionally malformed test fixture for
        #     parsers that need to handle unparseable input gracefully.
        #   - default_common_dict.json: dictionary uses duplicate keys by
        #     design (e.g. "Debug" entry appears twice with different
        #     contexts) — application spec, not a JSON correctness issue.
        exclude: |
          (?x)^(
            src/go/piperplus/testdata/invalid_json\.json |
            data/dictionaries/default_common_dict\.json |
            src/wasm/openjtalk-web/assets/default_common_dict\.json
          )$
      - id: check-added-large-files
        # Block accidental large model checkpoint commits. Use git LFS or
        # external storage instead.
        args: [--maxkb=2048]

  # ---------------------------------------------------------------------------
  # Rust formatter — addresses ae68abc1 (rustfmt drift across 5+ .rs files).
  # `cargo fmt --check` exits non-zero if any .rs file needs reformatting.
  # We use a `language: system` local hook so the version follows the
  # project's pinned toolchain (rust-toolchain.toml) instead of a vendored
  # rev that drifts from CI.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check (Rust)
        entry: bash -c 'cd src/rust && cargo fmt --all -- --check'
        language: system
        files: \.rs$
        pass_filenames: false
      - id: gofmt
        name: gofmt -l (Go)
        # gofmt -l prints files that are not gofmt'd; we treat any output
        # as a failure. Use awk to convert "any line of output" -> exit 1.
        entry: bash -c 'out=$(gofmt -l src/go); if [ -n "$out" ]; then echo "gofmt drift:"; echo "$out"; exit 1; fi'
        language: system
        files: \.go$
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # Cross-language lint hooks — added 2026-05 after PR #401 cycle of shame.
  #
  # Why these run at commit time (not push / CI only): repeated round-trips
  # through CI to fix lint drift cost much more than waiting locally. The
  # heaviest hooks (cargo clippy ~30-120s, dotnet format ~30-60s on a cold
  # cache) are still cheaper than a CI red mark + push round-trip.
  #
  # Skip rules (user-side):
  #   git commit --no-verify              # bypass once (CI still gates)
  #   SKIP=cargo-clippy git commit ...    # skip a specific hook
  #   SKIP=cargo-clippy,dotnet-format ... # skip multiple
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: mypy-g2p
        name: mypy --ignore-missing-imports (g2p, Python)
        # Mirror of .github/workflows/g2p-python-ci.yml step.
        entry: bash -c 'cd src/python/g2p && uv run mypy --ignore-missing-imports piper_plus_g2p/'
        language: system
        files: ^src/python/g2p/piper_plus_g2p/.*\.py$
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy --workspace --all-features --all-targets -- -D warnings (Rust)
        # Mirror of .github/workflows/rust-tests.yml step. Catches issues
        # like needless_range_loop / collapsible_if / items_after_test_module
        # / absurd_extreme_comparisons before they hit CI (PR #401 needed
        # 4 follow-up commits for these).
        entry: bash -c 'cd src/rust && cargo clippy --workspace --all-features --all-targets -- -D warnings'
        language: system
        files: \.rs$
        pass_filenames: false

      - id: go-vet
        name: go vet (Go)
        # Mirror of .github/workflows/go-ci.yml step. Catches assignments
        # to undefined fields, unreachable code, etc.
        entry: bash -c 'cd src/go && go vet ./... ./phonemize/...'
        language: system
        files: \.go$
        pass_filenames: false

      - id: dotnet-format
        name: dotnet format --verify-no-changes (C#)
        # Mirror of .github/workflows/csharp-ci.yml + ci.yml. Heavy on a cold
        # cache (~60s) but seconds once the SDK has materialized the analyzer
        # cache. Use SKIP=dotnet-format on tiny non-C# commits if needed.
        #
        # Requires .NET SDK matching global.json (currently 10.0.100).
        # If the SDK is missing the hook *skips with a warning* rather than
        # blocking commits — CI still gates merges. Install .NET 10 from
        # https://dotnet.microsoft.com/download/dotnet/10.0 to enable.
        entry: scripts/hooks/dotnet-format-check.sh
        language: system
        files: \.cs$
        pass_filenames: false

      - id: golangci-lint
        name: golangci-lint run (Go)
        # Mirror of .github/workflows/go-ci.yml + g2p-go-publish.yml. Skips
        # with a warning when the binary is absent — CI still gates. Install
        # via `brew install golangci-lint` to enable locally.
        entry: scripts/hooks/golangci-lint-check.sh
        language: system
        files: ^src/go/.*\.go$
        pass_filenames: false

  # PUA-related checks. These only run when files in the regression-prone
  # set actually change, so the typical `git commit` is unaffected.
  - repo: local
    hooks:
      - id: pua-cross-runtime-consistency
        name: PUA cross-runtime consistency (6 runtime tables vs pua.json)
        entry: python scripts/check_pua_consistency.py --check-version
        language: system
        # Mirror of paths in .github/workflows/pua-consistency.yml
        files: ^(src/python/g2p/piper_plus_g2p/data/pua\.json|src/python/g2p/piper_plus_g2p/encode/.+|src/python_run/piper/phonemize/token_mapper\.py|src/rust/piper-plus-g2p/src/token_map\.rs|src/go/phonemize/pua\.go|src/go/phonemize/pua_test\.go|src/wasm/g2p/src/pua-map\.js|src/csharp/PiperPlus\.Core/Mapping/OpenJTalkToPiperMapping\.cs|src/cpp/phoneme_parser\.cpp)$
        pass_filenames: false

      - id: pua-fixture-drift
        name: Test fixture in sync with pua.json
        entry: python scripts/regenerate_test_fixture.py --check
        language: system
        files: ^(src/python/g2p/piper_plus_g2p/data/pua\.json|tests/fixtures/g2p/phoneme_test_cases\.json)$
        pass_filenames: false
