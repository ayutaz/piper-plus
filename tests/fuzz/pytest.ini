[pytest]
# Local pytest config for the property-based fuzz suite.
#
# Why a local config?
#   The repo-root pytest.ini enforces --cov-fail-under=70 on
#   piper / piper_train, which would fail any narrowly-scoped fuzz run.
#   The fuzz suite intentionally exercises only SSML / text_splitter / PUA
#   modules. We invoke pytest with `-c tests/fuzz/pytest.ini` from the
#   `.github/workflows/fuzz-smoke.yml` workflow.
#
# Treat hypothesis-generated FailedHealthCheck etc. as errors (default).

python_files = test_*.py
python_functions = test_*

addopts =
    --strict-markers
    --tb=short
    -ra

# Hypothesis sometimes triggers DeprecationWarning from third-party libs
# (e.g. importlib resources). We do NOT escalate warnings to errors here
# because fuzz inputs can plausibly trigger benign internal warnings;
# crash detection comes from explicit `assert` failures in test bodies.
filterwarnings =
    default
