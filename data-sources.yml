# Canonical metadata for datasets used to train the 6-language multilingual
# base model + downstream fine-tunes. Consumed by
# `scripts/generate_model_card.py` to populate MODEL_CARD.md and
# LICENSE_ATTRIBUTIONS.md on HF Hub release.
#
# A `verified: false` entry means the license was inferred from upstream
# README / dataset card but has not been confirmed by a maintainer. Such
# entries are emitted in MODEL_CARD with a visible warning; once a human
# checks them, flip `verified` to `true`.
#
# Schema is forward-compatible: extra keys on a dataset are passed through
# but new top-level keys are ignored until the script learns about them.

schema_version: 1
last_reviewed: "2026-05-18"
review_period_months: 3

datasets:
