version: '3.8'

services:
  python-train:
    build:
      context: ./docker/python-train
      dockerfile: Dockerfile
    image: piper-python-train:latest
    container_name: piper-python-train
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - WANDB_API_KEY=${WANDB_API_KEY:-}
    volumes:
      - ./:/workspace
      - ./datasets:/workspace/datasets
      - ./checkpoints:/workspace/checkpoints
      - ./logs:/workspace/logs
    ports:
      - "6006:6006"  # TensorBoard
      - "8888:8888"  # Jupyter
    networks:
      - piper-network
    command: /bin/bash

  python-inference:
    build:
      context: ./docker/python-inference
      dockerfile: Dockerfile
    image: piper-python-inference:latest
    container_name: piper-python-inference
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./models:/app/models:ro
      - ./output:/app/output
    ports:
      - "8000:8000"  # API server
    networks:
      - piper-network
    command: ["python", "inference.py", "--server", "--model", "/app/models/en_US-amy-low.onnx"]

  cpp-train:
    build:
      context: ./docker/cpp-train
      dockerfile: Dockerfile
    image: piper-cpp-train:latest
    container_name: piper-cpp-train
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./:/workspace
      - ccache:/workspace/.ccache
    networks:
      - piper-network
    command: /bin/bash

  cpp-inference:
    build:
      context: ./docker/cpp-inference
      dockerfile: Dockerfile
      args:
        BUILDER_IMAGE: piper-cpp-train:latest
    image: piper-cpp-inference:latest
    container_name: piper-cpp-inference
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - MODEL_PATH=/app/models/en_US-amy-low.onnx
    volumes:
      - ./models:/app/models:ro
      - ./output:/app/output
      - ./build/piper:/usr/local/bin/piper:ro
    networks:
      - piper-network
    stdin_open: true
    tty: true

networks:
  piper-network:
    driver: bridge

volumes:
  ccache:
    driver: local