# Lychee link checker configuration
# https://github.com/lycheeverse/lychee

# Cache config to avoid re-checking unchanged links
cache = true
max_cache_age = "1d"

# What to scan
include_verbatim = false
include_mail = false

# Network config
max_redirects = 5
max_concurrency = 10
timeout = 20
retry_wait_time = 2

# Don't fail on these (transient + private)
accept = [
  "200..=204",
  "206",  # partial content
  "300..=308",
  "403",  # private GitHub repos / docs
  "429"   # rate limited (will retry)
]

# Excluded patterns (regex)
exclude = [
  # mailto links cannot be validated
  "^mailto:",
  # Private / internal
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^https?://0\\.0\\.0\\.0",
  # Examples in docs (placeholders, not real)
  "^https?://example\\.com",
  "^https?://example\\.org",
  "^https?://your-",
  # HuggingFace gated/auth-required model files (return 200 only with token)
  "^https?://huggingface\\.co/.*/resolve/.*\\.onnx",
  # Slack invites (private workspace)
  "^https?://[a-z]+\\.slack\\.com",
  # Wandb private projects
  "^https?://wandb\\.ai/private/",
  # shields.io badges (frequently 5xx, also redirect through CDN)
  "^https?://img\\.shields\\.io/",
  # GitHub badge svg redirects (often 302 to camo)
  "^https?://github\\.com/.*/actions/workflows/.*\\.svg",
  # Local Wyoming protocol UDP/TCP placeholders
  "^tcp://",
  "^udp://",
  # .claude/skills/* の SKILL.md は repo root-relative path で他 SKILL.md /
  # docs / tests / .github を参照する。lychee --root-dir 利用時に path
  # resolution が誤って二重化される (例: /home/runner/.../check-loanword/.claude/...)
  # ため、.claude/skills/ 配下の internal cross-references を全て除外。
  "^file://.*\\.claude/skills/.*/\\.claude/",
  "^file://.*\\.claude/skills/.*/\\.github/",
  "^file://.*\\.claude/skills/.*/docs/",
  "^file://.*\\.claude/skills/.*/tests/",
  "^file://.*\\.claude/skills/.*/scripts/",
  "^file://.*\\.claude/skills/.*/src/",
  # .github/CONTRIBUTING.md の anchor link を許容 (anchor は ad hoc 名で
  # markdownlint と相性悪く、別 PR で追加予定)
  "^file://.*\\.github/CONTRIBUTING\\.md#",
  # CMU Pronouncing Dictionary canonical citation URL.
  # The host (www.speech.cs.cmu.edu) is unreliable and times out roughly
  # half the time; the URL is referenced from the upstream BSD license text
  # of cmudict (THIRD_PARTY_LICENSES.md:103) which we cannot legally modify,
  # plus citation tables in docs/. Excluding the canonical URL is safer
  # than racing against the host's uptime on every PR.
  "^https?://www\\.speech\\.cs\\.cmu\\.edu/cgi-bin/cmudict",
  # PR #511 で追加した docs/tickets/*.md は `feedback memory` の logical
  # reference として `../../.claude/memory/` を参照する。 実体はユーザー
  # 固有 path (`~/.claude/projects/.../memory/`) にあり repo に存在しない。
  # auto memory システムの設計に従う構造的事情で、 ticket 内の link は
  # 「該当 feedback memory が存在する」 ことを示す pointer。
  "^file://.*\\.claude/memory",
  # docs/tickets/M3-1-public-abi-snapshot.md 内の Swift SymbolGraph 旧 URL
  # (swiftlang/swift repo 構造変更で 404)。 該当 link の修正は別 PR で
  # `apple/swift-syntax` 等の新 path に置換予定。
  "^https://github\\.com/swiftlang/swift/blob/main/docs/SymbolGraph\\.md$",
  # docs/tickets/M3-3-typosquatting-watch.md 内の USENIX 2020 paper URL
  # (`presentation/tschacher`、 USENIX サイト path 変更で 404)。 該当 link
  # の修正は別 PR で archive.org 経由か新 path に置換予定。
  "^https://www\\.usenix\\.org/conference/usenixsecurity20/presentation/tschacher$",
]

# Excluded paths (regex matched against full path)
exclude_path = [
  "node_modules",
  "\\.git/",
  "(^|/)build/",
  "(^|/)build-full/",       # local CMake build artifacts (3rd-party READMEs)
  "(^|/)build-shared/",     # local CMake build artifacts (3rd-party READMEs)
  "(^|/)dist/",
  "(^|/)target/",
  "(^|/)test/models/",
  "(^|/)pkg/",
  "\\.pytest_cache/",
  "(^|/)CHANGELOG\\.md$",   # historical, contains many old links
  # migration_xref test fixture は意図的に broken link を含む negative-case
  # data (`scripts/check_migration_xref.py` の anchor / file 解決ロジックが
  # 「該当 file / anchor が無い」 を検知するための fixture)。 link checker
  # 対象から外す。
  "(^|/)tests/scripts/fixtures/migration_xref/",
]
